  "LOGGING": "# Logging\n\n**spec_v4 \u00b7 2026-03-11**\n\n---\n\n## What Logging Is For\n\nLogging lets the platform display what an operation did, what went wrong, and how long\nthings took \u2014 without running the operation again or reading the source code.\n\nA log file is the operation's permanent record. It outlasts the process. The platform\nstores it; the user can read it days later.\n\n---\n\n## What the Platform Expects\n\nThe platform looks for log files in a predictable location with a predictable name.\nWhen it finds them, it displays them in the log viewer.\n\n**Location:** A `logs/` directory within the project (e.g., `data/logs/`)\n**Naming:** `{OperationName}_{YYYYMMDD_HHMMSS}.log`\n\nIf the file exists and matches this pattern, the platform displays it. The script is\nresponsible for writing to this location. The platform never writes log files itself.\n\n---\n\n## What Goes in a Log\n\nA log file should contain everything the operation printed to the terminal \u2014 both normal\noutput and error output, interleaved in the order it was produced.\n\nThe platform displays log files as-is. No special format is required inside the file.\nTimestamps on individual lines are helpful but not required.\n\n---\n\n## The [GAME] Line Protocol\n\nWithin the log output, lines prefixed with `[GAME]` are parsed by the platform for\nstatus information. These lines should appear in the log file the same as any other output.\n\n| Line | Platform Action |\n|------|----------------|\n| `[GAME] Service Starting: <name>` | Sets status to STARTING |\n| `[GAME] Service Started: <name>` | Sets status to RUNNING |\n| `[GAME] Service Stopped: <name>` | Sets status to STOPPED |\n\nAll other `[GAME]` lines are ignored by the platform but preserved in the log.\n\nThese lines do not replace normal log output. They are a signal layer on top of it.\n\n---\n\n## Log Retention\n\nLog files accumulate over time. The platform displays the most recent runs by default.\n\nA `bin/clean-logs.sh` operation can be provided to prune old files. No automatic\ncleanup is performed by the platform unless explicitly configured.\n\n---\n\n## What This Means for Feature Specifications\n\nFeatures that involve running operations (anything that calls a script) depend on this\nlogging contract being honored. Feature specs should state:\n\n- Whether the feature requires log output to function (e.g., the log viewer reads logs)\n- Whether the feature emits `[GAME]` status lines (e.g., an operation that starts a service)\n\nFeatures that do not run scripts have no logging requirements.\n",
  "METHODOLOGY": "# The Specification Methodology\n\n**spec_v4 \u00b7 2026-03-11**\n\n---\n\n## What This Is\n\nThis is a way of writing specifications so that an AI agent can build or rebuild a\nproject from them \u2014 without the original developer present, without prior context, and\nwithout guessing.\n\nThe key insight is that most project specs mix up two separate things:\n\n- **What the product does** \u2014 the features, the user experience, what gets stored, what\n  gets displayed\n- **How it is built** \u2014 the language, the database, the framework, the deployment model\n\nWhen these are mixed, the spec becomes outdated the moment a technology choice changes.\nAn AI session that reads it cannot tell whether a detail is a business requirement or an\nimplementation decision from two years ago.\n\nThis methodology keeps them separate.\n\n---\n\n## The Three Layers\n\n### Layer 1: What the Product Does\n\nThis is the feature specification. Each feature gets its own document. The document\ndescribes:\n\n- What problem it solves\n- What the user can do\n- What data flows in and out\n- Which other features it connects to\n- What the project must provide to enable this feature (the contract)\n\nNo technology words. No framework names. No database schemas. A feature spec written\ntoday should still describe the same product if the stack is replaced tomorrow.\n\n### Layer 2: The Contract\n\nThis is the binding layer between what the product does and how it is built.\n\nA contract is a plain text file that a project provides. The platform reads it. The\nplatform gains information about the project \u2014 what operations it supports, what its\nmetadata is, where it runs \u2014 without being told directly.\n\nContracts are files like `CLAUDE.md`, `git_homepage.md`, and the headers inside `bin/`\nscripts. They are committed to git alongside the code they describe. An AI agent reading\na contract file can derive everything it needs to interact with that project correctly.\n\nSee **THE-CONTRACT.md** for the full list of contracts with examples.\n\n### Layer 3: How It Is Built\n\nThis is the technical specification: stack choice, module structure, data models,\ninfrastructure. It answers \"how\" only. It must satisfy every contract declared in Layer 2.\n\nWhen an AI builds the project, it reads Layer 1 to understand what to build, Layer 2 to\nknow what artifacts to produce, and uses Layer 3 as the implementation guide.\n\n---\n\n## Why AI Needs This Structure\n\nAn AI agent working on a project without this structure must infer intent from code.\nThat works for isolated changes. It breaks for anything that requires understanding *why*\na design decision was made, *what* the intended user experience is, or *which features\nare not yet built*.\n\nWith this structure:\n\n- **Feature specs** tell the agent what to build and what the user expects\n- **Contracts** tell the agent what artifacts to produce (scripts, files, headers)\n- **Technical specs** tell the agent which tools and patterns to use\n\nAn agent can be dropped into any feature ticket, read three documents, and produce\ncorrect, consistent, platform-aware output.\n\n---\n\n## How Projects Earn Platform Capabilities\n\nThe platform (GAME) does not have a registration UI. Projects do not fill out forms.\nInstead, a project earns capabilities by implementing contracts.\n\n| A project provides... | The platform gives it... |\n|----------------------|--------------------------|\n| A `bin/start.sh` with a Name header | A \"Start\" button in the dashboard |\n| A `git_homepage.md` with Show: true | A card on the portfolio site |\n| A `CLAUDE.md` with endpoints | Clickable service links in the UI |\n| A declared port in a bin/ header | Automatic health monitoring |\n| Structured status messages in scripts | Live state tracking in the process monitor |\n\nNothing in this list requires changing the platform. A project adds the file; the\nplatform discovers the capability on the next scan.\n\n---\n\n## What the Specification Does Not Prescribe\n\n- Which programming language is used\n- Which database stores the data\n- Which framework serves the UI\n- Which cloud provider hosts the product\n- Which AI model implements the features\n\nThese are Layer 3 decisions. They belong in the technical spec, not here.\n\n---\n\n## The Purpose of This Document Set\n\nEvery document in this spec_v4 directory answers exactly one question:\n\n| Document | Question |\n|----------|---------|\n| METHODOLOGY.md (this file) | How does this specification work? |\n| THE-CONTRACT.md | What must a project provide? |\n| PERSISTENCE.md | How does a project store its own data? |\n| OPERATIONS.md | What must operational scripts expose? |\n| LOGGING.md | How do scripts produce observable output? |\n| features/*.md | What does each platform feature do? |\n\nAn AI agent building any part of the platform should read METHODOLOGY.md first, then the\nfeature spec for the feature being built, then the contracts relevant to that feature.\n",
  "OPERATIONS": "# Operations\n\n**spec_v4 \u00b7 2026-03-11**\n\n---\n\n## What Is an Operation?\n\nAn operation is a script in a project's `bin/` directory. The platform discovers it,\ngives it a button in the dashboard, runs it on demand, and monitors it while it runs.\n\nOperations can be written in any language \u2014 bash, Python, Node, or anything the host\nmachine can execute. The only requirement is the declaration block described in\n**THE-CONTRACT.md**.\n\n---\n\n## To Enable Platform Discovery\n\nAdd the declaration block to your script. See THE-CONTRACT.md, Contract 1.\n\n```\n# CommandCenter Operation\n# Name: Service Start\n# Port: 3000\n```\n\nWithout this block, the script is not visible to the platform. It still runs normally\nwhen invoked directly.\n\n---\n\n## To Enable Logging\n\nWrite all output (standard output and errors) to a file in addition to the terminal.\nName the file consistently so the platform can find and display it.\n\n**What to produce:**\n- A log file per run\n- Named with the operation name and a timestamp\n- Stored in a logs directory within the project\n\nThe platform reads these files to populate the log viewer. The exact mechanism (shell\nredirection, Python logging, etc.) is the script's choice \u2014 the platform looks for\nfiles matching the naming pattern.\n\n---\n\n## To Enable Status Tracking\n\nAnnounce when the operation starts and when it stops. Use a consistent prefix so the\nplatform can parse state transitions without interpreting arbitrary output.\n\n**What to produce:**\n- A \"starting\" message when the script begins\n- A \"started\" message when the service or process is ready\n- A \"stopped\" message when the script exits (by any means)\n\nThe prefix `[GAME]` is reserved for these messages. Other output can say anything.\n\nExample of what the messages communicate (not prescribing exact wording):\n```\n[GAME] Service Starting: Service Start\n[GAME] Service Started: Service Start on port 3000\n[GAME] Service Stopped: Service Start\n```\n\nThe platform watches for `[GAME]` prefixed lines to update the status badge without\nguessing from exit codes alone.\n\n---\n\n## To Enable Health Monitoring\n\nDeclare the port your service listens on in the operation header. The platform will\npoll that port periodically and show UP / DOWN status in the dashboard.\n\n```\n# Port: 3000\n```\n\nIf your service uses a non-root health endpoint (e.g., `/health` instead of `/`),\ndeclare it:\n\n```\n# Health: /health\n```\n\nIf no port is declared, health monitoring is not available for this operation.\n\n---\n\n## To Enable Clean Shutdown\n\nWhen your operation is stopped from the platform (via the Stop button), it receives a\ntermination signal. The script should:\n\n- Catch the signal\n- Emit a `[GAME] Service Stopped` message\n- Exit cleanly\n\nScripts that do not handle this will still be terminated \u2014 the `[GAME] Service Stopped`\nmessage will be absent, and the platform will mark the run as STOPPED rather than\nDONE.\n\n---\n\n## Naming Conventions\n\nThese names are not required but are recognized by the platform for default behaviors:\n\n| Script | Expected Purpose |\n|--------|----------------|\n| `bin/start.sh` | Start the development server |\n| `bin/stop.sh` | Stop the development server |\n| `bin/build.sh` | Run the build pipeline |\n| `bin/test.sh` | Run the test suite |\n| `bin/deploy.sh` | Deploy to production |\n\n---\n\n## Summary: What a Well-Formed Operation Provides\n\n| Capability | How |\n|-----------|-----|\n| Appears as a dashboard button | Declaration block with Name: |\n| Logs are viewable in platform | Write to log file with consistent naming |\n| Status badge updates live | Emit [GAME] prefixed status messages |\n| Health monitoring | Declare Port: in header |\n| Custom health check | Declare Health: path in header |\n| Clean shutdown | Handle termination signal; emit stopped message |\n\nAn operation that provides all of these is fully integrated with the platform. An\noperation that provides only the declaration block is still useful \u2014 it just has fewer\ncapabilities surfaced.\n",
  "PERSISTENCE": "# Project Metadata Persistence\n\n**spec_v4 \u00b7 2026-03-11**\n\n---\n\n## The Principle\n\nA project stores its own metadata in plain text files that live inside its repository.\nThe platform reads these files. The platform never owns the source of truth for a\nproject's description, settings, or state.\n\nThis means:\n- Project metadata travels with the project in git\n- An AI agent can read and update project metadata without a running platform\n- Metadata survives platform reinstalls, migrations, or stack changes\n- Humans can read and edit metadata in any text editor\n\n---\n\n## Where Data Lives\n\n### Data the Project Owns\n\nStored in files committed to the project's git repository.\n\n| What | Where | Format |\n|------|-------|--------|\n| AI working context | `CLAUDE.md` | Markdown with standard sections |\n| Portfolio card | `git_homepage.md` | YAML frontmatter |\n| Project links | `Links.md` | Markdown table |\n| Technology stack | `STACK.yaml` | YAML |\n| Operation scripts | `bin/*.sh` | Shell script with header |\n\nAn AI agent updating any of these files is updating persistent project state. No\ndatabase call needed. The change is immediately readable by the platform on the next\nscan.\n\n### Data the Platform Owns\n\nStored in the platform's own runtime database. This is derived data \u2014 it can be\nregenerated from the project files at any time.\n\n| What | Derived From |\n|------|-------------|\n| Project list | Filesystem scan |\n| Operation buttons | bin/ headers |\n| Endpoint links | CLAUDE.md sections |\n| Stack badges | STACK.yaml |\n| Portfolio card data | git_homepage.md |\n\nIf the platform database is deleted, a full scan restores all derived data from the\nsource files. Nothing is lost.\n\n### Data the Platform Adds\n\nSome data is added by the user through the platform UI and stored in the platform's\nown config files (also committed to git, but in the platform's repo):\n\n| What | Stored In |\n|------|-----------|\n| Tag colors | `data/tag_colors.json` (platform repo) |\n| Tag assignments | Platform database (derived from tags in git_homepage.md when possible) |\n| AI config profiles | `config_engine/profiles/` (platform repo) |\n\n---\n\n## How an AI Agent Persists Data\n\nWhen an AI agent needs to record something about a project \u2014 a decision, a setting, a\ncompleted feature \u2014 it edits the appropriate file in the project directory.\n\n**Example: Recording that a feature was completed**\n\nThe agent adds a line to `CLAUDE.md` under a `## Completed Features` section:\n\n```markdown\n## Completed Features\n- User authentication (2026-03-10)\n- Portfolio publishing (2026-02-28)\n```\n\nThe platform surfaces this on the next scan. The information is in git history. No\ndatabase update needed.\n\n**Example: Updating the portfolio card description**\n\nThe agent edits `git_homepage.md`:\n\n```yaml\n---\nTitle: My Project\nDescription: Updated description reflecting new capabilities.\nTags: web, tool\nShow on Homepage: true\n---\n```\n\nThe change is reflected in the portfolio on the next publish run. The agent does not\nneed access to the platform to make this change.\n\n---\n\n## What This Means for Feature Specifications\n\nEach feature spec that produces or consumes persistent data should state:\n\n- What data it needs to store\n- Which file it stores it in\n- What the format looks like (a brief example)\n\nThe spec does not need to describe a database schema. It describes a file section or\nYAML field that an AI agent can write and a human can read.\n",
  "SPEC_STANDARD_unused": "# Specification System Standard\n\nHow to use the PROJECT/ directory to specify, validate, and build any project. This document is the meta-standard \u2014 it describes the spec system itself.\n\n---\n\n## Architecture\n\nThe spec system has two tiers:\n\n### Tier 1: Technology Files (`stack/`)\n\nReusable best practices that **do not change between projects**. Each file maps to a STACK.yaml key:\n\n| STACK.yaml Key | File | Covers |\n|----------------|------|--------|\n| *(always)* | `stack/common.md` | Directory layout, bin/ scripts, Links.md, CLAUDE.md, git, dev workflow |\n| `language: python` | `stack/python.md` | Config, logging, testing, dependencies, startup validation |\n| `framework: flask` | `stack/flask.md` | App factory, blueprints, Jinja2, HTMX, test client |\n| `framework: django` | `stack/django.md` | Settings, ORM, migrations, admin, django-htmx |\n| `database: sqlite` | `stack/sqlite.md` | Connection, PRAGMAs, JSON columns, migrations, backup |\n| `database: postgres` | `stack/postgres.md` | Pooling, JSONB, numbered migrations, indexing, backup |\n| `frontend: bootstrap5` | `stack/bootstrap5.md` | CDN setup, dark theme, components, HTMX integration |\n\n### Tier 2: Specification Files (numbered, `NN-NAME.md`)\n\nProject-specific files that describe **what to build**. These reference technology files for implementation details.\n\n```\n01-OVERVIEW.md       # Purpose, features, dependencies\n02-DATABASE.md       # Schema, tables, data patterns\n03-SCANNER.md        # Feature: project discovery\n...\n11-STARTUP.md        # App initialization sequence\n```\n\n---\n\n## STACK.yaml\n\nThe manifest file that ties everything together. Every project has one.\n\n```yaml\n# --- Technology Stack ---\nlanguage: python          # \u2192 stack/python.md\nframework: flask          # \u2192 stack/flask.md\ndatabase: sqlite          # \u2192 stack/sqlite.md\nfrontend: bootstrap5      # \u2192 stack/bootstrap5.md\n\n# --- Project Configuration ---\nproject:\n  name: myproject\n  title: My Project\n  description: What it does\n  port: 5001\n  output_dir: ..          # Where to write generated code (relative to PROJECT/)\n  venv: true              # Whether to use a Python venv\n\n# --- Standard Directories ---\ndirectories:\n  data: data\n  logs: data/logs\n  backups: data/backups\n  tests: tests\n  static: static\n  templates: templates\n  scripts: bin\n  docs: docs\n\n# --- Environment Variables ---\nenv:\n  required:\n    - PROJECTS_DIR\n  optional:\n    - SECRET_KEY\n\n# --- Database Config ---\ndatabase_config:\n  path: data/app.db\n  wal_mode: true\n  foreign_keys: true\n\n# --- Spec Files ---\nspecs:\n  - 01-OVERVIEW.md\n  - 02-DATABASE.md\n  # ... all numbered spec files\n```\n\n### Key Naming Convention\n\nThe `language`, `framework`, `database`, and `frontend` values must exactly match filenames in `stack/` (without `.md`). This is how the tooling resolves files.\n\n---\n\n## File Organization\n\nThe spec system lives in a repository root that hosts multiple projects:\n\n```\nGAME_Spec/                  \u2190 Repository root\n\u251c\u2500\u2500 stack/                  # Technology files (shared, reusable)\n\u2502   \u251c\u2500\u2500 common.md           # Always included\n\u2502   \u251c\u2500\u2500 python.md           # language: python\n\u2502   \u251c\u2500\u2500 flask.md            # framework: flask\n\u2502   \u251c\u2500\u2500 django.md           # framework: django\n\u2502   \u251c\u2500\u2500 sqlite.md           # database: sqlite\n\u2502   \u251c\u2500\u2500 postgres.md         # database: postgres\n\u2502   \u2514\u2500\u2500 bootstrap5.md       # frontend: bootstrap5\n\u251c\u2500\u2500 validate.sh             # Generic validation tool (takes project name)\n\u251c\u2500\u2500 generate-prompt.sh      # Generic prompt generator (takes project name)\n\u251c\u2500\u2500 README.md               # Repository overview\n\u251c\u2500\u2500 SPEC_STANDARD.md        # This document\n\u2502\n\u2514\u2500\u2500 GAME/                   \u2190 First project (PROJECT_NAME)\n    \u251c\u2500\u2500 STACK.yaml          # Manifest: declares stack + config\n    \u251c\u2500\u2500 01-OVERVIEW.md      # Spec files (project-specific)\n    \u251c\u2500\u2500 02-DATABASE.md\n    \u251c\u2500\u2500 ...\n    \u2514\u2500\u2500 11-STARTUP.md\n\n\u2514\u2500\u2500 OTHER_PROJECT/         \u2190 Another project (same structure)\n    \u251c\u2500\u2500 STACK.yaml\n    \u251c\u2500\u2500 01-*.md\n    \u2514\u2500\u2500 ... more specs ...\n```\n\nEach project directory (`GAME/`, `OTHER_PROJECT/`, etc.) contains:\n- One `STACK.yaml` manifest\n- Numbered spec files (`01-*.md` through `11-*.md` or more)\n- No local copies of scripts or stack files (these are shared at the repo root)\n\n---\n\n## Writing Specification Files\n\n### Numbered Spec Files (Tier 2)\n\nRules:\n- Prefix with two-digit number: `01-`, `02-`, etc.\n- Use ALL CAPS hyphenated names: `02-DATABASE.md`, `05-ROUTES-API.md`\n- Each file covers one aspect of the system\n- Reference technology files for implementation patterns: `> See stack/sqlite.md`\n- Include concrete details: schema DDL, route paths, template names, config values\n- These files describe **this project** \u2014 they will differ between projects\n\n### Technology Files (Tier 1)\n\nRules:\n- Live in `stack/` directory\n- Filename matches the STACK.yaml value: `flask.md`, `sqlite.md`, `bootstrap5.md`\n- Each section follows the pattern: **Rule** \u2192 **Implementation** (code) \u2192 **Why**\n- Include a **Summary Checklist** at the end\n- State prerequisites: `Prerequisites: stack/common.md, stack/python.md`\n- **Never contain project-specific details** \u2014 these must work for any project\n\n---\n\n## Tooling\n\nScripts live at the repository root and take a project name as an argument.\n\n### validate.sh\n\nChecks that all files referenced in a project's STACK.yaml actually exist.\n\n```bash\nbash validate.sh <project-name>\n```\n\nExample:\n```bash\nbash validate.sh GAME\n```\n\nOutput:\n- `OK` for each file found\n- `FAIL` for missing files (exits with code 1)\n- `INFO` for stack files that exist but aren't referenced (available for other projects)\n- `WARN` for missing supporting files (README, SPEC_STANDARD)\n\n### generate-prompt.sh\n\nConcatenates technology files and a project's spec files into a single build prompt.\n\n```bash\n# Print to stdout\nbash generate-prompt.sh <project-name>\n\n# Save to file\nbash generate-prompt.sh <project-name> > build-prompt.md\n```\n\nExample:\n```bash\nbash generate-prompt.sh GAME > build-prompt.md\n```\n\nThe generated prompt includes:\n1. Project header with stack summary\n2. All referenced technology files (in dependency order)\n3. STACK.yaml configuration\n4. All numbered spec files (in order)\n\nFeed this prompt to an AI agent to build the project from scratch.\n\n---\n\n## Workflows\n\n### Building a New Project\n\n1. Create a new project directory at the repo root: `mkdir PROJECT_NAME`\n2. Create `PROJECT_NAME/STACK.yaml` with your technology selections\n3. Set `output_dir: ../..` to output code to the repo parent directory\n4. Write numbered spec files (`01-*.md`, `02-*.md`, etc.) describing your features\n5. Run `bash validate.sh PROJECT_NAME` to check completeness\n6. Run `bash generate-prompt.sh PROJECT_NAME > build-prompt.md` to create the prompt\n7. Feed `build-prompt.md` to an AI agent\n\n### Reverse-Engineering an Existing Project\n\n1. Have an AI agent read the codebase\n2. Generate numbered spec files describing current behavior\n3. Create `PROJECT_NAME/STACK.yaml` with the detected stack\n4. Run `bash validate.sh PROJECT_NAME` to verify completeness\n5. Use `bash generate-prompt.sh PROJECT_NAME > build-prompt.md` to create a rebuild prompt\n6. Build into the same or different stack by swapping technology files\n\n### Switching Stacks\n\nTo rebuild the same project in a different framework:\n1. Change `framework: flask` to `framework: django` in `PROJECT_NAME/STACK.yaml`\n2. Update spec files where framework-specific details appear (routes, templates)\n3. Run `bash validate.sh PROJECT_NAME` and `bash generate-prompt.sh PROJECT_NAME`\n4. Technology files handle the implementation patterns automatically\n\n---\n\n## Adding New Technology Files\n\nTo support a new technology:\n\n1. Create `stack/<name>.md` where `<name>` matches what you'll put in STACK.yaml\n2. Follow the template: prerequisites, numbered sections, Rule/Implementation/Why, summary checklist\n3. Add standard bin/ scripts for the technology\n4. The file should be complete enough to implement any project using that technology\n\nExample: adding Node.js support\n\n```\nstack/node.md           # language: node\nstack/express.md        # framework: express\nstack/astro.md          # framework: astro\n```\n\n---\n\n## Summary\n\n| What | Where | Changes per project? |\n|------|-------|---------------------|\n| Stack selection | STACK.yaml | Yes \u2014 pick your technologies |\n| How to implement | stack/*.md | No \u2014 reusable standards |\n| What to build | NN-*.md | Yes \u2014 project features |\n| Validation | validate.sh | No \u2014 generic tool |\n| Prompt generation | generate-prompt.sh | No \u2014 generic tool |\n",
  "THE-CONTRACT": "# The Contract\n\n**spec_v4 \u00b7 2026-03-11**\n\n---\n\n## What Is a Contract?\n\nA contract is a file a project provides. It has a defined format. The platform reads it.\nIn exchange, the project gains a platform capability.\n\nNo code change to the platform is needed. The project adds the file; the platform\ndiscovers it on the next scan.\n\nContracts are committed to git. They are readable by humans and AI agents. They do not\ndepend on the platform being running.\n\n---\n\n## Contract 1: The Operations Contract\n\n**File:** `bin/<name>.sh` (or any script in the `bin/` directory)\n**What you get:** A clickable button in the dashboard that runs the script\n\nThe script must contain a declaration block in its first 20 lines:\n\n```\n# CommandCenter Operation\n# Name: Service Start\n# Port: 3000\n```\n\n- `Name` is required. It becomes the button label.\n- `Port` is optional. Declaring it enables health monitoring for that port.\n\nA project can have any number of scripts in `bin/`. Each one that has this block\nbecomes a separate button. See **OPERATIONS.md** for what else scripts should expose.\n\n---\n\n## Contract 2: The Portfolio Contract\n\n**File:** `git_homepage.md` at the project root\n**What you get:** A card on the published portfolio site\n\n```yaml\n---\nTitle: My Project\nDescription: What this project does in one or two sentences.\nTags: web, tool, open-source\nImage: images/my-project.webp\nShow on Homepage: true\n---\n```\n\n- `Show on Homepage: false` hides the project from the portfolio without removing the file.\n- Tags appear as badges on the card.\n- Image is optional; a default is used if omitted.\n\n---\n\n## Contract 3: The AI Context Contract\n\n**File:** `CLAUDE.md` at the project root\n**What you get:** Populated links and endpoints in the dashboard; correct AI behavior in sessions\n\n```markdown\n# My Project\nOne paragraph description of what this project is.\n\n## Dev Commands\nHow to start, stop, test, build.\n\n## Service Endpoints\n- Local: http://localhost:3000\n\n## Bookmarks\n### Useful Links\n- [Production Site](https://...)\n```\n\nThe platform reads the `Service Endpoints` and `Bookmarks` sections and surfaces them\nas quick links. The AI agent reads the whole file as its working context for this project.\n\nSee **PERSISTENCE.md** for how `CLAUDE.md` is also used to store project metadata.\n\n---\n\n## Contract 4: The Stack Contract\n\n**File:** `STACK.yaml` at the project root\n**What you get:** Stack badges in the dashboard; governance rule checking\n\n```yaml\nlanguage: Python\nframework: Flask\nrequires:\n  - git\n  - venv\n```\n\nThe platform reads `language` and `framework` for display. The `requires` list is\nchecked on scan \u2014 missing items are flagged as compliance gaps.\n\n---\n\n## Contract 5: The Links Contract\n\n**File:** `Links.md` at the project root\n**What you get:** A quick-links panel in the project detail view\n\n```markdown\n| Name | URL | Notes |\n|------|-----|-------|\n| Production | https://... | Live site |\n| Docs | https://... | API docs |\n```\n\nEvery row in the table becomes a link in the UI. No additional setup.\n\n---\n\n## The Full Picture\n\nA project that implements all five contracts is fully governed:\n\n| Capability | Requires |\n|-----------|---------|\n| Operation buttons in dashboard | Contract 1 (bin/ header) |\n| Portfolio card published | Contract 2 (git_homepage.md) |\n| Endpoint links in dashboard | Contract 3 (CLAUDE.md) |\n| AI agent working context | Contract 3 (CLAUDE.md) |\n| Stack compliance checking | Contract 4 (STACK.yaml) |\n| Quick-links panel | Contract 5 (Links.md) |\n| Health monitoring | Contract 1 + Port declared |\n\nA project missing a contract is not broken. It simply does not have that capability in\nthe platform. The dashboard reports what is missing.\n\n---\n\n## Contracts Are Not Required by the Platform\n\nA project with no contracts at all will still appear in the dashboard \u2014 just as a name\nwith no buttons, no links, and a list of compliance gaps. The developer adds contracts\nwhen they want the capability. The platform never blocks a project for non-compliance.\n",
};

// Build the document list in the sidebar
function buildDocList() {
  const list = document.getElementById('doc-list');
  Object.keys(DOCS).sort().forEach(key => {
    const li = document.createElement('li');
    const a = document.createElement('a');
    a.textContent = key.replace(/-/g, ' ');
    a.onclick = () => showDoc(key);
    li.appendChild(a);
    list.appendChild(li);
  });
}

function showDoc(key) {
  if (!DOCS[key]) {
    console.warn('Document not found:', key);
    return;
  }
  document.getElementById('home-panel').style.display = 'none';
  document.getElementById('doc-panel').style.display = 'block';

  const content = DOCS[key];
  const html = markdownToHtml(content);
  document.getElementById('doc-content').innerHTML = html;

  // Update active nav item
  document.querySelectorAll('.file-list a').forEach(el => el.classList.remove('active'));
  const activeLink = Array.from(document.querySelectorAll('.file-list a')).find(a => a.textContent.replace(/ /g, '-') === key);
  if (activeLink) activeLink.classList.add('active');
}

function markdownToHtml(md) {
  // Simple markdown to HTML converter
  let html = md
    .replace(/^### (.*?)$/gm, '<h3>$1</h3>')
    .replace(/^## (.*?)$/gm, '<h2>$1</h2>')
    .replace(/^# (.*?)$/gm, '<h1>$1</h1>')
    .replace(/^- (.*?)$/gm, '<li>$1</li>')
    .replace(/(<li>.*?<\/li>)/s, '<ul>$1</ul>')
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\n\n+/g, '</p><p>')
    .replace(/^(?!<[^>]+>)/gm, '<p>');
  return '<p>' + html + '</p>';
}

buildDocList();
