<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title><!-- PROJECT_NAME --> — Specification</title>
<link rel="stylesheet" href="../doc/styles/gem.css">
<style>
*, *::before, *::after { box-sizing: border-box; }
body {
  display: flex; flex-direction: column; height: 100vh; margin: 0; overflow: hidden;
  background: var(--c-bg); color: var(--c-text);
  font-family: 'Segoe UI', 'Trebuchet MS', Arial, sans-serif; font-size: 14px; line-height: 1.5;
}

/* ── Topbar ── */
#topbar {
  display: flex; align-items: center;
  background: var(--c-topbar-bg); border-bottom: 1px solid var(--c-side-border);
  height: 40px; flex-shrink: 0;
}
.tb-brand {
  font-size: 13px; font-weight: 700; color: #fff;
  padding: 0 16px; height: 100%; display: flex; align-items: center;
  border-right: 1px solid var(--c-side-border); text-decoration: none; white-space: nowrap;
}
.tb-brand b { color: var(--c-accent); margin-right: 5px; }
.tb-brand:hover { background: rgba(255,255,255,.07); }
.tb-crumb {
  font-size: 12.5px; color: var(--c-side-link);
  padding: 0 14px; height: 100%; display: flex; align-items: center; gap: 5px;
  border-right: 1px solid var(--c-side-border);
}
.tb-crumb-sep { color: var(--c-side-section); }
.tb-crumb-name { color: #fff; font-weight: 600; }
.tb-spacer { flex: 1; }
.tb-btn {
  font-size: 12px; color: var(--c-side-link);
  padding: 0 14px; height: 100%; display: flex; align-items: center;
  border-left: 1px solid var(--c-side-border); text-decoration: none; white-space: nowrap;
  transition: color .1s, background .1s;
}
.tb-btn:hover { color: #fff; background: rgba(255,255,255,.07); }

/* ── Main ── */
#main { display: flex; flex: 1; overflow: hidden; }

/* ── Sidebar ── */
#sidebar {
  width: 210px; min-width: 210px; background: var(--c-side-bg);
  border-right: 1px solid var(--c-side-border);
  overflow-y: auto; display: flex; flex-direction: column;
}
#sidebar::-webkit-scrollbar { width: 4px; }
#sidebar::-webkit-scrollbar-thumb { background: var(--c-side-border); border-radius: 2px; }
.nav-sep { border-top: 1px solid var(--c-side-border); margin: 5px 0; }
.nav-group-label {
  font-size: 9.5px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 1px; color: var(--c-side-section); padding: 8px 14px 3px;
}
.nav-item {
  display: block; padding: 4px 14px 4px 16px;
  font-family: 'Cascadia Code', Consolas, monospace; font-size: 11.5px;
  color: var(--c-side-link); cursor: pointer;
  border-left: 3px solid transparent; transition: all .1s; text-decoration: none;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.nav-item:hover { color: #fff; background: rgba(255,255,255,.05); border-left-color: var(--c-accent); }
.nav-item.active { color: var(--c-accent); border-left-color: var(--c-accent); background: rgba(44,182,125,.06); }

/* ── Content ── */
#content { flex: 1; overflow-y: auto; padding: 20px 30px 40px; }

/* ── Project info card (always visible) ── */
.project-card {
  background: var(--c-side-bg); border: 1px solid var(--c-side-border);
  border-radius: 6px; padding: 16px 20px; margin-bottom: 18px;
}
.pc-name { color: #fff; font-size: 20px; font-weight: 700; margin: 0 0 2px; }
.pc-title { color: var(--c-accent); font-size: 13px; font-weight: 500; margin: 0 0 6px; }
.pc-desc { color: var(--c-side-link); font-size: 13px; line-height: 1.5; margin: 0 0 8px; }
.pc-meta { display: flex; gap: 14px; flex-wrap: wrap; }
.pc-meta span { font-size: 11.5px; color: var(--c-side-section); white-space: nowrap; }

/* ── File grid ── */
.group-label {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 1px; color: var(--c-h3); margin: 14px 0 5px;
  padding-bottom: 3px; border-bottom: 1px solid var(--c-td-border);
}
.file-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 5px; margin-bottom: 4px; }
.file-card {
  background: var(--c-bg); border: 1px solid var(--c-td-border); border-radius: 4px;
  padding: 6px 10px; cursor: pointer; transition: border-color .12s; text-decoration: none;
  font-family: 'Cascadia Code', Consolas, monospace; font-size: 12px;
  color: var(--c-h2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.file-card:hover { border-color: var(--c-accent); color: var(--c-accent); }
.file-card.active { border-color: var(--c-accent); background: var(--c-callout-bg); color: var(--c-accent); }

/* ── Rendered markdown ── */
#doc-content { display: none; }
.md h1 { font-size: 22px; font-weight: 700; color: var(--c-h1); border-bottom: 2px solid var(--c-h1-border); padding-bottom: 4px; margin: 20px 0 12px; }
.md h1:first-child { margin-top: 0; }
.md h2 { font-size: 16px; font-weight: 600; color: var(--c-h2); border-bottom: 1px solid var(--c-h2-border); padding-bottom: 3px; margin: 16px 0 8px; }
.md h3 { font-size: 14px; font-weight: 600; color: var(--c-h3); margin: 12px 0 5px; }
.md h4 { font-size: 13px; font-weight: 600; color: var(--c-h3); margin: 10px 0 4px; }
.md p { margin: 7px 0; line-height: 1.65; }
.md ul, .md ol { margin: 5px 0 5px 18px; line-height: 1.65; }
.md li { margin: 2px 0; }
.md a { color: #1565C0; text-decoration: underline; }
.md a:visited { color: #1565C0; }
.md table { border-collapse: collapse; margin: 10px 0; font-size: 13px; width: 100%; }
.md th { background: var(--c-th-bg); color: var(--c-th-text); font-weight: 600; padding: 5px 12px; text-align: left; }
.md td { padding: 4px 12px; border-bottom: 1px solid var(--c-td-border); }
.md tr:nth-child(even) td { background: var(--c-tr-alt); }
.md tr:hover td { background: var(--c-tr-hover); }
.md pre { background: var(--c-pre-bg); color: var(--c-pre-text); border: 1px solid var(--c-side-border); border-radius: 4px; padding: 10px 12px; overflow-x: auto; margin: 8px 0; font-size: 12.5px; line-height: 1.5; }
.md code { font-family: 'Cascadia Code', Consolas, monospace; font-size: 12.5px; background: var(--c-code-bg); color: var(--c-code-text); padding: 1px 4px; border-radius: 3px; }
.md pre code { background: none; padding: 0; color: inherit; }
.md blockquote { border-left: 3px solid var(--c-accent); padding: 6px 12px; margin: 8px 0; background: var(--c-callout-bg); border-radius: 0 4px 4px 0; }
.md hr { border: none; border-top: 1px solid var(--c-td-border); margin: 14px 0; }
</style>
</head>
<body>

<div id="topbar">
  <a class="tb-brand" href="../doc/index.html"><b>&#9654;</b>Prototyper</a>
  <div class="tb-crumb">
    <span class="tb-crumb-sep">/</span>
    <span class="tb-crumb-name"><!-- PROJECT_NAME --></span>
  </div>
  <div class="tb-spacer"></div>
  <a class="tb-btn" href="../doc/index.html">Documentation</a>
</div>

<div id="main">
  <div id="sidebar">
    <nav id="nav"></nav>
  </div>

  <div id="content">
    <div id="project-card" class="project-card"></div>
    <div id="file-grid-area"></div>
    <div id="doc-content" class="md"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
const DOCS = {};

marked.setOptions({ gfm: true, breaks: false });

// Group keys into sections. METADATA excluded from nav (used for project card only).
function groupFiles(keys) {
  const coreSet = new Set(['README', 'INTENT', 'ARCHITECTURE', 'DATABASE', 'UI', 'UI-GENERAL']);
  const featureSet = new Set(['FEATURE_MAP', 'FUNCTIONALITY']);
  const groups = { 'Project Core': [], 'Project Features': [], 'Screens': [], 'Other': [] };
  keys.forEach(k => {
    if (k === 'METADATA') return;
    if (coreSet.has(k)) groups['Project Core'].push(k);
    else if (featureSet.has(k) || k.startsWith('FEATURE-')) groups['Project Features'].push(k);
    else if (k.startsWith('SCREEN-')) groups.Screens.push(k);
    else groups.Other.push(k);
  });
  return groups;
}

function parseMeta(text) {
  const f = {};
  text.split('\n').forEach(line => {
    const m = line.match(/^([\w]+):\s*(.*)/);
    if (m) f[m[1]] = m[2].trim();
  });
  return f;
}

function buildNav(groups) {
  const nav = document.getElementById('nav');
  const order = ['Project Core', 'Project Features', 'Screens', 'Other'];
  order.forEach(group => {
    const files = groups[group];
    if (!files.length) return;
    const div = document.createElement('div');
    div.innerHTML = '<div class="nav-group-label">' + group + '</div>';
    files.forEach(key => {
      const a = document.createElement('a');
      a.className = 'nav-item';
      a.textContent = key + '.md';
      a.dataset.key = key;
      a.onclick = () => showDoc(key);
      div.appendChild(a);
    });
    nav.appendChild(div);
    nav.appendChild(Object.assign(document.createElement('div'), { className: 'nav-sep' }));
  });
}

function buildProjectCard(meta) {
  const card = document.getElementById('project-card');
  const name = meta.display_name || meta.name || '';
  const title = meta.title || '';
  const desc = meta.short_description || '';
  const metaItems = [];
  if (meta.stack) metaItems.push(meta.stack);
  if (meta.port) metaItems.push('Port: ' + meta.port);
  card.innerHTML =
    '<div class="pc-name">' + name + '</div>' +
    (title ? '<div class="pc-title">' + title + '</div>' : '') +
    (desc  ? '<div class="pc-desc">'  + desc  + '</div>' : '') +
    (metaItems.length ? '<div class="pc-meta">' + metaItems.map(i => '<span>' + i + '</span>').join('') + '</div>' : '');
}

function buildFileGrid(groups) {
  const area = document.getElementById('file-grid-area');
  const order = ['Project Core', 'Project Features', 'Screens', 'Other'];
  let html = '';
  order.forEach(group => {
    const files = groups[group];
    if (!files.length) return;
    html += '<div class="group-label">' + group + '</div><div class="file-grid">';
    files.forEach(key => {
      html += '<div class="file-card" data-key="' + key + '" onclick="showDoc(\'' + key + '\')">' + key + '.md</div>';
    });
    html += '</div>';
  });
  area.innerHTML = html;
}

function showDoc(key) {
  if (!DOCS[key]) return;
  document.getElementById('file-grid-area').style.display = 'none';
  const dc = document.getElementById('doc-content');
  dc.style.display = 'block';
  dc.innerHTML = marked.parse(DOCS[key]);
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.file-card').forEach(el => el.classList.remove('active'));
  const navLink = document.querySelector('.nav-item[data-key="' + key + '"]');
  if (navLink) navLink.classList.add('active');
  const card = document.querySelector('.file-card[data-key="' + key + '"]');
  if (card) card.classList.add('active');
  document.getElementById('content').scrollTop = 0;
}

const keys = Object.keys(DOCS).sort();
const groups = groupFiles(keys);
const meta = DOCS['METADATA'] ? parseMeta(DOCS['METADATA']) : {};
buildProjectCard(meta);
buildNav(groups);
buildFileGrid(groups);
</script>
</body>
</html>
