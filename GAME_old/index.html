const DOCS = {
  "01-OVERVIEW": "# GAME \u2014 Generic Agent Management Environment\n## Project Specification v2  \u00b7  Updated 2026-03-09\n\n> Visual architecture diagrams: `GAME/project_specifications/spec_v2/*.excalidraw`\n> v1 spec preserved in `Version 1/` in this directory.\n\n## Purpose\n\nGAME is a personal AI-assisted workflow management platform for managing ~15 projects (software, books, tools) from a single web dashboard. It auto-discovers projects from the filesystem, provides one-click operations via bash scripts with standard `CommandCenter Operation` headers, monitors background processes, enforces stack governance, and publishes a GitHub Pages portfolio.\n\nGAME is also an **Agent Assist platform**: it manages its own specification, categorizes projects, generates per-project Claude configurations via `config_engine/`, and guides feature development through a structured prompt-driven lifecycle (Idea \u2192 Checklist \u2192 Proposal \u2192 Iteration \u2192 Agent Developed \u2192 Testing \u2192 Done).\n\n## Scope\n\nThis specification covers the full system:\n- Project discovery and metadata (filesystem-driven via CLAUDE.md, Links.md, git_homepage.md, bin/ headers)\n- Operations engine (bin/ auto-registration \u2192 UI buttons \u2192 spawn.py \u2192 log capture)\n- Process management and observability (heartbeats, alerts, process logs)\n- GitHub Pages publishing pipeline (publisher.py + Astro + My_Github repo)\n- Config engine (YAML profiles \u2192 staged Claude configs \u2192 ~/.claude/)\n- Feature workflow (Idea \u2192 Done with Agent Assist at each stage)\n- External skill integration (Excalidraw, daily summary, etc.)\n\n## Tech Stack\n\n| Layer      | Technology                                  |\n|------------|---------------------------------------------|\n| Backend    | Python 3 / Flask                            |\n| Database   | SQLite (WAL mode, `data/cc.db`)             |\n| Frontend   | Bootstrap 5.3 (CDN) + HTMX 2.0 (CDN)       |\n| Styling    | Single `static/style.css`, dark theme only  |\n| Templates  | Jinja2 (Flask default)                      |\n| Process Mgmt | `subprocess.Popen` + background threads   |\n| No build step | No webpack/vite/npm for the app itself   |\n\n## Dependencies\n\n```\nflask\npython-dotenv\nPyYAML\n```\n\n## Environment Variables\n\n| Variable       | Required | Default                              | Purpose                        |\n|----------------|----------|--------------------------------------|--------------------------------|\n| `PROJECTS_DIR` | Yes      | Parent of app directory              | Root directory containing projects |\n| `SECRET_KEY`   | No       | `cc-dev-key-change-in-prod`          | Flask session key              |\n| `PRODUCTION_URL` | No     | `https://webcloudstudio.github.io`   | Live homepage URL              |\n| `APP_NAME`     | No       | `Command Center`                     | Displayed in nav bar           |\n\n## Directory Layout\n\n```\ncommandcenter/\n  app.py                  # Flask app factory, startup scanner\n  db.py                   # SQLite schema, helpers, migrations\n  models.py               # Project type registry\n  scanner.py              # Filesystem project discovery\n  routes.py               # All Flask routes (Blueprint)\n  ops.py                  # Operation execution engine\n  spawn.py                # Generic process spawning service\n  publisher.py            # GitHub Pages rebuild/publish\n  claude_convention.py    # CLAUDE.md parsing & stubbing\n  usage_analyzer.py       # Token usage analytics\n  static/\n    style.css             # Full stylesheet (dark theme)\n  templates/\n    base.html             # Layout: nav, modals, flash messages\n    list.html             # Projects tab\n    project_config.html   # Configuration tab\n    publish.html          # GIT-Homepage tab\n    processes.html        # Processes tab\n    settings.html         # Settings page (hamburger)\n    tags.html             # Tag colors page (hamburger)\n    usage.html            # Usage analytics page (hamburger)\n    help.html             # Help page (hamburger)\n    types/\n      _software_row.html      # Software project row\n      _software_detail.html   # Software project detail page\n      _book_row.html          # Book project row\n      _book_detail.html       # Book project detail page\n    components/\n      _project_standard_columns.html  # Shared first 2 columns\n      _project_editor_row.html        # Config page row\n  bin/\n    RebuildYourHomepage.sh  # npm build for homepage\n    LocalPreview.sh         # npm preview server\n    PushAndPublish.sh       # git add/commit/push\n  data/                     # Runtime data (gitignored)\n    cc.db                   # SQLite database\n    logs/                   # Process log files\n    tag_colors.json         # Tag color mappings\n    publish_clicks.json     # Last button click timestamps\n  workflow.json             # Optional custom workflow states\n```\n\n## Navigation Structure\n\n### Top Tabs\n1. **Projects** \u2014 Main project list with operations\n2. **Configuration** \u2014 Bulk project settings (workflow, type, publish)\n3. **GIT-Homepage** \u2014 GitHub Pages publish pipeline\n4. **Processes** \u2014 Running/completed process monitor\n\n### Hamburger Menu (top-right)\n- Settings \u2014 App name, homepage URL\n- Usage \u2014 Claude Code token analytics\n- Tags \u2014 Tag color management\n- Help \u2014 Feature documentation\n\n### Running Projects Bar\n- Shows green badges in nav for any project with a running server process\n",
  "02-DATABASE": "# Database Schema\n\nSQLite database at `data/cc.db`. WAL mode enabled, foreign keys enforced.\n\n> **Technology Reference**: See `stack/sqlite.md` for SQLite-specific best practices (connection setup, PRAGMAs, migration patterns, backup, and when to choose PostgreSQL instead).\n\n## Tables\n\n### projects\n\nPrimary table. One row per discovered project directory.\n\n```sql\nCREATE TABLE IF NOT EXISTS projects (\n    id           INTEGER PRIMARY KEY,\n    name         TEXT UNIQUE NOT NULL,     -- directory name (case-sensitive, immutable identifier)\n    title        TEXT NOT NULL,            -- display name, derived from dir name via camelCase splitting\n    description  TEXT,\n    project_type TEXT NOT NULL DEFAULT 'software',  -- 'software' or 'book'\n    status       TEXT DEFAULT 'template',  -- legacy field (workflow stored in extra JSON)\n    extra        TEXT DEFAULT '{}',        -- JSON: tech_stack, port, remote_url, workflow, links, bookmarks, unpushed, has_*_sh flags\n    has_git      INTEGER DEFAULT 0,\n    has_venv     INTEGER DEFAULT 0,\n    has_node     INTEGER DEFAULT 0,\n    has_claude   INTEGER DEFAULT 0,\n    card_title   TEXT,                     -- GitHub homepage card fields\n    card_desc    TEXT,\n    card_tags    TEXT,                     -- comma-separated or JSON array\n    card_type    TEXT,\n    card_url     TEXT,\n    card_show    INTEGER DEFAULT 0,        -- 1 = include on homepage\n    created_at   TEXT DEFAULT (datetime('now')),\n    updated_at   TEXT DEFAULT (datetime('now'))\n);\n```\n\n### operations\n\nOperations available for each project (seeded from `bin/` scripts and git status).\n\n```sql\nCREATE TABLE IF NOT EXISTS operations (\n    id          INTEGER PRIMARY KEY,\n    project_id  INTEGER REFERENCES projects(id),\n    name        TEXT NOT NULL,            -- e.g. \"Service Start\", \"Git Push\"\n    category    TEXT NOT NULL,            -- 'local' or 'remote'\n    cmd         TEXT NOT NULL,            -- shell command, e.g. \"bin/start.sh\", \"git push\"\n    cwd         TEXT,                     -- working directory (project path)\n    needs_venv  INTEGER DEFAULT 0,\n    is_url      INTEGER DEFAULT 0,        -- deprecated, unused\n    default_port INTEGER,                 -- from bin/ CommandCenter Operation header\n    sort_order  INTEGER DEFAULT 0\n);\n```\n\n### op_runs\n\nTracks running and completed process executions.\n\n```sql\nCREATE TABLE IF NOT EXISTS op_runs (\n    id         INTEGER PRIMARY KEY,\n    op_id      INTEGER REFERENCES operations(id),  -- NULL for spawn-service processes\n    started_at TEXT DEFAULT (datetime('now')),\n    pid        INTEGER,\n    status     TEXT DEFAULT 'running',    -- 'starting', 'running', 'done', 'error'\n    cmd        TEXT,                      -- command that was executed\n    name       TEXT                       -- human-readable operation name\n);\n```\n\n## Extra JSON Column Schema\n\nThe `projects.extra` column stores a JSON object with these keys:\n\n| Key             | Type    | Source      | Description                          |\n|-----------------|---------|-------------|--------------------------------------|\n| `tech_stack`    | string  | scanner     | \"flask\", \"django\", \"node\", \"astro\", \"python\" |\n| `port`          | int     | scanner/user | Configured port number              |\n| `remote_url`    | string  | scanner     | Git remote origin URL               |\n| `workflow`      | string  | user        | Current workflow state key (\"todo\", \"developing\", \"good\") |\n| `links`         | array   | scanner     | From Links.md: `[{label, url}]`     |\n| `bookmarks`     | object  | scanner     | From CLAUDE.md: `{group: [{title, url}]}` |\n| `unpushed`      | int     | scanner     | Count of unpushed git commits       |\n| `has_start_sh`  | bool    | scanner     | Project has start.sh                |\n| `has_build_sh`  | bool    | scanner     | Project has build.sh                |\n| `has_deploy_sh` | bool    | scanner     | Project has deploy.sh               |\n| `has_test_sh`   | bool    | scanner     | Project has test.sh                 |\n\n## Migrations\n\nSchema migrations run via `_run_migrations(conn)` during `init_db()`. Uses `PRAGMA table_info()` to detect missing columns and `ALTER TABLE` to add them. Current migrations:\n\n1. Add `cmd` column to `op_runs`\n2. Add `name` column to `op_runs`\n3. Add `default_port` column to `operations`\n\n## Data Access Patterns\n\n- `get_db()` \u2014 Returns connection with `Row` factory, WAL mode, FK enforcement\n- `row_to_dict(row)` \u2014 Converts Row to dict, auto-parses `extra` JSON field\n- `get_project(id)` / `get_project_by_name(name)` \u2014 Single project lookup\n- `get_all_projects()` \u2014 All projects ordered by type then title\n- `get_operations(project_id)` \u2014 Operations ordered by category then sort_order\n- `get_running_ops()` \u2014 JOIN op_runs + operations where status='running'\n- `get_running_projects()` \u2014 Distinct projects with running ops (for nav bar badges)\n- `query(sql, params, one=False)` \u2014 Generic query helper\n- `execute(sql, params)` \u2014 Generic write helper, returns lastrowid\n",
  "03-SCANNER": "# Project Scanner\n\n`scanner.py` \u2014 Discovers projects from the filesystem and syncs to the database.\n\n## Overview\n\nThe scanner reads a configured `PROJECTS_DIR` directory, detects attributes for each subdirectory, and upserts them into the database. It runs automatically at startup and on-demand via the Refresh button.\n\n## Discovery Algorithm\n\n```\nscan_projects(projects_dir):\n    for each subdirectory in projects_dir (sorted):\n        skip: .git, __pycache__, hidden dirs (starting with .)\n        detect_project(name, path)  \u2192  info dict\n        upsert_project(info)        \u2192  insert or update DB\n    return discovered list\n```\n\n## Detection Logic (`detect_project`)\n\n### Tech Stack Detection (priority order)\n1. `manage.py` exists \u2192 `django` (port 8000)\n2. `astro.config.mjs` or `astro.config.ts` \u2192 `astro`\n3. `app.py` exists \u2192 `flask` (port parsed from `app.run(port=N)`)\n4. `package.json` exists \u2192 `node`\n5. `setup.py` or `pyproject.toml` \u2192 `python`\n\n### Project Type Detection\n- Default: `software`\n- If no tech stack detected AND directory contains `chapters/`, `manuscript/`, `Book/`, or `drafts/` \u2192 `book`\n\n### Filesystem Flags\n- `has_git` \u2014 `.git/` directory exists\n- `has_venv` \u2014 `venv/` or `.venv/` directory exists\n- `has_node` \u2014 `node_modules/` directory exists\n- `has_claude` \u2014 `CLAUDE.md` file exists\n- `has_start_sh`, `has_build_sh`, `has_deploy_sh`, `has_test_sh` \u2014 standard script detection\n\n### Git Operations (Pure Python, No Subprocess)\n- **Remote URL**: Parsed from `.git/config` using `configparser`\n- **Unpushed Count**: BFS walk of commit graph comparing local HEAD to `refs/remotes/origin/{branch}`\n  - Reads loose objects via `zlib.decompress`\n  - Falls back to `packed-refs` for ref resolution\n  - Safety cap at 50 commits\n\n### Metadata File Parsing\n\n#### `Links.md` \u2014 Project endpoint links\n```markdown\n| Label | URL |\n|-------|-----|\n| Local Dev | http://localhost:8000 |\n| Production | https://example.com |\n```\nReturns: `[{label: \"Local Dev\", url: \"http://...\"}]`\n\n#### `git_homepage.md` \u2014 GitHub homepage card metadata\n```markdown\n| Field | Value |\n|-------|-------|\n| Title | My Project |\n| Description | Project description |\n| Card Type | Software |\n| Card URL | https://example.com |\n| Tags | tag1, tag2 |\n| Show on Homepage | true |\n```\nReturns: `{card_title, card_desc, card_type, card_url, card_tags, card_show}`\n\n#### `CLAUDE.md` \u2014 Bookmarks extraction\nParses `## Bookmarks` section for `### Group` headings and `- [Title](URL)` links.\n\n### `bin/` Directory Operations\nScans `bin/*.sh` files for `CommandCenter Operation` headers:\n```bash\n#!/bin/bash\n# CommandCenter Operation\n# Name: Service Start\n# Port: 8000\n```\nReturns: `[{name, port, script_path, script_name}]`\n\n## Title Generation\n\nDirectory names are converted to display titles via `camel_to_title()`:\n- `HerpesHearts` \u2192 `Herpes Hearts`\n- `command_center` \u2192 `Command Center`\n- `My_Github` \u2192 `My Github`\n\n## Upsert Logic (`upsert_project`)\n\n### Existing project (update):\n- **Always overwrite**: title (from dir name), has_git/venv/node/claude, card_* fields (from git_homepage.md)\n- **Always overwrite in extra**: links, bookmarks, unpushed, has_*_sh flags (live data)\n- **Never overwrite**: user-edited extra fields (workflow, etc.) \u2014 only set if empty\n- **Sync operations**: Delete bin/ and git ops, re-seed from current filesystem\n\n### New project (insert):\n- Insert with all detected fields\n- Seed operations from bin/ scripts and git status\n\n## Operation Seeding (`_seed_operations`)\n\n1. Delete all existing operations where `cmd LIKE 'bin/%'` or `name = 'Git Push'`\n2. Insert one operation per `bin/*.sh` file with `CommandCenter Operation` header\n   - Category: `local`\n   - Cmd: `bin/{script_name}`\n   - Includes `default_port` if specified in header\n3. If project has git: insert `Git Push` operation (category: `remote`, cmd: `git push`)\n\n## Orphan Cleanup (`cleanup_orphaned`)\n\nRemoves DB entries whose `name` doesn't match any actual directory in `PROJECTS_DIR`. Uses `os.listdir()` for case-sensitive comparison (critical on WSL where `os.path.isdir()` is case-insensitive). Cascades: deletes operations and op_runs for orphaned projects.\n",
  "04-OPERATIONS": "# Operations Engine\n\nTwo modules handle process execution: `ops.py` for project operations (servers, one-shot commands) and `spawn.py` for generic process spawning (used by the publish pipeline).\n\n## ops.py \u2014 Project Operation Execution\n\n### Command Classification\n\nCommands are classified as **server** (long-running) or **one-shot** based on keyword matching:\n\n```python\nSERVER_KEYWORDS = ['runserver', 'flask run', 'npm run dev', 'npm start', 'serve']\n```\n\n`is_server_command(cmd)` \u2192 True if any keyword appears in the command string.\n\n### Server Operations (`_run_server`)\n\n1. Check for existing running op_run for this op_id; if PID alive, return error\n2. Pre-insert `op_runs` record with `status='starting'`, `pid=0` to get a `run_id`\n3. Write startup header to `data/logs/{run_id}.log`\n4. Spawn process:\n   - Shell: `/bin/bash` (required for `source` builtin)\n   - Venv activation: `source {venv}/bin/activate && {cmd}` if `needs_venv=1`\n   - Output: `({cmd}) >> {log_path} 2>&1`\n   - Session: `start_new_session=True` (enables `os.killpg`)\n   - Env: `PYTHONUNBUFFERED=1`\n5. Update op_run with actual PID, status='running'\n6. Spawn daemon monitor thread: `proc.wait()` then mark status='done' and append exit code to log\n7. Return `{pid: int}` to caller\n\n### One-Shot Operations (`_run_oneshot`)\n\n1. Execute `subprocess.run()` with 30-second timeout\n2. Capture stdout+stderr\n3. Return `{output: str}` on success or `{error: str}` on failure\n\n### Stop Operation (`stop_operation`)\n\n1. Query all running op_runs for the given op_id\n2. Kill process group: `os.killpg(os.getpgid(pid), SIGTERM)`\n3. Mark status='done' in DB\n\n### Dead Process Cleanup (`cleanup_dead_processes`)\n\nCalled on every page load via context processor. Checks all running op_runs, marks any with dead PIDs as 'done'. Uses `os.kill(pid, 0)` to test process existence.\n\n## spawn.py \u2014 Generic Process Spawning Service\n\nUsed by the publish pipeline (rebuild, preview, push) and the Processes page.\n\n### `spawn_process(cmd, cwd, name, daemon=False, project_id=None)`\n\n1. Validate `cwd` exists\n2. Insert `op_runs` record (`op_id=NULL`, stores `cmd` and `name`)\n3. Create timestamped log file: `data/logs/{name}_{run_id}_{timestamp}.log`\n4. Write header: name, start time, working dir, command, type (daemon/batch)\n5. Spawn process same as ops.py (bash shell, new session, unbuffered)\n6. For batch (non-daemon): spawn monitor thread that calls `proc.wait()`, writes exit status, marks 'done'\n7. For daemon: no monitor \u2014 runs until manually stopped\n8. Return `{run_id, pid, log_path}` or `{error: str}`\n\n### `stop_process(run_id)`\n\n1. Look up process record by run_id\n2. Kill process group via SIGTERM\n3. Mark status='done'\n4. Append termination message to log file\n\n### `get_log_content(run_id)`\n\nSearches `data/logs/` for a file matching `*_{run_id}_*.log` and returns its contents.\n\n### `list_running_processes()` / `list_recent_processes(limit=20)`\n\nQuery op_runs, enrich each row with computed `elapsed` time string and `log_path`.\n\n### Elapsed Time Computation\n\nParses `started_at` ISO timestamp, computes delta from now:\n- `< 60s` \u2192 `\"Ns\"`\n- `< 3600s` \u2192 `\"Nm Ns\"`\n- `>= 3600s` \u2192 `\"Nh Nm\"`\n\n## Log Files\n\nAll logs stored in `data/logs/`:\n\n| Source   | Filename Pattern                     | Created By      |\n|----------|--------------------------------------|-----------------|\n| ops.py   | `{run_id}.log`                       | _run_server()   |\n| spawn.py | `{name}_{run_id}_{YYYYMMDD_HHMMSS}.log` | spawn_process() |\n\nLog format:\n```\n=== {name} ===\nStarted: 2024-01-15 10:30:00\nWorking dir: /path/to/project\nCommand: flask run --port 5001\nType: daemon\n\n--- Output ---\n[process stdout/stderr follows]\n\n--- Process exited with code 0 ---\nEnded: 2024-01-15 10:35:00\n```\n",
  "05-ROUTES-API": "# Routes & API Reference\n\nAll routes defined in `routes.py` as a Flask Blueprint (`bp = Blueprint('cc', ...)`).\n\n## Context Processor (every request)\n\n`inject_globals()` runs before every template render:\n1. Calls `ops.cleanup_dead_processes()` to mark dead PIDs as 'done'\n2. Injects into all templates:\n   - `running_ops_count` \u2014 count of running projects\n   - `running_projects` \u2014 list of `{id, title, run_id, op_id, op_name}`\n   - `PROJECT_TYPES` \u2014 from models.py registry\n   - `workflow_states` \u2014 from workflow.json or defaults\n   - `workflow_map` \u2014 `{key: state}` dict\n   - `app_name` \u2014 from config\n\n## Workflow States\n\nLoaded from `workflow.json` (if exists) or defaults:\n```json\n[\n  {\"key\": \"todo\",       \"label\": \"TODO\",       \"color\": \"#fdab3d\"},\n  {\"key\": \"developing\", \"label\": \"DEVELOPING\",  \"color\": \"#0073ea\"},\n  {\"key\": \"good\",       \"label\": \"GOOD\",        \"color\": \"#00c875\"}\n]\n```\n\n## Page Routes\n\n### `GET /` \u2014 Projects List\n- Loads all projects, enriches with `_prepare_row_project()` (operations, workflow, links, etc.)\n- Sorts by `?sort=name|status_asc|status_desc`\n- Renders `list.html` with type-specific row templates per project\n\n### `GET /project-config` \u2014 Configuration Page\n- Same data as project list, sorted by title\n- Renders `project_config.html` with editor rows\n\n### `GET /project/<id>` \u2014 Project Detail\n- Loads single project with operations, unpushed count, endpoints, bookmarks\n- Identifies server operations for live log viewer\n- Renders type-specific detail template (e.g. `types/_software_detail.html`)\n\n### `POST /project/<id>` \u2014 Update Project (form submit)\n- Updates title, description, extra fields (tech_stack, port, remote_url, etc.)\n- Updates card_* fields for homepage\n- Redirects back to detail page\n\n### `GET /publish` \u2014 GIT-Homepage Page\n- Shows rebuild/preview/push pipeline buttons with running status\n- Lists all projects with card metadata in contents table\n- Sidebar form for editing selected project's card details\n- Renders `publish.html`\n\n### `GET /processes` \u2014 Process Monitor\n- Lists running processes with PID, elapsed time, stop/log buttons\n- Lists completed processes with status, log buttons\n- Auto-refreshes while processes are running\n- Renders `processes.html`\n\n### `GET /settings` \u2014 Application Settings\n- Form: app name, homepage URL\n- Saves to Flask config (in-memory, not persisted to file)\n\n### `GET /tags` \u2014 Tag Color Management\n- Lists all tags with color assignments\n- Add/update/delete forms\n- Colors stored in `data/tag_colors.json`\n\n### `GET /usage` \u2014 Usage Analytics\n- Accepts `?days=7|14|30`\n- Calls `usage_analyzer.generate_report()`\n- Renders interactive Plotly charts in `usage.html`\n\n### `GET /help` \u2014 Help Page\n- Static accordion-based documentation of features\n\n## API Routes (HTMX)\n\n### Project Inline Editing\n| Method | Path | Purpose |\n|--------|------|---------|\n| `POST` | `/api/sync` | Re-run scanner, return sync count HTML |\n| `POST` | `/api/stub-conventions` | Create stub CLAUDE.md files for all projects |\n| `GET/POST` | `/api/project/<id>/edit-title` | Inline title edit form / save |\n| `GET/POST` | `/api/project/<id>/edit-port` | Inline port edit form / save |\n| `POST` | `/api/project/<id>/update` | Update single field (via `field` form param) |\n| `POST` | `/api/project/<id>/update/workflow` | Update workflow status |\n| `POST` | `/api/project/<id>/quick-edit` | Save workflow + project type, return updated row |\n| `GET` | `/api/project/<id>/edit-row` | Return edit-mode row HTML |\n| `GET` | `/api/project/<id>/row` | Return normal row HTML (cancel edit) |\n| `GET` | `/api/project/<id>/git-status` | Return unpushed count badge HTML |\n| `GET` | `/api/project/<id>/claude-content` | Return CLAUDE.md content for modal |\n\n### Field Update (`/api/project/<id>/update`)\n\nAccepts `field` form parameter to determine which field to update:\n- `title`, `description` \u2014 Direct column update\n- `workflow` \u2014 Stored in extra JSON\n- `project_type` \u2014 Direct column update\n- `tech_stack`, `port`, `remote_url`, `railway_id`, `website_url` \u2014 Stored in extra JSON\n- `card_show` \u2014 Checkbox toggle (checked = present in form data)\n- `card_title`, `card_type`, `card_desc`, `card_url`, `card_tags` \u2014 Direct column update\n\nReturns 204 No Content on success.\n\n### Operations\n| Method | Path | Purpose |\n|--------|------|---------|\n| `POST` | `/api/op/<id>/run` | Execute operation, return Stop button (server) or output modal (one-shot) |\n| `POST` | `/api/op/<id>/stop` | Kill running operation, return Start button |\n| `GET` | `/api/op/<id>/logs` | Return log viewer HTML (last 500 lines, auto-scrolled) |\n\n### Run Operation Response Patterns\n\n**Server started:** Returns Stop button HTML\n```html\n<button class=\"op-btn op-btn--danger\" hx-post=\"/api/op/{id}/stop\" hx-swap=\"outerHTML\">Stop</button>\n```\n\n**One-shot completed:** Returns original button + output in modal via OOB swap\n```html\n<button class=\"op-btn op-btn--local\" hx-post=\"/api/op/{id}/run\" hx-swap=\"outerHTML\">{name}</button>\n<pre id=\"op-output-body\" hx-swap-oob=\"innerHTML\">{escaped output}</pre>\n```\nPlus `HX-Trigger: showOpModal` header to open the output modal.\n\n### Publish Pipeline\n| Method | Path | Purpose |\n|--------|------|---------|\n| `POST` | `/publish/rebuild` | Start rebuild via spawn service |\n| `POST` | `/publish/push` | Start push via spawn service |\n| `POST` | `/publish/stop` | Stop rebuild or push (`target` form param) |\n| `POST` | `/publish/preview/start` | Start preview server |\n| `POST` | `/publish/preview/stop` | Stop preview server |\n| `POST` | `/api/project/<id>/toggle-publish` | Toggle card_show flag |\n| `GET` | `/publish/edit/<id>` | Publication metadata edit form |\n| `POST` | `/publish/edit/<id>` | Save publication metadata |\n\n### Process Monitor\n| Method | Path | Purpose |\n|--------|------|---------|\n| `GET` | `/api/processes/running` | JSON list of running processes |\n| `GET` | `/api/processes/log/<id>` | Plain text log file contents |\n| `POST` | `/api/processes/<id>/stop` | Stop process, redirect to processes page |\n\n### Tags\n| Method | Path | Purpose |\n|--------|------|---------|\n| `POST` | `/api/tag/add` | Add new tag with color |\n| `POST` | `/api/tag/update` | Update tag name and/or color |\n| `POST` | `/api/tag/delete` | Delete tag |\n\n### Settings\n| Method | Path | Purpose |\n|--------|------|---------|\n| `POST` | `/settings/save` | Save app name and homepage URL |\n\n### Register Project (API)\n| Method | Path | Purpose |\n|--------|------|---------|\n| `POST` | `/api/register-project` | Register project via JSON API (used by /init skill) |\n\nAccepts JSON: `{name, path, project_type, tech_stack, port, description}`\nReturns: `{ok: true, project_id: int, created: bool}`\n",
  "06-UI-TEMPLATES": "# UI Templates & Layout\n\nAll templates use Jinja2 and extend `base.html`.\n\n## base.html \u2014 Master Layout\n\n### Structure\n```\n<html data-bs-theme=\"dark\">\n  <head>\n    Bootstrap 5.3.3 CSS (CDN)\n    style.css (local)\n    HTMX 2.0.4 (CDN)\n  </head>\n  <body>\n    <nav class=\"cc-nav\">\n      Brand: \"\u2318 {app_name}\" (links to /)\n      Tabs: Projects | Configuration | GIT-Homepage | Processes\n      Hamburger (\u2630): Settings, Usage, Tags, Help\n      Running Projects: green \"\u25cf {title}\" badges (linked to project detail)\n    </nav>\n    <main class=\"cc-main\">\n      Flash messages (Bootstrap alerts, dismissible)\n      {% block content %}\n    </main>\n    CLAUDE.md Viewer Modal (#claudeModal)\n    Command Output Modal (#opOutputModal)\n    Bootstrap 5.3.3 JS (CDN)\n    showOpModal event listener (opens output modal on HX-Trigger)\n  </body>\n</html>\n```\n\n### Modals\n\n**CLAUDE.md Viewer** (`#claudeModal`): Large, scrollable modal. Content loaded via HTMX into `#claude-modal-body`. Shows project title, filename, and preformatted content.\n\n**Command Output** (`#opOutputModal`): Large, scrollable modal. Content injected via OOB swap into `#op-output-body`. Triggered by `showOpModal` custom event from HTMX response header.\n\n## list.html \u2014 Projects Tab\n\n### Header\n- Title: \"Projects\"\n- Sort dropdown: Name / Status \u2191 / Status \u2193 (changes URL param)\n- Refresh button: `POST /api/sync` then reload\n\n### Content\n- Empty state: \"No projects found\" with Refresh button\n- Table: `<table class=\"project-table\">` with type-specific row templates\n- Each project renders via `{% include type_config.row_template %}`\n\n## Type-Specific Row Templates\n\n### _project_standard_columns.html (shared)\n\nFirst 2 columns included by all row templates:\n\n| Column | Width | Content |\n|--------|-------|---------|\n| Status | 120px | Workflow badge (`<span class=\"workflow-badge\" style=\"background:{color}\">{label}</span>`) |\n| Name   | flex  | Type icon (\ud83d\udcd6/\ud83d\udcbb) + project title + RUNNING badge (if has_running) |\n\n### _software_row.html / _book_row.html\n\nExtends standard columns with:\n\n| Column | Content |\n|--------|---------|\n| Port | Click-to-edit port number (HTMX inline edit) |\n| Links | Links from Links.md as callout buttons, or server link from port |\n| Local Ops | Operation buttons (op-btn--local/service) for category='local' |\n| Remote Ops | Git Push button with unpushed count badge (hidden if count=0) |\n| CLAUDE.md | Orange badge opening viewer modal (if has_claude) |\n| Settings | \u2699\ufe0f gear icon linking to project detail page |\n\nBook row differs: shows \"Book\" type badge instead of server link when no Links.md.\n\n### Operation Button Behavior\n\n**Local ops** (Start Server, etc.):\n- Click \u2192 `POST /api/op/{id}/run` \u2192 button swaps to Stop button or shows output modal\n- Stop \u2192 `POST /api/op/{id}/stop` \u2192 button swaps back to Start\n\n**Remote ops** (Git Push):\n- Only visible when `unpushed > 0`\n- Shows red badge with unpushed count\n- Click \u2192 executes as one-shot, shows output in modal\n\n## _project_editor_row.html \u2014 Configuration Tab Row\n\n| Column | Content |\n|--------|---------|\n| Status | Workflow badge |\n| Name | Clickable type icon (toggles software\u2194book) + linked title |\n| Workflow | Dropdown select (auto-saves on change, reloads page) |\n| Publish | Checkbox for `card_show` (auto-saves via HTMX) |\n| Settings | \u2699\ufe0f gear icon |\n\n## Project Detail Pages\n\n### _software_detail.html\n\nLayout: 2-column (8/4 Bootstrap grid)\n\n**Left column:**\n- Back button\n- Title + \"Software\" badge + unpushed count\n- \"Project Details\" card: Title, Description, Tech Stack, Port, Remote URL (all auto-save on change via HTMX)\n\n**Right column:**\n- \"Info\" card: Directory, Git, Venv, Node, CLAUDE.md, Created date\n- \"Links\" card (if Links.md exists): label + URL list\n\n**Bottom (if server ops exist):**\n- \"Live Logs\" card: Auto-refreshing log viewer (polls every 3s via HTMX)\n- Dropdown to switch between multiple server ops\n- Log content from `/api/op/{id}/logs`\n\n### _book_detail.html\n\nSimplified layout:\n- Back button, title with \ud83d\udcd6 icon\n- \"Configuration\" card: Directory (read-only), Title, Description\n- \"Info\" card: Git, CLAUDE.md, Created date\n\n## publish.html \u2014 GIT-Homepage Tab\n\n### Pipeline Buttons (horizontal row)\n- **Rebuild** (blue): `\u27f3 Rebuild` \u2014 shows last click time, swaps to Stop when running\n- **Preview** (green): `\u25b6 Preview` \u2014 shows Preview link when running + Stop button\n- **Push** (purple): `\u2191 Push` \u2014 shows last click time, swaps to Stop when running\n- **Homepage** (purple): `\ud83c\udf10 Homepage` \u2014 links to production URL\n\n### Content Area (70/30 grid)\n\n**Left: Contents table** \u2014 All projects with:\n- Workflow badge, type icon, title\n- Card title, card type\n- Publish checkbox (auto-saves via HTMX)\n- Rows are clickable \u2192 updates Details sidebar\n\n**Right: Details card** \u2014 Edit form for selected project:\n- Card Title, Type, URL, Description, Tags, Show checkbox\n- All fields auto-save on blur via HTMX\n- JavaScript `switchToDetails(projectId)` updates form dynamically\n\n### Auto-Refresh\n- 1-second interval while any pipeline process is running\n- Stops automatically when all processes complete\n\n## processes.html \u2014 Processes Tab\n\n### Running Processes Table\n| Column | Content |\n|--------|---------|\n| Command | Truncated cmd (60 chars) in `<code>` |\n| PID | Green colored |\n| Started | Timestamp |\n| Elapsed | Computed time string |\n| Actions | Stop button (with confirm) + Log button |\n\n### Completed Processes Table\n| Column | Content |\n|--------|---------|\n| Command | Truncated cmd |\n| Status | \u2713 Done (green) / \u2717 Error (red) |\n| Completed | Timestamp |\n| Actions | Log button |\n\n### Log Viewer Modal\n- Custom modal (not Bootstrap): fixed overlay with close button\n- Fetches log via `fetch('/api/processes/log/{id}')` and displays in `<pre>`\n- Green monospace text on dark background\n\n### Auto-Refresh\n- 3-second interval while running processes exist\n- Checks `/api/processes/running` JSON endpoint\n- Stops when no processes running\n\n## settings.html\n- Form: Application Name (text), Homepage URL (url)\n- Save button + Cancel link\n- Saves to Flask config (in-memory)\n\n## tags.html\n- Color legend: py (green), db (orange), ops (blue), fe (purple), sec (red), neutral (gray)\n- Table: tag name, color dropdown + update button, delete button\n- Add form: name input + color dropdown + Add button\n\n## usage.html\n- Time period selector: 7/14/30 days dropdown + Refresh button\n- Report card: renders `usage_analyzer.generate_report()` HTML with Plotly charts\n\n## help.html\n- Bootstrap accordion with feature documentation sections:\n  1. Processes Monitor\n  2. Spawn Service\n  3. Publish Pipeline\n  4. Tags & Project Organization\n- Pro Tips section at bottom\n",
  "07-STYLING": "# Styling & Design System\n\nSingle stylesheet: `static/style.css`. Dark theme only. No light mode.\n\n## CSS Custom Properties\n\n```css\n:root {\n    --cc-bg: #1a1a2e;           /* Page background */\n    --cc-surface: #16213e;       /* Card/row backgrounds */\n    --cc-surface-hover: #1a2744; /* Row hover */\n    --cc-border: #0f3460;        /* Borders, dividers */\n    --cc-text: #e2e8f0;          /* Primary text */\n    --cc-muted: #94a3b8;         /* Secondary text */\n    --btn-local: #0073ea;        /* Local operation buttons */\n    --btn-remote: #a25ddc;       /* Remote operation buttons */\n    --btn-danger: #e44258;       /* Stop/delete buttons */\n    --btn-success: #00c875;      /* Success states */\n    --btn-service: #0073ea;      /* Service operation buttons */\n    --btn-git: #808080;          /* Git operation buttons */\n    --btn-callout: #a25ddc;      /* Link callout buttons */\n    --btn-claude: #fdab3d;       /* CLAUDE.md badge */\n}\n```\n\n## Component Classes\n\n### Navigation (`cc-nav`)\n- Background: surface color, bottom border\n- Links: uppercase, 0.9rem, 600 weight, 3px bottom border on active (blue)\n- Brand: 800 weight, 1.1rem\n\n### Project Table\n- `project-table`: border-spacing 0.35rem vertical\n- `project-row`: surface background, 8px border-radius on first/last td, hover slides right 2px\n\n### Operation Buttons (`op-btn`)\n- Size: 0.75rem, 600 weight, padding 0.25rem 0.65rem\n- Variants: `--local` (blue), `--remote` (purple), `--danger` (red), `--success` (green), `--ghost` (transparent), `--service` (blue), `--git` (gray), `--callout` (purple), `--claude` (orange)\n- Hover: opacity 0.85, translateY(-1px)\n\n### Pipeline Buttons (`pipeline-btn`)\n- Size: 1rem, 600 weight, padding 1rem 1.5rem, min-width 140px\n- Layout: flex-column (icon above subtitle)\n- Variants: `--rebuild` (blue), `--preview` (green), `--push` (purple)\n- `--running`: pulse animation\n\n### Badges\n- `workflow-badge`: 0.65rem, 700 weight, 6px radius, uppercase, inline color via `style=\"background:{color}\"`\n- `running-badge`: 0.6rem, green with pulse animation\n- `badge-unpushed`: 0.7rem, danger color, rounded\n- `badge-claude` / `op-btn--claude`: orange (#fdab3d), matches op-btn sizing\n\n### Cards (`cc-card`)\n- Background: surface, border: 1px border color, radius: 10px, padding: 1.5rem\n- Header (`cc-card-header`): 0.85rem, 700 weight, uppercase, muted color, bottom border\n\n### Forms (`cc-form`)\n- Inputs: bg background, border color border, text color\n- Focus: blue border, blue box-shadow\n- Labels: muted, 0.8rem, 600 weight, uppercase\n\n### Log Viewer\n- `log-output`: dark terminal background (#0d1117), monospace, 0.78rem, max-height 450px\n- `log-status-running`: green tinted, pulse animation\n- `log-status-done`: muted tinted\n- `log-waiting`: text pulse animation\n\n### Animations\n```css\n@keyframes pulse-green {\n    0%, 100% { box-shadow: 0 0 0 0 rgba(0, 200, 117, 0.4); }\n    50% { box-shadow: 0 0 0 6px rgba(0, 200, 117, 0); }\n}\n\n@keyframes pulse-text {\n    0%, 100% { opacity: 1; }\n    50% { opacity: 0.4; }\n}\n```\n\n### Responsive\n- `@media (max-width: 768px)`: reduced padding, smaller buttons\n\n## Typography\n- Primary font: Segoe UI, system-ui, -apple-system, sans-serif\n- Monospace: Courier New, Consolas, monospace (logs, code, ports)\n\n## External Dependencies (CDN)\n- Bootstrap 5.3.3 CSS + JS Bundle\n- HTMX 2.0.4\n- Plotly (usage page only, loaded in usage_analyzer.py output)\n",
  "08-PUBLISHER": "# GitHub Homepage Publisher\n\n`publisher.py` \u2014 Generates and publishes a GitHub Pages portfolio site from project card metadata.\n\n## Overview\n\nThe publisher takes projects marked with `card_show=1`, renders them as Astro card components, and deploys to a sibling `My_Github` directory that is a separate GitHub Pages repository.\n\n## Directory Structure\n\n```\n~/projects/\n  commandcenter/          # This app\n  My_Github/              # Astro-based GitHub Pages site\n    src/pages/index.astro  # Generated by publisher\n    ...\n```\n\n`PAGES_DIR` is auto-detected as a sibling directory: `../My_Github` relative to commandcenter.\n\n## Three-Step Pipeline\n\n### 1. Rebuild (`rebuild_async`)\n\nCalls `bin/RebuildYourHomepage.sh` via spawn service (batch mode).\n\nThe bash script:\n1. `cd` to `My_Github` directory\n2. `npm run build`\n\nBefore the script runs, `rebuild_pages()` generates `index.astro`:\n1. Query all projects where `card_show=1`\n2. Render each as an Astro `<article>` card via `_render_card()`\n3. Wrap in full Astro layout via `_build_astro()`\n4. Write to `My_Github/src/pages/index.astro`\n\n### 2. Preview (`start_preview`)\n\nCalls `bin/LocalPreview.sh` via spawn service (daemon mode).\n\nThe bash script:\n1. `cd` to `My_Github` directory\n2. `npm run preview -- --port 4321`\n\nPreview accessible at `http://localhost:4321/webcloudstudio`\n\n### 3. Push (`push_async`)\n\nCalls `bin/PushAndPublish.sh` via spawn service (batch mode).\n\nThe bash script:\n1. `cd` to `My_Github` directory\n2. `git add -A`\n3. `git commit -m \"Update homepage cards\"` (|| true to handle \"nothing to commit\")\n4. `git push`\n\nGitHub Actions handles actual deployment after push.\n\n## Card Rendering (`_render_card`)\n\nEach project card contains:\n- **Icon**: Book SVG (\ud83d\udcd6) or Heart SVG (\ud83d\udcbb equivalent)\n- **Meta**: Card type label + URL link (domain only)\n- **Title**: `card_title` or project title fallback\n- **Description**: `card_desc` or project description\n- **Tags**: Comma-separated or JSON array, rendered with color classes from `data/tag_colors.json`\n- **Action button**: \"Live Site \u2197\" or \"View on Amazon \u2197\" (books) linking to `card_url`\n\n### Tag Colors\n\nSix color categories stored in `data/tag_colors.json`:\n```json\n{\n  \"_comment\": \"Tag color configuration. Colors: py (green), db (orange), ops (blue), fe (purple), sec (red), neutral (gray)\",\n  \"tags\": {\n    \"Python\": \"py\",\n    \"Flask\": \"ops\",\n    \"React\": \"fe\"\n  }\n}\n```\n\nCSS class mapping: `tag--py`, `tag--db`, `tag--ops`, `tag--fe`, `tag--sec`, `tag--neutral`\n\n## Astro Layout (`_build_astro`)\n\nGenerated `index.astro` contains:\n- **Hero section**: Name, title, description\n- **Projects section**: Horizontal card carousel with prev/next buttons\n- **Carousel JS**: Client-side scroll with responsive breakpoints (1/2/3 cards per view)\n- **Inline styles**: Carousel wrapper, nav buttons, scroll container\n\n## Process Tracking\n\nGlobal variables track current run IDs:\n- `_rebuild_run_id`, `_push_run_id`, `_preview_run_id`\n\nStatus check functions (`rebuild_is_running()`, etc.) query spawn service for process status.\n\n## Click Time Recording\n\nEach pipeline button click records timestamp to `data/publish_clicks.json`:\n```json\n{\"rebuild\": \"2024-01-15T10:30:00\", \"push\": \"2024-01-15T10:35:00\", \"preview\": \"2024-01-15T10:32:00\"}\n```\nDisplayed under pipeline buttons as \"last clicked\" indicator.\n",
  "09-PROCESSES": "# Process Monitor and Operations Management\n\nThe Processes tab provides centralized visibility into all background processes spawned by Command Center \u2014 servers, builds, deploys, ETL jobs, backups, and any other commands run through the operations engine, spawn service, or bin/ scripts.\n\n> **Technology Reference**: See `stack/common.md` \u00a7 Shell Scripts for the bin/ script standard (headers, logging, tee pattern).\n\n## Design Principles\n\n1. **Everything runs through one system** \u2014 bin/ scripts, Python operations, manual commands, and scheduled jobs all produce process records and log files\n2. **Unified visibility** \u2014 one Processes page shows all running and completed work\n3. **Log everything** \u2014 stdout and stderr captured to `data/logs/` via tee or pipe\n4. **Operation categories** \u2014 processes are categorized for filtering and display\n\n## Process Categories\n\n| Category | Examples | Type | Source |\n|----------|----------|------|--------|\n| **Service** | Dev server start/stop | daemon | bin/start.sh, ops.py |\n| **Build** | Compile, bundle, rebuild | batch | bin/build.sh, spawn.py |\n| **Test** | Unit tests, lint | batch | bin/test.sh |\n| **Deploy** | Push to production, publish | batch | bin/deploy.sh, spawn.py |\n| **Database** | Migrations, backup, restore | batch | bin/migrate.sh, bin/backup.sh |\n| **ETL/ELT** | Data extract, transform, load | batch | bin/etl_*.sh, Python scripts |\n| **Operations** | Reorg, cleanup, maintenance | batch | bin/ops_*.sh |\n| **Git** | Push, pull, status | batch | ops.py |\n| **Scheduled** | Cron-triggered jobs | batch | Any of the above, triggered on schedule |\n\n## Architecture\n\n### Data Flow\n\n```\nUser clicks operation button (Projects page)\n  \u2192 ops.run_operation() or spawn.spawn_process()\n    \u2192 subprocess.Popen (new session, output to log file)\n    \u2192 Insert/update op_runs table\n    \u2192 Monitor thread watches for exit\n\nScheduled job triggers (future)\n  \u2192 spawn.spawn_process() with schedule metadata\n    \u2192 Same subprocess pipeline\n\nUser visits Processes page\n  \u2192 cleanup_dead_processes()\n  \u2192 list_running_processes()\n  \u2192 list_recent_processes()\n  \u2192 Render processes.html with category filters\n```\n\n### Process Sources\n\nAll processes ultimately flow through two modules:\n\n| Source | Module | Used By | op_id | Log Pattern |\n|--------|--------|---------|-------|-------------|\n| Project operations | `ops.py` | Start Server, Git Push, bin/ scripts | Set to operation ID | `{run_id}.log` |\n| Spawn service | `spawn.py` | Rebuild, Preview, Push, any ad-hoc command | NULL | `{name}_{run_id}_{ts}.log` |\n\nBoth write to `data/logs/` and record in `op_runs` table.\n\n### Running bin/ Scripts\n\nWhen Command Center runs a bin/ script, the execution follows this path:\n\n```\nbin/start.sh clicked in UI\n  \u2192 ops.run_operation() reads the operation record\n  \u2192 subprocess.Popen(['bash', 'bin/start.sh'], ..., stdout=log_file, stderr=STDOUT)\n  \u2192 Script's own tee logging writes to data/logs/ (via script preamble)\n  \u2192 ops.py also captures output to its own log file\n  \u2192 op_runs row tracks PID, status, timestamps\n```\n\n### Running Python Operations\n\nPython scripts and modules can also be spawned as processes:\n\n```python\n# Spawning a Python operation\nspawn_process(\n    cmd='python -m etl.load_data --source api',\n    cwd='/path/to/project',\n    name='ETL Load',\n    daemon=False,\n    project_id=project_id\n)\n```\n\nThe spawn service handles Python operations identically to bash scripts \u2014 same log capture, same process tracking, same UI display.\n\n### Process Lifecycle\n\n```\nstarting  \u2192  running  \u2192  done\n                     \u2192  error (on startup failure)\n```\n\n- **starting**: Record created, PID not yet assigned\n- **running**: Process spawned, PID recorded\n- **done**: Process exited (normal or killed) OR dead PID detected\n- **error**: Failed to spawn\n\n### Dead Process Detection\n\nTwo cleanup functions run automatically:\n- `ops.cleanup_dead_processes()` \u2014 called via context processor on every page load\n- `spawn.cleanup_dead_processes()` \u2014 called when Processes page loads\n\nBoth use `os.kill(pid, 0)` to test if PID is alive, mark dead processes as 'done'.\n\n## bin/ Script Integration\n\n### Discovery\n\nThe scanner reads bin/ scripts with CommandCenter headers and creates operation records:\n\n```bash\n#!/bin/bash\n# CommandCenter Operation\n# Name: Database Backup\n# Type: batch\n# Port: (optional, for daemons)\n```\n\nScripts without the `# CommandCenter Operation` header are still valid project scripts but won't appear in Command Center's UI.\n\n### Standard Operations per Project Type\n\n**All projects**:\n| Script | Type | Purpose |\n|--------|------|---------|\n| `bin/start.sh` | daemon | Start the dev server |\n| `bin/stop.sh` | batch | Stop the dev server |\n| `bin/test.sh` | batch | Run test suite |\n| `bin/backup.sh` | batch | Backup data/database |\n\n**Django projects** (additional):\n| Script | Type | Purpose |\n|--------|------|---------|\n| `bin/migrate.sh` | batch | makemigrations + migrate |\n| `bin/shell.sh` | daemon | Django interactive shell |\n| `bin/collectstatic.sh` | batch | Collect static files |\n\n**Data projects** (additional):\n| Script | Type | Purpose |\n|--------|------|---------|\n| `bin/etl_extract.sh` | batch | Extract data from source |\n| `bin/etl_transform.sh` | batch | Transform/clean data |\n| `bin/etl_load.sh` | batch | Load data to destination |\n| `bin/reorg.sh` | batch | Database/file reorganization |\n\n### Script Logging Standard\n\nEvery bin/ script follows the logging preamble from `stack/common.md`:\n\n```bash\nTIMESTAMP=$(date '+%Y-%m-%d_%H%M%S')\nSCRIPT_NAME=$(basename \"$0\" .sh)\nLOG_FILE=\"$LOG_DIR/${SCRIPT_NAME}_${TIMESTAMP}.log\"\n\necho \"=== $SCRIPT_NAME started at $(date '+%Y-%m-%d %H:%M:%S') ===\" | tee \"$LOG_FILE\"\necho \"Arguments: $*\" | tee -a \"$LOG_FILE\"\necho \"Working dir: $PROJECT_DIR\" | tee -a \"$LOG_FILE\"\n```\n\nLog files are viewable from the Process Monitor via `/api/processes/log/{run_id}`.\n\n## UI Components\n\n### Running Processes Table\n- Command (truncated to 60 chars)\n- Category badge (Service, Build, Test, ETL, etc.)\n- PID (green text)\n- Started timestamp\n- Elapsed time (computed: Ns / Nm Ns / Nh Nm)\n- Stop button (with confirmation dialog)\n- Log button (opens modal)\n\n### Completed Processes Table\n- Command (truncated)\n- Category badge\n- Status: Done (green) / Error (red)\n- Completed timestamp\n- Log button\n\n### Category Filter\n- Filter bar with toggleable category badges\n- Click to show/hide process categories\n- Persistent filter state via URL params or localStorage\n\n### Log Viewer Modal\n- Custom overlay (not Bootstrap modal)\n- Fetches plain text from `/api/processes/log/{run_id}`\n- Monospace green-on-dark display\n- Close button and click-outside-to-close\n\n### Auto-Refresh\n- Checks `/api/processes/running` every 3 seconds\n- Reloads page if running processes exist\n- Stops polling when all processes complete\n\n## Scheduled Operations (Future)\n\nThe Process Monitor framework supports scheduled execution:\n\n```\nschedule.json (per project or global):\n{\n  \"jobs\": [\n    {\n      \"name\": \"Nightly Backup\",\n      \"cmd\": \"bin/backup.sh\",\n      \"schedule\": \"0 2 * * *\",\n      \"category\": \"database\"\n    },\n    {\n      \"name\": \"ETL Daily Load\",\n      \"cmd\": \"bin/etl_load.sh --date yesterday\",\n      \"schedule\": \"0 6 * * *\",\n      \"category\": \"etl\"\n    }\n  ]\n}\n```\n\nScheduled jobs would:\n1. Be triggered by a scheduler (cron or internal timer)\n2. Execute through `spawn_process()` like any other operation\n3. Appear in the Processes page with a \"scheduled\" indicator\n4. Log to `data/logs/` following the same pattern\n\n## Enhancement Opportunities\n\n1. **Unified view**: Show ops.py server processes alongside spawn.py processes in one table (currently spawn.py processes only)\n2. **Live log streaming**: WebSocket or SSE-based log tailing instead of on-demand fetch\n3. **Process output in real-time**: Show last N lines of output inline in the table row\n4. **Category filters**: Filter by category (Service, Build, ETL, etc.)\n5. **Log retention**: Auto-cleanup old log files (keep last N days)\n6. **Process groups**: Group related processes (e.g., all processes for one project)\n7. **Alerting**: Notify on process failure (email, webhook, or UI notification)\n8. **Scheduling**: Built-in job scheduler for recurring operations\n9. **ETL dashboard**: Summary view of data pipeline runs with success/failure rates\n",
  "10-CONVENTIONS": "# Conventions & Supporting Modules\n\n## CLAUDE.md Convention (`claude_convention.py`)\n\nDefines a standard structure for project CLAUDE.md files and provides parsing/stubbing utilities.\n\n### Standard Sections (in order)\n\n1. `## Project Overview` \u2014 What the project does\n2. `## Architecture` \u2014 Tech stack, key files, patterns\n3. `## Dev Commands` \u2014 Bash commands to run the project\n4. `## Service Endpoints` \u2014 URLs: `- Label: https://url`\n5. `## Bookmarks` \u2014 Grouped links: `### Group` then `- [Title](URL)`\n\n### Section Rename Map\n\nVariant headings automatically renamed to standard:\n- `## Commands` / `## Development Commands` / `## Build Commands` \u2192 `## Dev Commands`\n- `## Overview` / `## Project Purpose` \u2192 `## Project Overview`\n- `## Stack` \u2192 `## Architecture`\n\n### Functions\n\n- `resolve_claude_file(path)` \u2014 Returns `(filepath, content)`. Follows `@agents.md` redirects (CLAUDE.md containing just `@agents.md` reads that file instead).\n- `parse_claude_md(content)` \u2014 Extracts:\n  - `endpoints`: list of `{label, url}` from `## Service Endpoints` section\n  - `bookmarks`: dict of `{group: [{title, url}]}` from `## Bookmarks` section\n- `rename_sections(content)` \u2014 Replaces variant headings with standard names\n- `generate_stubs(content)` \u2014 Appends missing standard sections with TODO placeholders\n- `stub_project_claude(path)` \u2014 Creates or updates CLAUDE.md with stubs. Handles `@agents.md` redirects.\n\n## Project Type Registry (`models.py`)\n\n```python\nPROJECT_TYPES = {\n    'software': {\n        'label': 'Software',\n        'detail_template': 'types/_software_detail.html',\n        'row_template': 'types/_software_row.html',\n        'fields': ['tech_stack', 'port', 'remote_url', 'railway_id', 'website_url'],\n        'default_ops': {\n            'flask':  [('Start Server', 'local', 'flask run --port {port}', True)],\n            'django': [('Start Server', 'local', 'python manage.py runserver {port}', True)],\n            'node':   [('Start Dev', 'local', 'npm run dev', False)],\n            'astro':  [('Start Dev', 'local', 'npm run dev', False)],\n            'bash':   [('Run Script', 'local', './start.sh', False)],\n        },\n    },\n    'book': {\n        'label': 'Book',\n        'detail_template': 'types/_book_detail.html',\n        'row_template': 'types/_book_row.html',\n        'fields': [],\n        'default_ops': {},\n    },\n}\n```\n\nTo add a new project type:\n1. Add entry to `PROJECT_TYPES` dict\n2. Create `types/_newtype_row.html` (include `_project_standard_columns.html`)\n3. Create `types/_newtype_detail.html` (extend `base.html`)\n\n## Usage Analyzer (`usage_analyzer.py`)\n\nReads Claude Code session JSONL files from `~/.claude/projects/**/*.jsonl` and generates interactive HTML reports.\n\n### Data Collection\n- Scans all `.jsonl` files in `.claude/projects/` recursively\n- Filters by date range (last N days)\n- Extracts usage data: input_tokens, output_tokens, cache_read, cache_creation\n- Groups by: day, project, tool\n\n### Report Output\n- Summary cards: total consumed, input, output, messages, weekly budget %\n- Daily bar chart (Plotly)\n- Project breakdown horizontal bar chart\n- Tool usage bar chart\n- Outlier detection: flags requests > 2 standard deviations above mean\n\n### CLI Usage\n```bash\npython usage_analyzer.py --days 30 -o report.html --outliers\n```\n\n### Flask Integration\n```python\nreport_html = usage_analyzer.generate_report(days_back=7, flag_outliers=False)\n```\n\n## Workflow States\n\nConfigurable via `workflow.json` at project root:\n\n```json\n{\n  \"workflow_states\": [\n    {\"key\": \"todo\",       \"label\": \"TODO\",       \"color\": \"#fdab3d\"},\n    {\"key\": \"developing\", \"label\": \"DEVELOPING\",  \"color\": \"#0073ea\"},\n    {\"key\": \"good\",       \"label\": \"GOOD\",        \"color\": \"#00c875\"}\n  ]\n}\n```\n\nFalls back to built-in defaults if file doesn't exist or can't be parsed. States are displayed as colored badges and selectable via dropdowns.\n\n## CommandCenter Operation Header Format\n\nBash scripts in project `bin/` directories can register as Command Center operations:\n\n```bash\n#!/bin/bash\n# CommandCenter Operation\n# Name: Service Start\n# Port: 8000\n\n# ... script body ...\n```\n\nRequired:\n- `# CommandCenter Operation` marker (exact match)\n- `# Name: {name}` \u2014 display name in UI\n\nOptional:\n- `# Port: {number}` \u2014 default port number\n\nScanner reads first 20 lines of each `bin/*.sh` file looking for this header.\n\n## Project Naming Convention\n\nDirectory names are converted to display titles:\n- `HerpesHearts` \u2192 `Herpes Hearts` (CamelCase split)\n- `My_Github` \u2192 `My Github` (underscore to space)\n- `commandcenter` \u2192 `Commandcenter` (capitalize first word)\n\nImplemented in `scanner.camel_to_title()`.\n\n## Metadata Files Convention\n\n### Links.md (per project)\n```markdown\n| Label | URL |\n|-------|-----|\n| Local Dev | http://localhost:8000 |\n| Production | https://example.com |\n```\n\n### git_homepage.md (per project)\n```markdown\n| Field | Value |\n|-------|-------|\n| Title | My Project Title |\n| Description | Project description here |\n| Card Type | Software |\n| Card URL | https://example.com |\n| Tags | tag1, tag2, tag3 |\n| Show on Homepage | true |\n```\n\nBoth use markdown table format. Parsed by scanner at startup.\n",
  "11-STARTUP": "# Application Startup & Configuration\n\n## Startup Sequence\n\n```\napp.py: create_app()\n  1. Create Flask app\n  2. Set config: SECRET_KEY, PROJECTS_DIR, PRODUCTION_URL, APP_NAME\n  3. db.init_db()\n     a. Create data/ directory if needed\n     b. Execute SCHEMA (CREATE TABLE IF NOT EXISTS for all 3 tables)\n     c. Run migrations (add missing columns)\n  4. If WERKZEUG_RUN_MAIN == 'true' (avoids double-run in debug mode):\n     a. scanner.cleanup_orphaned(PROJECTS_DIR) \u2014 remove stale DB entries\n     b. scanner.scan_projects(PROJECTS_DIR) \u2014 discover and upsert all projects\n  5. Register routes blueprint\n  6. Return app\n```\n\n## Running the Server\n\n```bash\n# Set required env var\nexport PROJECTS_DIR=~/projects\n\n# Activate virtual environment\nsource venv/bin/activate\n\n# Run Flask (debug mode with auto-reload)\nflask run --port 5001\n```\n\nOr directly:\n```bash\npython app.py  # Runs on 127.0.0.1:8080 in debug mode\n```\n\n## Flask Configuration\n\n| Key | Source | Default |\n|-----|--------|---------|\n| `SECRET_KEY` | env `SECRET_KEY` | `cc-dev-key-change-in-prod` |\n| `PROJECTS_DIR` | env `PROJECTS_DIR` | Parent of app directory |\n| `PRODUCTION_URL` | env `PRODUCTION_URL` | `https://webcloudstudio.github.io` |\n| `APP_NAME` | env `APP_NAME` | `Command Center` |\n\n## Debug Mode Behavior\n\n- Flask's debug reloader runs `create_app()` twice: once in the parent process, once in the reloader child\n- Scanner only runs when `WERKZEUG_RUN_MAIN=true` (the reloader child) to avoid duplicate scans\n- Auto-restart on Python file changes (but not template/CSS changes)\n\n## Data Directory\n\n`data/` is created automatically by `get_db()` if it doesn't exist. Contains:\n- `cc.db` \u2014 SQLite database\n- `logs/` \u2014 Process log files (created by ops.py and spawn.py)\n- `tag_colors.json` \u2014 Tag color mappings (created by tags route)\n- `publish_clicks.json` \u2014 Pipeline button click timestamps (created by publisher)\n\nAll items in `data/` should be gitignored.\n\n## Blueprint Registration\n\nAll routes are in a single Blueprint named `'cc'` with `static_folder='static'`. This means:\n- Static files served at `/static/style.css` via `url_for('cc.static', filename='style.css')`\n- All route names prefixed with `cc.` (e.g., `url_for('cc.project_list')`)\n",
  "METADATA": "name: GAME\ntitle: GAME \u2014 Generic Agent Management Environment\ndescription: AI-assisted workflow management platform. Governs a portfolio of projects via filesystem discovery, one-click operations, observability, and GitHub Pages publishing.\nport: 5001\nstatus: active\nversion: 2.0\nupdated: 2026-03-09\n",
  "README": "# GAME \u2014 Generic Agent Management Environment\n\n**Status**: Specification v2 | **Updated**: 2026-03-09\n\nAI-assisted workflow management platform that governs a portfolio of projects (~15 projects: software, books, tools) from a single web dashboard. Auto-discovers projects from the filesystem, provides one-click operations via bash scripts, monitors background processes, enforces stack governance, and publishes a GitHub Pages portfolio.\n\n---\n\n# Catalog\n\n| File | Description |\n|------|-------------|\n| `01-OVERVIEW.md` | System purpose, scope, tech stack, dependencies, directory layout, navigation structure |\n| `02-DATABASE.md` | SQLite schema, tables (projects, operations, processes, tags), relationships, migrations |\n| `03-SCANNER.md` | Filesystem project discovery, metadata extraction, file conventions (CLAUDE.md, Links.md, bin/ headers) |\n| `04-OPERATIONS.md` | Operation execution engine, bash script auto-registration, run history, logging, process spawning |\n| `05-ROUTES-API.md` | Flask routes for all tabs and features, REST API endpoints, request/response formats |\n| `06-UI-TEMPLATES.md` | Jinja2 templates structure, component reuse, conditional rendering, HTMX integration |\n| `07-STYLING.md` | Single CSS file (`static/style.css`), dark theme only, Bootstrap 5 integration, responsive design |\n| `08-PUBLISHER.md` | GitHub Pages pipeline, Astro integration, homepage card generation, deployment workflow |\n| `09-PROCESSES.md` | Background process management, heartbeat monitoring, process log capture, alert system |\n| `10-CONVENTIONS.md` | File naming, git hygiene, directory layout, CLAUDE.md standard sections, bin/ script headers |\n| `11-STARTUP.md` | Application startup validation, database initialization, scanner verification, health checks |\n| `METADATA.md` | Technology selections, project config, stack rules, directories, environment variables |\n\n---\n\n# Stacks\n\n## Selected Technologies\n\n| Component | Technology | Purpose |\n|-----------|-----------|---------|\n| **Language** | Python 3 | Core application, scanner, operations engine |\n| **Framework** | Flask | Web server (port 5001) for dashboard |\n| **Database** | SQLite (WAL mode) | Project metadata, operations log, process tracking |\n| **Frontend** | Bootstrap 5.3 (CDN) | Responsive dashboard components, dark theme |\n| **Templating** | Jinja2 (Flask default) | Dynamic HTML generation from project metadata |\n| **Frontend Interactivity** | HTMX 2.0 (CDN) | Dynamic UI without page reloads |\n| **Process Management** | `subprocess.Popen` + threading | Spawn and monitor background jobs |\n| **Publishing** | Astro + GitHub Pages | Static portfolio site generation |\n\n## When to Use Each Stack\n\n| Technology | When to Use |\n|-----------|----------|\n| **Flask** | Building the dashboard, serving pages and APIs |\n| **SQLite** | Storing project metadata offline, local caching |\n| **Bootstrap 5** | Ensuring responsive, accessible UI across all devices |\n| **Astro** | Pre-generating portfolio site for maximum performance |\n| **HTMX** | Adding interactivity without full JavaScript framework |\n| **subprocess.Popen** | Spawning bash scripts and monitoring long-running tasks |\n\n---\n\n# Prerequisites\n\n## System Requirements\n\n- **Python 3.8+** \u2014 Core application runs on Python 3\n- **Git** \u2014 For version control and project discovery\n- **Bash** \u2014 For operation scripts and spawning processes\n- **Node.js 18+** (optional) \u2014 Only needed for Astro homepage building\n\n## Python Dependencies\n\n```\nflask==2.3.0\npython-dotenv==1.0.0\nPyYAML==6.0\n```\n\nInstall via: `pip install -r requirements.txt`\n\n## Required Environment Variables\n\n| Variable | Purpose | Example |\n|----------|---------|---------|\n| `PROJECTS_DIR` | Root directory containing all managed projects | `/home/user/projects` |\n\n## Optional Environment Variables\n\n| Variable | Default | Purpose |\n|----------|---------|---------|\n| `SECRET_KEY` | `cc-dev-key-change-in-prod` | Flask session encryption key |\n| `PRODUCTION_URL` | `https://webcloudstudio.github.io` | Published homepage URL |\n| `APP_NAME` | `Command Center` | Displayed in navigation bar |\n| `FLASK_DEBUG` | *(unset)* | Enable Flask debug mode |\n\n## Project Discovery Requirements\n\nEvery discovered project must have:\n\n1. **Git Repository** \u2014 `.git/` directory present\n2. **CLAUDE.md** \u2014 Project conventions file with standard sections\n3. **git_homepage.md** \u2014 GitHub Pages card metadata (name, description, tags, type, URL)\n4. **bin/start.sh** \u2014 Script with `CommandCenter Operation` header\n5. **bin/stop.sh** \u2014 Script with `CommandCenter Operation` header\n\nIf any requirement is missing, the project shows a warning in the dashboard.\n\n---\n\n# Usage\n\n## Starting the Dashboard\n\n```bash\nexport PROJECTS_DIR=/path/to/projects\n./bin/start.sh              # Runs on http://localhost:5001\n```\n\n## Core Features\n\n### Projects Tab\n- Lists all discovered projects with auto-discovered metadata\n- Shows project type (software, book), status, tech stack\n- Displays git status, running processes, available operations\n\n### Configuration Tab\n- Bulk-edit project workflow states, types, and publish settings\n- Assign tags and categories\n- Toggle stack governance enforcement\n\n### GIT-Homepage Tab\n- Manage GitHub Pages publishing pipeline\n- View and edit portfolio cards\n- Rebuild and publish homepage\n\n### Processes Tab\n- Monitor running background operations\n- View process output and logs in real-time\n- Manage process lifecycle (start, stop, restart)\n\n---\n\n# Architecture at a Glance\n\n```\n\u250c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510\n\u2502        GAME Dashboard (Flask)                \u2502\n\u2502  Port 5001  \u00b7  Bootstrap 5 + HTMX           \u2502\n\u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u252c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518\n                     \u2502\n            \u250c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2534\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510\n            \u2502                  \u2502\n            \u25bc                  \u25bc\n      \u250c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510  \u250c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510\n      \u2502  Scanner    \u2502  \u2502  Operations \u2502\n      \u2502 (Discover)  \u2502  \u2502   (Spawn)   \u2502\n      \u2514\u2500\u2500\u2500\u2500\u2500\u2500\u252c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518  \u2514\u2500\u2500\u2500\u2500\u2500\u2500\u252c\u2500\u2500\u2500\u2500\u2500\u2500\u2518\n             \u2502                 \u2502\n      \u250c\u2500\u2500\u2500\u2500\u2500\u2500\u25bc\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u25bc\u2500\u2500\u2500\u2500\u2500\u2500\u2510\n      \u2502   SQLite Database (cc.db)      \u2502\n      \u2502  - projects metadata           \u2502\n      \u2502  - operation history           \u2502\n      \u2502  - process logs                \u2502\n      \u2502  - tag colors                  \u2502\n      \u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518\n             \u2502\n      \u250c\u2500\u2500\u2500\u2500\u2500\u2500\u25bc\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510\n      \u2502   Filesystem      \u2502\n      \u2502  - CLAUDE.md      \u2502\n      \u2502  - git_homepage   \u2502\n      \u2502  - bin/ scripts   \u2502\n      \u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518\n```\n\n---\n\n# Reliability & Safety\n\n- **Non-Destructive**: Dashboard discovers read-only; only runs explicitly authorized bash scripts\n- **Git-Safe**: All operations logged with timestamps; git status preserved\n- **Process Isolation**: Each operation runs in isolated subprocess with captured output\n- **Offline-Friendly**: Database mirrors filesystem state; can operate without network\n\n---\n\n# Next Steps\n\n1. Review `02-DATABASE.md` for schema design\n2. Follow `03-SCANNER.md` to understand project discovery\n3. Study `04-OPERATIONS.md` for operation spawning\n4. Check `10-CONVENTIONS.md` for your own projects to ensure they're discoverable\n",

// Build the document list in the sidebar
function buildDocList() {
  const list = document.getElementById('doc-list');
  Object.keys(DOCS).sort().forEach(key => {
    const li = document.createElement('li');
    const a = document.createElement('a');
    a.textContent = key.replace(/-/g, ' ');
    a.onclick = () => showDoc(key);
    li.appendChild(a);
    list.appendChild(li);
  });
}

function showDoc(key) {
  if (!DOCS[key]) {
    console.warn('Document not found:', key);
    return;
  }
  document.getElementById('home-panel').style.display = 'none';
  document.getElementById('doc-panel').style.display = 'block';

  const content = DOCS[key];
  const html = markdownToHtml(content);
  document.getElementById('doc-content').innerHTML = html;

  // Update active nav item
  document.querySelectorAll('.file-list a').forEach(el => el.classList.remove('active'));
  const activeLink = Array.from(document.querySelectorAll('.file-list a')).find(a => a.textContent.replace(/ /g, '-') === key);
  if (activeLink) activeLink.classList.add('active');
}

function markdownToHtml(md) {
  // Simple markdown to HTML converter
  let html = md
    .replace(/^### (.*?)$/gm, '<h3>$1</h3>')
    .replace(/^## (.*?)$/gm, '<h2>$1</h2>')
    .replace(/^# (.*?)$/gm, '<h1>$1</h1>')
    .replace(/^- (.*?)$/gm, '<li>$1</li>')
    .replace(/(<li>.*?<\/li>)/s, '<ul>$1</ul>')
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\n\n+/g, '</p><p>')
    .replace(/^(?!<[^>]+>)/gm, '<p>');
  return '<p>' + html + '</p>';
}

buildDocList();
