<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;

}
#sidebar {

  border-right: 1px solid #21262d; overflow-y: auto; display: flex; flex-direction: column;
}
#sidebar header { padding: 20px 16px 12px; border-bottom: 1px solid #21262d; }
#sidebar header h1 { font-size: 15px; font-weight: 600; color: #f0f6fc; }
#sidebar header p { font-size: 11px; color: #6e7681; margin-top: 4px; }

}

.file-list a { color: #58a6ff; text-decoration: none; cursor: pointer; }

.doc-content h3 { font-size: 16px; font-weight: 600; margin: 16px 0 8px; color: #c9d1d9; }

.doc-content li { margin: 6px 0; }

.doc-content table th, .doc-content table td { padding: 8px 12px; border: 1px solid #21262d; text-align: left; }
.doc-content table th { background: #161b22; font-weight: 600; }
.doc-content blockquote { border-left: 4px solid #58a6ff; padding-left: 16px; margin: 12px 0; color: #8b949e; font-style: italic; }
.doc-content hr { border: none; border-top: 1px solid #21262d; margin: 24px 0; }
.subtitle { font-size: 13px; color: #8b949e; margin: 8px 0 16px; }

const DOCS = {
  "ARCHITECTURE": "# Architecture\n\nFlask app factory with blueprints. Scanner, process engine, and publisher are backend modules feeding data to screen routes.\n\n## App Factory\n\n`create_app()` in `app.py`:\n1. Load config from environment and `.env`\n2. Initialize SQLite (create tables if missing, run migrations)\n3. Register blueprints\n4. Start async project scan on first request\n\n## Blueprint\n\nSingle blueprint `cc` registered on `/`. All routes in `routes.py`.\n\n## Backend Modules\n\n| Module | Responsibility |\n|--------|---------------|\n| `scanner.py` | Scans $PROJECTS_DIR: reads METADATA.md, AGENTS.md, bin/ headers, filesystem flags. Upserts into DB. |\n| `ops.py` + `spawn.py` | Launches bin/ scripts as subprocesses. Run/stop/log lifecycle. |\n| `publisher.py` | Builds static portfolio from projects where card_show=true. |\n| `db.py` | Database access helpers, migrations. |\n| `models.py` | PROJECT_TYPES registry. |\n| `claude_convention.py` | CLAUDE.md / AGENTS.md parsing. |\n\n## Routes\n\n| Method | Path | Returns |\n|--------|------|---------|\n| GET | `/` | Full dashboard page |\n| POST | `/api/scan` | Status message |\n| POST | `/api/run/{op_id}` | Updated button state |\n| POST | `/api/stop/{run_id}` | Updated button state |\n| POST | `/api/push/{project_id}` | Git status fragment |\n| GET | `/api/project/{id}` | Project detail fragment |\n| GET | `/processes` | Process list page |\n| GET | `/processes/{run_id}/log` | Log content fragment |\n| GET | `/publisher` | Publisher page |\n| POST | `/publisher/build` | Build status |\n| POST | `/publisher/publish` | Publish status |\n| GET | `/project-config` | Configuration page |\n| GET | `/monitoring` | Monitoring page |\n| GET | `/workflow` | Workflow board |\n| GET | `/health` | `{\"status\":\"ok\"}` JSON |\n\n## Directory Layout\n\n```\nGAME/\n  app.py                 create_app()\n  routes.py              All routes (blueprint: cc)\n  scanner.py             Project discovery\n  ops.py                 Operation launch/stop/status\n  spawn.py               Subprocess management\n  publisher.py           Portfolio builder\n  models.py              PROJECT_TYPES registry\n  db.py                  Database helpers + migrations\n  claude_convention.py   AGENTS.md parsing\n  templates/\n    base.html            Layout with nav bar\n    partials/            HTMX response fragments\n  static/\n    style.css            Dark theme styles\n  bin/\n    common.sh            Shared script functions\n    start.sh             Start Flask dev server\n    stop.sh              Stop server\n    build_documentation.sh  Generate docs/\n  data/\n    game.db              SQLite database\n  doc/                   Generated documentation\n  logs/                  Operation log files\n```\n\n## Open Questions\n\n- Should `usage_analyzer.py` remain? No working solution for reading AI session costs.\n- Split `routes.py` into per-screen route files as screens grow?\n",
  "DATABASE": "# Database\n\nSQLite at `data/game.db`. Stack conventions (WAL, FK pragma, migrations) per `stack/sqlite.md`.\n\n## Source of Truth\n\n| Layer | Role |\n|-------|------|\n| Project files (METADATA.md, bin/, filesystem) | Authoritative \u2014 committed to git |\n| SQLite database | Runtime cache \u2014 sole source for UI renders |\n| Startup scan | Background thread on Flask start; populates DB from disk |\n| Refresh button | Re-runs scan without restart |\n\nPages read DB only. UI writes go to both DB and METADATA.md (keeps file current for git history).\n\n---\n\n## projects\n\n| Column | Type | Notes |\n|--------|------|-------|\n| id | INTEGER PK | |\n| name | TEXT | unique, machine slug = directory name |\n| display_name | TEXT | from METADATA.md |\n| path | TEXT | absolute path to project dir |\n| status | TEXT | IDEA / PROTOTYPE / ACTIVE / PRODUCTION / ARCHIVED |\n| port | INTEGER | nullable |\n| stack | TEXT | slash-separated |\n| health_endpoint | TEXT | default /health |\n| desired_state | TEXT | running / on-demand |\n| namespace | TEXT | default: development |\n| tags | TEXT | comma-separated |\n| project_type | TEXT | software / book |\n| has_git | INTEGER | auto-detected |\n| has_venv | INTEGER | auto-detected |\n| has_node | INTEGER | auto-detected |\n| has_claude | INTEGER | auto-detected |\n| has_docs | INTEGER | auto-detected |\n| card_title | TEXT | portfolio override, defaults to display_name |\n| card_desc | TEXT | portfolio override, defaults to short_description |\n| card_tags | TEXT | portfolio override |\n| card_type | TEXT | portfolio override |\n| card_url | TEXT | portfolio override |\n| card_image | TEXT | portfolio override |\n| card_show | INTEGER | include in portfolio |\n| version | TEXT | YYYY-MM-DD.N |\n| extra | JSON | links, bookmarks, doc_path, tech_stack |\n| is_active | INTEGER | 0 if removed from disk |\n| last_scanned | TEXT | timestamp |\n| created_at | TEXT | timestamp, set once |\n| updated_at | TEXT | timestamp, updated on scan + UI writes |\n\n## operations\n\n| Column | Type | Notes |\n|--------|------|-------|\n| id | INTEGER PK | |\n| project_id | FK | references projects |\n| name | TEXT | from `# Name:` script header |\n| category | TEXT | local / service / maintenance |\n| cmd | TEXT | e.g. bin/start.sh |\n| cwd | TEXT | project path |\n| needs_venv | INTEGER | |\n| is_url | INTEGER | open URL instead of run command |\n| default_port | INTEGER | from `# Port:` header |\n| health_path | TEXT | from `# Health:` header |\n| schedule | TEXT | cron expression from `# Schedule:` header |\n| timeout | INTEGER | from `# Timeout:` header |\n| sort_order | INTEGER | |\n\nOperations are deleted and re-seeded per project on every scan.\n\n## op_runs\n\n| Column | Type | Notes |\n|--------|------|-------|\n| id | INTEGER PK | |\n| op_id | FK | references operations |\n| project_id | FK | references projects |\n| status | TEXT | running / done / error / stopped |\n| pid | INTEGER | OS process ID |\n| started_at | TEXT | |\n| finished_at | TEXT | nullable while running |\n| exit_code | INTEGER | nullable while running |\n| log_path | TEXT | logs/{project}_{script}_{yyyymmdd_hhmmss}.log |\n| cmd | TEXT | actual command executed |\n| name | TEXT | operation name at time of run |\n\n## tickets\n\n| Column | Type | Notes |\n|--------|------|-------|\n| id | INTEGER PK | |\n| project_id | FK | references projects |\n| title | TEXT | |\n| description | TEXT | |\n| state | TEXT | idea / proposed / ready / in_development / testing / done |\n| tags | TEXT | comma-separated |\n| sort_order | INTEGER | column position |\n| created_at | TEXT | |\n| updated_at | TEXT | |\n\n---\n\n## Open Questions\n\n- Remove legacy `title` column? `display_name` covers it.\n- Promote `tag_colors` from JSON file to a DB table?\n- Add `has_tests`, `has_specs` boolean flags to projects?\n- Add `git_branch`, `git_dirty`, `git_unpushed`, `git_last_commit` columns or keep in `extra` JSON?\n",
  "FEATURE-Heartbeat": "# Feature: Heartbeat Monitoring [ROADMAP]\n\nPeriodic health polling for projects with a port and health endpoint.\n\n## Trigger\n\nTimer-based (default 60s interval). Also on-demand from Monitoring screen.\n\n## Sequence\n\n1. Query projects WHERE port IS NOT NULL AND health_endpoint IS NOT NULL\n2. For each: HTTP GET http://localhost:{port}{health_endpoint}\n3. 200 OK within timeout \u2192 state=UP, record response_ms\n4. Connection refused / timeout / error \u2192 state=DOWN\n5. Compare new state vs previous \u2192 if changed, record state_transition event\n6. Update rolling 24h uptime percentage\n\n## States\n\n```\nUNKNOWN \u2192 UP \u2192 DOWN \u2192 UP (cycle)\nSNOOZED = suppresses alerts, continues polling\n```\n\n## Open Questions\n\n- Alert mechanism (flash on dashboard? email? webhook?)\n- Snooze duration and UI\n- Store heartbeat history or just current state + rolling average?\n",
  "FEATURE-Operations": "# Feature: Operations\n\nRun, stop, and monitor bin/ script execution.\n\n## Run\n\n**Trigger:** User clicks operation button.\n\n1. Load operation record (script_path, cwd, needs_venv, category)\n2. Create `op_runs` record: status=STARTING, log_path=`logs/{project}_{script}_{yyyymmdd_hhmmss}.log`\n3. Fork subprocess: cd to project dir, activate venv if needed, execute script\n4. Redirect stdout+stderr to log_path\n5. Update op_runs: status=RUNNING, pid=process.pid\n6. Dashboard button changes to running state\n\n## Monitor (background)\n\n- Parse log output for `[$PROJECT_NAME]` status lines\n- On process exit: status=DONE (exit 0), ERROR (non-zero), STOPPED (SIGTERM)\n- Update op_runs: finished_at, exit_code, status\n\n## Stop\n\n**Trigger:** User clicks Stop.\n\n1. Load op_runs \u2192 get pid\n2. Send SIGTERM to process group (`-pid`)\n3. Script's common.sh trap handles cleanup\n4. Process exits \u2192 monitor updates status to STOPPED\n\n## Key Behaviors\n\n- Process runs in a process group (clean SIGTERM of children)\n- Log file is append-only, named for sorting\n- common.sh/common.py handles venv, PORT, env, SIGTERM trap\n- Platform does not understand what the script does \u2014 just runs it and watches exit codes\n- One instance of a given operation per project at a time\n\n## Open Questions\n\n- Max concurrent operations across all projects?\n- Log rotation / cleanup policy?\n",
  "FEATURE-Publish": "# Feature: Portfolio Publishing\n\nBuilds a static portfolio site from project metadata and publishes to GitHub Pages.\n\n## Build\n\n**Trigger:** User clicks Rebuild on Publisher screen.\n\n1. Query projects WHERE card_show=true\n2. For each: resolve card fields with fallback chain (card_title\u2192display_name, card_desc\u2192short_description, card_image\u2192logo, card_tags\u2192tags)\n3. Check for doc/index.html \u2192 add documentation link if exists\n4. Generate card HTML fragments\n5. Load config/site_config.md (YAML frontmatter for branding, markdown body for home page)\n6. Assemble static site: card grid + home page\n7. Write output files\n\n## Publish\n\n**Trigger:** User clicks Publish on Publisher screen.\n\n1. Execute PushAndPublish.sh\n2. Git add, commit, push to GitHub Pages branch\n\n## Reads\n\n`projects` table (card fields), config/site_config.md, doc/ directories, static/images/\n\n## Writes\n\nStatic site output files, GitHub Pages branch\n\n## Open Questions\n\n- Preview generated site inline before publishing?\n- Custom domain support?\n",
  "FEATURE-Scan": "# Feature: Project Scan\n\nDiscovers projects on disk and populates the database.\n\n## Trigger\n\n- Platform startup (background thread, non-blocking)\n- User clicks Refresh button on Dashboard\n\n## Sequence\n\n1. `cleanup_orphaned()` \u2014 mark DB rows for projects no longer on disk as `is_active=false`\n2. For each directory in `$PROJECTS_DIR`:\n   a. `detect_project()` \u2014 read filesystem flags (has_git, has_venv, has_node, has_claude, has_docs), detect doc_path, auto-detect stack and port\n   b. `parse_metadata_md()` \u2014 parse key:value lines \u2192 identity fields, parse `## Links` \u2192 extra.links, parse card fields\n   c. `scan_bin_operations()` \u2014 read first 20 lines of each bin/*.sh and bin/*.py, extract CommandCenter headers (Name, Category, Port, Schedule, Timeout, Health)\n   d. Parse AGENTS.md if present \u2192 extra.bookmarks\n   e. `upsert_project()` \u2014 UPDATE existing (COALESCE preserves user-edited nulls), INSERT new, DELETE+re-seed operations for this project\n3. Log scan duration per project and total\n\n## Reads\n\nFilesystem ($PROJECTS_DIR), METADATA.md, AGENTS.md, bin/ scripts, .git/\n\n## Writes\n\n`projects` table, `operations` table\n\n## Key Behaviors\n\n- Non-blocking on startup \u2014 first page load returns immediately\n- Missing files produce compliance gaps, not errors\n- Projects removed from disk are marked inactive, not deleted\n- Git operations (status, log) run per-project \u2014 can be slow with many repos\n- User-edited fields preserved on re-scan via COALESCE\n\n## Open Questions\n\n- Scan timeout per project to prevent slow git repos from blocking?\n- Parallel scanning of multiple projects?\n",
  "FEATURE-Schedule": "# Feature: Scheduled Operations [ROADMAP]\n\nCron-based automated execution of bin/ scripts.\n\n## Trigger\n\nScheduler loop checks every 60 seconds. Also catch-up on startup.\n\n## Sequence\n\n1. Query operations WHERE schedule IS NOT NULL AND schedule_enabled=true\n2. Evaluate cron expression against current time\n3. If match and not already run this minute: execute Run flow (FEATURE-Operations)\n4. Update last_scheduled_run, calculate next_scheduled_run\n\n## Startup Catch-Up\n\nOn platform start:\n1. For each scheduled operation: compare last_scheduled_run against cron expression\n2. If missed run detected: fire ONE immediate run (most recent only, no backfill cascade)\n3. Record schedule_missed event\n\n## Declaration\n\nScripts declare schedules via `# Schedule:` header:\n\n```bash\n#!/bin/bash\n# CommandCenter Operation\n# Category: maintenance\n# Schedule: 0 2 * * *\n```\n\n## Open Questions\n\n- UI to enable/disable schedules without editing script headers?\n- Dashboard indicator for next scheduled run?\n- Max missed runs to catch up (currently: 1)?\n",
  "INTENT": "# Intent\n\nA solo practitioner or small team managing multiple AI-built projects needs one methodology. If your projects have custom capabilities then it is difficult to manage. Projects become easier to manage when they are standard in format.\n\nGAME is the dashboard that discovers, monitors, and operates projects that follow the standard. It scans project directories, reads METADATA.md and bin/ script headers, and presents a unified operations interface.\n\n## Core Principle\n\n**Contract-earns-capability.** Add the file, the platform discovers the capability:\n\n| File Added | Capability Earned |\n|------------|-------------------|\n| METADATA.md | Project appears in dashboard |\n| AGENTS.md | Bookmarks, endpoints, dev commands extracted |\n| bin/start.sh with header | Start button appears |\n| bin/daily.sh with `# Schedule:` | Daily automation registered |\n| doc/index.html | Documentation link appears |\n| health: /health in METADATA | Health monitoring enabled |\n| port: NNNN in METADATA | Service monitoring + heartbeat enabled |\n| show_on_homepage: true | Portfolio card generated |\n\n## What This Is Not\n\n- Not a CI/CD pipeline \u2014 it's an operations dashboard\n- Not a deployment tool \u2014 it runs local dev services\n- Not a project management tool \u2014 the workflow/tickets are lightweight helpers, not JIRA\n",
  "METADATA": "# GAME\n\nProject management dashboard for AI-assisted development.\n\nname: Game-Build\ndisplay_name: GAME\ntitle: GAME \u2014 Generic AI Management Environment\ngit_repo: Game-Build\nshort_description: Dashboard for managing local AI-assisted projects\nport: 5001\nstatus: ACTIVE\nversion: 2026-03-19.1\nupdated: 20260319\nstack: Python/Flask/SQLite/Bootstrap5\nhealth: /health\nshow_on_homepage: true\ntags: dashboard, tool, platform\ndesired_state: on-demand\nnamespace: development\n\n## Agent Instructions\n\nWhen working on this specification, add unresolved questions to the `## Open Questions` section at the bottom of the relevant spec file. Do not create new files for questions \u2014 append to the file the question pertains to.\n",
  "README": "# GAME \u2014 Generic AI Management Environment\n\nDashboard for managing local AI-assisted projects. Scans project directories, discovers operations from bin/ script headers, and provides a unified interface for start/stop, logs, health, docs, and git push.\n",
  "SCREEN-Configuration": "# Screen: Configuration\n\nEdit project metadata across all projects in a single list.\n\n## Route\n\n```\nGET /project-config\n```\n\n## Layout\n\nProject list using Standard Row Header. Each row has editable fields.\n\n## Columns\n\n| Column | Content |\n|--------|---------|\n| Status + Name | Standard Row Header |\n| Configuration | Editable fields (see below) |\n\n## Configuration Fields\n\n| Field | Label | Source | Input |\n|-------|-------|--------|-------|\n| Port | `port:` | projects.port | number |\n| Show on homepage | `show:` | projects.card_show | checkbox |\n| Tags | `tags:` | projects.tags | text |\n\nFields persist on change per DATABASE.md rules. Each field saves independently \u2014 no Save button.\n\n## Interactions\n\n| Action | Trigger | Effect |\n|--------|---------|--------|\n| Edit field | Change input value | POST update \u2192 DB + METADATA.md sync |\n| Open full editor | Click cog icon | Full METADATA.md field editor |\n\n## Open Questions\n\n- Add more inline fields (status, namespace, desired_state)?\n- Should cog icon open a modal or navigate to a detail page?\n",
  "SCREEN-Dashboard": "# Screen: Dashboard\n\nMain screen. Shows all projects with status, operations, and quick actions.\n\n## Route\n\n```\nGET /\n```\n\n## Layout\n\nFull project list as rows. Each row uses the Standard Row Header (see UI.md).\n\n## Columns\n\n| Column | Content |\n|--------|---------|\n| Status + Name | Standard Row Header |\n| Stack | `stack` field |\n| Port | Port number, linked to localhost:{port} |\n| Operations | Operation buttons per project (see UI.md Operation Buttons) |\n| Git | Push button (visible when unpushed > 0), branch, dirty indicator |\n| Links | From extra.links |\n| Help | Documentation button (visible when has_docs=true) |\n| CLAUDE | Button to open AGENTS.md modal (visible when has_claude=true) |\n\n## Interactions\n\n| Action | Trigger | Effect |\n|--------|---------|--------|\n| Run operation | Click operation button | POST /api/run/{op_id} \u2192 button shows running state |\n| Stop operation | Click stop on running op | POST /api/stop/{run_id} \u2192 button reverts to idle |\n| Git push | Click push button | POST /api/push/{project_id} \u2192 push button disappears |\n| Rescan | Click refresh button | POST /api/scan \u2192 project list refreshes |\n| View detail | Click project name | GET /api/project/{id} \u2192 detail panel expands |\n| View CLAUDE.md | Click CLAUDE button | Opens modal with AGENTS.md content |\n\n## Filter Bar\n\nStandard filter bar (see UI.md): text search, status pills, tag pills, namespace dropdown.\n\n## Open Questions\n\n- Inline editing of status/port on dashboard, or only on Configuration screen?\n- Show git_last_commit date as \"last updated\" indicator?\n",
  "SCREEN-Monitoring": "# Screen: Monitoring [ROADMAP]\n\nHealth status and event timeline for all monitored projects.\n\n## Route\n\n```\nGET /monitoring\n```\n\n## Layout\n\nTwo sections: health status table + event timeline.\n\n## Health Table\n\nProjects with `port` + `health_endpoint` set:\n\n| Column | Content |\n|--------|---------|\n| Project | display_name |\n| Status | UP / DOWN / UNKNOWN (colored indicator) |\n| Response time | ms (last check) |\n| Uptime | Rolling 24h percentage |\n| Last checked | Timestamp |\n\n## Event Timeline\n\nChronological list of platform events (most recent first):\n\n| Column | Content |\n|--------|---------|\n| Timestamp | When |\n| Project | Which project (or \"Platform\") |\n| Event | Type + summary |\n\n## Interactions\n\n| Action | Trigger | Effect |\n|--------|---------|--------|\n| Refresh health | Click Refresh | Polls all health endpoints now |\n| Filter events | Select event type / project | Client-side filter |\n\n## Open Questions\n\n- Poll interval configurable? Default 60 seconds.\n- Alert/snooze mechanism for DOWN transitions?\n- How many events to show before pagination?\n",
  "SCREEN-Processes": "# Screen: Processes\n\nView running and completed operations across all projects.\n\n## Route\n\n```\nGET /processes\n```\n\n## Layout\n\nList of op_runs records, most recent first.\n\n## Columns\n\n| Column | Content |\n|--------|---------|\n| Project | Project display_name |\n| Operation | Operation name |\n| Status | running / done / error / stopped (colored badge) |\n| Started | started_at timestamp |\n| Duration | elapsed or total time |\n| Actions | View Log button, Stop button (if running) |\n\n## Interactions\n\n| Action | Trigger | Effect |\n|--------|---------|--------|\n| View log | Click View Log | GET /processes/{run_id}/log \u2192 log content fragment |\n| Stop | Click Stop on running process | POST /api/stop/{run_id} \u2192 status updates |\n\n## Open Questions\n\n- Auto-refresh running processes via HTMX polling?\n- Filter by project or status?\n- Max log display length before truncation?\n",
  "SCREEN-Publisher": "# Screen: Publisher\n\nBuild and publish a static portfolio site from project metadata.\n\n## Route\n\n```\nGET /publisher\n```\n\n## Layout\n\nTwo sections: project card preview list + action buttons.\n\n## Project Cards\n\nList of projects where card_show=true. Each shows:\n\n| Field | Source |\n|-------|--------|\n| Title | card_title \u2192 fallback display_name |\n| Description | card_desc \u2192 fallback short_description |\n| Image | card_image \u2192 fallback logo |\n| Tags | card_tags \u2192 fallback tags |\n| Documentation link | Shown if has_docs=true |\n\n## Actions\n\n| Button | Effect |\n|--------|--------|\n| Rebuild | POST /publisher/build \u2192 regenerates static site from DB |\n| Publish | POST /publisher/publish \u2192 pushes to GitHub Pages |\n| Toggle project | POST /api/project/{id}/toggle-publish \u2192 include/exclude |\n\n## Open Questions\n\n- Preview the generated site inline or open in new tab?\n- Config for site title, branding (currently config/site_config.md)?\n",
  "SCREEN-Workflow": "# Screen: Workflow [ROADMAP]\n\nKanban board for project tickets.\n\n## Route\n\n```\nGET /workflow\n```\n\n## Layout\n\nKanban columns matching ticket states. Cards are draggable between columns.\n\n## Columns (States)\n\n```\nIDEA \u2192 PROPOSED \u2192 READY \u2192 IN DEVELOPMENT \u2192 TESTING \u2192 DONE\n```\n\nRework path: TESTING \u2192 READY. Redesign path: IN DEVELOPMENT \u2192 PROPOSED.\n\n## Card Content\n\n| Field | Display |\n|-------|---------|\n| Title | Card heading |\n| Project | Badge showing which project |\n| Tags | Tag pills |\n| Priority | Color indicator (Low/Medium/High/Critical) |\n\n## Interactions\n\n| Action | Trigger | Effect |\n|--------|---------|--------|\n| Create ticket | Click New Ticket | Modal with title, description, project, tags, priority |\n| Move ticket | Drag to new column | Validate transition, update state |\n| Edit ticket | Click card | Detail view with full description |\n\n## Open Questions\n\n- Per-project filter on the board?\n- AI transaction log entries when ticket enters IN DEVELOPMENT?\n- Archive done tickets after N days?\n",
  "UI": "# UI Standards\n\nShared patterns across all screens. Screen specs define only what is unique to that screen.\n\n## Theme\n\nBootstrap 5 dark theme (`data-bs-theme=\"dark\"`). Custom CSS in `static/style.css`.\n\n| Variable | Purpose |\n|----------|---------|\n| `--cc-surface` | Card/panel background |\n| `--cc-border` | Border color |\n| `--cc-muted` | Secondary text |\n\nNo JS build step. Bootstrap 5 + HTMX via CDN.\n\n## Navigation Bar\n\nFixed top. Left to right:\n\n| Element | Behavior |\n|---------|----------|\n| Brand (`cc-brand`) | App name + icon \u2192 project list |\n| Tab links | Dashboard, Configuration, GIT-Homepage, Processes, Monitoring, Workflow |\n| Documentation button | Opens doc/index.html (green) |\n| Settings dropdown | Hamburger \u2192 Settings, Tags, Help |\n| Running badges | Green pill per running project \u2192 project detail |\n\n## Standard Row Header\n\nShared across Dashboard, Configuration, Processes, Publisher:\n\n| Column | Content |\n|--------|---------|\n| Status badge | Colored pill: IDEA/PROTOTYPE/ACTIVE/PRODUCTION/ARCHIVED |\n| Project icon | Emoji or type icon |\n| Display name | Clickable `display_name` |\n\nStatus colors: IDEA=#94a3b8, PROTOTYPE=#fdab3d, ACTIVE=#0073ea, PRODUCTION=#00c875, ARCHIVED=#4a5568.\n\n## Operation Buttons\n\n| State | Appearance | Action |\n|-------|------------|--------|\n| Idle | Named button | Click \u2192 run |\n| Running | Green pulse + \"Stop\" | Click \u2192 SIGTERM |\n| Completed | Brief flash | Auto-reverts |\n\nCategories: `service`, `local`, `maintenance` \u2014 each has a CSS class.\n\n## Filter Bar\n\nClient-side filtering (no server round-trip):\n- Text search (name/description)\n- Status pill toggles\n- Tag pill toggles\n- Namespace dropdown\n\n## Modals\n\n| Modal | Purpose |\n|-------|---------|\n| CLAUDE.md Viewer | Shows AGENTS.md content |\n| Command Output | Shows operation stdout/stderr |\n\n## HTMX Conventions\n\nServer returns HTML fragments, never JSON (except `/health`). Patterns: `hx-get` for loading, `hx-post` for actions, `hx-target` for DOM replacement, `hx-swap` innerHTML or outerHTML.\n\n## Typography\n\nSystem font stack. Monospace for logs. Body 14px, headings 16-20px, badges 11px.\n\nDesktop-first. Minimum 1024px width.\n\n## Open Questions\n\n- Mobile/tablet support needed or strictly desktop?\n- Custom CSS variables vs Bootstrap defaults?\n",

marked.setOptions({ gfm: true, breaks: false });

function buildDocList() {
  const list = document.getElementById('doc-list');
  Object.keys(DOCS).sort().forEach(key => {
    const li = document.createElement('li');
    const a = document.createElement('a');
    a.textContent = key.replace(/-/g, ' ');
    a.onclick = () => showDoc(key);
    li.appendChild(a);
    list.appendChild(li);
  });
}

function showDoc(key) {
  if (!DOCS[key]) {
    console.warn('Document not found:', key);
    return;
  }
  document.getElementById('home-panel').style.display = 'none';
  document.getElementById('doc-panel').style.display = 'block';

  document.getElementById('doc-content').innerHTML = marked.parse(DOCS[key]);

  document.querySelectorAll('.file-list a').forEach(el => el.classList.remove('active'));
  const activeLink = Array.from(document.querySelectorAll('.file-list a')).find(a => a.textContent.replace(/ /g, '-') === key);
  if (activeLink) activeLink.classList.add('active');
}

buildDocList();
</script>
