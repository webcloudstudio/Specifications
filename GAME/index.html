const DOCS = {
  "ARCHITECTURE": "# Architecture\n\n**Flask app with blueprints.** App factory pattern. Scanner, process engine, and publisher are backend modules that feed data to the screen routes.\n\n---\n\n## App Factory\n\n`create_app()` in `app.py`. Returns a configured Flask instance.\n\n1. Load config from environment and `.env`\n2. Initialize SQLite database (create tables if missing, run migrations)\n3. Register blueprints\n4. Start async project scan on first request\n\n## Blueprints\n\nSingle blueprint `cc` registered on `/`. All routes live in `routes.py`.\n\n## Backend Modules\n\n### Scanner (`scanner.py`)\n\nScans `$PROJECTS_DIR` for project directories. For each:\n1. Read METADATA.md \u2192 parse key:value fields\n2. Read AGENTS.md / CLAUDE.md \u2192 extract endpoints, bookmarks\n3. Read bin/ scripts \u2192 parse CommandCenter headers\n4. Upsert into `projects` and `operations` tables\n\nRuns asynchronously on startup (not blocking first page load). Triggered manually by rescan button.\n\n### Process Engine (`ops.py` + `spawn.py`)\n\nLaunches bin/ scripts as background subprocesses.\n\n1. Receive launch request (project_id, operation_id)\n2. Create `runs` record with status STARTING\n3. Fork subprocess: `bash bin/{script}.sh` from project root\n4. Capture stdout/stderr to log file: `logs/{project}_{script}_{yyyymmdd_hhmmss}.log`\n5. Parse `[$PROJECT_NAME]` lines from output for status transitions\n6. Update `runs` record on exit (status, exit_code, finished_at)\n\nProvides: `launch(project_id, operation_id)`, `stop(run_id)`, `get_running()`, `get_log(run_id)`.\n\n### Publisher (`publisher.py`)\n\nBuilds static portfolio site from METADATA.md fields.\n\n1. Query projects where `show_on_homepage = true`\n2. Generate card HTML from title, short_description, tags, image\n3. If project has `doc/index.html`, add documentation link\n4. Write static site to output directory\n5. Optionally push to GitHub Pages\n\n### Usage Analyzer (`usage_analyzer.py`)\n\nReads AI session JSONL logs (produced by ai engine, not produced by GAME).\n\nA mechanism to scan the ai agent logs or to poll the ai agent to see\ninformation similar to the anthropic /usage command so we can display\ndata to the user.  At present I have not found a solution.\n\n## Routes (HTMX)\n\nAll screen interactions use HTMX for partial page updates. Server returns HTML fragments, not JSON.\n\n| Method | Path | Returns | Trigger |\n|--------|------|---------|---------|\n| GET | `/` | Full dashboard page | Page load |\n| POST | `/api/sync` | Status message | Rescan button |\n| POST | `/api/run/{op_id}` | Updated button state | Operation click |\n| POST | `/api/stop/{run_id}` | Updated button state | Stop click |\n| POST | `/api/push/{project_id}` | Git status fragment | Push button |\n| GET | `/api/project/{id}` | Project detail fragment | Row click |\n| GET | `/processes` | Process list page | Nav link |\n| GET | `/processes/{run_id}/log` | Log content fragment | View Log click |\n| GET | `/publisher` | Publisher page | Nav link |\n| POST | `/publisher/build` | Build status | Rebuild button |\n| POST | `/publisher/publish` | Publish status | Publish button |\n| GET | `/config` | Config page | Nav link |\n| POST | `/config/deploy/{profile}` | Deploy status | Deploy button |\n| POST | `/config/rollback/{id}` | Rollback status | Rollback button |\n| GET | `/usage` | Usage page | Nav link |\n| GET | `/health` | `{\"status\":\"ok\"}` | Health check |\n\n## Directory Layout\n\n```\nGAME/\n  app.py                 App factory (create_app)\n  routes.py              All routes (single blueprint: cc)\n  scanner.py             Project discovery\n  ops.py                 Operation launch/stop/status\n  spawn.py               Subprocess management\n  publisher.py           Portfolio builder\n  usage_analyzer.py      Token analytics\n  models.py              PROJECT_TYPES registry\n  db.py                  Database access helpers\n  claude_convention.py   CLAUDE.md / AGENTS.md parsing\n  templates/             Flask/Jinja2 templates\n    base.html            Layout with nav bar\n    partials/            HTMX response fragments\n  static/\n    style.css            Custom styles (Bootstrap 5 dark theme)\n  bin/\n    common.sh            Shared script functions\n    start.sh             Start Flask dev server\n    stop.sh              Stop server\n    build_documentation.sh  Generate docs/\n  data/\n    cc.db                SQLite database\n  docs/                  Generated documentation\n  logs/                  Operation log files\n```\n",
  "DATABASE": "# Database\n\n**SQLite with WAL mode.** Single file at `data/cc.db`.\n\n---\n\n## Source-of-Truth Model\n\n| Layer | Role |\n|-------|------|\n| **Project files** (`METADATA.md`, `bin/`, filesystem) | Authoritative source of truth \u2014 committed to git, editable by developer |\n| **SQLite database** | Runtime cache \u2014 the sole source of data for all UI page renders |\n| **Startup scan** | Runs automatically in a background thread every time Flask starts; populates the DB from disk |\n| **Refresh button** | Re-runs the same scan without restarting; useful when files changed mid-session |\n\n**Page rendering reads the database only.** No template, route, or partial reads a file from disk during a normal page load.\n\n**Writes go to both.** When the UI changes a value (status badge click, port inline edit, etc.), GAME writes to the DB immediately and then patches the same value into the project's `METADATA.md`. This keeps the file current so git history tracks changes.\n\n```\nStartup / Refresh (slow path \u2014 filesystem I/O)\n\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nscan_projects()\n  \u2514\u2500 for each project directory:\n       detect_project()          \u2192 reads METADATA.md, bin/ headers, filesystem flags\n       parse_metadata_md()       \u2192 reads METADATA.md key-values and ## Links table\n       scan_bin_operations()     \u2192 reads first 20 lines of each bin/*.sh / bin/*.py\n       upsert_project()          \u2192 INSERT or UPDATE into SQLite\n\nNormal page load (fast path \u2014 DB only)\n\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nRoute handler\n  \u2514\u2500 db.get_all_projects()           \u2192 SELECT * FROM projects\n  \u2514\u2500 db.get_all_operations_keyed()   \u2192 SELECT * FROM operations (one query, all projects)\n  \u2514\u2500 render_template()               \u2192 Jinja renders from dicts; no file I/O\n\nUI write (status click, port edit, etc.)\n\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n  \u2514\u2500 UPDATE projects SET ...     (SQLite)\n  \u2514\u2500 patch METADATA.md           (file \u2014 keeps disk in sync)\n```\n\n---\n\n## Field Source Mapping\n\nEvery field stored in the `projects` table, its source, and when it is read.\n\n| DB Column | Source File / Method | Read On | Notes |\n|-----------|---------------------|---------|-------|\n| `name` | Directory name | Scan | Machine slug; must match directory name |\n| `display_name` | `METADATA.md` \u2192 `display_name:` | Scan | Human-readable name for UI |\n| `title` | CamelCase split of directory name | Scan | Legacy; prefer `display_name` |\n| `path` | Filesystem (`os.path.abspath`) | Scan | Absolute path to project directory |\n| `status` | `METADATA.md` \u2192 `status:` | Scan | IDEA/PROTOTYPE/ACTIVE/PRODUCTION/ARCHIVED; also writable from UI |\n| `port` | `METADATA.md` \u2192 `port:` or auto-detected from `app.py` | Scan | Integer; also writable inline from UI |\n| `stack` | `METADATA.md` \u2192 `stack:` | Scan | Slash-separated tech summary |\n| `namespace` | `METADATA.md` \u2192 `namespace:` | Scan | Default: `development`; hidden in UI when default |\n| `tags` | `METADATA.md` \u2192 `tags:` | Scan | Comma-separated string |\n| `health_endpoint` | `METADATA.md` \u2192 `health:` | Scan | Default: `/health` |\n| `desired_state` | `METADATA.md` \u2192 `desired_state:` | Scan | `running` or `on-demand` |\n| `version` | `METADATA.md` \u2192 `version:` | Scan | Format: `YYYY-MM-DD.N` |\n| `project_type` | `METADATA.md` \u2192 `project_type:` or heuristic | Scan | `software` / `book` |\n| `has_git` | `.git/` directory present | Scan | Boolean flag |\n| `has_venv` | `venv/` or `.venv/` directory present | Scan | Boolean flag |\n| `has_node` | `node_modules/` directory present | Scan | Boolean flag |\n| `has_claude` | `CLAUDE.md` file present | Scan | Boolean flag; enables CLAUDE.md modal |\n| `has_docs` | Any subdir starting with `doc` containing `index.html` or `index.htm` (glob: `*/doc*/index.htm*`) | Scan | Boolean flag; enables \ud83d\udcd6 Help button |\n| `card_title` | `METADATA.md` \u2192 `title:` (card section) | Scan | Portfolio card; overrides `display_name` if set |\n| `card_desc` | `METADATA.md` \u2192 `short_description:` or `description:` | Scan | Portfolio card description |\n| `card_tags` | `METADATA.md` \u2192 `tags:` | Scan | Portfolio card tags |\n| `card_type` | `METADATA.md` \u2192 `card_type:` | Scan | Portfolio category label |\n| `card_url` | `METADATA.md` \u2192 `card_url:` | Scan | Portfolio card link |\n| `card_image` | `METADATA.md` \u2192 `image:` | Scan | Portfolio card image filename |\n| `card_show` | `METADATA.md` \u2192 `show_on_homepage:` | Scan | Boolean; include in generated portfolio |\n| `extra` (JSON) | Various | Scan | Stores: `links`, `bookmarks`, `doc_path`, `tech_stack`, `has_start_sh`, etc. |\n| `last_scanned` | System clock | Scan | Timestamp of last successful scan |\n| `created_at` | System clock | Insert only | Set once on first discovery |\n| `updated_at` | System clock | Scan + UI writes | Updated on every upsert |\n\n### `extra` JSON sub-fields\n\n| Key | Source | Notes |\n|-----|--------|-------|\n| `links` | `METADATA.md` \u2192 `## Links` table | List of `{label, url}` shown in Links column |\n| `bookmarks` | `AGENTS.md` / `CLAUDE.md` \u2192 `## Bookmarks` | Quick-access links for AI context |\n| `doc_path` | Filesystem detection | Relative path to doc index (e.g., `doc/index.html`); used to build Flask proxy URL `/project/{id}/doc/index.html` |\n| `tech_stack` | Auto-detected from `app.py`, `package.json`, etc. | Fallback for `stack` column |\n| `has_start_sh` | `bin/start.sh` present | Legacy flag; bin operations supersede this |\n\n### Operations table field sources\n\n| DB Column | Source | Read On |\n|-----------|--------|---------|\n| `project_id` | FK to projects | Scan |\n| `name` | `# Name:` header in bin script | Scan |\n| `category` | `# Category:` header; default `local` | Scan |\n| `cmd` | Derived from filename (`bin/start.sh`) | Scan |\n| `cwd` | Project path | Scan |\n| `default_port` | `# Port:` header | Scan |\n| `health_path` | `# Health:` header | Scan |\n| `schedule` | `# Schedule:` header | Scan |\n| `timeout` | `# Timeout:` header | Scan |\n\nOperations are deleted and re-seeded on every scan (only `bin/` operations \u2014 custom operations survive).\n\n---\n\n## Startup / Refresh Sequence\n\nBoth server startup and the Refresh button execute the same `scan_projects()` function in `scanner.py`. `scanner.py` is a library module \u2014 it has no entry point; it is called by `app.py` (startup) and by the `/api/sync` route (Refresh button).\n\nOn startup, the scan runs in a **background thread** so the server is immediately ready to serve requests; the DB will be fully populated within a few seconds. After a restart, the Refresh button is redundant \u2014 the startup scan has already run. Use Refresh only when project files change *while the server is running* and you want to pick up those changes without restarting.\n\n```\n1. cleanup_orphaned()        Remove DB rows for projects no longer on disk\n2. for each directory in PROJECTS_DIR:\n   a. detect_project()\n      - Read filesystem flags (has_git, has_venv, has_node, has_claude, has_docs)\n      - Detect doc_path by checking doc/ and docs/ for index.html / index.htm\n      - Auto-detect tech stack from known files (app.py, package.json, manage.py, etc.)\n      - Auto-detect port from app.py or METADATA.md\n   b. parse_metadata_md()\n      - Parse key:value lines \u2192 display_name, status, port, stack, namespace,\n        health_endpoint, desired_state, version, project_type, tags\n      - Parse ## Links table \u2192 extra.links\n      - Parse card metadata \u2192 card_* columns\n   c. scan_bin_operations()\n      - Read first 20 lines of each bin/*.sh and bin/*.py\n      - Look for `# CommandCenter Operation` marker\n      - Extract Name, Category, Port, Schedule, Timeout, Health headers\n   d. parse claude/agents if has_claude \u2192 extra.bookmarks\n   e. upsert_project()\n      - UPDATE if exists (preserves user-edited fields via COALESCE)\n      - INSERT if new\n      - DELETE + re-seed operations table for this project\n3. Log scan duration per project and total\n```\n\n**User-edited fields are preserved on re-scan** via SQL `COALESCE(?, column)` \u2014 if the scan value is NULL, the existing DB value is kept. Fields where METADATA.md is authoritative (status, port, stack) overwrite the DB.\n\n---\n\n## Schema\n\n### projects\n\n| Column | Type | Default | Description |\n|--------|------|---------|-------------|\n| id | INTEGER PK | auto | Auto-increment |\n| name | TEXT UNIQUE | \u2014 | Machine slug; matches directory name |\n| display_name | TEXT | NULL | Human-readable name from METADATA.md |\n| title | TEXT | \u2014 | CamelCase-split fallback (legacy) |\n| path | TEXT | NULL | Absolute path to project directory |\n| status | TEXT | 'template' | Lifecycle status |\n| port | INTEGER | NULL | Service port |\n| stack | TEXT | NULL | Technology summary |\n| health_endpoint | TEXT | '/health' | Health check path |\n| desired_state | TEXT | 'on-demand' | running / on-demand |\n| namespace | TEXT | 'development' | Deployment namespace |\n| tags | TEXT | NULL | Comma-separated tags |\n| project_type | TEXT | 'software' | software / book / etc. |\n| description | TEXT | NULL | Short description |\n| has_git | INTEGER | 0 | .git/ present |\n| has_venv | INTEGER | 0 | venv/ present |\n| has_node | INTEGER | 0 | node_modules/ present |\n| has_claude | INTEGER | 0 | CLAUDE.md present |\n| has_docs | INTEGER | 0 | doc[s]/index.htm[l] present |\n| card_title | TEXT | NULL | Portfolio card title |\n| card_desc | TEXT | NULL | Portfolio card description |\n| card_tags | TEXT | NULL | Portfolio card tags |\n| card_type | TEXT | NULL | Portfolio card category |\n| card_url | TEXT | NULL | Portfolio card URL |\n| card_image | TEXT | NULL | Portfolio card image filename |\n| card_show | INTEGER | 0 | Include in portfolio page |\n| version | TEXT | NULL | YYYY-MM-DD.N from METADATA.md |\n| extra | TEXT | '{}' | JSON blob (links, bookmarks, doc_path, etc.) |\n| is_active | INTEGER | 1 | 0 if removed from disk |\n| last_scanned | TEXT | NULL | Timestamp of last scan |\n| created_at | TEXT | datetime('now') | First discovery |\n| updated_at | TEXT | datetime('now') | Last scan or UI write |\n\n### operations\n\n| Column | Type | Description |\n|--------|------|-------------|\n| id | INTEGER PK | Auto-increment |\n| project_id | INTEGER FK | References projects.id |\n| name | TEXT | Display name from `# Name:` header |\n| category | TEXT | `local` / `service` / `maintenance` / custom |\n| cmd | TEXT | Command string (e.g., `bin/start.sh`) |\n| cwd | TEXT | Working directory (project path) |\n| needs_venv | INTEGER | Activate venv before running |\n| is_url | INTEGER | Open URL rather than run command |\n| default_port | INTEGER | From `# Port:` header |\n| health_path | TEXT | From `# Health:` header |\n| schedule | TEXT | From `# Schedule:` header |\n| timeout | INTEGER | From `# Timeout:` header |\n| sort_order | INTEGER | Display order |\n\n### op_runs\n\n| Column | Type | Description |\n|--------|------|-------------|\n| id | INTEGER PK | Auto-increment |\n| op_id | INTEGER FK | References operations.id |\n| project_id | INTEGER FK | References projects.id |\n| status | TEXT | running / done / error / stopped |\n| pid | INTEGER | OS process ID |\n| started_at | TEXT | datetime |\n| finished_at | TEXT | datetime or NULL while running |\n| exit_code | INTEGER | NULL while running |\n| log_path | TEXT | Path to log file |\n| cmd | TEXT | Actual command executed |\n| name | TEXT | Operation name at time of run |\n\n### tickets\n\n| Column | Type | Description |\n|--------|------|-------------|\n| id | INTEGER PK | Auto-increment |\n| project_id | INTEGER FK | References projects.id |\n| title | TEXT | Ticket title |\n| description | TEXT | Detail text |\n| state | TEXT | idea / proposed / ready / in_development / testing / done |\n| tags | TEXT | Comma-separated |\n| sort_order | INTEGER | Column position |\n| created_at | TEXT | datetime |\n| updated_at | TEXT | datetime |\n\n---\n\n## Conventions\n\n- WAL mode: set once in `init_db()` (persistent on the file); not repeated per connection\n- Foreign keys: `PRAGMA foreign_keys=ON` per connection (required for FK enforcement)\n- Schema changes: `_add_column_if_missing()` in `db.py` \u2014 additive only, no migration files\n- JSON blobs: stored as TEXT, parsed by application; changes do not require schema migration\n- DB created automatically on first startup if missing\n\n---\n\n## Open Questions / Design Decisions\n\n- **`title` column**: Duplicated by `display_name`. Candidate for removal once all templates consistently use `display_name`.\n- **WAL PRAGMA per connection**: Harmless (WAL is persistent) but wasteful \u2014 should move to `init_db()` only.\n- **Tag colors**: Currently in `data/tag_colors.json` (file, not DB). Should be promoted to a `tag_colors` table to stay consistent with the DB-as-UI-source model.\n- **`has_docs`, `has_tests`, `has_specs` flags**: `has_docs` is now implemented. `has_tests` and `has_specs` are roadmap items for contract-earns-capability (see FEATURE_MAP.md).\n- **`git_last_commit_date`**: Not yet implemented. Would replace `version` date as the `LastUpdate` source \u2014 requires running `git log` during scan and storing the result.\n",
  "FEATURE_MAP": "# GAME Feature Map\n\n**Complete catalog of project attributes, platform features, and operational capabilities.**\n\nThis is the primary feature reference for GAME. It defines what the platform knows about projects, what it can do with them, and what \"magic\" it provides for Claude-developed projects. All SCREEN-*.md files reference features defined here; all DATABASE.md columns trace back to attributes listed here.\n\n---\n\n## I. Project Identity\n\n### Naming (Consolidation)\n\nThe platform has too many name/description fields. The canonical model:\n\n| Field | Source | Purpose | Required |\n|-------|--------|---------|----------|\n| `name` | METADATA.md | Machine slug, matches directory name | Yes |\n| `display_name` | METADATA.md | Human-readable name for all UI display | Yes |\n| `short_description` | METADATA.md | One sentence, shown in lists and cards | Yes |\n| `git_repo` | METADATA.md | Full HTTPS URL to repository | Yes |\n\n**Derived / Override fields** (should default from the above, only stored separately when user explicitly overrides):\n\n| Field | Defaults From | Override Purpose |\n|-------|---------------|------------------|\n| `card_title` | `display_name` | Portfolio card shows a different name |\n| `card_desc` | `short_description` | Portfolio card shows a different summary |\n| `title` | `display_name` | Legacy \u2014 **candidate for removal** |\n| `description` | `short_description` | Longer narrative \u2014 rarely used, store in `extra` if needed |\n\n**Rule:** If `card_title` is empty, use `display_name`. If `card_desc` is empty, use `short_description`. Never require the user to enter the same text twice.\n\n### Visual Identity (NEW)\n\n| Field | Type | Source | Purpose |\n|-------|------|--------|---------|\n| `color` | hex string | METADATA.md | Project accent color for dashboard cards, charts, badges |\n| `icon` | string | METADATA.md | Emoji or icon identifier for quick visual scanning |\n| `logo` | path | METADATA.md | Path to project logo image (relative to project dir) |\n\n**Usage:** The dashboard row shows the icon next to the project name. The color tints the project's card border, tag pills, and chart segments. The logo appears in the project detail view and on portfolio cards (falls back to a colored initial if missing).\n\n**Default behavior:** If `color` not set, derive from a hash of the project name (deterministic palette). If `icon` not set, use the first letter of `display_name` in a colored circle.\n\n### Classification\n\n| Field | Type | Values | Purpose |\n|-------|------|--------|---------|\n| `project_type` | enum | `software`, `book`, custom | Determines UI template and default operations |\n| `category` | string | `infrastructure`, `client`, `tool`, `library`, `experiment` | High-level grouping for filtering/reporting |\n| `owner` | string | Name or handle | Who maintains this project |\n| `tags` | csv | Freeform | Cross-cutting labels for filtering |\n\n### Lifecycle\n\n| Field | Type | Values | Purpose |\n|-------|------|--------|---------|\n| `status` | enum | IDEA, PROTOTYPE, ACTIVE, PRODUCTION, ARCHIVED | Development phase |\n| `is_active` | boolean | Auto | false = removed from disk |\n| `desired_state` | enum | running, on-demand | Service always-on vs. manual start |\n| `namespace` | string | development, qa, production, custom | Environment segregation |\n\n### Technology & Infrastructure\n\n| Field | Type | Source | Purpose |\n|-------|------|--------|---------|\n| `stack` | string | METADATA.md | Slash-separated tech summary |\n| `port` | integer | METADATA.md | Service port (if applicable) |\n| `health_endpoint` | string | METADATA.md | Health check path (default `/health`) |\n| `deploy_url` | string | METADATA.md | Production/live URL |\n| `version` | string | METADATA.md | YYYY-MM-DD.N format |\n\n### Auto-Detected Flags (Scanner)\n\n| Flag | Detection Method | Purpose |\n|------|------------------|---------|\n| `has_git` | `.git/` directory exists | Show git status, push button |\n| `has_venv` | `venv/` or `.venv/` exists | Activate before running scripts |\n| `has_node` | `node_modules/` or `package.json` exists | npm-based operations |\n| `has_claude` | `CLAUDE.md` or `AGENTS.md` exists | Claude-integrated project |\n| `has_tests` | `tests/` or `bin/test.sh` exists | Show test runner button |\n| `has_docs` | `doc/index.html` exists | Show documentation link |\n| `has_specs` | Corresponding dir in Specifications/ | Specification management link |\n\n### Portfolio & Publishing\n\n| Field | Defaults From | Purpose |\n|-------|---------------|---------|\n| `show_on_homepage` | false | Include in published portfolio |\n| `card_title` | `display_name` | Override title for portfolio card |\n| `card_desc` | `short_description` | Override description for card |\n| `card_tags` | `tags` | Override tags for card filtering |\n| `card_type` | `project_type` | Override type badge |\n| `card_url` | `deploy_url` or `git_repo` | Override link URL |\n| `card_image` | `logo` | Override card thumbnail |\n\n### Git State (Auto-Detected)\n\n| Field | Type | Source | Purpose |\n|-------|------|--------|---------|\n| `git_branch` | string | Scanner | Current branch name |\n| `git_dirty` | boolean | Scanner | Uncommitted changes |\n| `git_unpushed` | integer | Scanner | Commits ahead of remote |\n| `git_last_commit` | string | Scanner | Last commit message |\n\n### Timestamps\n\n| Field | Format | Purpose |\n|-------|--------|---------|\n| `created_at` | ISO 8601 | First scan / record creation |\n| `updated_at` | ISO 8601 | Last database modification |\n| `last_scanned` | yyyymmdd_hhmmss | Last scanner pass |\n\n### Type-Specific Extension\n\n| Field | Type | Purpose |\n|-------|------|---------|\n| `extra` | JSON blob | Type-specific fields, no migration needed |\n\nThe type registry (`models.py`) defines which fields each type uses. New types add entries to `PROJECT_TYPES` and two HTML partials.\n\n---\n\n## II. Operations & Script Registry\n\n### Discovery\n\nScripts in `bin/` with the `# CommandCenter Operation` marker in the first 20 lines are automatically registered on scan.\n\n### Operation Attributes\n\n| Attribute | Header | Purpose |\n|-----------|--------|---------|\n| `script_name` | (filename) | Operation identifier |\n| `script_path` | (relative path) | Execution path |\n| `display_name` | (derived) | Button label |\n| `category` | `# Category:` | Group: `service`, `maintenance`, `build`, `deploy` |\n| `port` | `# Port:` | Service port override |\n| `health_path` | `# Health:` | Health endpoint for monitoring |\n| `schedule` | `# Schedule:` | Cron expression for automated runs |\n| `timeout` | `# Timeout:` | Max execution seconds |\n\n### Default Operations (by stack)\n\n| Stack | Operation | Command |\n|-------|-----------|---------|\n| Flask | Start Server | `flask run --port {port}` |\n| Django | Start Server | `python manage.py runserver {port}` |\n| Node | Start Dev | `npm run dev` |\n| Astro | Start Dev | `npm run dev` |\n| Bash | Run Script | `./start.sh` |\n\n### Run Records\n\n| Field | Type | Values |\n|-------|------|--------|\n| `status` | enum | STARTING, RUNNING, DONE, ERROR, STOPPED |\n| `pid` | integer | OS process ID |\n| `exit_code` | integer | null while running |\n| `started_at` | yyyymmdd_hhmmss | Launch time |\n| `finished_at` | yyyymmdd_hhmmss | Completion time |\n| `log_path` | string | `logs/{project}_{script}_{yyyymmdd_hhmmss}.log` |\n\n### Process State Machine\n\n```\nIDLE --> STARTING --> RUNNING --> DONE\n                              --> ERROR (non-zero exit)\n                              --> STOPPED (user SIGTERM)\n```\n\n---\n\n## III. Scheduling Engine\n\n### Schedule Declaration\n\nOperations declare schedules via the `# Schedule:` header in bin/ scripts:\n\n```bash\n#!/bin/bash\n# CommandCenter Operation\n# Category: maintenance\n# Schedule: 0 2 * * *\n```\n\n### Schedule Attributes\n\n| Field | Type | Purpose |\n|-------|------|---------|\n| `schedule` | cron expr | When to run (standard 5-field cron) |\n| `last_scheduled_run` | yyyymmdd_hhmmss | Last time the scheduler fired this |\n| `next_scheduled_run` | yyyymmdd_hhmmss | Calculated next fire time |\n| `schedule_enabled` | boolean | Can be paused without removing the header |\n\n### Standard Scheduled Scripts\n\n| Script | Convention | Typical Schedule |\n|--------|------------|------------------|\n| `bin/daily.sh` | Daily maintenance | `0 2 * * *` |\n| `bin/weekly.sh` | Weekly maintenance | `0 3 * * 0` |\n| `bin/build.sh` | Rebuild on schedule | Project-specific |\n\n### Missed Run Recovery\n\nOn startup, the scheduler checks `last_scheduled_run` against the cron expression. If a run was missed (platform was down), it fires immediately (catch-up). Only the most recent missed run fires \u2014 no backfill cascade.\n\n---\n\n## IV. Heartbeats & Events\n\nTwo fundamentally different observation types. Heartbeats answer \"what is the state right now?\" Events answer \"what happened?\"\n\n### Heartbeats (Continuous State)\n\nHeartbeats are periodic polls that produce a current state. They have no history beyond the current value and a rolling window.\n\n| Heartbeat | Source | States | Poll Method |\n|-----------|--------|--------|-------------|\n| **Service Health** | `port` + `health` from METADATA.md | UP / DOWN / UNKNOWN | HTTP GET to health endpoint |\n| **Process State** | Operations engine | RUNNING / STOPPED | Check PID existence |\n| **Git State** | Scanner | CLEAN / DIRTY / UNPUSHED | `git status` + `git log` |\n| **Compliance** | Scanner | COMPLIANT / GAPS / UNCHECKED | Check required files exist |\n\n**Heartbeat record:**\n\n| Field | Type | Purpose |\n|-------|------|---------|\n| `project_id` | FK | Which project |\n| `heartbeat_type` | enum | service_health, process_state, git_state, compliance |\n| `current_state` | string | Current state value |\n| `last_checked` | yyyymmdd_hhmmss | When last polled |\n| `response_ms` | integer | Response time (service health only) |\n| `uptime_pct` | float | Rolling 24h percentage (service health only) |\n\n**Aggregate indicators:**\n- **UP** = all heartbeats healthy\n- **DOWN** = any heartbeat in failure state\n- **MIXED** = some up, some down (multi-service projects)\n\n### Events (Discrete Occurrences)\n\nEvents are timestamped records of things that happened. They accumulate in a log and are never overwritten.\n\n| Event Type | Source | Trigger |\n|------------|--------|---------|\n| `operation_started` | Operations engine | Script launched |\n| `operation_completed` | Operations engine | Script exited (includes exit code) |\n| `operation_failed` | Operations engine | Non-zero exit |\n| `state_transition` | Heartbeat poller | UP-->DOWN, DOWN-->UP, etc. |\n| `git_push` | Dashboard action | User pushed commits |\n| `git_commit` | Scanner | New commit detected on scan |\n| `schedule_fired` | Scheduler | Cron triggered an operation |\n| `schedule_missed` | Scheduler | Startup catch-up detected missed run |\n| `build_completed` | Publisher | Portfolio site rebuilt |\n| `deploy_completed` | Publisher/config | Site published or config deployed |\n| `scan_completed` | Scanner | Project directory re-scanned |\n| `ticket_transition` | Workflow | Ticket moved between states |\n| `metadata_changed` | Configuration | METADATA.md field edited |\n| `alert_fired` | Monitoring | Health alert triggered |\n| `spec_updated` | Specification mgmt | Spec file committed via transaction log |\n\n**Event record:**\n\n| Field | Type | Purpose |\n|-------|------|---------|\n| `id` | PK | Auto-increment |\n| `project_id` | FK | Which project (null for platform events) |\n| `event_type` | string | From the table above |\n| `timestamp` | yyyymmdd_hhmmss | When it happened |\n| `summary` | string | Human-readable one-liner |\n| `detail` | JSON | Event-specific payload |\n| `source` | string | Which subsystem generated it |\n\n**Platform-level event log** visible on the Monitoring screen as a timeline. Per-project event log visible on the project detail screen.\n\n---\n\n## V. Specification Management\n\n### Transaction Log Integration\n\nProjects with a corresponding directory in `Specifications/` (e.g., `Specifications/GAME/`) have specification management capabilities. The transaction log tracks AI decisions and changes:\n\n| Feature | Details |\n|---------|---------|\n| **Spec Directory** | `Specifications/{project_name}/` \u2014 linked by convention |\n| **Transaction Log** | Ordered record of spec decisions, changes, rationale |\n| **Spec Files** | Markdown documents: README, ARCHITECTURE, DATABASE, SCREEN-*, FEATURE_MAP, etc. |\n| **Versioning** | Spec changes committed to the Specifications repo with descriptive messages |\n\n### Transaction Log Record\n\n| Field | Type | Purpose |\n|-------|------|---------|\n| `id` | PK | Sequential entry number |\n| `project_id` | FK | Which project |\n| `timestamp` | yyyymmdd_hhmmss | When the decision was made |\n| `category` | enum | `decision`, `change`, `question`, `rationale` |\n| `title` | string | One-line summary |\n| `body` | text | Full description, context, alternatives considered |\n| `files_affected` | JSON | List of spec files modified |\n| `ticket_id` | FK | Optional link to workflow ticket |\n\n### Spec-to-Code Traceability\n\n| Direction | Mechanism |\n|-----------|-----------|\n| Spec --> Code | Transaction log entry links to ticket; ticket links to commits |\n| Code --> Spec | Scanner detects `has_specs` flag; UI links to spec directory |\n| Spec --> Spec | Cross-references between FEATURE_MAP, SCREEN-*, ARCHITECTURE |\n\n---\n\n## VI. Auto-Detection Magic\n\nFeatures that GAME provides automatically for Claude-developed projects by reading filesystem conventions:\n\n### On Scan (Automatic)\n\n| Detection | Method | Result |\n|-----------|--------|--------|\n| **Project exists** | Directory with METADATA.md in $PROJECTS_DIR | Project record created |\n| **Identity** | Parse METADATA.md key:value fields | All identity fields populated |\n| **Operations** | Parse `# CommandCenter Operation` headers in bin/ | Operation buttons appear |\n| **Bookmarks** | Parse `## Bookmarks` in AGENTS.md | Quick-link buttons on dashboard |\n| **Endpoints** | Parse `## Service Endpoints` in AGENTS.md | Clickable service links |\n| **Dev Commands** | Parse `## Dev Commands` in AGENTS.md | Context for the platform |\n| **Stack detection** | `requirements.txt` --> Python, `package.json` --> Node, `Cargo.toml` --> Rust | Auto-populate stack if empty |\n| **Git status** | `git status`, `git log`, `git rev-list` | Branch, dirty, unpushed, last commit |\n| **Environment flags** | Check for venv/, node_modules/, .git/, CLAUDE.md, tests/, doc/ | Boolean flags |\n| **Schedule registration** | `# Schedule:` headers in bin/ scripts | Cron jobs registered |\n| **Compliance check** | Required files present per CLAUDE_RULES | Compliance gaps flagged |\n| **Spec linkage** | Matching directory in Specifications/ | Spec management enabled |\n\n### Contract-Earns-Capability Principle\n\n\"Add the file; the platform discovers the capability.\"\n\n| File Added | Capability Earned |\n|------------|-------------------|\n| `METADATA.md` | Project appears in dashboard |\n| `AGENTS.md` | Bookmarks, endpoints, dev commands extracted |\n| `bin/start.sh` with header | Start button appears |\n| `bin/daily.sh` with `# Schedule:` | Daily automation registered |\n| `doc/index.html` | Documentation link appears |\n| `Specifications/{name}/` | Specification management enabled |\n| `health: /health` in METADATA | Health monitoring enabled |\n| `port: NNNN` in METADATA | Service monitoring + heartbeat enabled |\n| `show_on_homepage: true` | Portfolio card generated |\n\n### Suggested Enhancements (Magic for Claude Users)\n\n| Feature | How It Works | Value |\n|---------|-------------|-------|\n| **Auto-scaffold** | `create_project.py` generates all required files from a template | Zero-to-dashboard in one command |\n| **Spec generation** | Generate ARCHITECTURE.md from scanning code structure, imports, routes | Keep specs in sync with code |\n| **Dependency detection** | Scan imports and config for references to other managed projects | Dependency graph on dashboard |\n| **Stale project detection** | No git commits in N days + status ACTIVE = flag for review | Surface forgotten projects |\n| **Environment drift** | Compare `.env.example` vs `.env` across projects | Catch missing config |\n| **Documentation freshness** | Compare `doc/` mtime vs last code commit | Flag stale docs |\n| **Test coverage hint** | `has_tests` false + status ACTIVE = suggest adding tests | Quality nudge |\n| **Common.sh drift** | Compare project's `bin/common.sh` against Specifications/templates/ | Flag outdated infrastructure |\n\n---\n\n## VII. Tag System\n\n| Feature | Details |\n|---------|---------|\n| **Storage** | Comma-separated string in `projects.tags` |\n| **Colors** | Per-tag hex color, stored in `tag_colors` table and `data/tag_colors.json` |\n| **Filtering** | Dashboard filter by tag (pill buttons) |\n| **Inline Editing** | Click tag on dashboard to edit |\n| **Cross-project** | Same tag across projects creates a natural grouping |\n| **Color Picker** | Settings screen with visual color selection |\n\n---\n\n## VIII. API Layer\n\n### HTMX Endpoints (HTML fragments)\n\n| Method | Path | Purpose |\n|--------|------|---------|\n| GET | `/` | Full dashboard page |\n| GET | `/api/project/{id}` | Project detail fragment |\n| POST | `/api/scan` | Trigger re-scan |\n| POST | `/api/run/{op_id}` | Launch operation |\n| POST | `/api/stop/{run_id}` | Stop running operation |\n| POST | `/api/push/{project_id}` | Git push |\n| POST | `/api/project/{id}/toggle-publish` | Toggle portfolio inclusion |\n| GET | `/processes` | Process list page |\n| GET | `/processes/{run_id}/log` | Log content fragment |\n| GET | `/publisher` | Publisher page |\n| POST | `/publisher/build` | Rebuild portfolio |\n| POST | `/publisher/publish` | Publish to GitHub Pages |\n| GET | `/config` | Configuration page |\n| GET | `/monitoring` | Monitoring page |\n| GET | `/workflow` | Workflow board |\n| GET | `/health` | `{\"status\":\"ok\"}` JSON |\n\n### JSON API (programmatic access)\n\nPotential extension: mirror key HTMX routes as JSON endpoints under `/api/v1/` for external tool integration (CLI tools, other projects, webhooks).\n\n| Endpoint | Purpose |\n|----------|---------|\n| `GET /api/v1/projects` | List all projects with status |\n| `GET /api/v1/projects/{id}` | Single project detail |\n| `GET /api/v1/projects/{id}/heartbeats` | Current heartbeat states |\n| `GET /api/v1/projects/{id}/events` | Recent events |\n| `POST /api/v1/projects/{id}/run/{op_id}` | Trigger operation |\n| `GET /api/v1/events` | Platform-wide event feed |\n| `GET /api/v1/health` | Platform health summary |\n\n---\n\n## IX. Workflow & Ticketing\n\n### Ticket Attributes\n\n| Field | Type | Purpose |\n|-------|------|---------|\n| `id` | PK | Ticket identifier |\n| `project_id` | FK | Parent project |\n| `title` | string | One-line summary |\n| `description` | text | Full description, acceptance criteria |\n| `state` | enum | From workflow.json states |\n| `tags` | csv | Ticket-level tags |\n| `priority` | enum | Low, Medium, High, Critical |\n| `created_at` | yyyymmdd_hhmmss | Creation time |\n| `updated_at` | yyyymmdd_hhmmss | Last modification |\n\n### Workflow States\n\nDefault states from `workflow.json` (user-configurable):\n\n```\nIDEA --> PROPOSED --> READY --> IN DEVELOPMENT --> TESTING --> DONE\n                                    ^                |\n                                  READY <------------+  (rework)\n```\n\n### AI Transaction Log (per ticket)\n\nWhen a ticket enters IN DEVELOPMENT, the AI agent's decisions are logged:\n\n| Field | Purpose |\n|-------|---------|\n| `decision` | What was decided and why |\n| `alternatives` | What was considered but rejected |\n| `files_changed` | Which files were modified |\n| `timestamp` | When the work happened |\n\nThis creates an audit trail from idea through implementation.\n\n---\n\n## X. Publisher & Portfolio\n\n### How It Works\n\n1. Scan projects where `show_on_homepage = true`\n2. For each: use `card_title` (or `display_name`), `card_desc` (or `short_description`), `card_image` (or `logo`), `card_tags` (or `tags`)\n3. If `doc/index.html` exists, add documentation link\n4. Generate static site from `config/site_config.md` branding\n5. Serve locally or push to GitHub Pages\n\n### Source Files\n\n| File | Purpose |\n|------|---------|\n| `config/site_config.md` | Site title, branding, home page markdown (YAML frontmatter + body) |\n| `git_homepage.md` | Per-project card metadata override |\n| `static/images/*.webp` | Card thumbnail images |\n\n---\n\n## XI. Compliance & Project Health\n\n### Compliance Checks (Scanner)\n\nBased on CLAUDE_RULES requirements:\n\n| Check | Required For | Detection |\n|-------|-------------|-----------|\n| METADATA.md exists | All projects | File presence |\n| AGENTS.md exists | All projects | File presence |\n| CLAUDE.md points to AGENTS.md | All projects | Content check |\n| bin/common.sh exists | Projects with bin/ | File presence |\n| .env.example when .env exists | Projects with .env | File comparison |\n| `name` field in METADATA.md | All projects | Parse check |\n| `display_name` in METADATA.md | All projects | Parse check |\n| Version format valid | All projects | Regex: `YYYY-MM-DD.N` |\n| Git initialized | ACTIVE+ status | `.git/` exists |\n| Health endpoint responding | PRODUCTION services | HTTP check |\n\n### Project Health Score (Derived)\n\nComposite score from multiple signals:\n\n| Signal | Weight | Healthy | Unhealthy |\n|--------|--------|---------|-----------|\n| Compliance | High | All checks pass | Missing required files |\n| Git activity | Medium | Commits within 30 days | Stale (no activity) |\n| Service health | High | UP heartbeat | DOWN heartbeat |\n| Tests exist | Low | `has_tests = true` | No tests for ACTIVE+ |\n| Docs current | Low | `has_docs = true` | Docs older than code |\n| Env drift | Medium | .env matches .env.example | Missing vars |\n\n---\n\n## XII. Complete Attribute Matrix\n\n### All Project Fields\n\n| Category | Attribute | Type | Mutable | Source | Notes |\n|----------|-----------|------|---------|--------|-------|\n| **Identity** | name | string | No | METADATA.md | Machine slug |\n| | display_name | string | Yes | METADATA.md | Primary human name |\n| | short_description | string | Yes | METADATA.md | One-liner |\n| | git_repo | string | Yes | METADATA.md | HTTPS URL |\n| **Visual** | color | hex | Yes | METADATA.md | Accent color |\n| | icon | string | Yes | METADATA.md | Emoji or icon |\n| | logo | path | Yes | METADATA.md | Logo image path |\n| **Classification** | project_type | enum | Yes | METADATA.md | Type registry key |\n| | category | string | Yes | METADATA.md | High-level group |\n| | owner | string | Yes | METADATA.md | Maintainer |\n| | tags | csv | Yes | METADATA.md + UI | Cross-cutting labels |\n| **Lifecycle** | status | enum | Yes | METADATA.md | IDEA...ARCHIVED |\n| | is_active | boolean | Auto | Scanner | false if removed from disk |\n| | desired_state | enum | Yes | METADATA.md | running / on-demand |\n| | namespace | string | Yes | METADATA.md | Environment |\n| **Technology** | stack | string | Yes | METADATA.md | Tech summary |\n| | port | int | Yes | METADATA.md | Service port |\n| | health_endpoint | string | Yes | METADATA.md | Health path |\n| | deploy_url | string | Yes | METADATA.md | Live URL |\n| | version | string | Yes | METADATA.md | YYYY-MM-DD.N |\n| **Auto-Detect** | has_git | boolean | Auto | Scanner | .git/ exists |\n| | has_venv | boolean | Auto | Scanner | venv/ exists |\n| | has_node | boolean | Auto | Scanner | package.json exists |\n| | has_claude | boolean | Auto | Scanner | CLAUDE.md exists |\n| | has_tests | boolean | Auto | Scanner | tests/ or bin/test.sh |\n| | has_docs | boolean | Auto | Scanner | doc/index.html |\n| | has_specs | boolean | Auto | Scanner | Specifications/{name}/ |\n| **Git State** | git_branch | string | Auto | Scanner | Current branch |\n| | git_dirty | boolean | Auto | Scanner | Uncommitted changes |\n| | git_unpushed | int | Auto | Scanner | Commits ahead |\n| | git_last_commit | string | Auto | Scanner | Last commit msg |\n| **Portfolio** | show_on_homepage | boolean | Yes | UI | Portfolio inclusion |\n| | card_title | string | Yes | UI | Override display_name |\n| | card_desc | string | Yes | UI | Override short_description |\n| | card_tags | string | Yes | UI | Override tags |\n| | card_type | string | Yes | UI | Override project_type |\n| | card_url | string | Yes | UI | Override link target |\n| | card_image | string | Yes | UI | Override logo |\n| **Timestamps** | created_at | ISO8601 | No | DB | Record creation |\n| | updated_at | ISO8601 | Auto | DB | Last modification |\n| | last_scanned | yyyymmdd_hhmmss | Auto | Scanner | Last scan pass |\n| **Extension** | extra | JSON | Yes | METADATA.md | Type-specific overflow |\n\n---\n\n## XIII. Specification Directory Organization\n\nRecommended structure for the `Specifications/GAME/` directory:\n\n```\nSpecifications/GAME/\n  README.md                  Overview, intent, stack, how to build\n  METADATA.md                Project identity fields (the actual metadata)\n  FEATURE_MAP.md             THIS FILE \u2014 complete feature catalog (primary reference)\n  ARCHITECTURE.md            Backend modules, app factory, data flow, directory layout\n  DATABASE.md                Schema, tables, conventions\n  UI-GENERAL.md              Shared UI patterns: nav bar, standard headers, dark theme,\n                               modals, HTMX conventions, filter patterns\n  SCREEN-DASHBOARD.md        Dashboard screen spec (references UI-GENERAL + FEATURE_MAP)\n  SCREEN-PROCESSES.md        Process viewer screen spec\n  SCREEN-PUBLISHER.md        Publisher screen spec\n  SCREEN-CONFIGURATION.md    Configuration/metadata editor screen spec\n  SCREEN-MONITORING.md       Monitoring/heartbeat screen spec\n  SCREEN-WORKFLOW.md         Workflow/kanban screen spec\n  UNUSED-SCREEN-USAGE.md     Archived usage screen (deprecated)\n```\n\n### Document Responsibilities\n\n| Document | Answers | Does NOT Cover |\n|----------|---------|----------------|\n| **FEATURE_MAP** (this file) | What attributes exist? What features does the platform offer? What can it detect? | How the UI renders it. How the code implements it. |\n| **ARCHITECTURE** | How is the code organized? What are the modules? How does data flow? | What the user sees. What features exist. |\n| **DATABASE** | What tables exist? What columns? What constraints? | Why those columns exist (\u2192 FEATURE_MAP). |\n| **UI-GENERAL** | What shared UI patterns exist? Nav bar, standard row header, dark theme, modals, HTMX. | Screen-specific layouts. |\n| **SCREEN-*** | What does this specific screen show? What can the user do? | Backend implementation. Full attribute definitions. |\n\n**Flow:** FEATURE_MAP defines features --> ARCHITECTURE describes modules --> DATABASE defines storage --> UI-GENERAL defines shared patterns --> SCREEN-* defines per-screen layout.\n\n---\n\n## XIV. Summary: What Makes a Project Fully Managed\n\nA project earns platform capabilities by adding files (contract-earns-capability):\n\n| Level | Files Required | Capabilities Earned |\n|-------|---------------|---------------------|\n| **Discovered** | METADATA.md | Appears in dashboard, identity, status |\n| **Contextual** | + AGENTS.md | Bookmarks, endpoints, dev commands extracted |\n| **Operational** | + bin/ scripts with headers | Operation buttons, run/stop, logging |\n| **Monitored** | + `port:` + `health:` in METADATA | Heartbeat polling, UP/DOWN/MIXED status |\n| **Scheduled** | + `# Schedule:` in script headers | Automated cron runs, missed-run catch-up |\n| **Published** | + `show_on_homepage: true` | Portfolio card on GitHub Pages |\n| **Documented** | + doc/index.html | Documentation link in dashboard + portfolio |\n| **Specified** | + Specifications/{name}/ | Spec management, transaction log |\n| **Compliant** | + All CLAUDE_RULES files | Full compliance score, health badge |\n\n---\n\n## References\n\n| Document | Location | Purpose |\n|----------|----------|---------|\n| ARCHITECTURE.md | This directory | Backend code structure |\n| DATABASE.md | This directory | Schema definition |\n| UI-GENERAL.md | This directory | Shared UI patterns |\n| SCREEN-*.md | This directory | Per-screen specifications |\n| CLAUDE_RULES.md | `../GLOBAL_RULES/CLAUDE_RULES.md` | Agent behavior contract |\n| DOCUMENTATION_BRANDING.md | `../GLOBAL_RULES/DOCUMENTATION_BRANDING.md` | Documentation theming standards |\n",
  "FUNCTIONALITY": "# Functionality: End-to-End Flows\n\n**How things actually work, step by step.** This document bridges FEATURE_MAP (what exists) and ARCHITECTURE (how code is organized) by describing the major workflows from trigger to completion.\n\nEach flow shows: what triggers it, what happens in sequence, what gets read, what gets written, and what the user sees.\n\n---\n\n## 1. Project Scan\n\n**Trigger:** Platform startup (first request), or user clicks Rescan button.\n\n```\nUser clicks Rescan (or first page load)\n  |\n  v\nPOST /api/scan\n  |\n  v\nScanner reads $PROJECTS_DIR\n  |\n  +---> For each directory:\n  |       |\n  |       +---> Read METADATA.md --> parse key:value fields\n  |       |       name, display_name, status, stack, port, version, tags, ...\n  |       |\n  |       +---> Read AGENTS.md --> extract sections\n  |       |       ## Bookmarks --> quick links\n  |       |       ## Service Endpoints --> service URLs\n  |       |       ## Dev Commands --> context (not stored, displayed on demand)\n  |       |\n  |       +---> Read bin/ scripts --> parse first 20 lines for headers\n  |       |       # CommandCenter Operation --> register operation\n  |       |       # Category: --> operation category\n  |       |       # Schedule: --> cron expression\n  |       |       # Port: / # Health: / # Timeout: --> operation metadata\n  |       |\n  |       +---> Check filesystem flags\n  |       |       .git/ --> has_git, then: git status, git log, git rev-list\n  |       |       venv/ --> has_venv\n  |       |       package.json --> has_node\n  |       |       CLAUDE.md --> has_claude\n  |       |       tests/ or bin/test.sh --> has_tests\n  |       |       doc/index.html --> has_docs\n  |       |       Specifications/{name}/ --> has_specs\n  |       |\n  |       +---> Upsert into `projects` table\n  |       +---> Replace rows in `operations` table for this project\n  |\n  +---> Mark projects not found on disk as is_active = false\n  |\n  v\nDashboard refreshes with updated project list\n```\n\n**Reads:** Filesystem ($PROJECTS_DIR), METADATA.md, AGENTS.md, bin/ scripts, .git/\n**Writes:** `projects` table, `operations` table\n**Event emitted:** `scan_completed`\n\n**Key behaviors:**\n- Non-blocking on startup \u2014 first page load returns immediately, scan runs async\n- Missing files produce compliance gaps, not errors \u2014 a project with only METADATA.md still appears\n- Projects removed from disk are marked `is_active = false`, not deleted\n- Git operations (status, log) run per-project \u2014 can be slow with many repos\n\n---\n\n## 2. Run Operation\n\n**Trigger:** User clicks an operation button on the dashboard or project detail.\n\n```\nUser clicks operation button (e.g., \"Start Server\")\n  |\n  v\nPOST /api/run/{op_id}\n  |\n  v\nLoad operation record from DB\n  |  --> script_path, cwd, needs_venv, category\n  |\n  v\nCreate op_runs record\n  |  status = STARTING\n  |  log_path = logs/{project}_{script}_{yyyymmdd_hhmmss}.log\n  |\n  v\nFork subprocess\n  |  cd to project directory\n  |  Activate venv if needs_venv\n  |  Execute: bash bin/{script}.sh (or python bin/{script}.py)\n  |  Redirect stdout+stderr to log_path\n  |\n  v\nUpdate op_runs: status = RUNNING, pid = process.pid\n  |\n  v\nDashboard button changes to running state (green pulse)\nNav bar shows running badge for this project\n  |\n  v\nBackground: monitor subprocess\n  |\n  +---> Parse log output for [$PROJECT_NAME] status lines\n  |       [$PROJECT_NAME] Starting: ... --> STARTING\n  |       [$PROJECT_NAME] Running: ...  --> RUNNING\n  |       [$PROJECT_NAME] Error: ...    --> flag\n  |\n  +---> On process exit:\n          |\n          +---> exit_code = 0 --> status = DONE\n          +---> exit_code != 0 --> status = ERROR\n          |\n          v\n        Update op_runs: finished_at, exit_code, status\n        Remove running badge from nav\n```\n\n**Reads:** `operations` table, project path\n**Writes:** `op_runs` table, log file\n**Events emitted:** `operation_started`, then `operation_completed` or `operation_failed`\n\n**Key behaviors:**\n- Process runs in a process group (enables clean SIGTERM of child processes)\n- Log file is append-only, named for sorting by project then time\n- common.sh/common.py in the script handles venv, PORT, env loading, SIGTERM trap\n- The platform does NOT parse or understand what the script does \u2014 it just runs it and watches exit codes\n\n---\n\n## 3. Stop Operation\n\n**Trigger:** User clicks Stop on a running operation.\n\n```\nUser clicks Stop button\n  |\n  v\nPOST /api/stop/{run_id}\n  |\n  v\nLoad op_runs record --> get pid\n  |\n  v\nSend SIGTERM to process group (-pid)\n  |  This triggers the trap in common.sh/common.py\n  |  Script performs cleanup, then exits\n  |\n  v\nProcess exits (caught by monitor from Flow 2)\n  |\n  v\nUpdate op_runs: status = STOPPED, finished_at = now\n  |\n  v\nDashboard button reverts to idle state\nRunning badge removed from nav\n```\n\n**Reads:** `op_runs` table\n**Writes:** `op_runs` table (status update)\n**Event emitted:** `operation_completed` (with STOPPED status)\n\n---\n\n## 4. Git Push\n\n**Trigger:** User clicks Push button (visible only when `git_unpushed > 0`).\n\n```\nUser clicks Push on project row\n  |\n  v\nPOST /api/push/{project_id}\n  |\n  v\nLoad project record --> get path\n  |\n  v\nExecute: git -C {path} push\n  |\n  +---> Success:\n  |       Update project: git_unpushed = 0\n  |       Flash success message\n  |       Push button disappears\n  |\n  +---> Failure:\n          Flash error with git output\n          Button remains visible\n```\n\n**Reads:** `projects` table, git remote config\n**Writes:** Remote repository, `projects` table\n**Event emitted:** `git_push` (success or failure)\n\n---\n\n## 5. Portfolio Publish\n\n**Trigger:** User clicks Rebuild or Publish on the Publisher screen.\n\n```\nBUILD:\n  User clicks Rebuild\n    |\n    v\n  POST /publisher/build\n    |\n    v\n  Query projects WHERE show_on_homepage = true\n    |\n    v\n  For each published project:\n    |\n    +---> Resolve card fields (with defaults):\n    |       card_title    --> fallback to display_name\n    |       card_desc     --> fallback to short_description\n    |       card_image    --> fallback to logo\n    |       card_tags     --> fallback to tags\n    |       card_type     --> fallback to project_type\n    |       card_url      --> fallback to deploy_url or git_repo\n    |\n    +---> Check for doc/index.html --> add Documentation link if exists\n    |\n    +---> Generate card HTML fragment\n    |\n    v\n  Load config/site_config.md\n    |  YAML frontmatter --> site title, branding\n    |  Markdown body --> home page content\n    |\n    v\n  Assemble static site: card grid + home page + resume page\n    |\n    v\n  Write output files\n  Flash \"Build complete\" with timestamp\n\nPUBLISH:\n  User clicks Publish\n    |\n    v\n  POST /publisher/publish\n    |\n    v\n  Execute PushAndPublish.sh\n    |  git add, commit, push to GitHub Pages branch\n    |\n    v\n  Flash publish status\n```\n\n**Reads:** `projects` table (card fields), `config/site_config.md`, `doc/` directories, `static/images/`\n**Writes:** Static site output files, GitHub Pages branch\n**Events emitted:** `build_completed`, `deploy_completed`\n\n---\n\n## 6. Heartbeat Poll [ROADMAP]\n\n**Trigger:** Timer-based (configurable interval, e.g., every 60 seconds). Also on-demand from Monitoring screen.\n\n```\nTimer fires (or user clicks Refresh on Monitoring)\n  |\n  v\nQuery projects WHERE port IS NOT NULL AND health_endpoint IS NOT NULL\n  |\n  v\nFor each monitored project:\n  |\n  +---> HTTP GET http://localhost:{port}{health_endpoint}\n  |       |\n  |       +---> 200 OK (within timeout):\n  |       |       state = UP\n  |       |       response_ms = elapsed\n  |       |\n  |       +---> Connection refused / timeout / error:\n  |               state = DOWN\n  |               response_ms = null\n  |\n  +---> Compare new state vs previous state\n  |       |\n  |       +---> Same state: update last_checked, response_ms\n  |       |\n  |       +---> State changed:\n  |               Record state_transition event\n  |               Update heartbeat record\n  |               If DOWN: fire alert (unless SNOOZED)\n  |               If UP (after DOWN): fire recovery alert\n  |\n  +---> Update rolling uptime_pct (24h window)\n  |\n  v\nMonitoring screen updates health table\nDashboard running indicators reflect combined state\n```\n\n**Reads:** `projects` table, HTTP endpoints\n**Writes:** `heartbeats` table, `events` table\n**Events emitted:** `state_transition` (on change), `alert_fired` (on DOWN)\n\n**States:** `UNKNOWN --> UP --> DOWN --> UP` (cycle). `SNOOZED` suppresses alerts but continues polling.\n\n---\n\n## 7. Schedule Fire [ROADMAP]\n\n**Trigger:** Cron expression match (checked every minute by scheduler loop).\n\n```\nScheduler tick (every 60 seconds)\n  |\n  v\nQuery operations WHERE schedule IS NOT NULL AND schedule_enabled = true\n  |\n  v\nFor each scheduled operation:\n  |\n  +---> Evaluate cron expression against current time\n  |       |\n  |       +---> No match: skip\n  |       |\n  |       +---> Match:\n  |               |\n  |               +---> Check last_scheduled_run\n  |               |       Already ran this minute? Skip (dedup)\n  |               |\n  |               +---> Execute Run Operation flow (Flow 2)\n  |               |\n  |               +---> Update last_scheduled_run = now\n  |               +---> Calculate next_scheduled_run\n  |\n  v\n(silent \u2014 no UI update unless user is watching Processes screen)\n\nSTARTUP CATCH-UP:\n  On platform start:\n    |\n    v\n  For each scheduled operation:\n    |\n    +---> Compare last_scheduled_run against cron expression\n    |       |\n    |       +---> Missed run(s) detected:\n    |               Fire ONE immediate run (most recent missed, no backfill cascade)\n    |               Record schedule_missed event\n    |\n    v\n  Resume normal tick loop\n```\n\n**Reads:** `operations` table (schedule, last_scheduled_run)\n**Writes:** `op_runs` table (via Flow 2), `operations` table (last/next scheduled run)\n**Events emitted:** `schedule_fired`, `schedule_missed` (on catch-up)\n\n---\n\n## 8. Ticket Lifecycle [ROADMAP]\n\n**Trigger:** User creates or moves a ticket on the Workflow screen.\n\n```\nCREATE:\n  User clicks New Ticket (on Workflow or project detail)\n    |\n    v\n  Enter title, description, tags, priority\n    |\n    v\n  Insert into tickets: state = IDEA\n    |\n    v\n  Card appears in IDEA column on Kanban board\n\nTRANSITION:\n  User drags ticket to new column (or clicks state button)\n    |\n    v\n  Validate transition is allowed:\n    IDEA --> PROPOSED (needs: summary and plan)\n    PROPOSED --> READY (needs: acceptance criteria)\n    READY --> IN DEVELOPMENT\n    IN DEVELOPMENT --> TESTING (needs: work completed)\n    TESTING --> DONE (needs: human validation)\n    TESTING --> READY (rework)\n    IN DEVELOPMENT --> PROPOSED (redesign)\n    |\n    v\n  Update ticket state\n  Record state change in ticket history\n    |\n    v\n  If entering IN DEVELOPMENT:\n    |  Begin collecting AI transaction log entries\n    |  (decisions, files changed, rationale)\n    |\n  If entering DONE:\n    |  Freeze transaction log\n    |  Ticket archived after configurable period\n    |\n    v\n  Kanban board updates, card moves to new column\n```\n\n**Reads:** `tickets` table, `workflow.json` (state definitions)\n**Writes:** `tickets` table, ticket history, transaction log\n**Events emitted:** `ticket_transition`\n\n---\n\n## 9. Configuration Edit\n\n**Trigger:** User clicks cog icon on Configuration screen, or edits inline fields.\n\n```\nUser opens field editor for a project\n  |\n  v\nGET /config or project detail editor\n  |  Load current values from DB\n  |\n  v\nUser edits field(s) and tabs out / saves\n  |\n  v\nPOST update\n  |\n  v\nUpdate `projects` table in database\n  |\n  v\nWrite changes back to METADATA.md on disk\n  |  Read current file\n  |  Find matching key: line\n  |  Replace value (or append if new key)\n  |  Write file\n  |\n  v\nFlash confirmation\n```\n\n**Reads:** `projects` table, METADATA.md file\n**Writes:** `projects` table, METADATA.md file (bidirectional sync)\n**Events emitted:** `metadata_changed`\n\n**Key behavior:** Database and METADATA.md are kept in sync. DB is the working copy (fast reads for dashboard). METADATA.md is the source of truth (survives database rebuild via rescan).\n\n---\n\n## 10. Specification Management [ROADMAP]\n\n**Trigger:** User edits spec content via the platform, or agent commits spec changes during ticket work.\n\n```\nVIEWING:\n  User clicks Specs link on project with has_specs = true\n    |\n    v\n  Load file list from Specifications/{project_name}/\n    |\n    v\n  Display spec index with file names, last modified, sizes\n\nEDITING (via platform):\n  User opens a spec file for editing\n    |\n    v\n  Load file content, render in editor\n    |\n    v\n  User saves changes\n    |\n    v\n  Write file to Specifications/{project_name}/\n    |\n    v\n  Git commit in Specifications repo\n    |  Message: \"Update {filename} for {project_name}\"\n    |\n    v\n  Record transaction log entry:\n    |  category = change\n    |  files_affected = [{filename}]\n    |  linked to ticket (if in context)\n\nAI AGENT FLOW (during ticket IN DEVELOPMENT):\n  Agent modifies spec file as part of ticket work\n    |\n    v\n  Agent commits with descriptive message\n    |\n    v\n  On next scan: transaction log entry auto-created\n    |  Linked to active ticket for this project\n    |  Files detected via git diff\n```\n\n**Reads:** Specifications/{name}/ directory, git log\n**Writes:** Spec files, Specifications repo commits, transaction log\n**Events emitted:** `spec_updated`\n\n---\n\n## Flow Summary\n\n| # | Flow | Trigger | Implemented |\n|---|------|---------|-------------|\n| 1 | Project Scan | Startup / Rescan button | Yes |\n| 2 | Run Operation | Operation button click | Yes |\n| 3 | Stop Operation | Stop button click | Yes |\n| 4 | Git Push | Push button click | Yes |\n| 5 | Portfolio Publish | Rebuild / Publish buttons | Yes |\n| 6 | Heartbeat Poll | Timer / Monitoring refresh | ROADMAP |\n| 7 | Schedule Fire | Cron tick / startup catch-up | ROADMAP |\n| 8 | Ticket Lifecycle | Create / drag ticket | Partial |\n| 9 | Configuration Edit | Cog icon / inline edit | Yes |\n| 10 | Specification Management | Spec link / agent commit | ROADMAP |\n\n---\n\n## Cross-Cutting Concerns\n\n### Event Emission\n\nEvery flow emits events (see FEATURE_MAP Section IV). Events are written to the `events` table and surfaced on:\n- Monitoring screen (platform-wide timeline)\n- Project detail (per-project event log)\n\n### Error Handling\n\nAll flows follow the same pattern:\n- Catch exceptions at the route level\n- Flash error message to user\n- Log to platform log (not project log)\n- Never crash the platform \u2014 a single project failure must not affect others\n\n### HTMX Partial Updates\n\nFlows that change UI state return HTML fragments, not full pages:\n- Run/Stop --> updated button state fragment\n- Push --> updated git status fragment\n- Scan --> status message fragment\n- Config edit --> updated row fragment\n\nThe browser replaces the targeted DOM element. No full page reload unless navigating to a different screen.\n\n### Concurrency\n\n- Only one instance of a given operation can run per project at a time\n- Multiple different operations can run simultaneously across projects\n- Scanner runs async \u2014 dashboard is usable during scan\n- Heartbeat poller runs on its own timer, independent of user actions\n- Scheduler runs on its own timer, independent of heartbeat poller\n",
  "METADATA": "# GAME\n\nProject management dashboard for AI-assisted development.\n\nname: GAME\ndisplay_name: GAME\ntitle: GAME \u2014 Generic AI Management Environment\ngit_repo: GAME\nshort_description: Dashboard for managing local AI-assisted projects\nport: 5001\nstatus: ACTIVE\nversion: 2026-03-13.2\nupdated: 20260313\nstack: Python/Flask/SQLite/Bootstrap5\nhealth: /health\nshow_on_homepage: true\ntags: dashboard, tool, platform\ndesired_state: on-demand\nnamespace: development\n",
  "README": "# GAME \u2014 Generic AI Management Environment\n\nA project framework for managing your projects.\n\nCommon built in standards provide enterprise features out of the box for users projects.  Projects can be easily conformed to a simple set of developement best practices which your agent can implement for you.  \n\nEach AI project has a minimal configured set of instructions placed in their rules which will expose project operations, endpoints, capabilities, documentation, command and control in a standard way that can be leveraged to make the easy to run and work with.  They will all work similarly. \n\n## Intent\n\nA solo practitioner or small team managing multiple AI-built projects needs one methedology.  If your projects have custom capabilities then it is difficult to manage.  A users projects become easier to manage when they are standard in format.  Start/Stop Services, Logs, Documentation, Health Checks, Unit Testing and other features are all set the same way. \n\nProjects go through workflow.  They have several stages where we conform the project to standards and verify the metadata as we work through our workflow.  \n\n## Stack\n\n- **Language:** Python\n- **Framework:** Flask (app factory, blueprints, HTMX for partial updates)\n- **Database:** SQLite (WAL mode, single file at `data/game.db`)\n- **Frontend:** Bootstrap 5 (dark theme, CDN)\n- **Port:** 5001\n\nEach stack component maps to a prescriptive reference file in `../GLOBAL_RULES/stack/` (python.md, flask.md, sqlite.md, bootstrap5.md). These files define exactly how to implement with concrete code examples.\n\n## Specifications\n\nAll project integration standards (script headers, METADATA.md format, secrets, documentation) are defined in `../GLOBAL_RULES/CLAUDE_RULES.md` \u2014 that file is injected into each project's AGENTS.md.\n\nThe specs in this directory describe GAME specifically:\n\n| Document | Answers |\n|----------|---------|\n| **FEATURE_MAP.md** | What attributes exist? What features does the platform offer? What can it detect? Primary reference. |\n| **ARCHITECTURE.md** | How is the code organized? What are the modules? How does data flow? |\n| **DATABASE.md** | What tables exist? What columns? What constraints? |\n| **UI-GENERAL.md** | Shared UI patterns: nav bar, standard headers, dark theme, modals, HTMX conventions. |\n| **SCREEN-*.md** | What does each screen show? What can the user do on it? |\n\n**Flow:** FEATURE_MAP defines features --> ARCHITECTURE describes modules --> DATABASE defines storage --> UI-GENERAL defines shared patterns --> SCREEN-* defines per-screen layout.\n\n## Building From This Specification\n\n```bash\n# 1. Validate that all stack files exist\nbash ../validate.sh GAME\n\n# 2. Generate a complete build prompt for an AI agent\nbash ../generate-prompt.sh GAME > build-prompt.md\n\n# 3. Feed build-prompt.md to the agent along with CLAUDE_RULES.md\n```\n\nThe generated prompt includes all stack reference files (common.md, python.md, flask.md, sqlite.md, bootstrap5.md) followed by all specification files in this directory. An AI agent reading this prompt has everything needed to build GAME from scratch.\n",
  "SCREEN-CONFIGURATION": "# Screen: Configuration\n\nA Baseline screen for editing project metadata across all projects in a single list.\n\n## Route\n\n```\nGET /project-config\n```\n\n## Columns\n\n```\ncolumns=Configuration\n```\n\n## Configuration Column\n\nThree editable fields per project row:\n\n| Field | Label | Source | Input |\n|-------|-------|--------|-------|\n| Port | `port:` | `projects.port` | number |\n| Show on homepage | `show:` | `projects.card_show` | checkbox |\n| Tags | `tags:` | `projects.tags` | text |\n\nFields persist on change per DATABASE.md rules. Each field saves independently \u2014 no Save button.\n",
  "UI-GENERAL": "# UI General Standards\n\n**Shared UI patterns, components, and conventions used across all screens.**\n\nAll SCREEN-*.md files reference this document for shared elements. Screen specs define only what is unique to that screen.\n\n---\n\n## Theme\n\nDark theme using Bootstrap 5 `data-bs-theme=\"dark\"`. Custom CSS in `static/style.css` extends Bootstrap with platform-specific variables:\n\n| Variable | Purpose | Value |\n|----------|---------|-------|\n| `--cc-surface` | Card/panel background | Dark surface |\n| `--cc-border` | Border color | Subtle dark border |\n| `--cc-muted` | Secondary text | Muted gray |\n\nNo JS build step. Bootstrap 5 via CDN. HTMX via CDN.\n\n---\n\n## Navigation Bar\n\nFixed top bar present on all screens. Components left to right:\n\n| Element | Behavior |\n|---------|----------|\n| **Brand** (`cc-brand`) | App name with command icon. Click --> project list. |\n| **Tab links** | Projects, Configuration, GIT-Homepage, Processes, Monitoring, Workflow. Active tab highlighted. |\n| **Documentation button** | Opens `doc/index.html` in new tab. |\n| **Settings dropdown** | Hamburger icon. Contains: Settings, Tags, Help. |\n| **Running badges** | Green pill badges for each currently-running project. Click --> project detail. |\n\n---\n\n## Standard Row Header\n\nSeveral screens share a standard row header pattern for project rows:\n\n| Column | Content | Width |\n|--------|---------|-------|\n| Status badge | Colored pill: IDEA/PROTOTYPE/ACTIVE/PRODUCTION/ARCHIVED | Fixed |\n| Project icon | Emoji or type icon | Fixed |\n| Display name | `display_name` from METADATA.md, clickable | Flex |\n\nThis pattern appears on: Dashboard, Configuration, Processes (as project column), Publisher.\n\nStatus badge colors:\n\n| Status | Color | Hex |\n|--------|-------|-----|\n| IDEA | Slate | `#94a3b8` |\n| PROTOTYPE | Amber | `#fdab3d` |\n| ACTIVE | Blue | `#0073ea` |\n| PRODUCTION | Green | `#00c875` |\n| ARCHIVED | Gray | `#4a5568` |\n\n---\n\n## Settings Icon (Cog)\n\nUsed on multiple screens. The cog icon opens a detail/edit view for the project's METADATA.md fields. Context-dependent behavior:\n\n| Screen | Cog Action |\n|--------|------------|\n| Dashboard | Opens project detail with inline editing |\n| Configuration | Opens full METADATA.md field editor |\n| Publisher | Opens publication field editor |\n\n---\n\n## Tag Pills\n\nTags render as small colored pills. Color from `tag_colors` table/config. Inline editable on some screens.\n\n```html\n<span class=\"badge\" style=\"background: {tag_color}\">{tag_name}</span>\n```\n\n---\n\n## Cards\n\nContent panels use a card pattern:\n\n```html\n<div class=\"cc-card\">\n    <div class=\"cc-card-header\">Section Title</div>\n    <div style=\"padding: 1rem\">\n        <!-- content -->\n    </div>\n</div>\n```\n\n---\n\n## Modals\n\nTwo global modals defined in `base.html`:\n\n| Modal | ID | Purpose |\n|-------|----|---------|\n| CLAUDE.md Viewer | `claudeModal` | Shows AGENTS.md content for a project |\n| Command Output | `opOutputModal` | Shows operation stdout/stderr output |\n\nModals use dark surface background with themed borders.\n\n---\n\n## HTMX Conventions\n\nAll screen interactions use HTMX partial page updates:\n\n| Pattern | Usage |\n|---------|-------|\n| `hx-get` | Load fragments (project detail, log content) |\n| `hx-post` | Trigger actions (run op, stop, push, scan) |\n| `hx-target` | Replace specific DOM element with response |\n| `hx-swap` | Usually `innerHTML` or `outerHTML` |\n| `hx-trigger` | Click (default), or custom events |\n\nServer returns HTML fragments, never JSON (except `/health`).\n\n---\n\n## Operation Buttons\n\nRendered per-operation on dashboard rows and project detail:\n\n| State | Appearance | Action |\n|-------|------------|--------|\n| Idle | `op-btn` styled button with operation name | Click --> run |\n| Running | Green pulsing indicator, \"Stop\" label | Click --> SIGTERM |\n| Recently completed | Brief success/error flash | Auto-reverts to idle |\n\nCategory determines button style:\n\n| Category | Style Class |\n|----------|-------------|\n| `service` | `op-btn--service` |\n| `local` | `op-btn--local` |\n| `maintenance` | `op-btn--maintenance` |\n\n---\n\n## Filter Bar\n\nDashboard and other list screens share a filter pattern:\n\n| Filter | Type | Behavior |\n|--------|------|----------|\n| Text search | Input field | Filters rows by name/description match |\n| Status filter | Pill buttons | Toggle visibility by status |\n| Tag filter | Pill buttons | Filter by selected tags |\n| Namespace filter | Dropdown | Filter by namespace |\n\nFilters are client-side (no server round-trip) for responsiveness.\n\n---\n\n## Flash Messages\n\nStandard Bootstrap 5 alert dismissible pattern. Categories: `success`, `danger`, `warning`, `info`.\n\n---\n\n## Typography\n\nSystem font stack (no web fonts). Monospace for logs and code output.\n\n| Element | Font | Size |\n|---------|------|------|\n| Body | System sans-serif | 14px |\n| Headings | System sans-serif | 16-20px |\n| Log output | System monospace | 13px |\n| Badges/pills | System sans-serif | 11px |\n\n---\n\n## Responsive Behavior\n\nDesigned for desktop use (operations center). Minimum supported width: 1024px. Nav bar scrolls horizontally on smaller screens. No mobile-first breakpoints.\n",
};

marked.setOptions({ gfm: true, breaks: false });

const STATUS_COLORS = {
  IDEA: '#94a3b8', PROTOTYPE: '#fdab3d', ACTIVE: '#0073ea',
  PRODUCTION: '#00c875', ARCHIVED: '#4a5568'
};

const FILE_ICONS = {
  METADATA: '\u{1F4CB}', README: '\u{1F4D6}', INTENT: '\u{1F3AF}',
  ARCHITECTURE: '\u{1F3D7}', DATABASE: '\u{1F5C4}', UI: '\u{1F3A8}',
};

function getIcon(name) {
  if (name.startsWith('SCREEN-')) return '\u{1F5A5}';
  if (name.startsWith('FEATURE-')) return '\u26A1';
  return FILE_ICONS[name] || '\u{1F4C4}';
}

function displayName(key) {
  if (key === 'METADATA') return 'Metadata';
  if (key === 'README') return 'Overview';
  if (key === 'INTENT') return 'Intent';
  if (key === 'ARCHITECTURE') return 'Architecture';
  if (key === 'DATABASE') return 'Database';
  if (key === 'UI' || key === 'UI-GENERAL') return 'UI Standards';
  if (key.startsWith('SCREEN-')) return 'Screen: ' + key.slice(7).replace(/-/g, ' ');
  if (key.startsWith('FEATURE-')) return 'Feature: ' + key.slice(8).replace(/-/g, ' ');
  return key.replace(/-/g, ' ').replace(/_/g, ' ');
}

function groupFiles(keys) {
  const groups = { Core: [], Design: [], Screens: [], Features: [], Other: [] };
  const core = new Set(['METADATA', 'README', 'INTENT']);
  const design = new Set(['ARCHITECTURE', 'DATABASE', 'UI', 'UI-GENERAL']);
  keys.forEach(k => {
    if (core.has(k)) groups.Core.push(k);
    else if (design.has(k)) groups.Design.push(k);
    else if (k.startsWith('SCREEN-')) groups.Screens.push(k);
    else if (k.startsWith('FEATURE-')) groups.Features.push(k);
    else groups.Other.push(k);
  });
  return groups;
}

function parseMeta(text) {
  const fields = {};
  text.split('\n').forEach(line => {
    const m = line.match(/^(\w[\w_]*):\s*(.+)/);
    if (m) fields[m[1]] = m[2].trim();
  });
  return fields;
}

function buildNav(groups) {
  const nav = document.getElementById('nav');
  const order = ['Core', 'Design', 'Screens', 'Features', 'Other'];
  order.forEach(group => {
    const files = groups[group].filter(k => k !== 'METADATA');
    if (!files.length) return;
    const div = document.createElement('div');
    div.className = 'nav-group';
    div.innerHTML = '<div class="nav-group-label">' + group + '</div>';
    files.forEach(key => {
      const a = document.createElement('a');
      a.className = 'nav-item';
      a.textContent = displayName(key);
      a.onclick = () => showDoc(key);
      div.appendChild(a);
    });
    nav.appendChild(div);
  });
}

function buildHome(groups, meta) {
  const home = document.getElementById('home-panel');
  let html = '';

  // Project info card from METADATA
  const statusColor = STATUS_COLORS[meta.status] || '#94a3b8';
  html += '<div class="project-info">';
  html += '<h1>' + (meta.display_name || meta.name || '');
  if (meta.status) html += ' <span class="status" style="background:' + statusColor + '">' + meta.status + '</span>';
  html += '</h1>';
  if (meta.short_description) html += '<p class="desc">' + meta.short_description + '</p>';
  const metaItems = [];
  if (meta.stack) metaItems.push('Stack: ' + meta.stack);
  if (meta.port) metaItems.push('Port: ' + meta.port);
  if (meta.repo) metaItems.push('Repo: ' + meta.repo);
  if (metaItems.length) {
    html += '<div class="meta-row">' + metaItems.map(i => '<span>' + i + '</span>').join('') + '</div>';
  }
  html += '</div>';

  // File cards by group (skip METADATA — shown above)
  const order = ['Core', 'Design', 'Screens', 'Features', 'Other'];
  const labels = { Core: 'Core', Design: 'Architecture & Data', Screens: 'Screens', Features: 'Features', Other: 'Other' };
  order.forEach(group => {
    const files = groups[group].filter(k => k !== 'METADATA');
    if (!files.length) return;
    html += '<div class="group-label">' + labels[group] + '</div>';
    html += '<div class="file-grid">';
    files.forEach(key => {
      html += '<a class="file-card" onclick="showDoc(\'' + key + '\')">';
      html += '<span class="icon">' + getIcon(key) + '</span>';
      html += '<span class="name">' + displayName(key) + '</span>';
      html += '</a>';
    });
    html += '</div>';
  });

  home.innerHTML = html;
}

function showDoc(key) {
  if (!DOCS[key]) return;
  document.getElementById('home-panel').style.display = 'none';
  document.getElementById('doc-panel').style.display = 'block';
  document.getElementById('doc-content').innerHTML = marked.parse(DOCS[key]);
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(el => {
    if (el.textContent === displayName(key)) el.classList.add('active');
  });
  document.getElementById('content').scrollTop = 0;
}

function showHome() {
  document.getElementById('home-panel').style.display = 'block';
  document.getElementById('doc-panel').style.display = 'none';
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.getElementById('content').scrollTop = 0;
}

// Init
const keys = Object.keys(DOCS).sort();
const groups = groupFiles(keys);
const meta = DOCS['METADATA'] ? parseMeta(DOCS['METADATA']) : {};
buildNav(groups);
buildHome(groups, meta);
</script>
