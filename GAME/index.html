const DOCS = {
  "09-SERVICE-SCRIPT-STANDARDS": "# Feature: Service Script Standards (bin/ Contract)\n\n**spec_v3 \u00b7 2026-03-10**\n\n---\n\n## Purpose\n\nThe Service Script Standards define the contract that project shell scripts must follow\nto be automatically discovered and registered as operations in GAME. Any script that\nfollows the contract becomes a clickable button with zero additional configuration.\n\n---\n\n## User Interactions\n\n- Project maintainers write bin/ scripts with standard headers\n- GAME discovers and registers them automatically on scan (no UI needed)\n- Registered operations appear as buttons in the CONTROL-PANEL\n- Users can see operation name, category, and declared port in the UI\n\n---\n\n## UI Screens\n\nNo dedicated UI screen \u2014 this is a contract specification, not a UI feature.\n\nDiscovery results are surfaced through CONTROL-PANEL (buttons) and PROJECT-DISCOVERY\n(compliance indicators).\n\n---\n\n## Inputs & Outputs\n\n- **Inputs:**\n  - Shell script files located in `bin/` within any project directory\n- **Outputs:**\n  - Operation registry entries (name, category, command path, declared port)\n  - Consumed by OPERATIONS-ENGINE and CONTROL-PANEL\n\n---\n\n## Interfaces With\n\n- PROJECT-DISCOVERY: reads bin/ headers during scan; produces operation registry\n- OPERATIONS-ENGINE: uses registered command path to execute the operation\n- CONTROL-PANEL: displays operation buttons derived from the registry\n- MONITORING-HEARTBEATS: uses declared port for health checks\n\n---\n\n## Contracts\n\n### The CommandCenter Operation Header\n\nAny bash script in a project's `bin/` directory that includes a `CommandCenter Operation`\nmarker in the first 20 lines is registered as an operation.\n\n**Required fields:**\n```bash\n#!/bin/bash\n# CommandCenter Operation\n# Name: [Human-readable operation name]\n```\n\n**Optional fields:**\n```bash\n# Port: [integer]        \u2190 declared service port; used for health checks and display\n# Category: [local|remote]  \u2190 defaults to \"local\" if omitted\n```\n\n**Complete example:**\n```bash\n#!/bin/bash\n# CommandCenter Operation\n# Name: Service Start\n# Port: 8000\n# Category: local\n\nsource venv/bin/activate\n./run_server.sh --port 8000\n```\n\n### Rules\n\n1. The `CommandCenter Operation` marker must appear within the first 20 lines.\n2. `Name:` is required. Scripts without a Name: are ignored.\n3. All other fields are optional.\n4. The script is run from the project's root directory (not from `bin/`).\n5. Scripts without the marker are valid shell scripts but are not registered with GAME.\n6. A project may have any number of registered operations.\n7. The command path registered is relative to the project root (e.g., `bin/start.sh`).\n\n### Naming Conventions (recommended, not enforced)\n\n| Script name | Typical purpose |\n|-------------|----------------|\n| `bin/start.sh` | Start development server |\n| `bin/stop.sh` | Stop development server |\n| `bin/build.sh` | Run build pipeline |\n| `bin/test.sh` | Run test suite |\n| `bin/deploy.sh` | Deploy to production |\n\n### Platform Notes\n\nScripts must be valid bash scripts (WSL/Linux bash). Windows `.bat` or PowerShell\nscripts are not currently supported.\n\nScripts should be executable (`chmod +x`). GAME will attempt to run them directly;\npermission errors are surfaced in the process log.\n\n---\n\n## State Machine\n\nNot applicable \u2014 this is a static contract, not a stateful process.\n\n---\n\n## Out of Scope\n\n- Executing scripts \u2192 OPERATIONS-ENGINE\n- Displaying buttons \u2192 CONTROL-PANEL\n- Health checking using declared ports \u2192 MONITORING-HEARTBEATS\n- Non-bash script types \u2192 not planned\n",
  "10-PROJECT-METADATA-STANDARDS": "# Project Metadata Standards\n\n**spec_v5 \u00b7 2026-03-13**\n\n---\n\n## Purpose\n\nDefines the single file a project uses to describe itself to the platform and to the AI development environment. All project identity, portfolio card, service links, and discovery metadata live in one place.\n\n---\n\n## The Consolidated Contract: METADATA.md\n\n**Location:** Project root (`METADATA.md`)\n**Replaces:** `git_homepage.md`, `Links.md`, `STACK.yaml` (those files are deprecated)\n\n```\nname: MyProject\ntitle: My Project \u2014 Short Tagline\ndescription: One to two sentence description of what this project does.\nport: 8000\nstatus: ACTIVE\nversion: 1.0\nupdated: 2026-03-13\nstack: Python/Flask/SQLite\nimage: images/myproject.webp\nhealth: /health\nshow_on_homepage: true\ntags: web, tool, api\nlinks:\n    Production  | https://myproject.example.com | Live site\n    Docs        | https://docs.example.com       | API documentation\n    Staging     | https://staging.example.com    | Pre-production\n```\n\n---\n\n## Field Reference\n\n| Field | Required At | Purpose |\n|-------|------------|---------|\n| `name` | All statuses | Machine name (no spaces) |\n| `status` | All statuses | Lifecycle stage: IDEA, PROTOTYPE, ACTIVE, PRODUCTION, ARCHIVED |\n| `title` | PROTOTYPE+ | Display name with short tagline |\n| `description` | PROTOTYPE+ | One to two sentences for portfolio card and dashboard |\n| `port` | ACTIVE+ | Primary port the service listens on |\n| `stack` | ACTIVE+ | Short technology summary (e.g. `Python/Flask/SQLite`) |\n| `version` | ACTIVE+ | Semantic version |\n| `updated` | ACTIVE+ | ISO date of last meaningful change |\n| `tags` | ACTIVE+ | Comma-separated tags for dashboard filtering and portfolio badges |\n| `show_on_homepage` | ACTIVE+ | `true` = include in published portfolio |\n| `image` | Optional | Relative path to portfolio card image |\n| `health` | PRODUCTION | Health check endpoint path (e.g. `/health`) |\n| `links` | Optional | Pipe-separated table: `Name | URL | Notes` |\n\n---\n\n## Status Values\n\n| Status | Meaning |\n|--------|---------|\n| `IDEA` | Concept only \u2014 no code expected |\n| `PROTOTYPE` | Proof of concept \u2014 not stable |\n| `ACTIVE` | Actively developed and in use |\n| `PRODUCTION` | Stable, deployed, monitored |\n| `ARCHIVED` | No longer maintained |\n\nThe compliance verifier (`verify.py`) uses status to determine which rules to enforce. IDEA projects are not penalized for missing bin/ scripts or CLAUDE.md. PRODUCTION projects are checked for health endpoints, git compliance, and clean environment handling.\n\n---\n\n## CLAUDE.md \u2014 AI Context File\n\n**Location:** Project root (`CLAUDE.md`)\n**Required at:** PROTOTYPE and above\n\nProvides working context to the AI assistant. Standard sections parsed by the platform:\n\n```markdown\n# Project Title\nOne paragraph description.\n\n## Dev Commands\n- Start: `./bin/start.sh`\n- Test: `./bin/test.sh`\n\n## Service Endpoints\n- Local: http://localhost:8000\n\n## Bookmarks\n### Useful Links\n- [Production](https://...)\n```\n\nSections `## Dev Commands`, `## Service Endpoints`, and `## Bookmarks` are required at ACTIVE and above.\n\n---\n\n## Deprecated Files\n\nThese files were used in earlier versions of the platform. Their fields have been merged into `METADATA.md`. Do not create them for new projects. Migrate existing projects and delete the originals.\n\n| Deprecated File | Replaced By |\n|----------------|-------------|\n| `git_homepage.md` | `title`, `description`, `tags`, `image`, `show_on_homepage` in METADATA.md |\n| `Links.md` | `links:` block in METADATA.md |\n| `STACK.yaml` | `stack:` field in METADATA.md |\n\n---\n\n## Interfaces With\n\n- **PROJECT-DISCOVERY**: reads METADATA.md on every scan\n- **CONTROL-PANEL**: displays title, status, tags, links from METADATA.md\n- **GITHUB-PUBLISHER**: reads `show_on_homepage`, `title`, `description`, `tags`, `image` for portfolio cards\n- **COMPLIANCE-VERIFICATION** (`verify.py`): checks field presence and value validity per status level\n",
  "15-FEATURE-INTERRELATIONSHIP-MAP": "# Feature: Interrelationship Map\n\n**spec_v3 \u00b7 2026-03-10**\n\n---\n\n## Purpose\n\nThis document summarizes the dependencies between all spec_v3 features \u2014 which features\nproduce data that other features consume, and which features trigger or are triggered by\nother features. Use this as the entry point when adding a new feature or debugging an\nunexpected interaction.\n\n---\n\n## Dependency Graph\n\n```\nPROJECT-METADATA-STANDARDS \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510\nSERVICE-SCRIPT-STANDARDS   \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2524\n                                                   \u2193\n                                         PROJECT-DISCOVERY\n                                                   \u2502\n                          \u250c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2524\n                          \u2502                        \u2502\n                          \u2193                        \u2193\n                   CONTROL-PANEL           GITHUB-PUBLISHER\n                          \u2502                        \u2191\n                          \u2502                        \u2502\n               \u250c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u253c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510   git_site_config.md\n               \u2502          \u2502              \u2502   git_homepage.md\n               \u2193          \u2193              \u2193\n     OPERATIONS-ENGINE  WORKFLOW-   TAG-MANAGEMENT\n               \u2502         STATES\n               \u2193\n       PROCESS-MONITOR\n               \u2502\n               \u2193\n      MONITORING-HEARTBEATS\n```\n\n---\n\n## Feature-by-Feature Dependency Table\n\n| Feature | Reads From | Writes To / Triggers |\n|---------|------------|----------------------|\n| **SERVICE-SCRIPT-STANDARDS** | bin/*.sh files | Operation registry (\u2192 PROJECT-DISCOVERY) |\n| **PROJECT-METADATA-STANDARDS** | CLAUDE.md, git_homepage.md, Links.md | Parsed metadata (\u2192 PROJECT-DISCOVERY) |\n| **PROJECT-DISCOVERY** | Filesystem, SERVICE-SCRIPT-STANDARDS, PROJECT-METADATA-STANDARDS, GIT-INTEGRATION | Project store, operation registry (\u2192 CONTROL-PANEL, OPERATIONS-ENGINE, GITHUB-PUBLISHER) |\n| **CONTROL-PANEL** | PROJECT-DISCOVERY, OPERATIONS-ENGINE, PROCESS-MONITOR, WORKFLOW-STATES, TAG-MANAGEMENT | Launch requests (\u2192 OPERATIONS-ENGINE), state changes (\u2192 WORKFLOW-STATES) |\n| **OPERATIONS-ENGINE** | CONTROL-PANEL (launch request), PROJECT-DISCOVERY (operation registry) | Process handle (\u2192 PROCESS-MONITOR), run records |\n| **PROCESS-MONITOR** | OPERATIONS-ENGINE (process handles), log files | Stop signals (\u2192 OPERATIONS-ENGINE), status summary (\u2192 CONTROL-PANEL nav bar) |\n| **WORKFLOW-STATES** | User input, USAGE-ANALYTICS | Current ticket state (\u2192 CONTROL-PANEL) |\n| **GITHUB-PUBLISHER** | PROJECT-DISCOVERY (git_homepage.md data), PROJECT-METADATA-STANDARDS | Static site files, published portfolio |\n| **TAG-MANAGEMENT** | User input | Tag assignments, tag colors (\u2192 CONTROL-PANEL) |\n| **CONFIGURATION-MANAGEMENT** | Profile YAML files, PROJECT-DISCOVERY (CLAUDE.md) | AI config files, staged configs (\u2192 GIT-INTEGRATION) |\n| **USAGE-ANALYTICS** | AI session JSONL logs | Usage summary (\u2192 CONTROL-PANEL nav bar), cost data (\u2192 WORKFLOW-STATES) |\n| **GIT-INTEGRATION** | Filesystem git state | Per-project git status (\u2192 CONTROL-PANEL), staging area (\u2192 CONFIGURATION-MANAGEMENT) |\n| **MONITORING-HEARTBEATS** | SERVICE-SCRIPT-STANDARDS (declared ports), PROCESS-MONITOR (running processes) | Health status (\u2192 CONTROL-PANEL), alert events |\n\n---\n\n## Core Contract Chain\n\nThe most important chain in the system \u2014 from project file to UI button:\n\n```\nDeveloper writes bin/start.sh with CommandCenter header\n  \u2193\nSERVICE-SCRIPT-STANDARDS defines the header format\n  \u2193\nPROJECT-DISCOVERY reads the header, creates operation registry entry\n  \u2193\nCONTROL-PANEL renders the \"Service Start\" button\n  \u2193\nUser clicks \u2192 OPERATIONS-ENGINE launches bin/start.sh\n  \u2193\nPROCESS-MONITOR streams the log\n  \u2193\nMONITORING-HEARTBEATS polls localhost:PORT for health\n```\n\nBreaking this chain at any point (wrong header format, wrong port, script not\nexecutable) causes the button to be missing or the health check to fail silently.\n\n---\n\n## Portfolio Publication Chain\n\n```\nDeveloper edits git_homepage.md with Show on Homepage: true\n  \u2193\nPROJECT-METADATA-STANDARDS defines the file format\n  \u2193\nPROJECT-DISCOVERY reads git_homepage.md on next scan\n  \u2193\nGITHUB-PUBLISHER reads discovered card data\n  \u2193\nUser clicks \"Rebuild Site\" \u2192 static site generated\n  \u2193\nUser clicks \"Push to GitHub Pages\" \u2192 portfolio live\n```\n\n---\n\n## AI Workflow Chain\n\n```\nUser creates feature ticket in WORKFLOW-STATES\n  \u2193\nTicket moves IDEA \u2192 PROPOSED (user adds plan)\n  \u2193\nTicket moves PROPOSED \u2192 READY (user adds acceptance criteria)\n  \u2193\nUSAGE-ANALYTICS confirms cost within budget\n  \u2193\nTicket moves READY \u2192 IN DEVELOPMENT (AI session begins)\n  \u2193\nAI session writes transaction log (acceptance criteria, features, intent)\n  \u2193\nTicket moves IN DEVELOPMENT \u2192 TESTING (AI session complete)\n  \u2193\nHuman validates \u2192 DONE (or back to READY / PROPOSED)\n```\n\n---\n\n## Features With No Outbound Dependencies\n\nThese features only consume; nothing reads from them:\n- GITHUB-PUBLISHER (endpoint: published portfolio, external)\n- USAGE-ANALYTICS report (HTML artifact, not consumed by other features)\n\n---\n\n## Contracts That Cross Multiple Features\n\n| Contract | Defined In | Consumed By |\n|----------|------------|-------------|\n| CommandCenter Operation bin/ header | SERVICE-SCRIPT-STANDARDS | PROJECT-DISCOVERY, OPERATIONS-ENGINE, MONITORING-HEARTBEATS |\n| git_homepage.md format | PROJECT-METADATA-STANDARDS | PROJECT-DISCOVERY, GITHUB-PUBLISHER |\n| CLAUDE.md format | PROJECT-METADATA-STANDARDS | PROJECT-DISCOVERY, CONTROL-PANEL, CONFIGURATION-MANAGEMENT |\n| git_site_config.md format | PROJECT-METADATA-STANDARDS (see GITHUB-PUBLISHER) | GITHUB-PUBLISHER |\n| Tag color JSON | TAG-MANAGEMENT | CONTROL-PANEL |\n| AI session JSONL log format | USAGE-ANALYTICS (read contract) | USAGE-ANALYTICS only |\n| AI transaction log format | WORKFLOW-STATES | WORKFLOW-STATES only |\n\n---\n\n## Implementation Priority (suggested)\n\nBased on dependencies \u2014 features with no upstream dependencies should be implemented first:\n\n1. SERVICE-SCRIPT-STANDARDS, PROJECT-METADATA-STANDARDS (contracts only, no code)\n2. PROJECT-DISCOVERY (reads contracts; foundation for everything)\n3. CONTROL-PANEL, OPERATIONS-ENGINE, PROCESS-MONITOR (core loop)\n4. GIT-INTEGRATION, TAG-MANAGEMENT, USAGE-ANALYTICS (enrichment)\n5. GITHUB-PUBLISHER, CONFIGURATION-MANAGEMENT (specialized pipelines)\n6. WORKFLOW-STATES (complex lifecycle; roadmap)\n7. MONITORING-HEARTBEATS (polling daemon; roadmap)\n",
  "CONFIGURATION-MANAGEMENT": "# Feature: Configuration Management\n\n**spec_v4 \u00b7 2026-03-11**\n\n---\n\n## Purpose\n\nManages the AI assistant's working configuration. The user selects a profile; the\nplatform deploys it to the AI's config directory. Past deployments are versioned in\ngit so any configuration can be rolled back.\n\n---\n\n## What the User Can Do\n\n- Select a configuration profile and deploy it\n- Preview what a profile will change before deploying\n- Roll back to a previous deployment\n- Create and edit profiles\n- Generate a project-specific AI context file from a profile\n\n---\n\n## Screens\n\n### Configuration Page\n\nThree sections:\n\n**Active Profile:** Current profile name and deploy time. Deploy button per profile.\nDiff view showing what will change.\n\n**Profile Library:** List of profiles with names and descriptions. Edit and New buttons.\n\n**Deployment History:** Table of past deployments with rollback button per row.\n\n---\n\n## How It Works\n\n1. User selects a profile\n2. Platform generates config files from the YAML profile\n3. Generated files are written to a staging directory (committed to git)\n4. Files are copied from staging to the AI assistant's live config directory\n\nRollback: copy staged files from a past deployment back to live config. Record the\nrollback as a new staging commit.\n\n---\n\n## Persistence\n\n**Profiles** are stored as YAML files in the platform's `config_engine/profiles/`\ndirectory. Committed to git.\n\n**Staged configs** are stored in `config_engine/staged/`. Committed to git after each\ndeployment. This git history is the rollback store.\n\n**Live configs** are written to the AI assistant's config directory (outside this\nrepo). Not committed.\n\n---\n\n## Out of Scope\n\n- Managing CLAUDE.md in individual projects \u2192 that is the project's own contract file\n- Per-project AI sessions \u2192 external\n",
  "CONTROL-PANEL": "# Feature: Control Panel\n\n**spec_v4 \u00b7 2026-03-11**\n\n---\n\n## Purpose\n\nThe main dashboard. Shows every discovered project in one view with its current state,\navailable operations, and key metadata. All common actions happen here without navigating\naway.\n\n---\n\n## What the User Can Do\n\n- See all projects at a glance\n- See each project's workflow state, type, tags, stack, and running status\n- Launch any operation with one click\n- Change a project's workflow state inline (no page reload)\n- Change a project's type inline\n- Navigate to a project's detail view\n- Filter the list by state, type, or tag\n- Trigger a rescan of the projects directory\n\n---\n\n## Screens\n\n### Projects List\n\nFull-width table or card grid. One row per project.\n\nEach row shows:\n- Project name\n- Type badge and workflow state badge\n- Tags (colored)\n- Stack summary\n- Running / idle indicator\n- Operation buttons (one per registered script)\n- Quick links (from CLAUDE.md bookmarks and Links.md)\n\nInline actions: workflow state dropdown, type selector, operation buttons.\n\n### Project Detail\n\nSingle-project view with full information:\n- All operations with descriptions and run status\n- All endpoints and bookmarks\n- Stack and git status\n- Feature tickets (when WORKFLOW-STATES is built)\n- Raw CLAUDE.md content (expandable)\n\n### Nav Bar (all pages)\n\nShows count of currently running processes. Links to the Process Monitor.\n\n---\n\n## Data In / Out\n\n**Reads from:**\n- PROJECT-DISCOVERY: all project records\n- OPERATIONS-ENGINE: current run status per operation\n- PROCESS-MONITOR: running process count for nav bar\n- TAG-MANAGEMENT: tag assignments and colors\n\n**Writes to:**\n- OPERATIONS-ENGINE: operation launch requests\n- Workflow state store: state change on inline edit\n- Project type store: type change on inline edit\n\n---\n\n## Contracts Used\n\n- **Operations Contract** (THE-CONTRACT.md \u00a71): operation buttons are derived from bin/ headers\n- **AI Context Contract** (THE-CONTRACT.md \u00a73): endpoint and bookmark links come from CLAUDE.md\n- **Links Contract** (THE-CONTRACT.md \u00a75): quick links come from Links.md\n\n---\n\n## Out of Scope\n\n- Running scripts \u2192 OPERATIONS-ENGINE\n- Viewing logs \u2192 PROCESS-MONITOR\n- Publishing portfolio \u2192 GITHUB-PUBLISHER\n- Managing tags \u2192 TAG-MANAGEMENT\n",
  "GIT-INTEGRATION": "# Feature: Git Integration\n\n**spec_v4 \u00b7 2026-03-11**\n\n---\n\n## Purpose\n\nSurfaces each project's git status in the dashboard and flags projects that are not\nfollowing git conventions. The platform reads git state \u2014 it never modifies it.\n\n---\n\n## What the User Can Do\n\n- See at a glance which projects have uncommitted changes\n- See which projects have unpushed commits\n- See current branch per project\n- See whether git is initialized at all\n- See governance compliance (git rules pass/fail)\n\n---\n\n## Screens\n\n### Git Status (inline, Control Panel)\n\nPer-project row:\n- Git initialized: yes / no\n- Current branch\n- Uncommitted changes count\n- Unpushed commits count\n- Last commit message (truncated) and time\n\n### Governance Checklist (within Project Detail)\n\nPass/fail list of git governance rules:\n- Git initialized\n- Remote configured\n- No long-lived uncommitted changes\n- Has pushed recently\n\n---\n\n## How It Works\n\nGit status is read during each discovery scan by running standard git commands in each\nproject directory. The platform does not modify any project's git state.\n\n---\n\n## Governance Rules\n\nRules are advisory \u2014 they show warnings, they do not block anything.\n\nStandard rules:\n- Git must be initialized\n- A remote must be configured\n- Working tree should not be dirty for an extended period\n\nCustom rules per project: [TBD] \u2014 may be declared in STACK.yaml.\n\n---\n\n## Out of Scope\n\n- Performing git operations (commit, push, merge) on behalf of the user \u2192 not planned\n- Branch management UI \u2192 not planned\n- CI/CD pipeline integration \u2192 not planned\n",
  "GITHUB-PUBLISHER": "# Feature: GitHub Publisher\n\n**spec_v4 \u00b7 2026-03-11**\n\n---\n\n## Purpose\n\nGenerates and publishes a professional portfolio website to GitHub Pages from the\nmetadata already in each project's `git_homepage.md`. No manual content management.\n\n---\n\n## What the User Can Do\n\n- Rebuild the portfolio site with one click\n- Preview it locally before publishing\n- Push it live with one click\n- Configure site-wide branding (name, tagline, home page text)\n- Show or hide individual projects from the portfolio\n\n---\n\n## Screens\n\n### Publisher Dashboard\n\nThree sections:\n\n**Build:** Rebuild button, last build timestamp and status, error output if failed.\n\n**Preview:** Start/stop local preview server, preview URL when running.\n\n**Publish:** Push to GitHub Pages button, last publish time, link to live site.\n\n---\n\n## How It Works\n\n1. Read site branding from `git_site_config.md` in the platform's own directory\n2. Scan all projects for `git_homepage.md` where `Show on Homepage: true`\n3. For each: parse card fields, resolve image paths\n4. Generate static site source files:\n   - Site config\n   - Projects page (card grid)\n   - Home page (branding + markdown body)\n   - Resume page (from static CV file)\n5. Build the static site\n6. Preview or publish\n\n---\n\n## Persistence\n\n**Site branding** is stored in `git_site_config.md` at the platform root.\n**Project card data** is stored in each project's `git_homepage.md`.\n\nNeither file is owned by the platform. The user edits them directly; the publisher reads them.\n\n---\n\n## Contracts Used\n\n- **Portfolio Contract** (THE-CONTRACT.md \u00a72): reads `git_homepage.md` from every project\n- **AI Context Contract** (THE-CONTRACT.md \u00a73): `git_site_config.md` follows similar frontmatter conventions\n\n---\n\n## Data In / Out\n\n**Reads:** git_homepage.md from all projects, git_site_config.md, card images, CV source file\n\n**Writes:** Static site source files, built site, published site (git push)\n\n---\n\n## Out of Scope\n\n- Editing card content directly in the UI \u2192 edit git_homepage.md in the project\n- Dynamic (server-rendered) portfolio \u2192 static only\n- Custom page templates beyond home/projects/resume \u2192 not planned\n",
  "METADATA": "name: GAME\ntitle: GAME \u2014 Project Management Dashboard\ndescription: Discovers local projects via filesystem contracts, provides a control panel for operations, process monitoring, portfolio publishing, and AI workflow management.\nport: 5001\nstatus: active\nversion: 4.0\nupdated: 2026-03-13\n",
  "MONITORING-HEARTBEATS": "# Feature: Monitoring & Heartbeats\n\n**spec_v4 \u00b7 2026-03-11 \u00b7 [ROADMAP]**\n\n---\n\n## Purpose\n\nPolls running services and tells the user when something goes down. Closes the loop\nbetween \"I started the server\" and \"the server is actually healthy.\"\n\n---\n\n## What the User Can Do\n\n- See health status (UP / DOWN / UNKNOWN) per service in the dashboard\n- Get notified when a service goes down or comes back up\n- View health history: uptime %, recent incidents\n- Silence alerts temporarily for a project\n\n---\n\n## Screens\n\n### Health Indicators (inline, Control Panel)\n\nPer-project: health badge (UP green / DOWN red / UNKNOWN gray), last checked time,\nresponse time.\n\n### Monitoring Dashboard\n\nTable of all monitored services: project, endpoint, status, last checked, response time,\nuptime %. Incident log below.\n\n### Alert Notification (in-UI)\n\nBanner or toast when a service changes state. Links to the project and its log.\n\n---\n\n## How It Works\n\nThe platform polls each service that has declared a port in its bin/ header. A\nsuccessful HTTP response to the declared endpoint = UP. Connection refused, timeout,\nor error response = DOWN.\n\nPort and health path come from the Operations Contract (THE-CONTRACT.md \u00a71).\n\n---\n\n## Alert Channels\n\nInitial: in-UI notification only.\nFuture: webhook, email, OS notification. [TBD]\n\n---\n\n## States\n\n```\nUNKNOWN \u2192 UP \u2192 DOWN \u2192 UP  (with alert on each transition)\n                    \u2192 SNOOZED (alerts suppressed; still polled)\n```\n\n---\n\n## Out of Scope\n\n- Automatic restart on failure \u2192 possible future integration with OPERATIONS-ENGINE\n- External (cloud-hosted) service monitoring \u2192 not planned\n- Performance benchmarking \u2192 out of scope\n",
  "OPERATIONS-ENGINE": "# Feature: Operations Engine\n\n**spec_v4 \u00b7 2026-03-11**\n\n---\n\n## Purpose\n\nRuns a project's registered scripts on demand. A user clicks a button; the engine\nlaunches the script, captures its output, and reports status back to the dashboard.\n\n---\n\n## What the User Can Do\n\n- Click an operation button to run it\n- See immediate feedback that it started\n- Stop a running operation\n- View run history for a project\n\n---\n\n## Screens\n\n### Operation Buttons (inline, within Control Panel / Project Detail)\n\nOne button per registered operation. Button label = operation name from the bin/ header.\n\nButton states: idle / running / error / done.\n\nClicking a running operation navigates to its live log in PROCESS-MONITOR.\n\n### Run History (within Project Detail)\n\nTable of past runs: operation name, start time, duration, exit status, link to log.\n\n---\n\n## How It Works\n\n1. User clicks a button\n2. Engine looks up the script path from the operation registry\n3. Script is launched as a background process from the project's root directory\n4. stdout and stderr are written to a log file (see LOGGING.md for naming)\n5. Run record is created: start time, PID, status\n6. Status updates as the script emits `[GAME]` status lines (see LOGGING.md)\n7. On exit, final status is recorded\n\n---\n\n## Run States\n\n```\nIDLE \u2192 STARTING \u2192 RUNNING \u2192 DONE\n                          \u2192 ERROR\n                          \u2192 STOPPED (user stopped it)\n```\n\n---\n\n## Data In / Out\n\n**Reads:**\n- Operation registry from PROJECT-DISCOVERY (script path, name, port)\n- Launch requests from CONTROL-PANEL\n\n**Writes:**\n- Running process handle \u2192 PROCESS-MONITOR\n- Run record (start, status, exit code, log path)\n\n---\n\n## Contracts Used\n\n- **Operations Contract** (THE-CONTRACT.md \u00a71): script path and metadata come from bin/ header\n- **Logging** (LOGGING.md): log file written per run; `[GAME]` lines parsed for status\n\n---\n\n## Out of Scope\n\n- Viewing logs \u2192 PROCESS-MONITOR\n- Health polling \u2192 MONITORING-HEARTBEATS\n- Scheduling operations \u2192 not planned\n",
  "PROCESS-MONITOR": "# Feature: Process Monitor\n\n**spec_v4 \u00b7 2026-03-11**\n\n---\n\n## Purpose\n\nShows the user what is running, what ran, and what the output was. The live log viewer\nand process control panel for everything the platform executes.\n\n---\n\n## What the User Can Do\n\n- See all currently running processes\n- See live log output for any running process\n- Stop a running process\n- See logs for completed past runs\n- Know which project and operation each process belongs to\n\n---\n\n## Screens\n\n### Process List\n\nFull-width list; most recent at top.\n\nPer row: project name, operation name, status badge (RUNNING / DONE / ERROR / STOPPED),\nstart time, duration, View Log button, Stop button (when running).\n\n### Log Viewer\n\nMonospace output area. Auto-scrolls while the process is running. Stops updating on exit.\n\nHeader: project name, operation name, status, start time.\n\nControls: Stop button (if running), Back to Processes link.\n\n---\n\n## Data In / Out\n\n**Reads:**\n- Process handles from OPERATIONS-ENGINE\n- Log files written by operations\n\n**Writes:**\n- Stop signal \u2192 running process\n- Updated status (STOPPED) \u2192 reflected in CONTROL-PANEL nav bar\n\n---\n\n## Contracts Used\n\n- **Logging** (LOGGING.md): reads log files by naming convention; parses `[GAME]` lines for\n  live status updates\n\n---\n\n## Out of Scope\n\n- Launching operations \u2192 OPERATIONS-ENGINE\n- Health polling \u2192 MONITORING-HEARTBEATS\n",
  "PROJECT-DISCOVERY": "# Feature: Project Discovery\n\n**spec_v4 \u00b7 2026-03-11**\n\n---\n\n## Purpose\n\nFinds all projects on the filesystem and registers their capabilities with the platform.\nNo manual setup. A project that follows the contracts is automatically discovered and\nsurfaced in the dashboard.\n\n---\n\n## What the User Can Do\n\n- Projects appear automatically after a scan\n- Trigger a manual rescan at any time\n- See which contracts each project has implemented (compliance summary)\n- See when the last scan ran\n\n---\n\n## How Discovery Works\n\nThe platform scans a single root directory. Every subdirectory is a candidate project.\n\nFor each project directory:\n1. Derive the display name from the directory name (CamelCase \u2192 spaced words)\n2. Read each contract file if present \u2014 CLAUDE.md, git_homepage.md, Links.md, STACK.yaml\n3. Read all bin/ scripts for CommandCenter headers\n4. Read git status\n5. Upsert the project record and its capabilities\n\nA missing contract file is not an error \u2014 it produces a compliance gap, shown in the dashboard.\n\n### Name Derivation\n\n| Directory Name | Display Title |\n|---------------|--------------|\n| `MyProject` | My Project |\n| `GAME` | GAME |\n| `my-tool` | my tool |\n| `conquer_2026` | Conquer 2026 |\n\n### Scan Triggers\n\n- On platform startup\n- On user request (Rescan button)\n\nProjects no longer found on disk are marked inactive \u2014 not deleted.\n\n---\n\n## Data Produced\n\n| Data | Consumed By |\n|------|-------------|\n| Project records | CONTROL-PANEL |\n| Operation registry (from bin/ headers) | OPERATIONS-ENGINE, CONTROL-PANEL |\n| Endpoints and bookmarks (from CLAUDE.md) | CONTROL-PANEL |\n| Card metadata (from git_homepage.md) | GITHUB-PUBLISHER |\n| Links (from Links.md) | CONTROL-PANEL |\n| Git status | CONTROL-PANEL, GIT-INTEGRATION |\n| Compliance flags | CONTROL-PANEL |\n\n---\n\n## Contracts Read\n\nAll five contracts defined in THE-CONTRACT.md are read during discovery.\n\n---\n\n## Out of Scope\n\n- Displaying projects \u2192 CONTROL-PANEL\n- Executing operations \u2192 OPERATIONS-ENGINE\n- Publishing portfolio \u2192 GITHUB-PUBLISHER\n",
  "PROJECT-DOCUMENTATION": "# Feature: Project Documentation\n\n**spec_v4 \u00b7 2026-03-11**\n\n---\n\n## Purpose\n\nEvery project can publish a self-contained documentation site. When a project has a\n`docs/` directory containing `index.html`, the platform automatically includes it in\nthe GitHub Pages portfolio build \u2014 copying it to a standard location where it can be\nbrowsed without any server.\n\n---\n\n## What the User Can Do\n\n- Browse any project's documentation at a stable URL on the portfolio site\n- See a \"Documentation \u2197\" link on the project's portfolio card (when docs exist)\n- Regenerate a project's documentation by running `bin/build_documentation.sh`\n- Update documentation content by editing markdown files and rebuilding\n\n---\n\n## Screens\n\n### Portfolio Card (modified)\n\nWhen a project has `docs/index.html`, the card on the projects page gains an additional\nbutton: **Documentation \u2197** \u2014 links to the docs URL on the portfolio site.\n\nThe existing \"View Project \u2197\" button (from `card_url` in git_homepage.md) is unaffected.\n\n---\n\n## How It Works\n\nDuring the portfolio rebuild (`bin/RebuildYourHomepage.sh`):\n\n1. The publisher scans each project directory for `docs/index.html`\n2. If found, the entire `docs/` directory is copied to `My_Github/public/project-docs/{project-name}/`\n3. The project card is rendered with a Documentation link pointing to `/project-docs/{project-name}/`\n4. The static site build includes the copied files as static assets\n\nThe documentation is served at:\n```\nhttps://{github-username}.github.io/project-docs/{project-name}/\n```\n\n---\n\n## The Standard: Project Documentation Contract\n\n**File:** `docs/index.html` at the project root\n**What you get:** Documentation link on the portfolio card; documentation browsable on the live site\n\n### Requirements\n\n1. `docs/index.html` must exist and be a valid standalone HTML file\n2. The file must work when opened directly (no server fetch required)\n3. All assets (CSS, JS, images) must be embedded inline or relative-path referenced\n   within the `docs/` directory \u2014 no external dependencies that won't resolve on GitHub Pages\n\n### Generating docs/index.html\n\nThe standard mechanism is `bin/build_documentation.sh` \u2014 a CommandCenter Operation\nthat generates `docs/index.html` from the project's source documentation.\n\nFor GAME, `build_documentation.sh` calls `docs/rebuild_index.sh`, which embeds all\nmarkdown specification files into a self-contained HTML viewer.\n\nFor other projects, `build_documentation.sh` might:\n- Convert markdown files to a styled HTML page\n- Package API documentation\n- Render a project overview from CLAUDE.md + git_homepage.md\n\nThe implementation is the project's choice. The contract is only that\n`docs/index.html` exists and works standalone.\n\n### What build_documentation.sh Should Do\n\nAs a CommandCenter Operation, `bin/build_documentation.sh` must:\n\n- Include the CommandCenter Operation header (see SERVICE-SCRIPT-STANDARDS / THE-CONTRACT \u00a71)\n- Emit `[GAME] Service Starting/Stopped` messages (see LOGGING.md)\n- Write its output to `docs/index.html`\n- Exit 0 on success, non-0 on failure\n\n---\n\n## Persistence\n\n`docs/index.html` is committed to the project's git repository. It is both source\nand output \u2014 the generated artifact is version-controlled alongside the markdown sources.\n\nThe `docs/` directory in `My_Github/public/project-docs/` is derived \u2014 it is\noverwritten on every portfolio rebuild and should not be edited there directly.\n\n---\n\n## Data In / Out\n\n**Inputs:**\n- `docs/index.html` in each project directory (detected by publisher)\n\n**Outputs:**\n- `My_Github/public/project-docs/{name}/` \u2014 copied docs tree\n- Documentation link on the portfolio card\n\n---\n\n## Contracts Used\n\n- **Operations Contract** (THE-CONTRACT.md \u00a71): `bin/build_documentation.sh` uses\n  the CommandCenter header\n- **Logging** (LOGGING.md): build script emits status messages\n- **Portfolio Contract** (THE-CONTRACT.md \u00a72): publisher reads project dirs during rebuild\n\n---\n\n## Out of Scope\n\n- Hosting documentation separately from the GitHub Pages portfolio \u2192 not planned\n- Auto-generating documentation without `build_documentation.sh` \u2192 always requires explicit build\n- Documentation versioning \u2192 out of scope; git history of `docs/` serves this purpose\n",
  "README": "# GAME \u2014 Project Management Dashboard\n\n**Status**: Specification v4 | **Updated**: 2026-03-13\n\nDiscovers local projects via filesystem contracts and provides a unified dashboard for operations, monitoring, publishing, and AI-assisted development workflows.\n\n---\n\n# Catalog\n\n## Feature Specifications\n\n| File | Description |\n|------|-------------|\n| `CONTROL-PANEL.md` | Main dashboard \u2014 project list, status, inline actions, operation buttons |\n| `PROJECT-DISCOVERY.md` | Filesystem scanner that auto-registers projects and their capabilities |\n| `OPERATIONS-ENGINE.md` | Runs bin/ scripts on demand, captures output, reports status |\n| `PROCESS-MONITOR.md` | Live log viewer and process control panel |\n| `GIT-INTEGRATION.md` | Per-project git status display and governance checks |\n| `GITHUB-PUBLISHER.md` | Generates and publishes a GitHub Pages portfolio from project metadata |\n| `PROJECT-DOCUMENTATION.md` | Auto-includes project docs/ sites in the portfolio build |\n| `TAG-MANAGEMENT.md` | Visual grouping with colored tags and filtering |\n| `CONFIGURATION-MANAGEMENT.md` | AI assistant config profiles with versioned deployment and rollback |\n| `USAGE-ANALYTICS.md` | Token usage and cost tracking across AI sessions |\n| `MONITORING-HEARTBEATS.md` | Health polling and alerting for running services [ROADMAP] |\n| `WORKFLOW-STATES.md` | Feature ticket lifecycle from IDEA to DONE [ROADMAP] |\n\n## Contract & Standards Specifications\n\n| File | Description |\n|------|-------------|\n| `09-SERVICE-SCRIPT-STANDARDS.md` | The bin/ script header contract \u2014 how scripts register as operations |\n| `10-PROJECT-METADATA-STANDARDS.md` | File contracts: CLAUDE.md, git_homepage.md, Links.md, STACK.yaml |\n| `15-FEATURE-INTERRELATIONSHIP-MAP.md` | Dependency graph showing how all features connect |\n",
  "TAG-MANAGEMENT": "# Feature: Tag Management\n\n**spec_v4 \u00b7 2026-03-11**\n\n---\n\n## Purpose\n\nLightweight visual grouping for projects. Tags have user-defined colors. A project\ncan have multiple tags. The project list is filterable by tag.\n\n---\n\n## What the User Can Do\n\n- Assign tags to projects from the dashboard\n- Create tags on the fly while tagging\n- Edit tag names and colors\n- Delete tags\n- Filter the project list by one or more tags\n\n---\n\n## Screens\n\n### Tag Badges (inline, Control Panel)\n\nColored badge per tag on each project row. Click to filter by that tag.\n\"+\" to add a tag \u2192 dropdown of existing tags + \"New tag\" option.\n\n### Tag Management (settings section)\n\nList of all tags. Per row: color swatch, name, project count, edit, delete.\nNew Tag form: name + color picker. Inline edit.\n\n---\n\n## Persistence\n\nTag color definitions are stored in a user-editable JSON file in the platform's data\ndirectory. This file is committed to the platform's git repository.\n\n```json\n{\n  \"active\": \"#4caf50\",\n  \"paused\": \"#ff9800\",\n  \"published\": \"#2196f3\"\n}\n```\n\nTag-to-project assignments are stored in the platform database. They may optionally\nbe imported from the `Tags` field in a project's `git_homepage.md`.\n\n---\n\n## Out of Scope\n\n- Portfolio card tags \u2192 those are in git_homepage.md; separate from dashboard tags\n- Hierarchical tags \u2192 flat only\n",
  "USAGE-ANALYTICS": "# Feature: Usage Analytics\n\n**spec_v4 \u00b7 2026-03-11**\n\n---\n\n## Purpose\n\nShows the user how much AI work has been done, what it cost, and which projects\nconsumed the most. Enables cost-aware scheduling of AI development (a key input to\nthe WORKFLOW-STATES READY state).\n\n---\n\n## What the User Can Do\n\n- View token usage and estimated cost for today, this week, this month\n- See usage broken down by project\n- View individual session records\n- See a usage summary in the nav bar on every page\n\n---\n\n## Screens\n\n### Usage Dashboard\n\nSummary bar: today's tokens, today's cost, this month's tokens, this month's cost.\n\nBy-project table: project name, sessions today, tokens today, tokens this month,\nestimated cost. Sortable.\n\nSession log: timestamp, project, model, token count, cost. Paginated, most recent first.\n\n### Nav Bar Indicator (all pages)\n\nToday's token count and/or cost. Links to Usage Dashboard.\n\n---\n\n## How It Works\n\nThe platform reads AI session log files written by the AI assistant. It does not\nproduce these files \u2014 it reads them.\n\nLog files are JSONL format, one record per line. The platform extracts: timestamp,\nproject context, token counts, model name.\n\nCost is estimated using a rates table (user-editable, not hardcoded). Estimates are\nlabeled as estimates in the UI.\n\n---\n\n## Persistence\n\nSession log files are not written by this platform \u2014 they are read from the AI\nassistant's own log directory.\n\nThe rates table (model name \u2192 cost per million tokens) is stored as a user-editable\nconfiguration file in the platform's data directory.\n\n---\n\n## Out of Scope\n\n- Billing integration or real-time cost queries from the AI provider \u2192 not planned\n- Per-ticket cost attribution \u2192 possible future integration with WORKFLOW-STATES\n",
  "WORKFLOW-STATES": "# Feature: Workflow States\n\n**spec_v4 \u00b7 2026-03-11 \u00b7 [ROADMAP]**\n\n---\n\n## Purpose\n\nA structured lifecycle for feature development. Each feature ticket moves from first\nidea to done, with the platform prompting the right activities at each stage and\npreserving an audit trail of decisions and AI work.\n\n---\n\n## What the User Can Do\n\n- Create feature tickets for any project\n- Move tickets through states with a clear purpose at each step\n- Attach notes, images, or audio to any ticket at any state\n- See all tickets per project in the dashboard\n- See tickets across all projects in a Kanban view\n\n---\n\n## The States\n\n| State | What It Means |\n|-------|--------------|\n| IDEA | First capture \u2014 incomplete, not yet reviewed |\n| PROPOSED | Has a summary and plan; ready for discussion |\n| READY | Has acceptance criteria; scheduled for AI work |\n| IN DEVELOPMENT | AI session is running or recently finished |\n| TESTING | AI work complete; human validation in progress |\n| DONE | Accepted and complete |\n\n**Note:** The AI development session itself is not a state \u2014 it is work that happens\nbetween READY and TESTING. The ticket enters IN DEVELOPMENT when work begins and moves\nto TESTING when the session ends.\n\n---\n\n## State Transitions\n\n```\nIDEA \u2192 PROPOSED \u2192 READY \u2192 IN DEVELOPMENT \u2192 TESTING \u2192 DONE\n                                  \u2191              |\n                               READY \u2190\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518  (rework: simple)\n                             PROPOSED \u2190\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500  (rework: redesign)\n```\n\n---\n\n## Screens\n\n### Tickets List (within Project Detail)\n\nCompact list grouped by state. Per row: title, state badge, last updated. New Ticket button.\n\n### Ticket Detail\n\n- Title and description\n- Attachments (notes, audio, images)\n- Feature plan (appears at PROPOSED)\n- Acceptance criteria (appears at READY)\n- AI Transaction Log (read-only; populated after IN DEVELOPMENT)\n- Test notes (appears at TESTING)\n- State history timeline\n\n### All-Projects Kanban (separate page)\n\nColumns per state. Cards show project name and ticket title. Filter by project or tag.\n\n---\n\n## The AI Transaction Log\n\nWhen AI development completes, a transaction log is written for the ticket.\nThis is the audit trail for AI-generated work.\n\n**Required fields:**\n- Acceptance Criteria: what was required\n- Features Implemented: what was built\n- Intent: why each major decision was made\n\nThis log is stored with the ticket. It enables human review, rollback understanding,\nand resumption in a future session.\n\n---\n\n## Persistence\n\nTicket data is stored in the platform database. The transaction log may also be\ncommitted to the project repository as a file for git-based traceability.\n\n---\n\n## Data In / Out\n\n**Reads:** User input, USAGE-ANALYTICS (cost data for READY state scheduling)\n\n**Writes:** Current ticket state \u2192 CONTROL-PANEL display\n\n---\n\n## Out of Scope\n\n- Running the AI session \u2192 external tool (Claude Code or equivalent)\n- Token cost tracking \u2192 USAGE-ANALYTICS\n",
};

// Build the document list in the sidebar
function buildDocList() {
  const list = document.getElementById('doc-list');
  Object.keys(DOCS).sort().forEach(key => {
    const li = document.createElement('li');
    const a = document.createElement('a');
    a.textContent = key.replace(/-/g, ' ');
    a.onclick = () => showDoc(key);
    li.appendChild(a);
    list.appendChild(li);
  });
}

function showDoc(key) {
  if (!DOCS[key]) {
    console.warn('Document not found:', key);
    return;
  }
  document.getElementById('home-panel').style.display = 'none';
  document.getElementById('doc-panel').style.display = 'block';

  const content = DOCS[key];
  const html = markdownToHtml(content);
  document.getElementById('doc-content').innerHTML = html;

  // Update active nav item
  document.querySelectorAll('.file-list a').forEach(el => el.classList.remove('active'));
  const activeLink = Array.from(document.querySelectorAll('.file-list a')).find(a => a.textContent.replace(/ /g, '-') === key);
  if (activeLink) activeLink.classList.add('active');
}

function markdownToHtml(md) {
  // Simple markdown to HTML converter
  let html = md
    .replace(/^### (.*?)$/gm, '<h3>$1</h3>')
    .replace(/^## (.*?)$/gm, '<h2>$1</h2>')
    .replace(/^# (.*?)$/gm, '<h1>$1</h1>')
    .replace(/^- (.*?)$/gm, '<li>$1</li>')
    .replace(/(<li>.*?<\/li>)/s, '<ul>$1</ul>')
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\n\n+/g, '</p><p>')
    .replace(/^(?!<[^>]+>)/gm, '<p>');
  return '<p>' + html + '</p>';
}

buildDocList();
</script>
