<style>

body {

.doc-content table th, .doc-content table td { padding: 8px 12px; border: 1px solid #21262d; text-align: left; }

<script>
const DOCS = {
  "09-SERVICE-SCRIPT-STANDARDS": "# Service Script Standards\n\n**The bin/ script contract.** How scripts register as platform operations.\n\n---\n\n## The Header\n\nAny script in `bin/` with a `CommandCenter Operation` marker in the first 20 lines becomes a registered operation.\n\n```bash\n#!/bin/bash\n# CommandCenter Operation\n# Name: Service Start\n# Port: 8000\n# Category: local\n# Health: /health\n# Schedule: daily 02:00\n# MaxMemory: 512M\n# Timeout: 300\n```\n\n**Required:** `CommandCenter Operation` marker + `Name:`\n**Optional:** `Port`, `Category`, `Health`, `Schedule`, `MaxMemory`, `Timeout`\n\n## Rules\n\n1. Marker must appear within first 20 lines\n2. `Name:` is required \u2014 scripts without it are ignored\n3. Script runs from project root (not from `bin/`)\n4. Scripts must be executable (`chmod +x`)\n5. A project can have any number of registered operations\n6. Bash and Python scripts supported\n\n## Standard Names (recommended)\n\n| Script | Purpose |\n|--------|---------|\n| `bin/start.sh` | Start services |\n| `bin/stop.sh` | Stop services |\n| `bin/build.sh` | Build / compile |\n| `bin/test.sh` | Run tests |\n| `bin/deploy.sh` | Deploy |\n\n## Interfaces\n\n- **PROJECT-DISCOVERY:** reads headers during scan\n- **OPERATIONS-ENGINE:** uses registered path to execute\n- **CONTROL-PANEL:** renders operation buttons\n- **MONITORING-HEARTBEATS:** uses declared port for health checks\n",
  "10-PROJECT-METADATA-STANDARDS": "# Project Metadata Standards\n\n**The METADATA.md contract.** Single file for project identity, portfolio, links, and discovery.\n\n---\n\n## METADATA.md\n\n**Location:** Project root. **Replaces:** `git_homepage.md`, `Links.md`, `STACK.yaml`.\n\n```yaml\nname: MyProject\ntitle: My Project \u2014 Short Tagline\ndescription: One to two sentence description.\nport: 8000\nstatus: ACTIVE\nversion: 1.0\nupdated: 2026-03-13\nstack: Python/Flask/SQLite\nimage: images/myproject.webp\nhealth: /health\nshow_on_homepage: true\ntags: web, tool, api\ndesired_state: running\nnamespace: production\nlinks:\n    Production | https://myproject.example.com | Live site\n    Docs       | https://docs.example.com       | API documentation\n```\n\n## Fields\n\n| Field | Required At | Purpose |\n|-------|------------|---------|\n| `name` | All | Machine name (no spaces) |\n| `status` | All | IDEA, PROTOTYPE, ACTIVE, PRODUCTION, ARCHIVED |\n| `title` | PROTOTYPE+ | Display name with tagline |\n| `description` | PROTOTYPE+ | One to two sentences |\n| `port` | ACTIVE+ | Primary service port |\n| `stack` | ACTIVE+ | Technology summary |\n| `version` | ACTIVE+ | Semantic version |\n| `updated` | ACTIVE+ | ISO date |\n| `tags` | ACTIVE+ | Comma-separated |\n| `show_on_homepage` | ACTIVE+ | Include in portfolio |\n| `image` | Optional | Portfolio card image path |\n| `health` | PRODUCTION | Health check path |\n| `links` | Optional | Pipe-separated: Name | URL | Notes |\n\n## Status Levels\n\n| Status | Compliance Level |\n|--------|-----------------|\n| IDEA | name + status only |\n| PROTOTYPE | METADATA.md complete + CLAUDE.md stub |\n| ACTIVE | Full script + metadata compliance |\n| PRODUCTION | All rules including health + git + env |\n| ARCHIVED | METADATA.md only |\n\n## CLAUDE.md\n\n**Required at:** PROTOTYPE+. Provides AI working context. Must have `## Dev Commands`, `## Service Endpoints`, `## Bookmarks` at ACTIVE+.\n\n## Interfaces\n\n- **PROJECT-DISCOVERY:** reads METADATA.md on every scan\n- **CONTROL-PANEL:** displays title, status, tags, links\n- **GITHUB-PUBLISHER:** reads portfolio fields\n- **COMPLIANCE-VERIFICATION:** checks field presence per status\n",
  "15-FEATURE-INTERRELATIONSHIP-MAP": "# Feature Interrelationship Map\n\n**Dependency graph.** Which features produce data that others consume.\n\n---\n\n## Core Chain: File \u2192 Button \u2192 Process \u2192 Health\n\n```\nbin/start.sh with CommandCenter header\n  \u2192 SERVICE-SCRIPT-STANDARDS (defines format)\n  \u2192 PROJECT-DISCOVERY (reads header, registers operation)\n  \u2192 CONTROL-PANEL (renders button)\n  \u2192 OPERATIONS-ENGINE (launches script)\n  \u2192 PROCESS-MONITOR (streams log)\n  \u2192 MONITORING-HEARTBEATS (polls health)\n```\n\n## Portfolio Chain: Metadata \u2192 Card \u2192 Publish\n\n```\nMETADATA.md with show_on_homepage: true\n  \u2192 PROJECT-DISCOVERY (reads on scan)\n  \u2192 GITHUB-PUBLISHER (builds card)\n  \u2192 User clicks Rebuild \u2192 static site\n  \u2192 User clicks Publish \u2192 GitHub Pages\n```\n\n## AI Workflow Chain: Ticket \u2192 Build \u2192 Review\n\n```\nIDEA \u2192 PROPOSED (add plan) \u2192 READY (add criteria)\n  \u2192 IN DEVELOPMENT (AI session)\n  \u2192 TESTING (human validates)\n  \u2192 DONE (or rework \u2192 READY/PROPOSED)\n```\n\n## Dependency Table\n\n| Feature | Reads From | Writes To |\n|---------|------------|-----------|\n| SERVICE-SCRIPT-STANDARDS | bin/ files | Operation registry \u2192 DISCOVERY |\n| PROJECT-METADATA-STANDARDS | METADATA.md, CLAUDE.md | Parsed metadata \u2192 DISCOVERY |\n| PROJECT-DISCOVERY | Filesystem, standards, git | Project store \u2192 PANEL, ENGINE, PUBLISHER |\n| CONTROL-PANEL | DISCOVERY, ENGINE, MONITOR, TAGS | Launch requests \u2192 ENGINE, state changes |\n| OPERATIONS-ENGINE | PANEL (requests), DISCOVERY (registry) | Process handle \u2192 MONITOR, run records |\n| PROCESS-MONITOR | ENGINE (handles), log files | Stop signals, status \u2192 PANEL nav bar |\n| WORKFLOW-STATES | User input, USAGE-ANALYTICS | Ticket state \u2192 PANEL |\n| GITHUB-PUBLISHER | DISCOVERY (metadata), docs/ dirs | Published portfolio |\n| TAG-MANAGEMENT | User input, METADATA.md | Tags + colors \u2192 PANEL |\n| CONFIGURATION-MANAGEMENT | Profile YAML, CLAUDE.md | AI config files |\n| USAGE-ANALYTICS | AI session JSONL logs | Usage summary \u2192 PANEL nav bar |\n| GIT-INTEGRATION | Filesystem git state | Git status \u2192 PANEL, compliance flags |\n| MONITORING-HEARTBEATS | Declared ports, running processes | Health status \u2192 PANEL, alerts |\n\n## Implementation Priority\n\n1. Standards (contracts, no code)\n2. PROJECT-DISCOVERY (foundation)\n3. CONTROL-PANEL + OPERATIONS-ENGINE + PROCESS-MONITOR (core loop)\n4. GIT-INTEGRATION + TAG-MANAGEMENT + USAGE-ANALYTICS (enrichment)\n5. GITHUB-PUBLISHER + CONFIGURATION-MANAGEMENT (pipelines)\n6. WORKFLOW-STATES (complex lifecycle)\n7. MONITORING-HEARTBEATS (polling daemon)\n",
  "CONFIGURATION-MANAGEMENT": "# Configuration Management\n\n**AI assistant config profiles.** Select a profile, deploy it, roll back to any previous version.\n\n---\n\n## Capabilities\n\n- Profile library (YAML files)\n- Deploy with diff preview\n- Deployment history in git\n- One-click rollback to any prior deployment\n- Generate project-specific AI context from profile\n\n## How It Works\n\n1. User selects a profile\n2. Platform generates config files from YAML\n3. Files written to staging directory (committed to git)\n4. Files copied to AI assistant's live config directory\n\nRollback: copy staged files from a past commit back to live config.\n\n## Persistence\n\n- **Profiles:** `config_engine/profiles/*.yaml` (git committed)\n- **Staged configs:** `config_engine/staged/` (git committed \u2014 this IS the rollback store)\n- **Live configs:** AI assistant's config directory (outside this repo)\n",
  "CONTROL-PANEL": "# Control Panel\n\n**The main dashboard.** Shows every project with status, operations, and metadata. All common actions happen here.\n\n---\n\n## Capabilities\n\n- Project list with status badges, tags, stack, and running indicator\n- One-click operation buttons per project (from bin/ headers)\n- Inline workflow state and type editing\n- Filter by state, type, or tag\n- Quick links from CLAUDE.md bookmarks\n- Running process count in nav bar\n- Rescan trigger\n\n## Screens\n\n**Projects List:** Full-width table. One row per project. Columns: name, type/state badges, tags, stack, running indicator, operation buttons, quick links.\n\n**Project Detail:** Single-project view with all operations, endpoints, bookmarks, git status, and CLAUDE.md content.\n\n**Nav Bar:** Running process count. Link to Process Monitor.\n\n## Data Flow\n\n| Reads From | Writes To |\n|------------|-----------|\n| PROJECT-DISCOVERY (project records) | OPERATIONS-ENGINE (launch requests) |\n| OPERATIONS-ENGINE (run status) | Workflow state store (state changes) |\n| PROCESS-MONITOR (running count) | Project type store (type changes) |\n| TAG-MANAGEMENT (tags + colors) | |\n",
  "GIT-INTEGRATION": "# Git Integration\n\n**Read-only git status display.** Surfaces each project's git state in the dashboard. Never modifies git.\n\n---\n\n## Capabilities\n\n- Per-project: branch, uncommitted changes count, unpushed commits count, last commit message\n- Governance checklist: initialized, remote configured, not persistently dirty\n- Status read during each discovery scan\n\n## Governance Rules (advisory, not blocking)\n\n- Git must be initialized\n- A remote must be configured\n- Working tree should not be dirty for extended periods\n\n## Data Flow\n\n| Reads From | Writes To |\n|------------|-----------|\n| Filesystem git state | CONTROL-PANEL (git status display) |\n| | PROJECT-DISCOVERY (compliance flags) |\n",
  "GITHUB-PUBLISHER": "# GitHub Publisher\n\n**Portfolio site generator.** Builds and publishes a static GitHub Pages portfolio from METADATA.md across all projects.\n\n---\n\n## Capabilities\n\n- One-click rebuild of portfolio site\n- Local preview server\n- One-click push to GitHub Pages\n- Site-wide branding config (name, tagline, home page text)\n- Per-project show/hide via `show_on_homepage` in METADATA.md\n- Documentation links when `docs/index.html` exists\n\n## How It Works\n\n1. Read site branding from platform config\n2. Scan projects for METADATA.md where `show_on_homepage: true`\n3. Parse card fields (title, description, tags, image)\n4. Generate static site (card grid, home page, resume page)\n5. Build and serve locally or publish\n\n## Screens\n\n**Publisher Dashboard:**\n- Build: Rebuild button, last build time, error output\n- Preview: Start/stop local server, preview URL\n- Publish: Push button, last publish time, live site link\n\n## Data Flow\n\n| Reads From | Writes To |\n|------------|-----------|\n| PROJECT-DISCOVERY (METADATA.md data) | Static site files |\n| Site branding config | Published portfolio (git push) |\n| Project docs/ directories | |\n",
  "METADATA": "name: GAME\ntitle: GAME \u2014 Project Management Dashboard\ndescription: Discovers local projects via filesystem contracts, provides a control panel for operations, process monitoring, portfolio publishing, and AI workflow management.\nport: 5001\nstatus: active\nversion: 4.0\nupdated: 2026-03-13\n",
  "MONITORING-HEARTBEATS": "# Monitoring & Health Checks [ROADMAP]\n\n**Service health polling and alerting.** Polls running services, alerts on failure, tracks uptime.\n\n---\n\n## Capabilities\n\n- Health polling via declared Port and health endpoint\n- Liveness check: is the service responding?\n- Readiness check: is it ready for traffic?\n- States: UNKNOWN \u2192 UP \u2192 DOWN \u2192 SNOOZED\n- In-UI alerts on state transitions\n- Uptime history and incident log\n- Silence alerts temporarily per project\n\n## How It Works\n\nPolls each service that declares a port in bin/ headers or METADATA.md. HTTP response to health endpoint = UP. Connection refused/timeout/error = DOWN.\n\n## Screens\n\n**Health Indicators (inline):** Per-project badge (UP/DOWN/UNKNOWN), last checked, response time.\n\n**Monitoring Dashboard:** All monitored services table. Incident log below.\n\n**Alerts:** Banner or toast on state change.\n\n## Future\n\n- Webhook/email/OS notifications\n- Auto-restart on failure (integration with OPERATIONS-ENGINE)\n",
  "OPERATIONS-ENGINE": "# Operations Engine\n\n**Run bin/ scripts on demand.** User clicks a button, engine launches the script, captures output, reports status.\n\n---\n\n## Capabilities\n\n- One-click script execution from dashboard\n- Background process launch from project root\n- stdout/stderr capture to log file\n- Run state tracking: IDLE \u2192 STARTING \u2192 RUNNING \u2192 DONE/ERROR/STOPPED\n- Run history per project (start time, duration, exit code, log path)\n- Stop button for running operations\n\n## How It Works\n\n1. User clicks operation button\n2. Engine looks up script path from operation registry\n3. Script launched as background process from project root\n4. Output written to log file per CLAUDE_RULES logging convention\n5. `[GAME]` status lines parsed for state transitions\n6. Final status recorded on exit\n\n## State Machine\n\n```\nIDLE \u2192 STARTING \u2192 RUNNING \u2192 DONE\n                          \u2192 ERROR\n                          \u2192 STOPPED (user cancelled)\n```\n\n## Data Flow\n\n| Reads From | Writes To |\n|------------|-----------|\n| PROJECT-DISCOVERY (operation registry) | PROCESS-MONITOR (process handle) |\n| CONTROL-PANEL (launch requests) | Run records (history) |\n",
  "PROCESS-MONITOR": "# Process Monitor\n\n**Live log viewer and process control.** Shows what is running, what ran, and what the output was.\n\n---\n\n## Capabilities\n\n- List all running and completed processes (most recent first)\n- Live log output with auto-scroll\n- Stop button for running processes\n- Log viewer for completed runs\n- Per-process: project name, operation name, status, start time, duration\n\n## Screens\n\n**Process List:** Full-width list. Per row: project, operation, status badge (RUNNING/DONE/ERROR/STOPPED), start time, duration, View Log, Stop.\n\n**Log Viewer:** Monospace output area. Auto-scrolls while running, stops on exit. Header shows project, operation, status.\n\n## Data Flow\n\n| Reads From | Writes To |\n|------------|-----------|\n| OPERATIONS-ENGINE (process handles) | Stop signal \u2192 running process |\n| Log files (by naming convention) | Status summary \u2192 CONTROL-PANEL nav bar |\n",
  "PROJECT-DISCOVERY": "# Project Discovery\n\n**Auto-registration via filesystem scan.** Finds all projects, reads their contracts, registers capabilities. No manual setup.\n\n---\n\n## Capabilities\n\n- Scan a root directory for project subdirectories\n- Read METADATA.md for identity, status, tags, links\n- Read CLAUDE.md for endpoints and bookmarks\n- Read bin/ scripts for CommandCenter Operation headers\n- Read git status per project\n- Upsert project records and capabilities\n- Mark removed projects as inactive (not deleted)\n\n## How It Works\n\n1. Scan root directory \u2014 every subdirectory is a candidate\n2. Derive display name from directory name (CamelCase \u2192 spaced words)\n3. Read METADATA.md if present\n4. Read CLAUDE.md if present\n5. Read bin/ headers for registered operations\n6. Read git status\n7. Upsert project record\n\nMissing contract files produce compliance gaps, not errors.\n\n## Scan Triggers\n\n- Platform startup\n- User request (Rescan button)\n\n## Data Produced\n\n| Data | Consumed By |\n|------|-------------|\n| Project records | CONTROL-PANEL |\n| Operation registry (bin/ headers) | OPERATIONS-ENGINE, CONTROL-PANEL |\n| Endpoints and bookmarks (CLAUDE.md) | CONTROL-PANEL |\n| Portfolio metadata (METADATA.md) | GITHUB-PUBLISHER |\n| Git status | CONTROL-PANEL, GIT-INTEGRATION |\n| Compliance flags | CONTROL-PANEL |\n",
  "PROJECT-DOCUMENTATION": "# Project Documentation\n\n**Self-contained docs per project.** When a project has `docs/index.html`, the publisher includes it in the portfolio build at a stable URL.\n\n---\n\n## Capabilities\n\n- Browse any project's docs at a stable portfolio URL\n- \"Documentation\" link on portfolio card when docs exist\n- Regenerate via `bin/build_documentation.sh` operation\n- Standalone HTML \u2014 no server required\n\n## Contract\n\n- **File:** `docs/index.html` at project root\n- Must be valid standalone HTML (no server fetch, no external dependencies)\n- All assets embedded inline or relative-path within `docs/`\n- `bin/build_documentation.sh` is the standard generator (CommandCenter Operation)\n\n## How It Works\n\nDuring portfolio rebuild:\n1. Publisher scans each project for `docs/index.html`\n2. If found, copies `docs/` to published site under `project-docs/{project-name}/`\n3. Adds Documentation link to portfolio card\n\n## Data Flow\n\n| Reads From | Writes To |\n|------------|-----------|\n| `docs/index.html` per project | Published docs on portfolio site |\n| `bin/build_documentation.sh` output | `docs/index.html` |\n",
  "README": "# GAME \u2014 Generic AI Management Environment\n\n**Status:** Specification v5 | **Updated:** 2026-03-13\n\nA dashboard for managing AI-assisted projects. Discovers local projects via filesystem contracts, provides operations, monitoring, publishing, and workflow management.\n\n---\n\n## Feature Specifications\n\n| File | Description |\n|------|-------------|\n| `CONTROL-PANEL.md` | Main dashboard \u2014 project list, status, operations |\n| `PROJECT-DISCOVERY.md` | Filesystem scanner, auto-registration |\n| `OPERATIONS-ENGINE.md` | Run bin/ scripts on demand, capture output |\n| `PROCESS-MONITOR.md` | Live log viewer, process control |\n| `GIT-INTEGRATION.md` | Per-project git status (read-only) |\n| `GITHUB-PUBLISHER.md` | Static portfolio site from METADATA.md |\n| `PROJECT-DOCUMENTATION.md` | Self-contained docs per project |\n| `TAG-MANAGEMENT.md` | Visual grouping with colored tags |\n| `CONFIGURATION-MANAGEMENT.md` | AI config profiles with rollback |\n| `USAGE-ANALYTICS.md` | Token usage and cost tracking |\n| `MONITORING-HEARTBEATS.md` | Health polling and alerting [ROADMAP] |\n| `WORKFLOW-STATES.md` | Feature ticket lifecycle [ROADMAP] |\n\n## Standards\n\n| File | Description |\n|------|-------------|\n| `09-SERVICE-SCRIPT-STANDARDS.md` | bin/ script header contract |\n| `10-PROJECT-METADATA-STANDARDS.md` | METADATA.md and CLAUDE.md contracts |\n| `15-FEATURE-INTERRELATIONSHIP-MAP.md` | Feature dependency graph |\n\n## Stack\n\nPython / Flask / SQLite / Bootstrap 5 | Port 5001\n",
  "TAG-MANAGEMENT": "# Tag Management\n\n**Lightweight visual grouping.** Tags from METADATA.md with user-defined colors. Filterable in the project list.\n\n---\n\n## Capabilities\n\n- Assign tags to projects from dashboard\n- Create tags on the fly\n- Edit tag names and colors\n- Delete tags\n- Filter project list by one or more tags\n\n## Screens\n\n**Tag Badges (inline):** Colored badges per project. Click to filter. \"+\" to add.\n\n**Tag Settings:** List of all tags with color swatch, name, project count, edit, delete.\n\n## Persistence\n\n- Tag colors: JSON file in platform data directory (git committed)\n- Tag assignments: platform database, seeded from METADATA.md `tags:` field\n",
  "USAGE-ANALYTICS": "# Usage Analytics\n\n**AI token and cost tracking.** Reads session logs, shows usage by project and over time.\n\n---\n\n## Capabilities\n\n- Daily/weekly/monthly token summaries\n- By-project breakdown\n- Session log (timestamp, project, model, tokens, cost)\n- Nav bar cost indicator\n- User-editable rates table (model \u2192 cost per million tokens)\n\n## How It Works\n\nReads AI session JSONL log files (not produced by this platform). Extracts timestamp, project context, token counts, model name. Cost estimated from rates table.\n\n## Screens\n\n**Usage Dashboard:** Summary bar (today/month tokens and cost). By-project table. Session log (paginated).\n\n**Nav Bar:** Today's cost indicator.\n\n## Persistence\n\n- Session logs: read from AI assistant's log directory (external)\n- Rates table: user-editable config file in platform data directory\n",

// Build the document list in the sidebar
function buildDocList() {
  const list = document.getElementById('doc-list');
  Object.keys(DOCS).sort().forEach(key => {
    const li = document.createElement('li');
    const a = document.createElement('a');
    a.textContent = key.replace(/-/g, ' ');
    a.onclick = () => showDoc(key);
    li.appendChild(a);
    list.appendChild(li);
  });
}

function showDoc(key) {
  if (!DOCS[key]) {
    console.warn('Document not found:', key);
    return;
  }
  document.getElementById('home-panel').style.display = 'none';
  document.getElementById('doc-panel').style.display = 'block';

  const content = DOCS[key];
  const html = markdownToHtml(content);
  document.getElementById('doc-content').innerHTML = html;

  // Update active nav item
  document.querySelectorAll('.file-list a').forEach(el => el.classList.remove('active'));
  const activeLink = Array.from(document.querySelectorAll('.file-list a')).find(a => a.textContent.replace(/ /g, '-') === key);
  if (activeLink) activeLink.classList.add('active');
}

function markdownToHtml(md) {
  // Simple markdown to HTML converter
  let html = md
    .replace(/^### (.*?)$/gm, '<h3>$1</h3>')
    .replace(/^## (.*?)$/gm, '<h2>$1</h2>')
    .replace(/^# (.*?)$/gm, '<h1>$1</h1>')
    .replace(/^- (.*?)$/gm, '<li>$1</li>')
    .replace(/(<li>.*?<\/li>)/s, '<ul>$1</ul>')
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\n\n+/g, '</p><p>')
    .replace(/^(?!<[^>]+>)/gm, '<p>');
  return '<p>' + html + '</p>';
}

buildDocList();
