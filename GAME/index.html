  "ARCHITECTURE": "# Architecture\n\n**Flask app with blueprints.** App factory pattern. Scanner, process engine, and publisher are backend modules that feed data to the screen routes.\n\n---\n\n## App Factory\n\n`create_app()` in `app.py`. Returns a configured Flask instance.\n\n1. Load config from environment and `.env`\n2. Initialize SQLite database (create tables if missing, run migrations)\n3. Register blueprints\n4. Start async project scan on first request\n\n## Blueprints\n\n| Blueprint | Mount | Purpose |\n|-----------|-------|---------|\n| `dashboard` | `/` | Main project list, project detail, inline actions |\n| `processes` | `/processes` | Process list, log viewer, stop endpoint |\n| `publisher` | `/publisher` | Portfolio build, preview, publish |\n| `config` | `/config` | Profile management, deploy, rollback |\n| `usage` | `/usage` | Token analytics dashboard |\n| `api` | `/api` | JSON endpoints for HTMX partial updates |\n\n## Backend Modules\n\n### Scanner (`scanner.py`)\n\nScans `$PROJECTS_DIR` for project directories. For each:\n1. Read METADATA.md \u2192 parse key:value fields\n2. Read AGENTS.md / CLAUDE.md \u2192 extract endpoints, bookmarks\n3. Read bin/ scripts \u2192 parse CommandCenter headers\n4. Read git status (branch, dirty, unpushed)\n5. Upsert into `projects` and `operations` tables\n\nRuns asynchronously on startup (not blocking first page load). Triggered manually by rescan button.\n\n### Process Engine (`engine.py`)\n\nLaunches bin/ scripts as background subprocesses.\n\n1. Receive launch request (project_id, operation_id)\n2. Create `runs` record with status STARTING\n3. Fork subprocess: `bash bin/{script}.sh` from project root\n4. Capture stdout/stderr to log file: `logs/{project}_{script}_{yyyymmdd_hhmmss}.log`\n5. Parse `[$PROJECT_NAME]` lines from output for status transitions\n6. Update `runs` record on exit (status, exit_code, finished_at)\n\nProvides: `launch(project_id, operation_id)`, `stop(run_id)`, `get_running()`, `get_log(run_id)`.\n\n### Publisher (`publisher.py`)\n\nBuilds static portfolio site from METADATA.md fields.\n\n1. Query projects where `show_on_homepage = true`\n2. Generate card HTML from title, short_description, tags, image\n3. If project has `doc/index.html`, add documentation link\n4. Write static site to output directory\n5. Optionally push to GitHub Pages\n\n### Config Engine (`config_engine.py`)\n\nManages AI assistant configuration profiles.\n\n1. List profiles from `config_engine/profiles/*.yaml`\n2. Generate config files from selected profile\n3. Write to `config_engine/staged/` and git commit\n4. Copy to AI assistant's live config directory\n5. Rollback: checkout a past staged commit\n\n### Usage Analyzer (`usage.py`)\n\nReads AI session JSONL logs (external files, not produced by GAME).\n\n1. Scan log directory for JSONL files\n2. Parse: timestamp, project, model, tokens\n3. Join with `usage_rates` for cost estimates\n4. Aggregate by day/week/month and by project\n\n## Routes (HTMX)\n\nAll screen interactions use HTMX for partial page updates. Server returns HTML fragments, not JSON.\n\n| Method | Path | Returns | Trigger |\n|--------|------|---------|---------|\n| GET | `/` | Full dashboard page | Page load |\n| POST | `/api/scan` | Status message | Rescan button |\n| POST | `/api/run/{op_id}` | Updated button state | Operation click |\n| POST | `/api/stop/{run_id}` | Updated button state | Stop click |\n| POST | `/api/push/{project_id}` | Git status fragment | Push button |\n| GET | `/api/project/{id}` | Project detail fragment | Row click |\n| GET | `/processes` | Process list page | Nav link |\n| GET | `/processes/{run_id}/log` | Log content fragment | View Log click |\n| GET | `/publisher` | Publisher page | Nav link |\n| POST | `/publisher/build` | Build status | Rebuild button |\n| POST | `/publisher/publish` | Publish status | Publish button |\n| GET | `/config` | Config page | Nav link |\n| POST | `/config/deploy/{profile}` | Deploy status | Deploy button |\n| POST | `/config/rollback/{id}` | Rollback status | Rollback button |\n| GET | `/usage` | Usage page | Nav link |\n| GET | `/health` | `{\"status\":\"ok\"}` | Health check |\n\n## Directory Layout\n\n```\nGAME/\n  app.py                 App factory (create_app)\n  scanner.py             Project discovery\n  engine.py              Process execution\n  publisher.py           Portfolio builder\n  config_engine.py       Config profile manager\n  usage.py               Token analytics\n  models.py              Database helpers, schema creation\n  templates/\n    base.html            Layout with nav bar\n    dashboard.html       Main project list\n    project_detail.html  Single project view\n    processes.html       Process list and log viewer\n    publisher.html       Publisher controls\n    config.html          Config management\n    usage.html           Usage analytics\n    partials/            HTMX response fragments\n  static/\n    css/style.css        Custom styles (Bootstrap 5 dark theme)\n    js/app.js            Client-side helpers\n  bin/\n    common.sh            Shared script functions\n    start.sh             Start Flask dev server\n    stop.sh              Stop server\n    build_documentation.sh  Generate doc/\n  data/\n    game.db              SQLite database\n    migrations/          Numbered SQL migration files\n  config_engine/\n    profiles/            YAML config profiles\n    staged/              Git-committed staged configs\n  doc/                   Generated documentation\n  logs/                  Operation log files\n```\n",
  "DATABASE": "# Database\n\n**SQLite with WAL mode.** Single file at `data/game.db`. All tables below.\n\n---\n\n## Schema\n\n### projects\n\nDiscovered projects. One row per project directory. Upserted on every scan.\n\n| Column | Type | Description |\n|--------|------|-------------|\n| id | INTEGER PK | Auto-increment |\n| name | TEXT UNIQUE | Machine name from METADATA.md |\n| display_name | TEXT | Human-readable name |\n| path | TEXT | Absolute path to project directory |\n| status | TEXT | IDEA/PROTOTYPE/ACTIVE/PRODUCTION/ARCHIVED |\n| port | INTEGER | Service port |\n| stack | TEXT | Technology summary |\n| health_endpoint | TEXT | Health check path |\n| desired_state | TEXT | running/on-demand |\n| namespace | TEXT | development/qa/production/custom |\n| tags | TEXT | Comma-separated |\n| show_on_homepage | BOOLEAN | Portfolio inclusion |\n| title | TEXT | Display title with tagline |\n| short_description | TEXT | One sentence |\n| git_branch | TEXT | Current branch |\n| git_dirty | BOOLEAN | Uncommitted changes |\n| git_unpushed | INTEGER | Unpushed commit count |\n| git_last_commit | TEXT | Last commit message |\n| is_active | BOOLEAN | False if removed from disk |\n| last_scanned | TEXT | yyyymmdd_hhmmss |\n| extra | TEXT | JSON blob for additional METADATA.md fields |\n\n### operations\n\nRegistered operations from bin/ script headers. Re-populated on scan.\n\n| Column | Type | Description |\n|--------|------|-------------|\n| id | INTEGER PK | Auto-increment |\n| project_id | INTEGER FK | References projects.id |\n| script_name | TEXT | Filename (e.g., start.sh) |\n| script_path | TEXT | Relative path (e.g., bin/start.sh) |\n| display_name | TEXT | Derived from filename |\n| category | TEXT | From header or default |\n| port | INTEGER | From `# Port:` header |\n| health_path | TEXT | From `# Health:` header |\n| schedule | TEXT | From `# Schedule:` header |\n| timeout | INTEGER | From `# Timeout:` header |\n\n### runs\n\nHistory of operation executions.\n\n| Column | Type | Description |\n|--------|------|-------------|\n| id | INTEGER PK | Auto-increment |\n| project_id | INTEGER FK | References projects.id |\n| operation_id | INTEGER FK | References operations.id |\n| status | TEXT | STARTING/RUNNING/DONE/ERROR/STOPPED |\n| pid | INTEGER | OS process ID |\n| started_at | TEXT | yyyymmdd_hhmmss |\n| finished_at | TEXT | yyyymmdd_hhmmss or NULL |\n| exit_code | INTEGER | NULL while running |\n| log_path | TEXT | Path to log file |\n\n### tag_colors\n\nUser-defined tag colors.\n\n| Column | Type | Description |\n|--------|------|-------------|\n| tag | TEXT PK | Tag name |\n| color | TEXT | Hex color (#4caf50) |\n\n### config_deployments\n\nAI configuration deployment history.\n\n| Column | Type | Description |\n|--------|------|-------------|\n| id | INTEGER PK | Auto-increment |\n| profile_name | TEXT | Profile that was deployed |\n| deployed_at | TEXT | yyyymmdd_hhmmss |\n| git_sha | TEXT | Commit SHA of staged config |\n\n### usage_sessions\n\nParsed AI session records (read from external JSONL logs).\n\n| Column | Type | Description |\n|--------|------|-------------|\n| id | INTEGER PK | Auto-increment |\n| project_name | TEXT | Project context |\n| model | TEXT | AI model name |\n| tokens_in | INTEGER | Input tokens |\n| tokens_out | INTEGER | Output tokens |\n| estimated_cost | REAL | From rates table |\n| session_time | TEXT | yyyymmdd_hhmmss |\n\n### usage_rates\n\nUser-editable cost rates.\n\n| Column | Type | Description |\n|--------|------|-------------|\n| model | TEXT PK | Model name |\n| cost_per_million_in | REAL | Cost per 1M input tokens |\n| cost_per_million_out | REAL | Cost per 1M output tokens |\n\n---\n\n## Conventions\n\n- WAL mode enabled on connection: `PRAGMA journal_mode=WAL`\n- Foreign keys enforced: `PRAGMA foreign_keys=ON`\n- All timestamps in `yyyymmdd_hhmmss` format\n- JSON stored in TEXT columns, parsed by application\n- Migrations in `data/migrations/` as numbered SQL files\n- Database created on first startup if missing\n",
  "METADATA": "# GAME\n\nProject management dashboard for AI-assisted development.\n\nname: GAME\ndisplay_name: GAME\ntitle: GAME \u2014 Generic AI Management Environment\ngit_repo: GAME\nshort_description: Dashboard for managing local AI-assisted projects\nport: 5001\nstatus: ACTIVE\nversion: 2026-03-13.2\nupdated: 20260313\nstack: Python/Flask/SQLite/Bootstrap5\nhealth: /health\nshow_on_homepage: true\ntags: dashboard, tool, platform\ndesired_state: on-demand\nnamespace: development\n",
  "README": "# GAME \u2014 Generic AI Management Environment\n\nA web dashboard for managing AI-assisted development projects. Discovers local projects by reading their METADATA.md and bin/ script headers, then provides a unified interface for running operations, viewing logs, publishing portfolios, managing AI configurations, and tracking usage costs.\n\n## Intent\n\nA solo practitioner or small team managing multiple AI-built projects needs one place to see what's running, launch operations, and track costs. GAME is that place. It does not modify project code \u2014 it reads filesystem contracts (METADATA.md, AGENTS.md, bin/ headers) and surfaces them as a dashboard with buttons.\n\n## Stack\n\n- **Language:** Python\n- **Framework:** Flask (app factory, blueprints, HTMX for partial updates)\n- **Database:** SQLite (WAL mode, single file at `data/game.db`)\n- **Frontend:** Bootstrap 5 (dark theme, CDN)\n- **Port:** 5001\n\nEach stack component maps to a prescriptive reference file in `../stack/` (python.md, flask.md, sqlite.md, bootstrap5.md). These files define exactly how to implement with concrete code examples.\n\n## Specifications\n\nAll project integration standards (script headers, METADATA.md format, secrets, documentation) are defined in `../CLAUDE_RULES.md` \u2014 that file should be appended to your CLAUDE.md before building this project.\n\nThe specs in this directory describe GAME specifically:\n\n- **ARCHITECTURE.md** \u2014 App factory, blueprints, backend modules (scanner, engine, publisher, config, usage), routes, directory layout\n- **DATABASE.md** \u2014 SQLite schema for projects, operations, runs, tags, config, usage\n- **SCREEN-*.md** \u2014 What each UI screen shows and how users interact with it\n\n## Building From This Specification\n\n```bash\n# 1. Validate that all stack files exist\nbash ../validate.sh GAME\n\n# 2. Generate a complete build prompt for an AI agent\nbash ../generate-prompt.sh GAME > build-prompt.md\n\n# 3. Feed build-prompt.md to the agent along with CLAUDE_RULES.md\n```\n\nThe generated prompt includes all stack reference files (common.md, python.md, flask.md, sqlite.md, bootstrap5.md) followed by all specification files in this directory. An AI agent reading this prompt has everything needed to build GAME from scratch.\n",
  "SCREEN-CONFIGURATION": "# Screen: Configuration\n\n**AI assistant config profile management.** Deploy profiles, preview diffs, roll back.\n\n---\n\n## Layout\n\nThree sections: Active Profile, Profile Library, Deployment History.\n\n## Active Profile\n\n- Current profile name and deploy time\n- Diff preview showing what will change\n- Deploy button per profile\n\n## Profile Library\n\n- List of profiles with names and descriptions\n- Edit and New buttons\n\n## Deployment History\n\n- Table of past deployments\n- Rollback button per row\n\n## How It Works\n\n1. User selects a profile (YAML file in `config_engine/profiles/`)\n2. Platform generates config files from profile\n3. Files written to `config_engine/staged/` (committed to git \u2014 this is the rollback store)\n4. Files copied to AI assistant's live config directory\n\nRollback: copy staged files from a past git commit back to live config.\n\n## Data Flow\n\n| Reads | Writes |\n|-------|--------|\n| Profile YAML files | Staged configs (git committed) |\n| AGENTS.md from projects | AI assistant live config |\n",
  "SCREEN-DASHBOARD": "# Screen: Dashboard\n\n**The main view.** Shows every discovered project with status, operations, and metadata.\n\n---\n\n## Layout\n\nFull-width project list. One row per project. Nav bar at top with running process count and today's AI cost.\n\n## Per-Project Row\n\n| Element | Source | Interaction |\n|---------|--------|-------------|\n| Project name | METADATA.md `display_name` | Click \u2192 project detail |\n| Status badge | METADATA.md `status` | Display only |\n| Namespace badge | METADATA.md `namespace` | Display only |\n| Tags (colored) | METADATA.md `tags` + color config | Click tag \u2192 filter |\n| Stack summary | METADATA.md `stack` | Display only |\n| Running indicator | Process engine state | Green dot if running |\n| Operation buttons | bin/ headers (one per registered script) | Click \u2192 run script |\n| Push button | Git: shown only if unpushed commits | Click \u2192 git push |\n| Quick links | AGENTS.md bookmarks | Click \u2192 open URL |\n\n## Project Detail (click into a project)\n\n- All operations with run status\n- All endpoints and bookmarks from AGENTS.md\n- Git status: branch, uncommitted count, unpushed count, last commit\n- METADATA.md fields\n- AGENTS.md content (expandable)\n\n## Actions\n\n- **Run operation**: Click button \u2192 operations engine launches script, button shows running state\n- **Stop operation**: Click running button \u2192 sends SIGTERM\n- **Filter**: By tag, status, namespace, or text search\n- **Rescan**: Button to re-scan project directories\n- **Push**: Per-project, shown only when unpushed commits exist\n\n## Startup Behavior\n\nOn web server startup, the platform scans the projects directory **asynchronously**. The dashboard renders immediately with cached data; scan results update the view when complete. This avoids blocking on 30+ `git status` calls.\n\nScan reads: METADATA.md, AGENTS.md, bin/ headers, git status per project. Missing files produce compliance gaps, not errors. Projects removed from disk are marked inactive.\n\n## Tag Management\n\nTag colors stored in a JSON config file in the platform data directory (git committed). Tags assigned from METADATA.md `tags:` field. Inline tag editing from dashboard. Color picker in settings.\n\n## Data Flow\n\n| Reads | Writes |\n|-------|--------|\n| Project scanner results | Operation launch requests |\n| Process engine run states | Git push commands |\n| Tag color config | |\n",
  "SCREEN-MONITORING": "# Screen: Monitoring [ROADMAP]\n\n**Service health dashboard.** Polls running services, shows status, alerts on failure.\n\n---\n\n## Layout\n\nHealth table with all monitored services. Incident log below.\n\n## Health Table\n\n| Column | Description |\n|--------|-------------|\n| Project name | From METADATA.md |\n| Endpoint | `port` + `health` from METADATA.md |\n| Status badge | UP (green) / DOWN (red) / UNKNOWN (gray) |\n| Last checked | Timestamp (yyyymmdd_hhmmss) |\n| Response time | Milliseconds |\n| Uptime % | Rolling 24h |\n\n## Incident Log\n\nTimeline of state changes. Per row: timestamp, project, previous state \u2192 new state.\n\n## Alerts\n\nBanner or toast notification when a service changes state. Links to the project.\n\n## How It Works\n\nPolls each service that declares `port:` and `health:` in METADATA.md. HTTP GET to health endpoint. Response = UP. Connection refused / timeout / error = DOWN.\n\nStates: `UNKNOWN \u2192 UP \u2192 DOWN \u2192 UP` (alert on each transition). SNOOZED suppresses alerts but continues polling.\n\n## Data Flow\n\n| Reads | Writes |\n|-------|--------|\n| METADATA.md (port, health) | Health status \u2192 dashboard |\n| Process engine (running state) | Alert events |\n",
  "SCREEN-PROCESSES": "# Screen: Processes\n\n**Live log viewer and process control.** Shows what is running, what ran, and the output.\n\n---\n\n## Layout\n\nProcess list (most recent first) with expandable log viewer.\n\n## Process List\n\n| Column | Description |\n|--------|-------------|\n| Project name | From METADATA.md |\n| Operation | Derived from script filename |\n| Status badge | RUNNING / DONE / ERROR / STOPPED |\n| Start time | yyyymmdd_hhmmss format |\n| Duration | Elapsed or total |\n| View Log | Opens log viewer |\n| Stop | Sends SIGTERM (shown only when RUNNING) |\n\n## Log Viewer\n\nMonospace output area. Auto-scrolls while the process is running. Stops on process exit.\n\nHeader shows: project name, operation name, status, start time.\n\nControls: Stop button (if running), Back to list.\n\n## State Machine\n\n```\nIDLE \u2192 STARTING \u2192 RUNNING \u2192 DONE\n                          \u2192 ERROR (non-zero exit)\n                          \u2192 STOPPED (user cancelled)\n```\n\nThe platform parses `[$PROJECT_NAME]` status lines from log output to track transitions.\n\n## Log Files\n\nNamed per CLAUDE_RULES convention: `logs/{project}_{script}_{yyyymmdd_hhmmss}.log`. Project name prepended for sorting.\n\n## Data Flow\n\n| Reads | Writes |\n|-------|--------|\n| Process handles from operations engine | Stop signal \u2192 process |\n| Log files by naming convention | Running count \u2192 dashboard nav bar |\n",
  "SCREEN-PUBLISHER": "# Screen: Publisher\n\n**Portfolio site management.** Builds and publishes a static GitHub Pages portfolio from METADATA.md.\n\n---\n\n## Layout\n\nThree sections: Build, Preview, Publish.\n\n## Build Section\n\n- Rebuild button\n- Last build timestamp and status\n- Error output if build failed\n\n## Preview Section\n\n- Start/stop local preview server\n- Preview URL when running\n\n## Publish Section\n\n- Push to GitHub Pages button\n- Last publish timestamp\n- Link to live site\n\n## How It Works\n\n1. Scan all projects for METADATA.md where `show_on_homepage: true`\n2. Parse card fields: `title`, `short_description`, `tags`, `image`\n3. If project has `doc/index.html`, add documentation link to card\n4. Generate static site: card grid, home page, resume page\n5. Build and serve locally or push to GitHub Pages\n\n## Data Flow\n\n| Reads | Writes |\n|-------|--------|\n| METADATA.md from all projects | Static site files |\n| Site branding config | Published portfolio (git push) |\n| Project doc/ directories | |\n",
  "SCREEN-USAGE": "# Screen: Usage Analytics\n\n**AI token and cost tracking.** Reads session logs, shows usage by project and over time.\n\n---\n\n## Layout\n\nSummary bar at top, by-project table, session log below.\n\n## Summary Bar\n\nToday's tokens, today's cost, this month's tokens, this month's cost.\n\n## By-Project Table\n\n| Column | Description |\n|--------|-------------|\n| Project name | From session log context |\n| Sessions today | Count |\n| Tokens today | Sum |\n| Tokens this month | Sum |\n| Estimated cost | From rates table |\n\nSortable by any column.\n\n## Session Log\n\nPaginated, most recent first. Per row: timestamp (yyyymmdd_hhmmss), project, model, token count, cost.\n\n## Nav Bar Indicator\n\nToday's cost shown on all screens. Links to this page.\n\n## How It Works\n\nReads AI session JSONL log files (not produced by this platform). Extracts: timestamp, project context, token counts, model name. Cost estimated from a user-editable rates table (model \u2192 cost per million tokens). Estimates labeled as estimates.\n\n## Data Flow\n\n| Reads | Writes |\n|-------|--------|\n| AI session JSONL logs (external) | Usage summary \u2192 nav bar |\n| Rates config file | |\n",
  "SCREEN-WORKFLOW": "# Screen: Workflow [ROADMAP]\n\n**Kanban board for feature tickets.** Structured lifecycle from idea to done with AI audit trail.\n\n---\n\n## Layout\n\nKanban columns (one per state) across all projects. Filter by project or tag.\n\n## States\n\n| State | Meaning |\n|-------|---------|\n| IDEA | First capture, not reviewed |\n| PROPOSED | Has summary and plan |\n| READY | Has acceptance criteria, scheduled for work |\n| IN DEVELOPMENT | AI session running or recently finished |\n| TESTING | Work complete, human validating |\n| DONE | Accepted |\n\n## Transitions\n\n```\nIDEA \u2192 PROPOSED \u2192 READY \u2192 IN DEVELOPMENT \u2192 TESTING \u2192 DONE\n                                \u2191              |\n                             READY \u2190\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518  (rework)\n                           PROPOSED \u2190\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500  (redesign)\n```\n\n## Ticket Detail\n\n- Title and description\n- Attachments (notes, images, audio)\n- Feature plan (at PROPOSED)\n- Acceptance criteria (at READY)\n- AI Transaction Log (after IN DEVELOPMENT): what was decided, what was built, why\n- Test notes (at TESTING)\n- State history timeline\n\n## Per-Project Ticket List\n\nCompact list grouped by state within the project detail view. New Ticket button.\n\n## Data Flow\n\n| Reads | Writes |\n|-------|--------|\n| User input | Ticket state \u2192 dashboard |\n| Usage analytics (cost for scheduling) | Transaction log \u2192 project git repo |\n",

marked.setOptions({ gfm: true, breaks: false });

function buildDocList() {
  const list = document.getElementById('doc-list');
  Object.keys(DOCS).sort().forEach(key => {
    const li = document.createElement('li');
    const a = document.createElement('a');
    a.textContent = key.replace(/-/g, ' ');
    a.onclick = () => showDoc(key);
    li.appendChild(a);
    list.appendChild(li);
  });
}

function showDoc(key) {
  if (!DOCS[key]) {
    console.warn('Document not found:', key);
    return;
  }
  document.getElementById('home-panel').style.display = 'none';
  document.getElementById('doc-panel').style.display = 'block';

  document.getElementById('doc-content').innerHTML = marked.parse(DOCS[key]);

  document.querySelectorAll('.file-list a').forEach(el => el.classList.remove('active'));
  const activeLink = Array.from(document.querySelectorAll('.file-list a')).find(a => a.textContent.replace(/ /g, '-') === key);
  if (activeLink) activeLink.classList.add('active');
}

buildDocList();
</script>
