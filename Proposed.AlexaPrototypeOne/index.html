<script>
const DOCS = {
  "01-OVERVIEW": "# 01 \u2014 Overview\n\n---\n\n## Purpose\n\nAlexa Prototype One routes voice commands spoken to an Alexa device into\nconfigurable local workflows. Speak a keyword phrase and a message is\ndispatched to a destination: a local file, a GAME ticket, a webhook, a script,\nor a Slack channel.\n\nThe system has two halves:\n\n- **Cloud half (AWS):** Alexa Skill + Lambda + SQS. Always on. Receives voice\n  and stores messages durably until the local machine is ready to process them.\n\n- **Local half:** A Python polling daemon reads routing rules from SQLite,\n  dispatches messages to destinations. A Flask UI at port 5002 lets you manage\n  routing rules and approve flagged commands.\n\n---\n\n## Core User Flow\n\n```\n1. User says:  \"Alexa, open command center\"\n               \"book idea about recursive data structures\"\n               (session ends)\n\n2. AWS:        Lambda enqueues {\"keyword_raw\": \"book idea about recursive data structures\", ...}\n               to SQS queue\n\n3. Local:      Daemon polls SQS, finds message\n               Matches routing rule: keyword=\"book idea\", destination=file_append\n               Appends \"[2026-03-11T14:23Z] book idea about recursive data structures\"\n               to data/ideas/book.txt\n               Deletes message from SQS\n\n4. User:       Sees entry in data/ideas/book.txt\n               Config UI at localhost:5002 shows message as 'completed'\n```\n\n---\n\n## Destination Types\n\n| Type | What it does | Example keyword |\n|------|-------------|-----------------|\n| `file_append` | Append text to a local file | \"book idea\", \"note\" |\n| `game_ticket` | Create a ticket in GAME | \"game ticket\" |\n| `api_endpoint` | POST to any HTTP endpoint | \"deploy request\" |\n| `run_script` | Run a local shell/Python script | \"process log\" |\n| `slack_webhook` | Post to Slack channel | \"team note\" |\n\nAll routing rules are user-configured in the Flask UI \u2014 no code change or\nLambda redeployment needed to add a new keyword.\n\n---\n\n## Offline Tolerance\n\nIf the local daemon is stopped:\n- Alexa still responds \"Got it.\" \u2014 Lambda and SQS remain operational\n- Messages accumulate in SQS (retained up to 4 days)\n- When the daemon restarts, it drains the backlog in order\n\nThis is the core architectural guarantee: voice commands are never lost due to\nthe local machine being offline or restarting.\n\n---\n\n## Confirmation\n\nSome routing rules are flagged `requires_confirmation`. These messages are held\nin a \"pending approval\" state and shown prominently in the config UI. The user\napproves or rejects before dispatch occurs. Useful for destructive operations\n(deploy scripts, deletes) where you want a human checkpoint.\n\n---\n\n## Tech Stack\n\n| Component | Technology |\n|-----------|------------|\n| Voice input | Amazon Alexa Skills Kit (ASK) |\n| Cloud receiver | AWS Lambda (Python 3.12) |\n| Message queue | Amazon SQS |\n| Routing engine | Python daemon (boto3 + SQLite) |\n| Config UI | Python Flask + Bootstrap 5 + HTMX |\n| Database | SQLite (data/alexa.db) |\n\nSee STACK.yaml for full configuration.\n\n---\n\n## Success Criteria\n\n- Voice command appears in config UI within 10 seconds of being spoken\n- Messages are not lost when daemon is offline (tested by stopping daemon, speaking, restarting)\n- A new routing rule (new keyword + destination) can be added via the UI without any code change\n- Destinations can be offline \u2014 file append always works; API endpoints retry up to 3 times\n- Confirmations appear at the top of the UI and block dispatch until approved or rejected\n- All dispatches are recorded in message_log with full audit trail\n",
  "02-ARCHITECTURE": "# 02 \u2014 Architecture\n\n---\n\n## System Diagram\n\n```\n\u250c\u2500\u2500\u2500 AWS Boundary \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510\n\u2502                                                                 \u2502\n\u2502   Alexa Device                                                  \u2502\n\u2502       \u2502 (speech \u2192 ASK cloud STT)                               \u2502\n\u2502       \u25bc                                                         \u2502\n\u2502   Alexa Skill (ASK)                                             \u2502\n\u2502       \u2502 IntentRequest / VoiceCommandIntent                      \u2502\n\u2502       \u25bc                                                         \u2502\n\u2502   AWS Lambda  \u2500\u2500\u25ba Amazon SQS Queue                             \u2502\n\u2502   (validates,      (durable, always on,                        \u2502\n\u2502    enqueues,        messages persist when                      \u2502\n\u2502    responds         daemon is offline)                         \u2502\n\u2502    \"Got it\")                                                    \u2502\n\u2502                                                                 \u2502\n\u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518\n\n\u250c\u2500\u2500\u2500 Local Machine \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510\n\u2502                                                                  \u2502\n\u2502   Python Daemon (daemon.py)                                      \u2502\n\u2502       \u2502 polls SQS every N seconds (boto3 long poll)             \u2502\n\u2502       \u2502 reads routing_rules from SQLite                         \u2502\n\u2502       \u2502 matches utterance \u2192 rule                                \u2502\n\u2502       \u2502                                                         \u2502\n\u2502       \u251c\u2500\u2500\u25ba game_ticket  \u2500\u2500\u25ba POST localhost:5001/api/ticket      \u2502\n\u2502       \u251c\u2500\u2500\u25ba file_append  \u2500\u2500\u25ba data/ideas/book.txt                 \u2502\n\u2502       \u251c\u2500\u2500\u25ba api_endpoint \u2500\u2500\u25ba any HTTP endpoint                   \u2502\n\u2502       \u251c\u2500\u2500\u25ba run_script   \u2500\u2500\u25ba bin/my-script.sh                    \u2502\n\u2502       \u251c\u2500\u2500\u25ba slack_webhook\u2500\u2500\u25ba Slack                               \u2502\n\u2502       \u2514\u2500\u2500\u25ba pending_confirm (held until UI approval)             \u2502\n\u2502                                                                  \u2502\n\u2502   Flask Config UI (app.py, port 5002)                            \u2502\n\u2502       - Routing rules CRUD                                       \u2502\n\u2502       - Message history                                          \u2502\n\u2502       - Pending confirmations                                    \u2502\n\u2502       - Daemon status                                            \u2502\n\u2502                                                                  \u2502\n\u2502   SQLite Database (data/alexa.db)                               \u2502\n\u2502       - routing_rules                                            \u2502\n\u2502       - message_log                                              \u2502\n\u2502       - confirmations                                            \u2502\n\u2502       - audit_log                                                \u2502\n\u2502                                                                  \u2502\n\u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518\n```\n\n---\n\n## Two Boundaries, Four Components\n\n### Cloud Components (AWS-managed, always available)\n\n**1. Alexa Skill (ASK)**\n- Handles speech-to-text via AWS ASK cloud infrastructure\n- Sends `IntentRequest` to Lambda with structured JSON\n- One intent: `VoiceCommandIntent` with `AMAZON.SearchQuery` slot captures full utterance\n- No local hosting required; configured in Alexa Developer Console\n- Lambda must respond within 8 seconds (timeout constraint)\n\n**2. AWS Lambda**\n- Validates Alexa skill ID, extracts utterance, writes SQS message, returns \"Got it.\"\n- Stateless \u2014 no database, no routing logic\n- ~200ms execution time; well within 8s Alexa deadline\n- Costs: free tier covers personal use indefinitely\n\n**3. Amazon SQS Queue**\n- Durable message store that bridges cloud and local\n- **Store-and-forward**: if daemon is offline, messages accumulate in queue (up to 4 days retention)\n- Standard queue (not FIFO) \u2014 at-least-once delivery\n- Dead letter queue (DLQ) after 3 failed receive attempts\n- Long polling reduces API calls and cost\n\n### Local Components (developer machine, started on demand)\n\n**4. Python Daemon (daemon.py)**\n- Polls SQS every 5 seconds (configurable)\n- Matches utterances against `routing_rules` table\n- Dispatches to 5 destination types\n- Handles confirmations, retries, and failure states\n- PID file at `data/daemon.pid`\n\n**5. Flask Config UI (app.py, port 5002)**\n- Routing rules management\n- Message history and audit log viewer\n- Pending confirmations queue with approve/reject\n- No voice processing \u2014 display-only interface\n\n---\n\n## Key Design Decisions\n\n### Why Lambda, not Flask-as-Alexa-endpoint\n\nAlexa Skills require an HTTPS endpoint with a valid TLS certificate accessible\nfrom the internet. A local Flask server is not directly accessible. Options are:\n\n1. **Lambda** (chosen) \u2014 native AWS, zero infrastructure, free tier sufficient\n2. **ngrok** \u2014 tunnels localhost to HTTPS URL; works for development but not production\n\nThe v2 architecture uses Lambda for production and ngrok for local development testing\nof the Lambda code itself. The Flask UI at port 5002 never receives Alexa requests.\n\n### Why SQS, not direct webhook to Flask\n\nDirect webhook (Lambda \u2192 POST to localhost) would require:\n- The local machine to be publicly reachable (ngrok or port forwarding)\n- The Flask server to always be running\n- Complex retry logic if Flask is down\n\nSQS solves all three: Lambda and daemon are fully decoupled, the local machine needs\nno inbound connectivity, and messages wait in the queue indefinitely.\n\n### Why SQLite routing rules, not hardcoded intents\n\nHardcoded Alexa intents (CommandIntent, IdeaIntent, etc.) require redeploying the\nLambda + rebuilding the Alexa interaction model for every new keyword. SQLite routing\nrules require only a database row insert \u2014 no deployment, no restart.\n\n### Outbox Pattern\n\nThe `message_log` table implements the distributed systems \"outbox pattern\":\nmessages are recorded to the local database atomically with SQS receipt, and\nonly deleted from SQS after confirmed successful dispatch. This guarantees\nat-least-once delivery to destinations.\n\n---\n\n## Failure Modes\n\n| Failure | Behavior |\n|---------|----------|\n| Daemon offline | SQS retains messages up to 4 days; daemon drains queue on restart |\n| Destination unreachable | Dispatch fails; SQS re-delivers after visibility timeout; retried up to 3 times |\n| Lambda error (SQS send fails) | Alexa hears \"Something went wrong\"; no message recorded |\n| SQLite locked | daemon retries via Python sqlite3 retry; Flask returns 503 |\n| SQS DLQ threshold reached | Message moves to DLQ; visible in AWS console; not retried automatically |\n\n---\n\n## Local Development Flow\n\n```\n1. Create AWS resources:   SQS queue + Lambda function (see 10-AWS-SETUP.md)\n2. Configure .env:         AWS credentials + SQS_QUEUE_URL + ALEXA_SKILL_ID\n3. Initialize DB:          python init_db.py\n4. Start Flask UI:         bin/start.sh         (port 5002)\n5. Start daemon:           bin/start-daemon.sh  (background process)\n6. Test Lambda:            aws lambda invoke ... (with test event JSON)\n7. Watch queue drain:      check GET /api/messages in the UI\n```\n\nNo ngrok required for the normal dev loop \u2014 test Lambda directly with `aws lambda invoke`.\nngrok is only needed if you want to test with a physical Alexa device.\n",
  "03-DATABASE": "# 03 \u2014 Database Schema\n\nSQLite database at `data/alexa.db`. WAL mode enabled. Foreign keys enforced.\nInitialized by `init_db.py` on first run; safe to re-run (idempotent).\n\nSee `stack/sqlite.md` for connection patterns and query conventions.\n\n---\n\n## Tables\n\n### routing_rules\n\nThe core configuration table. Each row maps a keyword pattern to a destination.\nSeeded with defaults by `init_db.py`. User-editable via the config UI.\n\n```sql\nCREATE TABLE IF NOT EXISTS routing_rules (\n    id                  INTEGER PRIMARY KEY AUTOINCREMENT,\n    keyword             TEXT NOT NULL,\n    match_type          TEXT NOT NULL DEFAULT 'contains',\n    -- 'exact' | 'contains' | 'startswith'\n    destination_type    TEXT NOT NULL,\n    -- 'game_ticket' | 'file_append' | 'api_endpoint' | 'run_script' | 'slack_webhook'\n    destination_config  TEXT NOT NULL DEFAULT '{}',\n    -- JSON object; schema varies by destination_type (see 06-ROUTING-RULES.md)\n    requires_confirmation INTEGER NOT NULL DEFAULT 0,  -- boolean\n    priority            INTEGER NOT NULL DEFAULT 100,\n    -- Lower integer = higher priority. First matching rule wins.\n    enabled             INTEGER NOT NULL DEFAULT 1,    -- boolean\n    description         TEXT,\n    created_at          TEXT NOT NULL DEFAULT (datetime('now')),\n    updated_at          TEXT NOT NULL DEFAULT (datetime('now'))\n);\n\nCREATE INDEX IF NOT EXISTS idx_rules_enabled_priority\n    ON routing_rules (enabled, priority);\nCREATE UNIQUE INDEX IF NOT EXISTS idx_rules_keyword_type\n    ON routing_rules (keyword, match_type);\n```\n\n**destination_config JSON schemas** (see 06-ROUTING-RULES.md for full detail):\n\n| destination_type | Required keys |\n|-----------------|---------------|\n| `game_ticket`   | `project_keyword` |\n| `file_append`   | `path`, `format` |\n| `api_endpoint`  | `url`, `method` |\n| `run_script`    | `script` |\n| `slack_webhook` | `webhook_url` |\n\n---\n\n### message_log\n\nRecords every message received from SQS \u2014 its lifecycle from receipt through dispatch.\nThis is the primary audit trail and the source of truth for the config UI's message view.\n\n```sql\nCREATE TABLE IF NOT EXISTS message_log (\n    id                  TEXT PRIMARY KEY,\n    -- SQS message ID (UUID, set by AWS)\n    sqs_receipt_handle  TEXT,\n    -- SQS receipt handle; required to delete message after processing\n    keyword_raw         TEXT NOT NULL,\n    -- Full utterance text as received from Alexa (lowercase normalized)\n    matched_rule_id     INTEGER REFERENCES routing_rules(id) ON DELETE SET NULL,\n    alexa_session_id    TEXT,\n    user_id             TEXT,\n    device_id           TEXT,\n    status              TEXT NOT NULL DEFAULT 'received',\n    -- State machine:\n    --   received \u2192 dispatching \u2192 completed\n    --   received \u2192 pending_confirm \u2192 confirmed \u2192 dispatching \u2192 completed\n    --   received \u2192 pending_confirm \u2192 rejected\n    --   dispatching \u2192 failed (on dispatch error)\n    destination_type    TEXT,\n    destination_config  TEXT,           -- JSON snapshot of rule config at dispatch time\n    requires_confirmation INTEGER DEFAULT 0,\n    retry_count         INTEGER NOT NULL DEFAULT 0,\n    max_retries         INTEGER NOT NULL DEFAULT 3,\n    error_msg           TEXT,\n    received_at         TEXT NOT NULL DEFAULT (datetime('now')),\n    dispatching_at      TEXT,\n    completed_at        TEXT,\n    result              TEXT            -- JSON response from destination (if any)\n);\n\nCREATE INDEX IF NOT EXISTS idx_msg_status     ON message_log (status);\nCREATE INDEX IF NOT EXISTS idx_msg_received   ON message_log (received_at DESC);\nCREATE INDEX IF NOT EXISTS idx_msg_rule       ON message_log (matched_rule_id);\n```\n\n---\n\n### confirmations\n\nTracks approval decisions for messages where `requires_confirmation = 1`.\n\n```sql\nCREATE TABLE IF NOT EXISTS confirmations (\n    id          INTEGER PRIMARY KEY AUTOINCREMENT,\n    message_id  TEXT NOT NULL REFERENCES message_log(id) ON DELETE CASCADE,\n    status      TEXT NOT NULL DEFAULT 'pending',\n    -- 'pending' | 'approved' | 'rejected' | 'timed_out'\n    created_at  TEXT NOT NULL DEFAULT (datetime('now')),\n    decided_at  TEXT,\n    decided_by  TEXT        -- 'user' | 'auto_timeout'\n);\n\nCREATE INDEX IF NOT EXISTS idx_conf_message  ON confirmations (message_id);\nCREATE INDEX IF NOT EXISTS idx_conf_status   ON confirmations (status);\n```\n\n---\n\n### audit_log\n\nAppend-only event log. Written by daemon and Flask UI for every significant\nstate transition. Never modified after insert.\n\n```sql\nCREATE TABLE IF NOT EXISTS audit_log (\n    id          INTEGER PRIMARY KEY AUTOINCREMENT,\n    event_type  TEXT NOT NULL,\n    -- 'sqs_received' | 'rule_matched' | 'rule_unmatched' | 'dispatched'\n    -- | 'dispatch_failed' | 'confirm_requested' | 'confirm_approved'\n    -- | 'confirm_rejected' | 'confirm_timed_out' | 'sqs_deleted'\n    message_id  TEXT,\n    rule_id     INTEGER,\n    details     TEXT,       -- JSON with event-specific data\n    success     INTEGER,    -- boolean\n    created_at  TEXT NOT NULL DEFAULT (datetime('now'))\n);\n\nCREATE INDEX IF NOT EXISTS idx_audit_message   ON audit_log (message_id);\nCREATE INDEX IF NOT EXISTS idx_audit_event     ON audit_log (event_type);\nCREATE INDEX IF NOT EXISTS idx_audit_created   ON audit_log (created_at DESC);\n```\n\n---\n\n## Default Seed Data\n\nInserted by `init_db.py` if `routing_rules` is empty:\n\n```sql\nINSERT INTO routing_rules (keyword, match_type, destination_type, destination_config, description)\nVALUES\n    ('game ticket',  'contains', 'game_ticket',  '{\"project_keyword\": \"GAME\", \"auto_approve\": false}',\n     'Create a GAME workflow ticket'),\n    ('book idea',    'contains', 'file_append',  '{\"path\": \"data/ideas/book.txt\", \"format\": \"[{timestamp}] {utterance}\\n\"}',\n     'Append to book ideas file'),\n    ('note',         'startswith','file_append', '{\"path\": \"data/notes.txt\", \"format\": \"[{timestamp}] {utterance}\\n\"}',\n     'Append to general notes'),\n    ('end',          'exact',    'session_close', '{}',\n     'Close Alexa session (no external dispatch)');\n```\n\n---\n\n## db.py \u2014 Initialization Pattern\n\n```python\nimport sqlite3, os\nfrom contextlib import contextmanager\n\nDB_PATH = os.environ.get('DB_PATH', 'data/alexa.db')\n\n@contextmanager\ndef get_db():\n    conn = sqlite3.connect(DB_PATH)\n    conn.row_factory = sqlite3.Row\n    conn.execute(\"PRAGMA journal_mode=WAL\")\n    conn.execute(\"PRAGMA foreign_keys=ON\")\n    try:\n        yield conn\n        conn.commit()\n    except Exception:\n        conn.rollback()\n        raise\n    finally:\n        conn.close()\n\ndef init_db():\n    os.makedirs(os.path.dirname(DB_PATH), exist_ok=True)\n    with get_db() as conn:\n        with open('schema.sql') as f:\n            conn.executescript(f.read())\n        # Seed defaults if empty\n        row = conn.execute(\"SELECT COUNT(*) FROM routing_rules\").fetchone()\n        if row[0] == 0:\n            _seed_defaults(conn)\n```\n",
  "04-LAMBDA-SKILL": "# 04 \u2014 Lambda Function & Alexa Skill\n\nThe Lambda function is the cloud-side entry point. It receives every Alexa intent,\nvalidates the request, extracts the utterance, enqueues it to SQS, and returns an\nAlexa confirmation response. All routing logic happens in the local daemon \u2014 Lambda\nnever calls localhost.\n\n---\n\n## SQS Message Envelope (Canonical Definition)\n\nThis is the contract between Lambda (producer) and the daemon (consumer).\nBoth sides must use exactly this schema. Do not add fields without updating both.\n\n```json\n{\n  \"message_id\": \"uuid4-string\",\n  \"keyword_raw\": \"full utterance text from Alexa, lowercase normalized\",\n  \"alexa_session_id\": \"amzn1.echo-api.session.xxx\",\n  \"user_id\": \"amzn1.ask.account.xxx\",\n  \"device_id\": \"amzn1.ask.device.xxx\",\n  \"timestamp\": \"2026-03-11T14:23:01Z\"\n}\n```\n\n- `message_id`: generated by Lambda via `str(uuid.uuid4())`\n- `keyword_raw`: `slots['utterance']['value']` lowercased and stripped\n- `timestamp`: UTC ISO-8601, `datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ')`\n- `alexa_session_id`, `user_id`, `device_id`: extracted from Alexa request JSON\n\n---\n\n## Alexa Skill Configuration\n\n**Skill type:** Custom\n**Invocation name:** \"command center\" (user says \"Alexa, open command center\")\n**Languages:** en-US\n\n### Interaction Model\n\n**One intent: `VoiceCommandIntent`**\n\nUsing a single free-text intent is the correct architecture. Adding separate\nintents per keyword (CommandIntent, IdeaIntent, etc.) would require Alexa model\nredeployment every time routing rules change. With a single free-text intent,\nrouting is controlled entirely via the `routing_rules` SQLite table.\n\n```json\n{\n  \"name\": \"VoiceCommandIntent\",\n  \"slots\": [\n    {\n      \"name\": \"utterance\",\n      \"type\": \"AMAZON.SearchQuery\"\n    }\n  ],\n  \"samples\": [\n    \"{utterance}\",\n    \"tell me {utterance}\",\n    \"command {utterance}\",\n    \"note {utterance}\"\n  ]\n}\n```\n\n**Use `AMAZON.SearchQuery`, not `AMAZON.AlphaNumeric`.**\n`AMAZON.SearchQuery` is designed for free-form natural language phrases and\ncaptures multi-word utterances reliably. `AMAZON.AlphaNumeric` truncates at\nword boundaries and misses common words. Test with utterances 5+ words long.\n\nAlso include standard built-in intents (required for certification):\n- `AMAZON.StopIntent`\n- `AMAZON.CancelIntent`\n- `AMAZON.HelpIntent`\n\n### Endpoint\n\nSet endpoint type to **Lambda function ARN** (not HTTPS).\nPaste the Lambda function ARN from the AWS console after deploying.\n\n---\n\n## Lambda Function: `lambda_function.py`\n\n```python\nimport json\nimport os\nimport uuid\nimport logging\nfrom datetime import datetime, timezone\n\nimport boto3\n\nlogger = logging.getLogger()\nlogger.setLevel(logging.INFO)\n\nsqs = boto3.client('sqs', region_name=os.environ['AWS_REGION'])\nQUEUE_URL = os.environ['SQS_QUEUE_URL']\nSKILL_ID = os.environ['ALEXA_SKILL_ID']\n\n\ndef lambda_handler(event, context):\n    \"\"\"Entry point for all Alexa requests.\"\"\"\n    # 1. Validate skill ID\n    application_id = event.get('session', {}).get('application', {}).get('applicationId', '')\n    if application_id != SKILL_ID:\n        logger.warning(f\"Rejected request from unknown skill: {application_id}\")\n        return _error_response(\"Unauthorized skill.\")\n\n    request_type = event.get('request', {}).get('type', '')\n\n    # 2. Handle session lifecycle\n    if request_type == 'LaunchRequest':\n        return _speech_response(\"Command center ready. Go ahead.\", end_session=False)\n\n    if request_type == 'SessionEndedRequest':\n        return _empty_response()\n\n    if request_type != 'IntentRequest':\n        return _empty_response()\n\n    intent_name = event['request']['intent']['name']\n\n    # 3. Handle built-in intents\n    if intent_name in ('AMAZON.StopIntent', 'AMAZON.CancelIntent'):\n        return _speech_response(\"Goodbye.\", end_session=True)\n\n    if intent_name == 'AMAZON.HelpIntent':\n        return _speech_response(\"Say anything after opening command center and I'll route it.\", end_session=False)\n\n    # 4. Handle VoiceCommandIntent\n    if intent_name == 'VoiceCommandIntent':\n        return _handle_voice_command(event)\n\n    return _speech_response(\"I didn't understand that.\", end_session=True)\n\n\ndef _handle_voice_command(event):\n    slots = event['request']['intent'].get('slots', {})\n    utterance_slot = slots.get('utterance', {})\n    utterance = utterance_slot.get('value', '').strip().lower()\n\n    if not utterance:\n        return _speech_response(\"I didn't catch that. Try again.\", end_session=False)\n\n    session = event.get('session', {})\n    user = session.get('user', {})\n    context_obj = event.get('context', {})\n    system = context_obj.get('System', {})\n\n    message = {\n        'message_id': str(uuid.uuid4()),\n        'keyword_raw': utterance,\n        'alexa_session_id': session.get('sessionId', ''),\n        'user_id': user.get('userId', ''),\n        'device_id': system.get('device', {}).get('deviceId', ''),\n        'timestamp': datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ'),\n    }\n\n    try:\n        sqs.send_message(\n            QueueUrl=QUEUE_URL,\n            MessageBody=json.dumps(message),\n            MessageAttributes={\n                'source': {'StringValue': 'alexa', 'DataType': 'String'}\n            }\n        )\n        logger.info(f\"Enqueued message {message['message_id']}: {utterance[:80]}\")\n        return _speech_response(\"Got it.\", end_session=True)\n    except Exception as e:\n        logger.error(f\"Failed to enqueue: {e}\")\n        return _speech_response(\"Sorry, something went wrong. Try again.\", end_session=True)\n\n\ndef _speech_response(text, end_session=True):\n    return {\n        'version': '1.0',\n        'response': {\n            'outputSpeech': {'type': 'PlainText', 'text': text},\n            'shouldEndSession': end_session,\n        }\n    }\n\ndef _error_response(text):\n    return _speech_response(text, end_session=True)\n\ndef _empty_response():\n    return {'version': '1.0', 'response': {}}\n```\n\n---\n\n## IAM Role\n\nThe Lambda function needs an execution role with:\n\n1. **Managed policy**: `AWSLambdaBasicExecutionRole` (CloudWatch Logs)\n2. **Inline policy** \u2014 SQS send only:\n\n```json\n{\n  \"Version\": \"2012-10-17\",\n  \"Statement\": [{\n    \"Effect\": \"Allow\",\n    \"Action\": [\"sqs:SendMessage\"],\n    \"Resource\": \"arn:aws:sqs:{region}:{account-id}:alexa-prototype-queue\"\n  }]\n}\n```\n\nNo other permissions. Lambda cannot read from the queue \u2014 that is the daemon's job.\n\n---\n\n## Configuration\n\n### Lambda Environment Variables\n\n| Variable | Value |\n|----------|-------|\n| `AWS_REGION` | e.g. `us-east-1` |\n| `SQS_QUEUE_URL` | Full queue URL from AWS console |\n| `ALEXA_SKILL_ID` | `amzn1.ask.skill.xxxxxxxx-xxxx-...` |\n\n`AWS_ACCESS_KEY_ID` and `AWS_SECRET_ACCESS_KEY` are NOT needed in Lambda \u2014\nit uses its IAM execution role automatically.\n\n### Lambda Settings\n\n| Setting | Value |\n|---------|-------|\n| Runtime | Python 3.12 |\n| Handler | `lambda_function.lambda_handler` |\n| Timeout | 5 seconds |\n| Memory | 128 MB |\n| Architecture | x86_64 |\n\n---\n\n## Deployment\n\nPackage and upload as a zip file (no frameworks required for prototype):\n\n```bash\n# From lambda/ directory\nzip -r lambda.zip lambda_function.py\naws lambda update-function-code \\\n    --function-name alexa-prototype-handler \\\n    --zip-file fileb://lambda.zip\n```\n\nThe Lambda directory is `lambda/` in the project root. It contains only\n`lambda_function.py` \u2014 boto3 is available in the Lambda Python 3.12 runtime\nwithout packaging.\n\n---\n\n## Local Testing (Without Alexa)\n\nDuring development, test the Lambda by sending a crafted event directly:\n\n```bash\naws lambda invoke \\\n    --function-name alexa-prototype-handler \\\n    --payload file://test_events/voice_command.json \\\n    response.json\ncat response.json\n```\n\nSample test event at `test_events/voice_command.json`:\n```json\n{\n  \"session\": {\n    \"sessionId\": \"test-session-001\",\n    \"application\": {\"applicationId\": \"YOUR_SKILL_ID\"},\n    \"user\": {\"userId\": \"test-user-001\"}\n  },\n  \"context\": {\"System\": {\"device\": {\"deviceId\": \"test-device-001\"}}},\n  \"request\": {\n    \"type\": \"IntentRequest\",\n    \"intent\": {\n      \"name\": \"VoiceCommandIntent\",\n      \"slots\": {\n        \"utterance\": {\"name\": \"utterance\", \"value\": \"book idea about machine learning\"}\n      }\n    }\n  },\n  \"version\": \"1.0\"\n}\n```\n",
  "05-DAEMON": "# 05 \u2014 SQS Polling Daemon\n\nThe daemon is a long-running Python process (not a Flask app \u2014 no HTTP server).\nIt polls SQS, matches routing rules, dispatches to destinations, and manages the\nmessage lifecycle. It is started and stopped via `bin/start-daemon.sh` / `bin/stop-daemon.sh`.\n\n---\n\n## Process Model\n\n**Single-threaded, synchronous dispatch.** The daemon processes one SQS batch\nat a time. It does not run parallel dispatches. This keeps state simple and\navoids concurrent writes to SQLite.\n\n**Implication for slow scripts:** If a `run_script` destination takes 25 seconds,\nthe next SQS poll is delayed by 25 seconds. This is acceptable for a personal\nprototype. The SQS message's visibility timeout (30s default) must exceed the\nlongest expected dispatch time \u2014 if it doesn't, SQS re-delivers before dispatch\ncompletes, causing a duplicate. See \"Visibility Timeout\" section below.\n\n**Concurrency upgrade path:** Add a `ThreadPoolExecutor` with max 4 workers in a\nlater iteration if slow dispatches become a problem. Not in scope for v1.\n\n---\n\n## Main Loop\n\n```python\n# daemon.py\nimport json\nimport logging\nimport os\nimport signal\nimport sys\nimport time\n\nimport boto3\nfrom dotenv import load_dotenv\n\nfrom db import get_db, init_db\nfrom dispatcher import dispatch\nfrom routing import match_rule, load_rules\nfrom confirmations import handle_pending_confirmations\n\nload_dotenv()\nlogger = logging.getLogger(__name__)\n\nQUEUE_URL = os.environ['SQS_QUEUE_URL']\nPOLL_INTERVAL = int(os.environ.get('DAEMON_POLL_INTERVAL', '5'))\nPID_FILE = 'data/daemon.pid'\n\nsqs = boto3.client('sqs', region_name=os.environ['AWS_REGION'])\nrunning = True\n\n\ndef handle_signal(signum, frame):\n    global running\n    logger.info(f\"[GAME] Service Stopped: SQS Daemon\")\n    running = False\n\n\ndef main():\n    signal.signal(signal.SIGTERM, handle_signal)\n    signal.signal(signal.SIGINT, handle_signal)\n\n    # Write PID file\n    os.makedirs('data', exist_ok=True)\n    with open(PID_FILE, 'w') as f:\n        f.write(str(os.getpid()))\n\n    init_db()\n    logger.info(f\"[GAME] Service Starting: SQS Daemon\")\n    logger.info(f\"[GAME] Service Started: SQS Daemon polling {QUEUE_URL}\")\n\n    try:\n        while running:\n            poll_and_dispatch()\n            handle_pending_confirmations()\n            time.sleep(POLL_INTERVAL)\n    finally:\n        if os.path.exists(PID_FILE):\n            os.remove(PID_FILE)\n        logger.info(\"[GAME] Service Stopped: SQS Daemon\")\n\n\ndef poll_and_dispatch():\n    \"\"\"Receive up to 10 messages, process each, delete on success.\"\"\"\n    response = sqs.receive_message(\n        QueueUrl=QUEUE_URL,\n        MaxNumberOfMessages=10,\n        WaitTimeSeconds=20,     # Long polling \u2014 reduces empty receive API calls\n        MessageAttributeNames=['All'],\n    )\n    messages = response.get('Messages', [])\n    if not messages:\n        return\n\n    rules = load_rules()    # Re-read from SQLite on every cycle\n\n    for msg in messages:\n        receipt = msg['ReceiptHandle']\n        try:\n            body = json.loads(msg['Body'])\n        except json.JSONDecodeError as e:\n            logger.error(f\"Invalid SQS message body: {e}\")\n            _delete_message(receipt)    # Malformed \u2014 discard\n            continue\n\n        _process_message(body, receipt, rules)\n\n\nif __name__ == '__main__':\n    logging.basicConfig(level=logging.INFO,\n                        format='%(asctime)s %(levelname)s %(name)s: %(message)s')\n    main()\n```\n\n---\n\n## Message Processing\n\n```python\ndef _process_message(body: dict, receipt: str, rules: list):\n    message_id = body['message_id']\n    utterance = body['keyword_raw']\n\n    # 1. Write to message_log (received state)\n    with get_db() as conn:\n        conn.execute(\"\"\"\n            INSERT OR IGNORE INTO message_log\n            (id, sqs_receipt_handle, keyword_raw, status, received_at)\n            VALUES (?, ?, ?, 'received', datetime('now'))\n        \"\"\", (message_id, receipt, utterance))\n\n    # 2. Match routing rule\n    rule = match_rule(utterance, rules)\n    if rule is None:\n        logger.info(f\"No rule matched for: {utterance!r}\")\n        _update_status(message_id, 'completed', error_msg='No rule matched')\n        _delete_message(receipt)    # Discard unmatched messages\n        _audit(message_id, 'rule_unmatched', success=True)\n        return\n\n    # 3. Log rule match\n    with get_db() as conn:\n        conn.execute(\"\"\"\n            UPDATE message_log SET matched_rule_id=?, destination_type=?,\n            destination_config=?, requires_confirmation=?\n            WHERE id=?\n        \"\"\", (rule['id'], rule['destination_type'],\n              rule['destination_config'], rule['requires_confirmation'], message_id))\n    _audit(message_id, 'rule_matched', rule_id=rule['id'], success=True)\n\n    # 4. Check confirmation requirement\n    if rule['requires_confirmation']:\n        _hold_for_confirmation(message_id, receipt, rule)\n        return\n\n    # 5. Dispatch\n    _do_dispatch(message_id, receipt, body, rule)\n```\n\n---\n\n## Dispatch\n\n```python\ndef _do_dispatch(message_id, receipt, body, rule):\n    _update_status(message_id, 'dispatching')\n    try:\n        result = dispatch(rule['destination_type'], rule['destination_config'], body)\n        _update_status(message_id, 'completed', result=result)\n        _delete_message(receipt)\n        _audit(message_id, 'dispatched', rule_id=rule['id'], success=True)\n    except Exception as e:\n        logger.error(f\"Dispatch failed for {message_id}: {e}\")\n        _increment_retry(message_id, str(e))\n        _audit(message_id, 'dispatch_failed', success=False,\n               details={'error': str(e)})\n        # Do NOT delete from SQS \u2014 visibility timeout causes re-delivery\n```\n\n---\n\n## Visibility Timeout and Retry\n\nWhen dispatch fails, the message is **not deleted from SQS**. SQS will re-deliver\nit after the visibility timeout (30s by default).\n\n**If retry_count reaches max_retries (3):**\n- Mark `message_log.status = 'failed'` permanently\n- Delete from SQS to prevent infinite re-delivery\n- Log to audit_log\n\nThis requires the daemon to track retries in `message_log` and check them:\n\n```python\ndef _increment_retry(message_id, error_msg):\n    with get_db() as conn:\n        row = conn.execute(\n            \"SELECT retry_count, max_retries FROM message_log WHERE id=?\",\n            (message_id,)\n        ).fetchone()\n        if row and row['retry_count'] + 1 >= row['max_retries']:\n            conn.execute(\"\"\"\n                UPDATE message_log SET status='failed', retry_count=retry_count+1,\n                error_msg=? WHERE id=?\n            \"\"\", (error_msg, message_id))\n            # Caller must also delete from SQS in this case\n        else:\n            conn.execute(\"\"\"\n                UPDATE message_log SET retry_count=retry_count+1, error_msg=?\n                WHERE id=?\n            \"\"\", (error_msg, message_id))\n```\n\n---\n\n## Confirmation Hold\n\nWhen a rule has `requires_confirmation=1`:\n\n```python\ndef _hold_for_confirmation(message_id, receipt, rule):\n    # 1. Extend SQS visibility timeout to 12 hours\n    sqs.change_message_visibility(\n        QueueUrl=QUEUE_URL,\n        ReceiptHandle=receipt,\n        VisibilityTimeout=43200     # 12 hours in seconds\n    )\n    # 2. Update message_log\n    _update_status(message_id, 'pending_confirm')\n    # 3. Insert confirmation record\n    with get_db() as conn:\n        conn.execute(\"\"\"\n            INSERT INTO confirmations (message_id, status, created_at)\n            VALUES (?, 'pending', datetime('now'))\n        \"\"\", (message_id,))\n    _audit(message_id, 'confirm_requested', rule_id=rule['id'], success=True)\n    logger.info(f\"Holding message {message_id} for confirmation\")\n```\n\nSee 07-CONFIRMATION-FLOW.md for the full approval lifecycle.\n\n---\n\n## bin/start-daemon.sh\n\n```bash\n#!/bin/bash\n# CommandCenter Operation\n# Name: Start Daemon\n# Description: Start the SQS polling daemon\n\nexport PORT=${PORT:-5002}\nPROJECT_ROOT=\"$(cd \"$(dirname \"$0\")/..\" && pwd)\"\nLOG_DIR=\"$PROJECT_ROOT/data/logs\"\nmkdir -p \"$LOG_DIR\"\nLOG_FILE=\"$LOG_DIR/StartDaemon_$(date +%Y%m%d_%H%M%S).log\"\n\ncd \"$PROJECT_ROOT\"\nsource venv/bin/activate 2>/dev/null || true\n\necho \"[GAME] Service Starting: SQS Daemon\" | tee -a \"$LOG_FILE\"\npython daemon.py >> \"$LOG_FILE\" 2>&1 &\necho \"[GAME] Service Started: SQS Daemon (PID $!)\" | tee -a \"$LOG_FILE\"\n```\n\n## bin/stop-daemon.sh\n\n```bash\n#!/bin/bash\n# CommandCenter Operation\n# Name: Stop Daemon\n\nPROJECT_ROOT=\"$(cd \"$(dirname \"$0\")/..\" && pwd)\"\nPID_FILE=\"$PROJECT_ROOT/data/daemon.pid\"\n\nif [ ! -f \"$PID_FILE\" ]; then\n    echo \"Daemon not running (no PID file).\"\n    exit 0\nfi\n\nPID=$(cat \"$PID_FILE\")\nkill \"$PID\" 2>/dev/null && echo \"Sent SIGTERM to PID $PID\" || echo \"PID $PID not found.\"\n```\n",
  "06-ROUTING-RULES": "# 06 \u2014 Routing Rules\n\nRouting rules are the core configuration object. Each rule maps a keyword pattern\nto a destination. The daemon evaluates incoming utterances against all enabled rules\nand dispatches to the first match.\n\n---\n\n## Keyword Matching Algorithm\n\nThe daemon calls `match_rule(utterance, rules)` on every SQS message:\n\n```python\ndef match_rule(utterance: str, rules: list[dict]) -> dict | None:\n    \"\"\"\n    Returns the first enabled rule whose keyword matches the utterance,\n    ordered by priority ASC (lower integer = higher priority).\n    Returns None if no rule matches.\n    \"\"\"\n    text = utterance.strip().lower()\n    for rule in sorted(rules, key=lambda r: r['priority']):\n        if not rule['enabled']:\n            continue\n        kw = rule['keyword'].lower()\n        match_type = rule['match_type']\n        if match_type == 'exact' and text == kw:\n            return rule\n        elif match_type == 'contains' and kw in text:\n            return rule\n        elif match_type == 'startswith' and text.startswith(kw):\n            return rule\n    return None\n```\n\n**Only the first matching rule is dispatched.** If you need fan-out (one utterance\ntriggers multiple rules), add a `fan_out: true` flag to STACK.yaml \u2014 not in scope\nfor v1. Use `priority` to control which rule wins when multiple would match.\n\n**Rules are re-read from SQLite on every poll cycle** \u2014 no in-memory cache.\nThis means routing changes take effect within one poll interval without a daemon restart.\n\n---\n\n## Match Types\n\n| match_type | Behavior | Example keyword | Matches |\n|------------|----------|-----------------|---------|\n| `exact` | Full string equality (stripped, lowercased) | `end` | \"end\", \"END\", \" end \" |\n| `contains` | Substring present anywhere | `book idea` | \"add book idea\", \"this is a book idea about python\" |\n| `startswith` | Utterance begins with keyword | `note` | \"note remember to call Alex\", \"note meeting summary\" |\n\n---\n\n## Destination Types\n\n### 1. `game_ticket`\n\nCreates a ticket in the GAME Command Center via its API.\n\n```json\n{\n  \"project_keyword\": \"GAME\",\n  \"auto_approve\": false,\n  \"priority\": \"medium\",\n  \"tags\": [\"voice\", \"alexa\"]\n}\n```\n\n- `project_keyword` (required): GAME project name to file the ticket under\n- `auto_approve` (optional, default false): if true, auto-approve after creation\n- `priority` (optional, default \"medium\"): ticket priority\n- `tags` (optional): list of tags to apply\n\nDispatch: `POST {GAME_API_URL}/api/project/{project_keyword}/ticket/create`\nwith `{title: utterance, description: utterance, tags: [...], priority: priority}`\n\n---\n\n### 2. `file_append`\n\nAppends a formatted line to a local file. Creates file and parent directories\nif they don't exist.\n\n```json\n{\n  \"path\": \"data/ideas/book.txt\",\n  \"format\": \"[{timestamp}] {utterance}\\n\"\n}\n```\n\n- `path` (required): file path relative to project root\n- `format` (required): format string using Python `.format()` syntax\n\n**Format string variables:**\n\n| Variable | Value |\n|----------|-------|\n| `{utterance}` | Full raw utterance text |\n| `{timestamp}` | ISO-8601 datetime, UTC, e.g. `2026-03-11T14:23:01Z` |\n| `{date}` | Date only, e.g. `2026-03-11` |\n| `{keyword}` | Matched keyword from the rule |\n| `{message_id}` | SQS message ID |\n\nExample output line: `[2026-03-11T14:23:01Z] add dark mode to login screen`\n\n---\n\n### 3. `api_endpoint`\n\nHTTP POST (or GET) to any URL. Useful for webhooks, local services, or IFTTT.\n\n```json\n{\n  \"url\": \"http://localhost:5001/api/ingest\",\n  \"method\": \"POST\",\n  \"headers\": {\"Authorization\": \"Bearer token\"},\n  \"body_template\": \"{\\\"text\\\": \\\"{utterance}\\\", \\\"source\\\": \\\"alexa\\\"}\"\n}\n```\n\n- `url` (required): full URL\n- `method` (optional, default \"POST\"): HTTP method\n- `headers` (optional): dict of extra headers. `Content-Type: application/json` is always sent.\n- `body_template` (optional): JSON string with `{utterance}` substitution. If omitted,\n  sends the full SQS message envelope as JSON body.\n\nDispatch timeout: 10 seconds. On timeout, mark `status='failed'`, log error, do not delete from SQS.\n\n---\n\n### 4. `run_script`\n\nRuns a local shell script or Python file. The utterance is passed as `$1`\n(argv[1]) and also via `ALEXA_UTTERANCE` environment variable.\n\n```json\n{\n  \"script\": \"bin/process-idea.sh\",\n  \"timeout\": 30,\n  \"cwd\": null\n}\n```\n\n- `script` (required): path relative to project root\n- `timeout` (optional, default 30): seconds before SIGTERM\n- `cwd` (optional): working directory override; defaults to project root\n\nThe daemon calls: `subprocess.run([script, utterance], timeout=timeout, capture_output=True)`\n\nstdout/stderr is captured and stored in `message_log.result` as JSON:\n`{\"stdout\": \"...\", \"stderr\": \"...\", \"returncode\": 0}`\n\nNon-zero returncode = dispatch failure; retry logic applies.\n\n---\n\n### 5. `slack_webhook`\n\nPosts a formatted message to a Slack incoming webhook.\n\n```json\n{\n  \"webhook_url\": \"https://hooks.slack.com/services/T.../B.../...\",\n  \"channel\": \"#voice-log\",\n  \"username\": \"Alexa\",\n  \"icon_emoji\": \":microphone:\",\n  \"template\": \"*{keyword}*: {utterance}\"\n}\n```\n\n- `webhook_url` (required): Slack incoming webhook URL\n- `channel` (optional): override channel\n- `username` (optional): display name\n- `icon_emoji` (optional): emoji icon\n- `template` (optional, default \"`{utterance}`\"): message text template\n\n---\n\n## Special Destination: `session_close`\n\nNot a real destination \u2014 a sentinel value handled entirely within the daemon.\nWhen matched, the daemon:\n1. Deletes the message from SQS\n2. Logs a `session_close` event to audit_log\n3. Does NOT dispatch externally\n4. The Lambda has already told Alexa to close the session via `shouldEndSession: true`\n\n---\n\n## Priority and Conflict Resolution\n\n| Priority value | Meaning |\n|---------------|---------|\n| 0\u201349 | High priority \u2014 always evaluated first |\n| 50\u201399 | Normal priority |\n| 100+ | Low priority / fallback rules |\n\n**Default seed rules all use priority 100.** If a user adds a more specific rule\n(e.g. `\"book idea for work\"` as `exact`), give it a lower priority integer so it\nwins over the broader `\"book idea\"` `contains` rule.\n\n---\n\n## Config UI Integration\n\nSee 08-CONFIG-UI.md for the routing rules management screens. The UI provides:\n- List view of all rules (sortable by priority)\n- Create / edit / delete forms\n- Toggle enabled/disabled per rule without deleting\n- Test a rule: enter sample utterance text, see which rule would match\n",
  "07-CONFIRMATION-FLOW": "# 07 \u2014 Confirmation Flow\n\nSome routing rules are flagged `requires_confirmation = 1`. These messages are\nheld in a pending state until the user approves or rejects them in the config UI.\nMessages are not dispatched until explicitly approved.\n\n---\n\n## State Transitions\n\n```\nSQS message received\n        \u2193\n  rule matched\n        \u2193\nrequires_confirmation = 1?\n   YES \u2193              NO \u2192 dispatch immediately\npending_confirm\n   \u2193           \u2193\napproved    rejected (or timed_out)\n   \u2193               \u2193\ndispatching      sqs_deleted (no dispatch)\n   \u2193\ncompleted\n```\n\n---\n\n## Hold Flow (Daemon)\n\nWhen the daemon encounters a message whose matched rule has `requires_confirmation = 1`:\n\n1. **Extend SQS visibility timeout to 12 hours**\n   - Prevents SQS from re-delivering the message before the user acts\n   - SQS default (30s) would cause re-delivery and duplicate confirmation requests\n   - 12 hours = `VisibilityTimeout=43200`\n\n2. **Update `message_log.status = 'pending_confirm'`**\n\n3. **Insert row into `confirmations` table** with `status='pending'`\n\n4. **Do not delete from SQS** \u2014 the receipt handle must be retained in\n   `message_log.sqs_receipt_handle` for deletion after approval\n\nThe daemon emits no Alexa response at confirmation time \u2014 Alexa has already\nreceived \"Got it\" from Lambda. The Lambda response may optionally say\n\"Got it, that needs your approval.\" if the `ALEXA_SKILL_ID` hint is set, but\nthis requires Lambda to query the routing rules (adds latency and complexity \u2014\nnot in scope for v1).\n\n---\n\n## Approval Flow (Config UI \u2192 Daemon)\n\n**User action:** Clicks \"Approve\" button in the Pending Confirmations section.\n\n**Flask route:** `POST /api/confirmations/<confirmation_id>/approve`\n\n```python\n@bp.route('/api/confirmations/<int:conf_id>/approve', methods=['POST'])\ndef approve_confirmation(conf_id):\n    with get_db() as conn:\n        row = conn.execute(\n            \"SELECT * FROM confirmations WHERE id=?\", (conf_id,)\n        ).fetchone()\n        if not row or row['status'] != 'pending':\n            return jsonify({'error': 'Not found or already decided'}), 404\n\n        conn.execute(\"\"\"\n            UPDATE confirmations SET status='approved', decided_at=datetime('now'),\n            decided_by='user' WHERE id=?\n        \"\"\", (conf_id,))\n        conn.execute(\"\"\"\n            UPDATE message_log SET status='confirmed' WHERE id=?\n        \"\"\", (row['message_id'],))\n    return jsonify({'status': 'approved'})\n```\n\n**Daemon side** (called in `handle_pending_confirmations()` each poll cycle):\n\n```python\ndef handle_pending_confirmations():\n    \"\"\"Find confirmed messages and dispatch them.\"\"\"\n    with get_db() as conn:\n        rows = conn.execute(\"\"\"\n            SELECT ml.*, c.id as conf_id\n            FROM message_log ml\n            JOIN confirmations c ON c.message_id = ml.id\n            WHERE ml.status = 'confirmed' AND c.status = 'approved'\n        \"\"\").fetchall()\n\n    for row in rows:\n        rule = _get_rule_by_id(row['matched_rule_id'])\n        if rule:\n            body = {\n                'message_id': row['id'],\n                'keyword_raw': row['keyword_raw'],\n            }\n            _do_dispatch(row['id'], row['sqs_receipt_handle'],\n                         body, rule)\n```\n\n---\n\n## Rejection Flow (Config UI \u2192 Daemon)\n\n**Flask route:** `POST /api/confirmations/<confirmation_id>/reject`\n\n```python\n@bp.route('/api/confirmations/<int:conf_id>/reject', methods=['POST'])\ndef reject_confirmation(conf_id):\n    with get_db() as conn:\n        row = conn.execute(\n            \"SELECT * FROM confirmations WHERE id=?\", (conf_id,)\n        ).fetchone()\n        if not row or row['status'] != 'pending':\n            return jsonify({'error': 'Not found or already decided'}), 404\n\n        # Get the SQS receipt to delete the message\n        msg = conn.execute(\n            \"SELECT sqs_receipt_handle FROM message_log WHERE id=?\",\n            (row['message_id'],)\n        ).fetchone()\n\n        conn.execute(\"\"\"\n            UPDATE confirmations SET status='rejected', decided_at=datetime('now'),\n            decided_by='user' WHERE id=?\n        \"\"\", (conf_id,))\n        conn.execute(\"\"\"\n            UPDATE message_log SET status='rejected', completed_at=datetime('now')\n            WHERE id=?\n        \"\"\", (row['message_id'],))\n\n    # Delete from SQS so it's not re-delivered\n    if msg and msg['sqs_receipt_handle']:\n        sqs.delete_message(QueueUrl=QUEUE_URL, ReceiptHandle=msg['sqs_receipt_handle'])\n\n    return jsonify({'status': 'rejected'})\n```\n\n---\n\n## Auto-Timeout\n\nA background check (run inside `handle_pending_confirmations()`) auto-rejects\nconfirmations older than 24 hours:\n\n```python\ndef auto_timeout_confirmations():\n    \"\"\"Reject pending confirmations older than 24 hours.\"\"\"\n    with get_db() as conn:\n        stale = conn.execute(\"\"\"\n            SELECT c.id, c.message_id, ml.sqs_receipt_handle\n            FROM confirmations c\n            JOIN message_log ml ON ml.id = c.message_id\n            WHERE c.status = 'pending'\n              AND c.created_at < datetime('now', '-24 hours')\n        \"\"\").fetchall()\n\n        for row in stale:\n            conn.execute(\"\"\"\n                UPDATE confirmations SET status='timed_out',\n                decided_at=datetime('now'), decided_by='auto_timeout'\n                WHERE id=?\n            \"\"\", (row['id'],))\n            conn.execute(\"\"\"\n                UPDATE message_log SET status='rejected',\n                error_msg='auto_timeout', completed_at=datetime('now')\n                WHERE id=?\n            \"\"\", (row['message_id'],))\n            if row['sqs_receipt_handle']:\n                sqs.delete_message(QueueUrl=QUEUE_URL,\n                                   ReceiptHandle=row['sqs_receipt_handle'])\n```\n\n---\n\n## Config UI Display\n\nThe config UI homepage (`GET /`) shows a **Pending Confirmations** section at the\ntop of the page when any confirmations have `status='pending'`. The section is\nvisually highlighted (orange border / warning color in Bootstrap5).\n\nPer confirmation row:\n- Utterance text (what was said)\n- Matched rule description\n- Time received (relative: \"5 minutes ago\")\n- Destination preview (e.g., \"\u2192 game_ticket: GAME\")\n- **Approve** button (green) \u2014 `hx-post=\"/api/confirmations/{id}/approve\"`\n- **Reject** button (red) \u2014 `hx-post=\"/api/confirmations/{id}/reject\"`\n\nBoth buttons use HTMX to update in-place without page reload. On action, the\nrow fades out and the count in the section header decrements.\n\nIf no pending confirmations, the section is not rendered (hidden, not empty).\n\n---\n\n## Rules That Should Use requires_confirmation\n\nSuggested defaults (user-configurable):\n- Any rule that sends to an external API (`api_endpoint`) \u2014 default ON\n- Any rule that runs a script (`run_script`) \u2014 default ON\n- GAME ticket creation \u2014 default OFF (fast feedback loop preferred)\n- File append \u2014 default OFF (low stakes)\n- Slack webhook \u2014 default OFF (informational)\n",
  "08-CONFIG-UI": "# 08 \u2014 Configuration UI\n\nStandalone Flask application at port 5002. Provides routing rules management,\nmessage history, and confirmation approvals. It is NOT embedded in GAME \u2014 it\nruns as an independent service. The Flask UI and the daemon share the same\nSQLite database but are separate processes.\n\n---\n\n## Pages and Routes\n\n### Dashboard \u2014 `GET /`\n\nThe homepage. Shows live operational status at a glance.\n\n**Sections (top to bottom):**\n\n1. **Pending Confirmations** (shown only if count > 0)\n   - Orange/warning highlight\n   - Table: Utterance | Rule | Time Ago | Destination | Approve | Reject\n   - HTMX: approve/reject update row in-place, decrement counter\n\n2. **Queue Stats** (4 stat cards)\n   - SQS Depth: `GET /api/queue/depth` (boto3 ApproximateNumberOfMessages)\n   - Messages Today: count from message_log\n   - Completed Today: count where status='completed'\n   - Failed / Pending: counts\n\n3. **Daemon Status**\n   - Green \"Running\" or red \"Stopped\" badge\n   - Based on PID file + process check (see `GET /api/daemon/status`)\n\n4. **Recent Messages** (last 20)\n   - Table: Time | Utterance (truncated 60 chars) | Matched Rule | Status badge | Destination\n   - Status badge colors: received=blue, dispatching=yellow, completed=green, failed=red, pending_confirm=orange\n\nAuto-refreshes via HTMX `hx-trigger=\"every 10s\"` on the stats and recent messages sections.\n\n---\n\n### Routing Rules \u2014 `GET /rules`\n\nFull list of all routing_rules rows.\n\n**Table columns:**\n- Priority (sortable)\n- Keyword\n- Match Type badge (exact / contains / startswith)\n- Destination Type\n- Destination Summary (first 40 chars of config)\n- Confirm? (checkbox icon)\n- Enabled (toggle, HTMX inline update)\n- Actions: Edit | Delete\n\n**\"New Rule\" button** links to `GET /rules/new`.\n\n---\n\n### New Rule \u2014 `GET /rules/new`, `POST /rules`\n\nForm fields:\n- Keyword (text input)\n- Match Type (select: contains / exact / startswith)\n- Priority (number, default 100)\n- Destination Type (select: game_ticket / file_append / api_endpoint / run_script / slack_webhook)\n- Destination Config (textarea, JSON \u2014 hints shown below field for selected type)\n- Requires Confirmation (checkbox)\n- Description (text input, optional)\n- Enabled (checkbox, default checked)\n\nOn POST: validate JSON in destination_config; return form with errors inline if invalid.\nOn success: redirect to `GET /rules`.\n\n---\n\n### Edit Rule \u2014 `GET /rules/<id>/edit`, `POST /rules/<id>`\n\nSame form as New Rule, pre-populated. POST updates the row and redirects to `GET /rules`.\n\n---\n\n### Delete Rule \u2014 `POST /rules/<id>/delete`\n\nSoft-confirm via Bootstrap modal (client-side JS). On confirm: delete row, redirect to `GET /rules`.\nIf the rule has associated message_log rows, set `matched_rule_id = NULL` (FK SET NULL).\n\n---\n\n### Message History \u2014 `GET /messages`\n\nPaginated log of all messages. Default: 50 per page, most recent first.\n\n**Filter bar:**\n- Status: All / received / dispatching / completed / failed / pending_confirm / rejected\n- Date range: today / last 7 days / custom\n- Search: utterance text (LIKE match)\n\n**Table columns:**\n- Time (relative + full on hover)\n- Utterance (full text)\n- Status badge\n- Rule matched (or \"No rule\")\n- Destination\n- Retry count (if > 0)\n- Detail link \u2192 `GET /messages/<id>`\n\n---\n\n### Message Detail \u2014 `GET /messages/<id>`\n\nFull record for one message:\n- All `message_log` fields\n- Associated confirmation record (if any)\n- Audit log entries for this message (chronological)\n- Raw SQS message body\n\n---\n\n### Test Rule \u2014 `GET /rules/test` (HTMX fragment endpoint)\n\nUtility: enter an utterance, see which rule would match.\n\n```\nGET /rules/test?utterance=book+idea+about+python\n\u2192 Returns HTML fragment: \"Matched: 'book idea' (contains) \u2192 file_append: data/ideas/book.txt\"\n  or \"No rule matched.\"\n```\n\nUsed inline in the Rules list page via HTMX.\n\n---\n\n## Templates\n\n```\ntemplates/\n\u251c\u2500\u2500 base.html                # Bootstrap5 dark theme, nav, HTMX CDN\n\u251c\u2500\u2500 dashboard.html           # extends base.html\n\u251c\u2500\u2500 rules/\n\u2502   \u251c\u2500\u2500 list.html\n\u2502   \u251c\u2500\u2500 form.html            # shared for new + edit\n\u2502   \u2514\u2500\u2500 _rule_row.html       # HTMX partial for enabled toggle\n\u251c\u2500\u2500 messages/\n\u2502   \u251c\u2500\u2500 list.html\n\u2502   \u2514\u2500\u2500 detail.html\n\u2514\u2500\u2500 partials/\n    \u251c\u2500\u2500 _pending_confirmations.html  # HTMX auto-refresh target\n    \u251c\u2500\u2500 _queue_stats.html            # HTMX auto-refresh target\n    \u2514\u2500\u2500 _recent_messages.html        # HTMX auto-refresh target\n```\n\n`base.html` includes:\n- Bootstrap 5 CSS (CDN, dark theme via `data-bs-theme=\"dark\"`)\n- Bootstrap 5 JS bundle (CDN)\n- HTMX (CDN, `hx-boost=\"true\"` on body)\n- Nav links: Dashboard | Rules | Messages\n\n---\n\n## HTMX Patterns\n\n**Auto-refresh stats:**\n```html\n<div id=\"queue-stats\"\n     hx-get=\"/partials/queue-stats\"\n     hx-trigger=\"every 10s\"\n     hx-swap=\"outerHTML\">\n  ...current stats...\n</div>\n```\n\n**Inline confirmation approve:**\n```html\n<button hx-post=\"/api/confirmations/{{ conf.id }}/approve\"\n        hx-target=\"#conf-row-{{ conf.id }}\"\n        hx-swap=\"outerHTML swap:0.5s\"\n        class=\"btn btn-sm btn-success\">Approve</button>\n```\n\n**Enabled toggle:**\n```html\n<input type=\"checkbox\" {{ 'checked' if rule.enabled }}\n       hx-post=\"/api/rules/{{ rule.id }}/toggle\"\n       hx-swap=\"none\">\n```\n\n---\n\n## Flask Structure\n\n```python\n# app.py\nfrom flask import Flask\nfrom routes.dashboard import bp as dashboard_bp\nfrom routes.rules import bp as rules_bp\nfrom routes.messages import bp as messages_bp\nfrom routes.api import bp as api_bp\nfrom db import init_db\n\ndef create_app():\n    app = Flask(__name__)\n    app.config['SECRET_KEY'] = os.environ.get('SECRET_KEY', 'dev-key-change-me')\n    with app.app_context():\n        init_db()\n    app.register_blueprint(dashboard_bp)\n    app.register_blueprint(rules_bp, url_prefix='/rules')\n    app.register_blueprint(messages_bp, url_prefix='/messages')\n    app.register_blueprint(api_bp, url_prefix='/api')\n    return app\n```\n\n---\n\n## Design System\n\nFollows `stack/bootstrap5.md`. Key choices:\n- `data-bs-theme=\"dark\"` on `<html>`\n- Primary color for actions: `btn-primary`\n- Status badges: use `bg-success`, `bg-warning`, `bg-danger`, `bg-secondary`, `bg-info`\n- Confirmation section: `border border-warning rounded p-3 mb-4`\n- Stat cards: 4-column Bootstrap grid, `card` component with large number in `card-body`\n",
  "09-API": "# 09 \u2014 API Reference\n\nAll JSON API endpoints for the Flask config UI. Used by HTMX partials and\ncan be called by external tools (curl, GAME integration, etc.).\n\nAuthentication: `Authorization: Bearer {SECRET_KEY}` header on all `/api/` routes.\nOmit auth for HTMX-triggered endpoints (they originate from the same origin).\n\n---\n\n## Routing Rules\n\n### GET /api/rules\n\nReturns all routing rules ordered by priority ASC.\n\n**Response 200:**\n```json\n{\n  \"rules\": [\n    {\n      \"id\": 1,\n      \"keyword\": \"game ticket\",\n      \"match_type\": \"contains\",\n      \"destination_type\": \"game_ticket\",\n      \"destination_config\": {\"project_keyword\": \"GAME\", \"auto_approve\": false},\n      \"requires_confirmation\": false,\n      \"priority\": 100,\n      \"enabled\": true,\n      \"description\": \"Create a GAME workflow ticket\",\n      \"created_at\": \"2026-03-11T14:00:00\",\n      \"updated_at\": \"2026-03-11T14:00:00\"\n    }\n  ],\n  \"total\": 4\n}\n```\n\n---\n\n### POST /api/rules\n\nCreate a new routing rule.\n\n**Request:**\n```json\n{\n  \"keyword\": \"slack note\",\n  \"match_type\": \"startswith\",\n  \"destination_type\": \"slack_webhook\",\n  \"destination_config\": {\n    \"webhook_url\": \"https://hooks.slack.com/services/...\",\n    \"template\": \"{utterance}\"\n  },\n  \"requires_confirmation\": false,\n  \"priority\": 50,\n  \"description\": \"Post to Slack dev channel\",\n  \"enabled\": true\n}\n```\n\n**Response 201:**\n```json\n{\"id\": 5, \"status\": \"created\"}\n```\n\n**Response 400** (validation failure):\n```json\n{\"error\": \"destination_config missing required key: webhook_url\"}\n```\n\n---\n\n### PUT /api/rules/<id>\n\nUpdate an existing rule. Accepts same body as POST. Returns 200 `{\"status\": \"updated\"}`.\n\n---\n\n### DELETE /api/rules/<id>\n\nDelete a rule. Returns 200 `{\"status\": \"deleted\"}`.\n\n---\n\n### POST /api/rules/<id>/toggle\n\nToggle `enabled` flag. Returns 200 `{\"enabled\": true}`.\n\n---\n\n### GET /api/rules/test?utterance=<text>\n\nTest which rule would match a given utterance.\n\n**Response 200:**\n```json\n{\n  \"matched\": true,\n  \"rule\": {\n    \"id\": 2,\n    \"keyword\": \"book idea\",\n    \"match_type\": \"contains\",\n    \"destination_type\": \"file_append\"\n  }\n}\n```\n\n```json\n{\"matched\": false, \"rule\": null}\n```\n\n---\n\n## Confirmations\n\n### GET /api/confirmations\n\nReturns all pending confirmations with message details.\n\n**Response 200:**\n```json\n{\n  \"confirmations\": [\n    {\n      \"id\": 3,\n      \"message_id\": \"uuid-...\",\n      \"utterance\": \"deploy production server\",\n      \"rule_description\": \"Run deploy script\",\n      \"destination_type\": \"run_script\",\n      \"destination_summary\": \"bin/deploy.sh\",\n      \"created_at\": \"2026-03-11T14:00:00\",\n      \"age_minutes\": 12\n    }\n  ],\n  \"total\": 1\n}\n```\n\n---\n\n### POST /api/confirmations/<id>/approve\n\nApprove a pending confirmation. Daemon dispatches on next poll.\n\n**Response 200:** `{\"status\": \"approved\"}`\n**Response 404:** `{\"error\": \"Not found or already decided\"}`\n\n---\n\n### POST /api/confirmations/<id>/reject\n\nReject a pending confirmation. Deletes from SQS immediately.\n\n**Response 200:** `{\"status\": \"rejected\"}`\n\n---\n\n## Messages\n\n### GET /api/messages\n\nReturns recent messages. Query params: `status`, `limit` (default 50), `offset`.\n\n**Response 200:**\n```json\n{\n  \"messages\": [\n    {\n      \"id\": \"uuid-...\",\n      \"keyword_raw\": \"book idea about machine learning\",\n      \"status\": \"completed\",\n      \"matched_rule_id\": 2,\n      \"destination_type\": \"file_append\",\n      \"retry_count\": 0,\n      \"received_at\": \"2026-03-11T14:23:01\",\n      \"completed_at\": \"2026-03-11T14:23:03\"\n    }\n  ],\n  \"total\": 142,\n  \"has_more\": true\n}\n```\n\n---\n\n## Daemon Status\n\n### GET /api/daemon/status\n\nChecks if daemon process is running.\n\n```python\nimport os, psutil\n\n@bp.route('/api/daemon/status')\ndef daemon_status():\n    pid_file = 'data/daemon.pid'\n    if not os.path.exists(pid_file):\n        return jsonify({'running': False, 'pid': None})\n    pid = int(open(pid_file).read().strip())\n    running = psutil.pid_exists(pid)\n    return jsonify({'running': running, 'pid': pid if running else None})\n```\n\n**Response 200:**\n```json\n{\"running\": true, \"pid\": 12345}\n```\n```json\n{\"running\": false, \"pid\": null}\n```\n\n---\n\n## Queue Depth\n\n### GET /api/queue/depth\n\nReturns current SQS queue message counts.\n\n```python\n@bp.route('/api/queue/depth')\ndef queue_depth():\n    sqs = boto3.client('sqs', region_name=os.environ['AWS_REGION'])\n    attrs = sqs.get_queue_attributes(\n        QueueUrl=os.environ['SQS_QUEUE_URL'],\n        AttributeNames=[\n            'ApproximateNumberOfMessages',\n            'ApproximateNumberOfMessagesNotVisible',\n        ]\n    )['Attributes']\n    return jsonify({\n        'available': int(attrs['ApproximateNumberOfMessages']),\n        'in_flight': int(attrs['ApproximateNumberOfMessagesNotVisible']),\n    })\n```\n\n**Response 200:**\n```json\n{\"available\": 3, \"in_flight\": 1}\n```\n\n---\n\n## Partials (HTMX fragments)\n\nThese routes return HTML fragments, not JSON. Used for auto-refresh.\n\n| Route | Returns |\n|-------|---------|\n| `GET /partials/queue-stats` | Queue stats card grid HTML |\n| `GET /partials/pending-confirmations` | Confirmations section HTML (empty string if none) |\n| `GET /partials/recent-messages` | Recent messages table body HTML |\n| `GET /partials/daemon-status` | Daemon status badge HTML |\n\n---\n\n## Health\n\n### GET /health\n\nReturns 200 if Flask is up and SQLite is reachable.\n\n```json\n{\"status\": \"ok\", \"db\": \"ok\", \"daemon\": true}\n```\n\nReturns 503 if DB is unreachable.\n\n---\n\n## Error Codes\n\n| Code | Meaning |\n|------|---------|\n| 400 | Invalid request body / missing required field |\n| 404 | Resource not found |\n| 409 | Conflict (e.g., duplicate keyword+match_type) |\n| 500 | Unhandled server error |\n| 503 | Database or SQS unavailable |\n",
  "10-AWS-SETUP": "# 10 \u2014 AWS Setup\n\nStep-by-step instructions to create all required AWS resources.\nAssumes an AWS account exists and `aws` CLI is configured with admin credentials locally.\n\n---\n\n## 1. Create SQS Queue\n\n**AWS Console \u2192 SQS \u2192 Create Queue**\n\n| Setting | Value |\n|---------|-------|\n| Type | Standard (not FIFO) |\n| Name | `alexa-prototype-queue` |\n| Visibility timeout | 30 seconds |\n| Message retention | 4 days (345,600 seconds) |\n| Maximum message size | 256 KB (default) |\n| Receive message wait time | 20 seconds (enables long polling) |\n| Dead-letter queue | Create new (see below) |\n\n**Create DLQ first:**\n\n| Setting | Value |\n|---------|-------|\n| Type | Standard |\n| Name | `alexa-prototype-dlq` |\n| Message retention | 14 days |\n\nThen go back to creating `alexa-prototype-queue` and set:\n- Dead-letter queue: `alexa-prototype-dlq`\n- Maximum receives: `3`\n\n**Copy the queue URL** (format: `https://sqs.{region}.amazonaws.com/{account-id}/alexa-prototype-queue`).\nThis becomes `SQS_QUEUE_URL` in your `.env` and Lambda environment variables.\n\n---\n\n## 2. Create Lambda Function\n\n**AWS Console \u2192 Lambda \u2192 Create Function**\n\n| Setting | Value |\n|---------|-------|\n| Function name | `alexa-prototype-handler` |\n| Runtime | Python 3.12 |\n| Architecture | x86_64 |\n| Execution role | Create a new role with basic Lambda permissions |\n\nAfter creation:\n\n**Configuration \u2192 General configuration:**\n- Timeout: 5 seconds\n- Memory: 128 MB\n\n**Configuration \u2192 Environment variables \u2014 add:**\n| Key | Value |\n|-----|-------|\n| `AWS_REGION` | e.g. `us-east-1` |\n| `SQS_QUEUE_URL` | The full queue URL from Step 1 |\n| `ALEXA_SKILL_ID` | (fill in after Step 4 \u2014 come back to this) |\n\nNote: `AWS_ACCESS_KEY_ID` and `AWS_SECRET_ACCESS_KEY` are NOT needed in Lambda \u2014\nthe IAM execution role handles credentials.\n\n---\n\n## 3. Grant Lambda Permission to Write to SQS\n\n**AWS Console \u2192 IAM \u2192 Roles \u2192 find the role Lambda created in Step 2**\n\nAdd an inline policy named `SQSSendMessage`:\n\n```json\n{\n  \"Version\": \"2012-10-17\",\n  \"Statement\": [\n    {\n      \"Effect\": \"Allow\",\n      \"Action\": [\"sqs:SendMessage\"],\n      \"Resource\": \"arn:aws:sqs:{region}:{account-id}:alexa-prototype-queue\"\n    }\n  ]\n}\n```\n\nReplace `{region}` and `{account-id}` with your actual values.\n\n---\n\n## 4. Deploy Lambda Code\n\n```bash\ncd /path/to/AlexaPrototypeOne/lambda\nzip lambda.zip lambda_function.py\naws lambda update-function-code \\\n    --function-name alexa-prototype-handler \\\n    --zip-file fileb://lambda.zip\n```\n\n---\n\n## 5. Create Alexa Skill\n\n**developer.amazon.com/alexa/console/ask \u2192 Create Skill**\n\n| Setting | Value |\n|---------|-------|\n| Skill name | Command Center |\n| Default language | English (US) |\n| Model | Custom |\n| Hosting | Provision your own (not Alexa-hosted) |\n| Template | Start from scratch |\n\n**Invocation Name:** `command center`\n(User says: \"Alexa, open command center\")\n\n### Build Interaction Model\n\n**JSON editor tab \u2192 paste:**\n\n```json\n{\n  \"interactionModel\": {\n    \"languageModel\": {\n      \"invocationName\": \"command center\",\n      \"intents\": [\n        {\n          \"name\": \"VoiceCommandIntent\",\n          \"slots\": [\n            {\"name\": \"utterance\", \"type\": \"AMAZON.SearchQuery\"}\n          ],\n          \"samples\": [\n            \"{utterance}\",\n            \"command {utterance}\",\n            \"note {utterance}\",\n            \"tell me {utterance}\"\n          ]\n        },\n        {\"name\": \"AMAZON.StopIntent\", \"samples\": []},\n        {\"name\": \"AMAZON.CancelIntent\", \"samples\": []},\n        {\"name\": \"AMAZON.HelpIntent\", \"samples\": []}\n      ]\n    }\n  }\n}\n```\n\nClick **Build Model** and wait for it to complete (~30 seconds).\n\n### Set Endpoint\n\n**Endpoint \u2192 AWS Lambda ARN**\n\nPaste the Lambda function ARN from Step 2.\n(Format: `arn:aws:lambda:{region}:{account-id}:function:alexa-prototype-handler`)\n\nClick **Save Endpoints**.\n\n**Copy the Skill ID** from the top of the page.\n(Format: `amzn1.ask.skill.xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx`)\n\n---\n\n## 6. Grant Alexa Permission to Invoke Lambda\n\nRun this in your AWS CLI:\n\n```bash\naws lambda add-permission \\\n    --function-name alexa-prototype-handler \\\n    --statement-id alexa-trigger \\\n    --action lambda:InvokeFunction \\\n    --principal alexa-appkit.amazon.com \\\n    --event-source-token YOUR_SKILL_ID\n```\n\nReplace `YOUR_SKILL_ID` with the skill ID from Step 5.\n\n---\n\n## 7. Update Lambda Environment Variable\n\nGo back to Lambda \u2192 Configuration \u2192 Environment variables.\nSet `ALEXA_SKILL_ID` to the skill ID from Step 5.\n\n---\n\n## 8. Create Local .env File\n\n```bash\n# /mnt/c/Users/barlo/projects/AlexaPrototypeOne/.env\n\n# AWS Credentials (for local daemon + Flask UI)\nAWS_ACCESS_KEY_ID=AKIAXXXXXXXXXXXXXXXX\nAWS_SECRET_ACCESS_KEY=xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx\nAWS_REGION=us-east-1\n\n# SQS\nSQS_QUEUE_URL=https://sqs.us-east-1.amazonaws.com/123456789012/alexa-prototype-queue\n\n# Alexa Skill\nALEXA_SKILL_ID=amzn1.ask.skill.xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx\n\n# Optional\nSECRET_KEY=change-me-for-production\nDAEMON_POLL_INTERVAL=5\nGAME_API_URL=http://localhost:5001\nGAME_API_KEY=\nFLASK_DEBUG=1\n```\n\nThe `.env` file is gitignored. Never commit it.\n\n---\n\n## 9. Verify End-to-End\n\n```bash\n# 1. Initialize database\nsource venv/bin/activate\npython init_db.py\n\n# 2. Test Lambda directly (no Alexa device needed)\naws lambda invoke \\\n    --function-name alexa-prototype-handler \\\n    --payload file://test_events/voice_command.json \\\n    /tmp/response.json\ncat /tmp/response.json\n# Expected: {\"version\": \"1.0\", \"response\": {\"outputSpeech\": {\"type\": \"PlainText\", \"text\": \"Got it.\"}, ...}}\n\n# 3. Check SQS for the message\naws sqs receive-message \\\n    --queue-url $SQS_QUEUE_URL \\\n    --attribute-names All\n\n# 4. Start daemon + UI\nbin/start-daemon.sh\nbin/start.sh\n\n# 5. Open dashboard\nopen http://localhost:5002\n# Expected: message appears in Recent Messages with status 'completed'\n```\n\n---\n\n## Estimated Cost (Personal Use)\n\n| Service | Free Tier | Expected Usage | Cost |\n|---------|-----------|----------------|------|\n| Lambda | 1M requests/month | ~1,000/month | $0 |\n| SQS | 1M requests/month | ~10,000/month | $0 |\n| CloudWatch Logs | 5 GB/month | < 1 MB | $0 |\n\nThis project stays entirely within AWS Free Tier for personal use.\n",
  "11-STARTUP": "# 11 \u2014 Startup Sequence\n\n---\n\n## Prerequisites\n\n1. AWS resources created per 10-AWS-SETUP.md (Lambda, SQS queue, Alexa Skill)\n2. `.env` file populated with all required environment variables\n3. Python 3.12+, `venv` created:\n   ```bash\n   python -m venv venv\n   source venv/bin/activate\n   pip install -r requirements.txt\n   ```\n\n### requirements.txt\n\n```\nflask>=3.0\npython-dotenv>=1.0\nboto3>=1.34\npsutil>=5.9\n```\n\n---\n\n## Step 1: Initialize Database\n\n```bash\nsource venv/bin/activate\npython init_db.py\n```\n\n`init_db.py` does:\n1. Creates `data/` directory if missing\n2. Creates all four tables (routing_rules, message_log, confirmations, audit_log)\n3. Seeds default routing_rules if the table is empty\n4. Idempotent \u2014 safe to run again; uses `CREATE TABLE IF NOT EXISTS`\n\nExpected output:\n```\nDatabase initialized: data/alexa.db\nSeeded 4 default routing rules.\n```\n\nIf `data/alexa.db` already exists with rows, outputs:\n```\nDatabase initialized: data/alexa.db\nRouting rules already seeded (4 rows) \u2014 skipping.\n```\n\n---\n\n## Step 2: Start Flask Config UI\n\n```bash\nbin/start.sh\n```\n\nFlask starts at `http://localhost:5002`.\n\nStartup validation in `create_app()`:\n- Checks SQLite is readable (runs `SELECT 1`)\n- Checks `.env` vars are loaded (warns but does not abort if AWS vars missing)\n- Logs warning if `data/daemon.pid` does not exist (daemon not running)\n\n---\n\n## Step 3: Start Daemon\n\n```bash\nbin/start-daemon.sh\n```\n\nDaemon startup sequence:\n1. Load `.env`\n2. Write PID to `data/daemon.pid`\n3. Call `init_db()` (idempotent)\n4. Verify SQS connectivity:\n   ```python\n   sqs.get_queue_attributes(QueueUrl=QUEUE_URL,\n                             AttributeNames=['ApproximateNumberOfMessages'])\n   ```\n   If SQS is unreachable, log error and exit with code 1.\n5. Emit `[GAME] Service Started: SQS Daemon`\n6. Begin poll loop\n\n---\n\n## Step 4: Deploy Lambda\n\n```bash\ncd lambda\nzip lambda.zip lambda_function.py\naws lambda update-function-code \\\n    --function-name alexa-prototype-handler \\\n    --zip-file fileb://lambda.zip\n```\n\nLambda is updated in ~5 seconds. No restart required \u2014 Lambda instances are replaced automatically.\n\n---\n\n## Full System Verification Test\n\n```bash\n# 1. Send a test message directly to Lambda (simulates Alexa)\naws lambda invoke \\\n    --function-name alexa-prototype-handler \\\n    --payload '{\"session\":{\"sessionId\":\"test-1\",\"application\":{\"applicationId\":\"YOUR_SKILL_ID\"},\"user\":{\"userId\":\"test-user\"}},\"context\":{\"System\":{\"device\":{\"deviceId\":\"test-device\"}}},\"request\":{\"type\":\"IntentRequest\",\"intent\":{\"name\":\"VoiceCommandIntent\",\"slots\":{\"utterance\":{\"name\":\"utterance\",\"value\":\"book idea about testing the system\"}}}}}' \\\n    /tmp/test_response.json\n\n# 2. Verify Lambda response\ncat /tmp/test_response.json\n# Expected: {\"response\": {\"outputSpeech\": {\"text\": \"Got it.\"}, ...}}\n\n# 3. Wait one poll cycle (5 seconds), then check the UI\nopen http://localhost:5002\n# Expected: recent messages shows \"book idea about testing the system\" with status 'completed'\n\n# 4. Verify the file was written\ncat data/ideas/book.txt\n# Expected: [2026-03-11T...Z] book idea about testing the system\n```\n\n---\n\n## Directory Layout (After Startup)\n\n```\nAlexaPrototypeOne/\n\u251c\u2500\u2500 app.py                    # Flask factory\n\u251c\u2500\u2500 daemon.py                 # SQS polling daemon\n\u251c\u2500\u2500 init_db.py                # Database initialization\n\u251c\u2500\u2500 schema.sql                # SQL DDL (imported by init_db.py)\n\u251c\u2500\u2500 db.py                     # get_db() context manager\n\u251c\u2500\u2500 dispatcher.py             # dispatch() by destination_type\n\u251c\u2500\u2500 routing.py                # match_rule(), load_rules()\n\u251c\u2500\u2500 confirmations.py          # handle_pending_confirmations(), auto_timeout_confirmations()\n\u251c\u2500\u2500 config.py                 # Config classes (DevConfig, ProdConfig)\n\u251c\u2500\u2500 routes/\n\u2502   \u251c\u2500\u2500 dashboard.py\n\u2502   \u251c\u2500\u2500 rules.py\n\u2502   \u251c\u2500\u2500 messages.py\n\u2502   \u2514\u2500\u2500 api.py\n\u251c\u2500\u2500 templates/                # See 08-CONFIG-UI.md\n\u251c\u2500\u2500 static/                   # CSS overrides, any custom JS\n\u251c\u2500\u2500 lambda/\n\u2502   \u2514\u2500\u2500 lambda_function.py    # Deployed to AWS Lambda\n\u251c\u2500\u2500 test_events/\n\u2502   \u2514\u2500\u2500 voice_command.json    # Test event for lambda invoke\n\u251c\u2500\u2500 bin/\n\u2502   \u251c\u2500\u2500 start.sh              # Start Flask UI\n\u2502   \u251c\u2500\u2500 stop.sh               # Stop Flask UI\n\u2502   \u251c\u2500\u2500 start-daemon.sh       # Start polling daemon\n\u2502   \u2514\u2500\u2500 stop-daemon.sh        # Stop polling daemon\n\u251c\u2500\u2500 data/                     # Gitignored\n\u2502   \u251c\u2500\u2500 alexa.db              # SQLite database\n\u2502   \u251c\u2500\u2500 daemon.pid            # Daemon PID file\n\u2502   \u251c\u2500\u2500 ideas/\n\u2502   \u2502   \u2514\u2500\u2500 book.txt          # file_append destination\n\u2502   \u251c\u2500\u2500 notes.txt             # file_append destination\n\u2502   \u2514\u2500\u2500 logs/                 # bin/ script output logs\n\u251c\u2500\u2500 tests/\n\u251c\u2500\u2500 .env                      # Gitignored; see .env.example\n\u251c\u2500\u2500 .env.example              # Checked in; no real values\n\u2514\u2500\u2500 requirements.txt\n```\n\n---\n\n## .env.example\n\n```bash\n# AWS Credentials (used by daemon + Flask UI; NOT Lambda \u2014 Lambda uses IAM role)\nAWS_ACCESS_KEY_ID=AKIAXXXXXXXXXXXXXXXX\nAWS_SECRET_ACCESS_KEY=your-secret-key-here\nAWS_REGION=us-east-1\n\n# SQS\nSQS_QUEUE_URL=https://sqs.us-east-1.amazonaws.com/123456789012/alexa-prototype-queue\n\n# Alexa Skill\nALEXA_SKILL_ID=amzn1.ask.skill.xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx\n\n# Flask config UI\nSECRET_KEY=change-me-in-production\nFLASK_DEBUG=1\n\n# Daemon\nDAEMON_POLL_INTERVAL=5\n\n# Optional: GAME integration\nGAME_API_URL=http://localhost:5001\nGAME_API_KEY=\n```\n",
