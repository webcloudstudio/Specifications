<!DOCTYPE html>

<head>

<title>GLOBAL RULES Specification</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #0d1117; color: #c9d1d9;
  display: flex; height: 100vh; overflow: hidden;
}
#sidebar {
  width: 260px; min-width: 260px; background: #161b22;
  border-right: 1px solid #21262d; overflow-y: auto; display: flex; flex-direction: column;
}
#sidebar header { padding: 20px 16px 12px; border-bottom: 1px solid #21262d; }
#sidebar header h1 { font-size: 15px; font-weight: 600; color: #f0f6fc; }
#sidebar header p { font-size: 11px; color: #6e7681; margin-top: 4px; }
#sidebar header a { color: #58a6ff; text-decoration: none; font-size: 11px; margin-top: 8px; display: inline-block; }
#sidebar header a:hover { text-decoration: underline; }
.nav-section { padding: 16px 0 8px; }
.nav-section-title {
  font-size: 10px; font-weight: 600; text-transform: uppercase;
  letter-spacing: .08em; color: #6e7681; padding: 0 16px 6px;
}
.nav-item {
  display: block; padding: 7px 16px; font-size: 13px; color: #8b949e;
  cursor: pointer; border-left: 3px solid transparent;
  transition: color .1s, border-color .1s, background .1s; text-decoration: none;
}
.nav-item:hover { color: #c9d1d9; background: #1f2428; }
.nav-item.active { color: #58a6ff; border-left-color: #58a6ff; background: rgba(88,166,255,.06); }
#content { flex: 1; overflow-y: auto; }
#home-panel { padding: 40px 48px; max-width: 860px; }
#doc-panel { padding: 40px 48px; max-width: 860px; display: none; }
#home-panel h2 { font-size: 18px; font-weight: 600; color: #f0f6fc; margin: 24px 0 12px; }
.section-label { font-size: 13px; font-weight: 600; text-transform: uppercase; color: #6e7681; margin-top: 16px; margin-bottom: 12px; letter-spacing: .08em; }
.file-list { list-style: none; }
.file-list li { padding: 6px 0; }
.file-list a { color: #58a6ff; text-decoration: none; cursor: pointer; }
.file-list a:hover { text-decoration: underline; }
.doc-content h1 { font-size: 24px; font-weight: 700; margin: 24px 0 16px; color: #f0f6fc; }
.doc-content h2 { font-size: 20px; font-weight: 600; margin: 20px 0 12px; color: #f0f6fc; }
.doc-content h3 { font-size: 16px; font-weight: 600; margin: 16px 0 8px; color: #c9d1d9; }
.doc-content h4 { font-size: 14px; font-weight: 600; margin: 12px 0 6px; color: #c9d1d9; }
.doc-content p { margin: 12px 0; line-height: 1.6; }
.doc-content ul, .doc-content ol { margin: 12px 0 12px 20px; line-height: 1.6; }
.doc-content li { margin: 6px 0; }
.doc-content pre {
  background: #0d1117; border: 1px solid #21262d; border-radius: 6px; padding: 12px;
  overflow-x: auto; margin: 12px 0; font-size: 12px; line-height: 1.4;
}
.doc-content code {
  background: #161b22; padding: 2px 6px; border-radius: 3px; font-family: 'Monaco', 'Menlo', 'Consolas', monospace;
  font-size: 12px; color: #79c0ff;
}
.doc-content pre code { background: none; padding: 0; }
.doc-content table { border-collapse: collapse; margin: 12px 0; font-size: 13px; }
.doc-content table th, .doc-content table td { padding: 8px 12px; border: 1px solid #21262d; text-align: left; }
.doc-content table th { background: #161b22; font-weight: 600; }
.doc-content blockquote { border-left: 4px solid #58a6ff; padding-left: 16px; margin: 12px 0; color: #8b949e; font-style: italic; }
.doc-content hr { border: none; border-top: 1px solid #21262d; margin: 24px 0; }
.subtitle { font-size: 13px; color: #8b949e; margin: 8px 0 16px; }
</style>
</head>

const DOCS = {
  "CLAUDE_RULES": "# CLAUDE_RULES_START\n\n# DEFAULT DEVELOPMENT RULES\n\n**Version:** 2026-03-16.1\n\nFull specification and methodology: `Specifications/AGENTS.md` in the Specifications repository. This condensed version covers agent behavior only.\n\n---\n\n## Git Workflow\n\n1. Commit immediately after completing a task with no errors.\n2. Commit messages: descriptive text, no \"Claude\"/\"Anthropic\"/\"AI\" mentions.\n3. DO NOT push \u2014 local commits only.\n4. NO co-authored-by lines.\n\nWeb server changes: print \"No restart needed \u2014 browser refresh is enough.\" (templates/CSS/static only) or \"Restart required \u2014 `./bin/start.sh`.\" (Python/JS server files).\n\n---\n\n## Project Layout\n\n```\nProjectName/\n  METADATA.md       Identity (name, port, status, stack, etc.)\n  AGENTS.md         AI context: dev commands, endpoints, architecture\n  CLAUDE.md         Contains only: @AGENTS.md\n  .env.sample       Required env vars (committed)\n  .env              Actual env vars (never committed)\n  bin/              All executable scripts\n    common.sh       Shared functions \u2014 sourced by all bash scripts\n    common.py       Shared OperationContext \u2014 imported by Python scripts\n  doc/              Generated documentation\n  logs/             Log files (gitignored)\n  data/             Persistent data\n  tests/            Test suite\n```\n\n---\n\n## Scripts (`bin/`)\n\nAll scripts live in `bin/` \u2014 bash (`.sh`) or Python (`.py`). The `# CommandCenter Operation` marker in the first 20 lines registers a script with the platform.\n\n**Standard script names** (only create what the project needs):\n\n| Script | Purpose | Name String\n|--------|---------|\n| `bin/start.sh` | Start service \u2014 service projects only | Stop Service |\n| `bin/stop.sh` | Stop service \u2014 service projects only | Stop Service |\n| `bin/build.sh` | Build / compile / package | Build |\n| `bin/daily.sh` | Daily maintenance | Daily Batch |\n| `bin/weekly.sh` | Weekly maintenance | Weekly Batch |\n| `bin/build_documentation.sh` | Generate doc/ output | Build Doc |\n| `bin/deploy.sh` | Deploy to environment | Deploy |\n\nIf the script name matches a Standard Script Name the following header should exist with a Name: field matching the Name String.  If possible\nthese should be the first lines of the file and there should be no other \"# Name:\" or \"# Category:\" fields.\n\n#!/bin/bash\n# CommandCenter Operation\n# Name: {Name String}\n# Category: Operations\n\n**Bash** \u2014 source `common.sh` then add functionality:\n\n```bash\n#!/bin/bash\n# CommandCenter Operation\n# Category: service\nsource \"$(cd \"$(dirname \"$0\")\" && pwd)/common.sh\"\n\n# your start command \u2014 use $PORT for the service port\n# e.g. Flask: export FLASK_DEBUG=1 && flask run --port \"$PORT\"\n```\n\n`common.sh` handles everything: `SCRIPT_NAME`, `PROJECT_DIR`, `cd`, `PROJECT_NAME`, `PORT`, venv activation, `.secrets`/`.env` loading, timestamped log file, SIGTERM trap, and the `[$PROJECT_NAME] Starting:` message. Use `$PORT` as the service port \u2014 never hardcode a port number. Override the trap after sourcing if the script needs custom cleanup.\n\n**Python** \u2014 import `common.py` then add functionality:\n\n```python\n#!/usr/bin/env python3\n# CommandCenter Operation\n# Category: maintenance\nimport sys, os; sys.path.insert(0, os.path.dirname(__file__)); from common import op\n\ndef main(ctx):\n    # ctx.project_name, ctx.port, ctx.logger available \u2014 use ctx.port as the service port\n    pass\n\nif __name__ == '__main__':\n    op(__file__).run(main)\n```\n\n`op(__file__).run(main)` handles the same concerns as `common.sh`: path setup, METADATA.md parsing, env loading, logging, SIGTERM, and status messages.\n\nUse Linux line endings (no `\\r`). Run `chmod +x bin/*.sh`.\n\n---\n\n## METADATA.md\n\n**Authoritative source for project identity.** Always read `name`, `display_name`, `short_description`, and `git_repo` from this file \u2014 never infer them from directory names. Present in every set-up project.\n\nKey-value format (not YAML):\n\n```\n# AUTHORITATIVE PROJECT METADATA - THE FIELDS IN THIS FILE SHOULD BE CURRENT\n\nname: MyProject                              # machine slug, matches directory name\ndisplay_name: My Project                     # human-readable name for UI/display\ngit_repo: https://github.com/org/MyProject   # full HTTPS URL, for links only\nport: 8000                                   # omit if not a service\nshort_description: One sentence.             # shown in dashboards and indexes\nhealth: /health                              # omit if not a service\nstatus: PROTOTYPE                            # IDEA|PROTOTYPE|ACTIVE|PRODUCTION|ARCHIVED\nstack: Python/Flask/SQLite                   # slash-separated, used by generate_prompt.sh\nversion: 2026-03-16.1                        # YYYY-MM-DD.N, increment on releases\nupdated: 20260316_120000                     # set automatically by platform scripts\n```\n\n`port`, `health`, `stack`, and `status` are platform fields \u2014 managed by GAME and platform scripts, not needed for day-to-day agent work. `git_repo` SSH remotes are normalised to HTTPS automatically.\n\n---\n\n## AGENTS.md Required Sections\n\n```markdown\n## Dev Commands\n- Start: `./bin/start.sh`   # service projects only\n- Stop: `./bin/stop.sh`     # service projects only\n- Test: `./bin/test.sh`     # if tests exist\n\n## Service Endpoints        # omit if not a service\n- Local: http://localhost:PORT\n\n## Bookmarks\n- [Documentation](doc/index.html)\n```\n\nOnly include commands and endpoints that actually exist for the project.\n\n# CLAUDE_RULES_END\n",
  "CONVERT": "# Specification Conversion Rules\n\n**How to expand concise project specs into detailed, implementation-ready specifications.**\n\nThese rules are global \u2014 they apply to all projects regardless of stack. Stack-specific expansion is handled by the corresponding `stack/*.md` file.\n\n---\n\n## Expansion Principles\n\n1. **The spec author writes the WHAT.** Column names, screen layouts, triggers, sequences.\n2. **The conversion expands the HOW.** Types, defaults, constraints, HTMX attributes, error handling \u2014 all inferred from stack rules and conventions.\n3. **Stack implies conventions.** If METADATA.md says `stack: Python/Flask/SQLite`, apply every pattern from `stack/python.md`, `stack/flask.md`, `stack/sqlite.md` without the author restating them.\n4. **Don't duplicate stack rules into specs.** If `stack/sqlite.md` says \"WAL mode, FK pragma, Row factory\" then DATABASE.md should NOT repeat that. The build prompt includes both.\n5. **[ROADMAP] items preserve intent only.** Do not expand implementation detail for roadmap features. Keep the description and Open Questions.\n\n---\n\n## DATABASE.md Expansion\n\n**Author writes:** table name, column names, types, and brief notes.\n\n**Conversion adds:**\n- `DEFAULT` clauses (infer from type: TEXT timestamps get `datetime('now')`, booleans get `0`, JSON gets `'{}'`)\n- `NOT NULL` where the column is required (PKs, unique slugs, FKs)\n- `UNIQUE` constraints noted in the author's comments\n- FK references with `REFERENCES table(column)` syntax\n- Index suggestions for columns used in WHERE/JOIN (prefix with `-- INDEX:`)\n- The `_add_column_if_missing()` migration list from the column inventory\n- Convention notes: WAL, FK pragma, JSON blob pattern \u2014 all from `stack/sqlite.md`\n\n**Example \u2014 author writes:**\n\n```markdown\n## projects\n| Column | Type | Notes |\n|--------|------|-------|\n| id | INTEGER PK | |\n| name | TEXT | unique, machine slug |\n| status | TEXT | IDEA/PROTOTYPE/ACTIVE/PRODUCTION/ARCHIVED |\n| extra | JSON | |\n| created_at | TEXT | timestamp |\n```\n\n**Conversion expands to full CREATE TABLE with defaults, constraints, indexes.**\n\n---\n\n## SCREEN-*.md Expansion\n\n**Author writes:** route, columns/sections, interactions, Open Questions.\n\n**Conversion adds:**\n- HTMX attributes for each interaction (`hx-post`, `hx-target`, `hx-swap`)\n- Server response type (HTML fragment vs full page)\n- Reference to UI.md shared components used (nav bar, standard row header, filter bar)\n- Flash message patterns for success/error states\n- `columns=` directive mapped to Bootstrap grid or table layout\n\n---\n\n## FEATURE-*.md Expansion\n\n**Author writes:** trigger, sequence (numbered steps), reads, writes, Open Questions.\n\n**Conversion adds:**\n- Route/endpoint signatures (method, path, return type)\n- Event emissions (from the platform event model)\n- Error handling pattern (catch at route, flash to user, log to platform, never crash)\n- Concurrency notes (one instance per project, async where noted)\n- Cross-references to SCREEN-*.md files that render this feature's output\n\n---\n\n## UI.md Expansion\n\n**Author writes:** component name, purpose, key visual details.\n\n**Conversion adds:**\n- Bootstrap 5 class names and markup patterns\n- CSS variable references (`--cc-surface`, `--cc-border`, etc.)\n- HTMX loading states and swap targets\n- Responsive behavior notes (desktop-first, 1024px minimum)\n\n---\n\n## ARCHITECTURE.md Expansion\n\n**Author writes:** module names, responsibilities, directory layout.\n\n**Conversion adds:**\n- Import relationships between modules\n- Public function signatures (name, params, return)\n- Data flow arrows showing which module calls which\n- Template directory structure with partial naming conventions\n\n---\n\n## Naming Conventions\n\n| Prefix | Contains | Example |\n|--------|----------|---------|\n| `METADATA.md` | Project identity fields | Always present |\n| `README.md` | One-line project description | Always present |\n| `INTENT.md` | Why the project exists | Always present |\n| `DATABASE.md` | Tables and columns | If project has a database |\n| `UI.md` | Shared visual patterns | If project has a UI |\n| `ARCHITECTURE.md` | Code organization | Always present |\n| `SCREEN-{Name}.md` | Per-screen specification | One per screen |\n| `FEATURE-{Name}.md` | Cross-cutting behavior | One per major feature |\n\n**Screen names** match the nav bar label: `SCREEN-Dashboard.md`, `SCREEN-Configuration.md`.\n\n**Feature names** describe the capability: `FEATURE-Scan.md`, `FEATURE-Operations.md`.\n\n---\n\n## Open Questions Section\n\nSpec files end with `## Open Questions` \u2014 except README.md, METADATA.md, and INTENT.md which do not have this section.\n\n```markdown\n## Open Questions\n- Question about a design decision not yet resolved\n- Question about scope or approach\n```\n\nOpen Questions are preserved through conversion. They signal to the builder \"ask the human before deciding.\" Agents add new questions to this section rather than creating new files.\n\n---\n\n## Build Tags\n\nWhen `bin/build.sh` runs, it creates an annotated git tag:\n\n```\nbuild/{project}/{YYYY-MM-DD.N}\n```\n\nAnnotated tags are permanent git objects \u2014 never pruned by `git gc`. This preserves the exact spec state used for each build. Diff between builds:\n\n```bash\ngit diff build/Game-Build/2026-03-19.1..build/Game-Build/2026-03-19.2 -- Game-Build/\n```\n\n---\n\n## Pipeline\n\n```\ncreate_spec.sh  \u2192  (author edits)  \u2192  validate.sh  \u2192  convert.sh  \u2192  build.sh\n   CREATE             DRAFT            VALIDATED       CONVERTED       BUILT\n```\n\n| Step | Script | Output |\n|------|--------|--------|\n| CREATE | `bin/create_spec.sh <name> [\"desc\"]` | Spec directory with template files |\n| DRAFT | (author edits files) | Concise specs |\n| VALIDATED | `bin/validate.sh <name>` | Exit 0 = ready, exit 1 = fix issues |\n| CONVERTED | `bin/convert.sh <name> > convert-prompt.md` | Detailed specs (optional \u2014 build handles inline) |\n| BUILT | `bin/build.sh <name> > build-prompt.md` | Tagged commit + complete build prompt |\n| PROMOTED | (copy spec dir to own repo) | Independent project |\n\nOne-shot path: skip CONVERTED, go straight from VALIDATED to BUILT. `bin/build.sh` includes CONVERT.md so the AI agent handles expansion and building in a single pass.\n",
  "DOCUMENTATION_BRANDING": "# Documentation Branding Standards\n\n**Version:** 1.1 \u2014 2026-03-17\n**Maintainer:** Ed Barlow / SQL Technologies\n**Reference implementation:** `/mnt/c/Users/barlo/projects/gem/doc/`\n\n---\n\n## Design Philosophy\n\nDocumentation uses a **dark chrome / light content** split:\n\n- **Navigation chrome** (top bar, left sidebar) \u2014 dark background, light text. Always dark regardless of content mode.\n- **Content area** \u2014 light background (`#F4FAF4` tinted white), dark text. Optimised for reading long documents.\n- **Hyperlinks in content** \u2014 standard blue, always underlined. This is the web convention and should not be overridden for content links.\n- **Navigation links** \u2014 no underline. Hover shows a colored left border (accent color) and subtle background lift.\n\nThe dark chrome and the content area create a natural frame. The sidebar and top bar read as **one continuous dark panel** \u2014 they use the same background color family, with the top bar slightly darker than the sidebar body.\n\n---\n\n## The Four-Color System\n\nEvery theme reduces to four visible color families:\n\n| # | Role | Where used | Example (Evergreen) |\n|---|---|---|---|\n| 1 | **Top bar** (darkest) | `body.gem-topbar` background | `#071208` |\n| 2 | **Sidebar + section banners** (slightly lighter) | `body.gem-sidebar`, content `<h1>` section dividers | `#0C1E10` |\n| 3 | **Light text on dark** | Sidebar links, top bar text, GEM badge text, version, copyright | `#90C898` |\n| 4 | **Accent** | GEM badge bg, sidebar hover indicator (3px left border), h1 underline, callout borders | `#7AE890` |\n\nContent headings (h1/h2/h3) use progressively lighter shades of the theme's base hue on the light content background. Hyperlinks are always `#1565C0` blue regardless of theme.\n\n**Rule:** If two things are in the dark chrome zone, they must either be the same color or clearly different shades of the same family. Never place dark green text on a dark green background.\n\n---\n\n## Available Themes\n\nSix themes ship with the reference implementation. Each is defined as a single `:root {}` CSS variable block.\n\n| Theme name | Base color | Hex | Character |\n|---|---|---|---|\n| `green` *(default)* | Evergreen | `#1B5E20` | Forest green, clean |\n| `midnight` | Midnight Blue | `#0D3B8E` | Corporate navy |\n| `purple` | Royal Purple | `#4527A0` | Distinctive, dramatic |\n| `midnight-green` | Midnight Green | `#004953` | Deep teal |\n| `mughal` | Mughal Green | `#306030` | Rich forest |\n| `rainforest` | Tropical Rainforest | `#00755E` | Warm teal-green |\n\n---\n\n## Theme Variable Reference\n\nThe complete set of CSS custom properties required per theme. Copy this block and fill in values to create a new theme.\n\n```css\n/* GEM Theme: <Name>  |  gem-base.css must follow this file */\n:root {\n  /* \u2500\u2500 Dark chrome (top bar + sidebar) \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */\n  --c-topbar-bg:     ;   /* darkest \u2014 top bar background */\n  --c-side-bg:       ;   /* slightly lighter \u2014 sidebar body + content section banners */\n  --c-side-border:   ;   /* border between chrome and content, scrollbar */\n  --c-side-section:  ;   /* muted section label text (small uppercase in sidebar) */\n  --c-side-link:     ;   /* sidebar link text, top bar version + copyright text */\n\n  /* \u2500\u2500 Accent \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */\n  --c-accent:        ;   /* GEM badge bg, sidebar hover left border, callout borders */\n  --c-accent-text:   ;   /* text ON the GEM badge (usually very dark, matches topbar) */\n\n  /* \u2500\u2500 Content headings (on light bg \u2014 must be \u22654.5:1 contrast) \u2500 */\n  --c-h1:            ;   /* darkest heading \u2014 close to base color */\n  --c-h1-border:     ;   /* h1 underline (light tint of theme color) */\n  --c-h2:            ;   /* medium heading */\n  --c-h2-border:     ;   /* h2 underline (lighter) */\n  --c-h3:            ;   /* lighter heading */\n\n  /* \u2500\u2500 Content area \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */\n  --c-bg:            ;   /* page background (tinted white, not pure white) */\n  --c-text:          ;   /* body text (very dark, near-black, slight tint of theme) */\n\n  /* \u2500\u2500 Tables \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */\n  --c-th-bg:         ;   /* table header background (use h1 color or darker) */\n  --c-th-text:       ;   /* table header text (light) */\n  --c-td-border:     ;   /* cell borders (light tint) */\n  --c-tr-alt:        ;   /* alternating row background */\n  --c-tr-hover:      ;   /* row hover background */\n\n  /* \u2500\u2500 Code \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */\n  --c-code-bg:       ;   /* inline code background (light tint) */\n  --c-code-text:     ;   /* inline code text (h1 or h2 color) */\n  --c-pre-bg:        ;   /* code block background (match topbar-bg) */\n  --c-pre-text:      ;   /* code block text (match side-link) */\n\n  /* \u2500\u2500 Callout box \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */\n  --c-callout-bg:    ;   /* rgba(accent, 0.07) */\n  --c-callout-border:;   /* rgba(accent, 0.25) */\n\n  /* \u2500\u2500 Footer \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */\n  --c-foot-text:     ;   /* muted copyright footer text */\n}\n```\n\n### Evergreen (default) \u2014 complete example\n\n```css\n:root {\n  --c-topbar-bg:     #071208;\n  --c-side-bg:       #0C1E10;\n  --c-side-border:   #1A4828;\n  --c-side-section:  #5A9868;\n  --c-side-link:     #90C898;\n\n  --c-accent:        #7AE890;\n  --c-accent-text:   #071208;\n\n  --c-h1:            #1B5E20;\n  --c-h1-border:     #B8DFC0;\n  --c-h2:            #2E7D32;\n  --c-h2-border:     #C8EAC8;\n  --c-h3:            #388E3C;\n\n  --c-bg:            #F4FAF4;\n  --c-text:          #0D2010;\n\n  --c-th-bg:         #1B5E20;\n  --c-th-text:       #E8F5E9;\n  --c-td-border:     #B8DFC0;\n  --c-tr-alt:        #EDF7EE;\n  --c-tr-hover:      #D4EDDA;\n\n  --c-code-bg:       #DFF0E0;\n  --c-code-text:     #1B5E20;\n  --c-pre-bg:        #071208;\n  --c-pre-text:      #90C898;\n\n  --c-callout-bg:    rgba(74,200,112,0.07);\n  --c-callout-border:rgba(74,200,112,0.25);\n\n  --c-foot-text:     #6A9F72;\n}\n```\n\n---\n\n## Typography\n\nNo web fonts. Uses the OS system font stack \u2014 renders natively on Windows, Mac, and Linux.\n\n```css\n/* All text */\nfont-family: 'Segoe UI', 'Trebuchet MS', Arial, Helvetica, sans-serif;\n\n/* Code and pre blocks */\nfont-family: 'Cascadia Code', 'Consolas', 'Courier New', monospace;\n```\n\n| Element | Size | Weight | Notes |\n|---|---|---|---|\n| Body | 16px | 400 | `line-height: 1.7` |\n| h1 | 26px | 700 | Theme h1 color + thin underline |\n| h2 | 20px | 600 | Theme h2 color + thin underline |\n| h3 | 17px | 600 | Theme h3 color, no decoration |\n| h4\u2013h6 | 15\u201313px | 600 | Theme h3 color |\n| Sidebar links | 13.5px | 400 | `--c-side-link` color |\n| Sidebar section labels | 9.5px | 700 | `--c-side-section` color, uppercase, `letter-spacing: 1px` |\n| Top bar title | 15px | 500 | White (`#FFFFFF`) always |\n| Top bar nav links | 13px | 600 | White (`#FFFFFF`) always |\n| Version badge | 11px | 500 | `rgba(255,255,255,0.75)`, pill border |\n| Copyright | 11.5px | 400 | `rgba(255,255,255,0.65)` |\n| Code inline | 13px | 400 | Monospace, tinted bg |\n| Code block | 13px | 400 | Monospace, dark bg matching topbar |\n| Footer | 12.5px | 400 | `--c-foot-text` |\n\n---\n\n## Link Rules\n\n| Context | Style | Rationale |\n|---|---|---|\n| Content body (`<a>`) | `color: #1565C0; text-decoration: underline` | Standard web hyperlink convention |\n| Content visited | Same blue `#1565C0` | Prevents the default browser purple, which clashes with dark themes |\n| Content hover | Darker blue `#0D3B8E`, still underlined | Feedback without color drama |\n| Sidebar nav links | `--c-side-link` color, no underline | Navigation item, not a body link |\n| Sidebar nav hover | White text + subtle bg + 3px accent left border | Conquer 2026 / ezdocs pattern |\n| Top bar nav links | Same as sidebar links | Unified chrome |\n| Top bar nav hover | White text + subtle bg + 2px accent bottom border | Horizontal nav variant |\n| Links inside section banners (dark bg) | `rgba(255,255,255,0.88)`, underlined | Must be readable on dark background |\n\n---\n\n## Page Structure\n\n### Three-panel (frameset \u2014 legacy projects like GEM)\n\n```\n\u250c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510\n\u2502  TOP BAR (top.htm) \u2014 56px                               \u2502\n\u2502  [GEM] [Build/version] Title  \u2502  Nav links  \u2502 Copyright \u2502\n\u2502  bg: --c-topbar-bg             \u2502             \u2502           \u2502\n\u251c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u252c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2524\n\u2502 SIDEBAR          \u2502  CONTENT                              \u2502\n\u2502 (toc.htm) 24%   \u2502  (readme.htm) 76%                    \u2502\n\u2502 bg: --c-side-bg  \u2502  bg: --c-bg (light)                  \u2502\n\u2502                  \u2502                                       \u2502\n\u2502 [Section label]  \u2502  [dark banner \u2014 bg: --c-side-bg]     \u2502\n\u2502   Nav link       \u2502    h1 heading (white on dark)         \u2502\n\u2502   Nav link       \u2502  [dark banner ...]                    \u2502\n\u2502   Nav link \u25c0\u258c    \u2502                                       \u2502\n\u2502   (hover: left   \u2502  Body text, tables, code              \u2502\n\u2502    accent bar)   \u2502                                       \u2502\n\u2502                  \u2502  [footer \u2014 copyright]                 \u2502\n\u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2534\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518\n```\n\nThe sidebar title strip uses `--c-topbar-bg` \u2014 same as the top bar \u2014 so the top-left corner reads as one unified dark header.\n\n### Single-page (modern projects like ezdocs, conquer_2026, EdBarlowsStoredProcs)\n\n```html\n<body>                          <!-- bg: --c-bg -->\n  <nav class=\"sidebar\">         <!-- bg: --c-side-bg, left border -->\n    <div class=\"sidebar-header\"> <!-- bg: --c-topbar-bg -->\n      <h1>Project Name</h1>\n      <p>v1.0 \u2014 subtitle</p>\n    </div>\n    <div class=\"nav-section\">SECTION</div>\n    <a href=\"#anchor\">Link text</a>\n  </nav>\n  <main>                        <!-- max-width: 860px, padding -->\n    <h1>...</h1>\n    ...\n  </main>\n</body>\n```\n\n---\n\n## Section Divider Banners (Legacy HTML)\n\nLegacy content files use `<TABLE BGCOLOR=#0066cc>` as section heading banners. The theme reskins these using `--c-side-bg` (sidebar color) so banners match the sidebar:\n\n```css\ntable[bgcolor=\"#0066cc\"] {\n  background: var(--c-side-bg) !important;\n  border: 1px solid var(--c-side-border) !important;\n  border-radius: 4px;\n  width: 100% !important;\n  margin: 20px 0 12px 0 !important;\n}\ntable[bgcolor=\"#0066cc\"] h1,\ntable[bgcolor=\"#0066cc\"] h2 {\n  color: #FFFFFF !important;   /* CRITICAL: must be white on dark bg */\n  border: none !important;\n}\n```\n\n---\n\n## Callout / Note Boxes\n\n```html\n<div class=\"gem-note\">\n  <strong>Note:</strong> important information here.\n</div>\n```\n\nOr use a plain `<blockquote>` \u2014 both are styled identically:\n- Background: `rgba(accent, 0.07)` tinted\n- Left border: `4px solid --c-accent`\n- Border: `1px solid rgba(accent, 0.25)`\n\n---\n\n## Implementation for a New Project\n\n### Option A \u2014 Modern single-page doc (recommended for new projects)\n\n1. Copy `gem/doc/styles/gem-base.css` to your project's `doc/styles/`.\n2. Create `doc/styles/themes/` and copy the theme files you want.\n3. In your build script, concatenate theme + base:\n   ```bash\n   cat doc/styles/themes/green.css doc/styles/gem-base.css > doc/styles/gem.css\n   ```\n4. Reference `gem.css` in your HTML:\n   ```html\n   <link rel=\"stylesheet\" href=\"styles/gem.css\">\n   ```\n5. Use `body` with no class for content pages. Classes `gem-topbar` and `gem-sidebar` are reserved for the navigation chrome.\n\n### Option B \u2014 Legacy frameset project\n\nUse `bin/build_documentation.sh` from the GEM project as a reference. It:\n1. Generates `gem.css` from a theme file + base CSS.\n2. Runs `bin/update_doc_theme.pl` to rebuild `top.htm`, `toc.htm`, update frameset heights, inject CSS + copyright footers into content files, and humanize CamelCase nav link text.\n\nTo port to a new project, copy both scripts and adjust the nav links in `process_top()`.\n\n### Switching themes\n\n```bash\n./bin/build_documentation.sh --theme=green          # default\n./bin/build_documentation.sh --theme=midnight\n./bin/build_documentation.sh --theme=purple\n./bin/build_documentation.sh --theme=midnight-green\n./bin/build_documentation.sh --theme=mughal\n./bin/build_documentation.sh --theme=rainforest\n./bin/build_documentation.sh --theme=X --css-only   # rebuild CSS only, no HTML\n```\n\n---\n\n## Reference Files\n\n| File | Location | Purpose |\n|---|---|---|\n| `gem-base.css` | `gem/doc/styles/gem-base.css` | All structural CSS rules (no colors) |\n| `themes/*.css` | `gem/doc/styles/themes/` | One file per theme \u2014 only `:root {}` variables |\n| `gem.css` | `gem/doc/styles/gem.css` | Generated active theme (do not edit) |\n| `build_documentation.sh` | `gem/bin/` | Build entry point |\n| `update_doc_theme.pl` | `gem/bin/` | HTML processor (frameset projects) |\n| `DOC_STANDARDS.md` | `gem/doc/DOC_STANDARDS.md` | GEM-specific build instructions |\n\n---\n\n## Copyright\n\nCopyright notices appear in two places:\n1. **Top bar** \u2014 extracted verbatim from the source `top.htm` file. Never modified by the build script.\n2. **Page footer** \u2014 injected before `</body>` if not already present. Text is extracted from the page's own content, or falls back to `Copyright \u00a9 1994\u20132012 SQL Technologies. All rights reserved.`\n\nFor new projects, put the copyright in the sidebar header or page footer as appropriate.\n\n---\n\n## What Not to Do\n\n| \u274c Don't | \u2713 Do instead |\n|---|---|\n| Dark text on dark background | Always verify: `--c-side-section` must be lighter than `--c-side-bg` |\n| Purple visited links (`#6040a0`) | Keep `a:visited` the same blue as `a:link` |\n| Gradient on top bar that differs from sidebar | Flat `--c-topbar-bg`, no gradient |\n| Top bar background lighter than sidebar | Top bar = darkest shade; sidebar = slightly lighter |\n| CamelCase nav text (`TheWin32Process`) | Run through humanizer or write with spaces from the start |\n| Different link styles per theme | Links are always `#1565C0` blue + underlined in content |\n| Font size chaos (mixing 8pt/16pt/12px) | Use the type scale above; body = 16px base |\n",
  "README": "# Global Rules\n\nStandards distributed to all projects. Changes here propagate via `bin/update_projects.sh`.\n\n| File | Purpose | Distributed To |\n|------|---------|----------------|\n| `CLAUDE_RULES.md` | Agent behavior contract | Injected into each project's AGENTS.md |\n| `DOCUMENTATION_BRANDING.md` | Documentation theming, color system, typography | Referenced by build_documentation scripts |\n| `templates/common.sh` | Bash script infrastructure | Copied to each project's `bin/common.sh` |\n| `templates/common.py` | Python script infrastructure | Copied to each project's `bin/common.py` |\n| `stack/*.md` | Prescriptive tech patterns per technology | Used by `generate_prompt.sh` for build prompts |\n| `gitignore` | Standard .gitignore | Copied to new projects on creation |\n\n**After any change:** run `bash bin/update_projects.sh` from the Specifications root.\n",
};

marked.setOptions({ gfm: true, breaks: false });

function buildDocList() {
  const list = document.getElementById('doc-list');
  Object.keys(DOCS).sort().forEach(key => {
    const li = document.createElement('li');
    const a = document.createElement('a');
    a.textContent = key.replace(/-/g, ' ');
    a.onclick = () => showDoc(key);
    li.appendChild(a);
    list.appendChild(li);
  });
}

function showDoc(key) {
  if (!DOCS[key]) {
    console.warn('Document not found:', key);
    return;
  }
  document.getElementById('home-panel').style.display = 'none';
  document.getElementById('doc-panel').style.display = 'block';

  document.getElementById('doc-content').innerHTML = marked.parse(DOCS[key]);

  document.querySelectorAll('.file-list a').forEach(el => el.classList.remove('active'));
  const activeLink = Array.from(document.querySelectorAll('.file-list a')).find(a => a.textContent.replace(/ /g, '-') === key);
  if (activeLink) activeLink.classList.add('active');
}

buildDocList();
</script>
